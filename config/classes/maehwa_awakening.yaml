# ============================================================================
# BDO Trainer - Awakened Maehwa Combo Configuration
# ============================================================================
# Class: Maehwa (Awakening)
# Weapons: Blade (Main) / Horn Bow (Off) / Kerispear (Awakening)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Note: Maehwa has NO grab. She relies on CC chains and burst to secure kills.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Maehwa Class Discord
#   - Community guides by Al募, Vert, JinHiYo, FlexTape
# ============================================================================

class: Maehwa
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    moonrise:
        name: "Moonrise"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Main awakening damage slash. Super Armor throughout with knockdown on hit."
        flows_into: ["flow_moonrise", "petal_drill", "frost_pillars"]
        notes: "Bread-and-butter damage skill. Always chain into Flow: Moonrise."

    flow_moonrise:
        name: "Flow: Moonrise"
        input: "LMB (after Moonrise)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Moonrise. Additional burst with Super Armor."
        flows_into: ["petal_drill", "frost_pillars", "stigma"]
        notes: "Always chain after Moonrise for extra damage. Down attack properties."

    petal_drill:
        name: "Petal Drill"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 8000
        description: "Multi-hit piercing thrust with Super Armor. Highest single-target damage in kit."
        flows_into: ["flow_petal_drill", "moonrise", "frost_pillars"]
        core_effect: "Core: Petal Drill - Extra hits and increased damage on all hits"
        notes: "Core skill. Best single-target burst in Maehwa's kit. Essential for 1v1."

    flow_petal_drill:
        name: "Flow: Petal Drill"
        input: "RMB (after Petal Drill)"
        keys: ["rmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Petal Drill. Extends the piercing combo with Super Armor."
        flows_into: ["moonrise", "frost_pillars", "stigma"]
        notes: "Always follow Petal Drill with this for extra hits. Air attack properties."

    petal_bloom:
        name: "Petal Bloom"
        input: "W + F"
        keys: ["w", "f"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 9000
        description: "Forward charge with Forward Guard and bound CC on hit."
        flows_into: ["moonrise", "petal_drill", "flow_cloud_stab"]
        core_effect: "Core: Petal Bloom - Bound on hit, increased damage"
        notes: "Good engage tool with frontal protection. Use to catch targets."

    frost_pillars:
        name: "Frost Pillars"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Ice pillar eruption with Super Armor. Strong AOE damage."
        flows_into: ["flow_tip_of_an_iceberg", "moonrise", "petal_drill"]
        notes: "Strong AOE. Flows into Tip of an Iceberg. Good PVE clear."

    flow_tip_of_an_iceberg:
        name: "Flow: Tip of an Iceberg"
        input: "LMB (after Frost Pillars)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Frost Pillars. Extends ice eruption with Super Armor."
        flows_into: ["moonrise", "petal_drill", "stigma"]
        notes: "Always chain after Frost Pillars for extra damage and hits."

    stigma:
        name: "Stigma"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor debuff strike. Reduces target DP and applies stiffness."
        flows_into: ["moonrise", "petal_drill", "frost_pillars"]
        notes: "DP debuff. Use before burst for maximum damage. Good PVP opener."

    royal_rage:
        name: "Royal Rage"
        input: "Q"
        keys: ["q"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff. Increases AP, attack speed, and critical hit rate. Super Armor."
        flows_into: ["sleet_steps", "moonrise", "petal_drill"]
        core_effect: "Core: Royal Rage - Increased buff duration and Super Armor"
        notes: "Use before engaging. Similar to Warrior's Solar Flare. Hotbar recommended."

    sleet_steps:
        name: "Sleet Steps"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Super Armor dash. Primary awakening movement. PVE iframe."
        flows_into: ["moonrise", "petal_drill", "frost_pillars"]
        notes: "Primary movement in awakening. PVE iframe (1s invincibility vs monsters). Spammable."

    sticky_snowflake:
        name: "Sticky Snowflake"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard ice strike with stiffness CC."
        flows_into: ["moonrise", "petal_drill", "frost_pillars"]
        notes: "Good CC tool with frontal protection. Use to fish for stiffness in PVP."

    decapitation:
        name: "Decapitation"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "none"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward rushing slash with knockback. Unprotected but fast."
        flows_into: ["moonrise", "petal_drill", "flow_cloud_stab"]
        notes: "Fast approach but unprotected. Use carefully in PVP."

    flow_cloud_stab:
        name: "Flow: Cloud Stab"
        input: "F (after awakening skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard thrust available after multiple awakening skills."
        flows_into: ["moonrise", "petal_drill", "frost_pillars"]
        notes: "Can chain after many awakening skills. Good filler with FG."

    flow_december:
        name: "Flow: December"
        input: "LMB (after Stigma)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Stigma. Extends debuff combo with additional damage."
        flows_into: ["moonrise", "petal_drill"]
        notes: "Chain after Stigma for extended damage and CC."

    oppression:
        name: "Oppression"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor overhead slam from hotbar. Good protected burst."
        flows_into: ["moonrise", "petal_drill"]
        notes: "Put on hotbar. Good protected damage filler."

    cataclysm:
        name: "Cataclysm"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 12000
        description: "Wide AOE ice explosion from hotbar. Super Armor."
        flows_into: ["moonrise", "frost_pillars"]
        notes: "Hotbar skill. Good for AOE situations and large scale."

    moon_slash:
        name: "Moon Slash"
        input: "LMB (basic)"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic awakening auto-attack chain. Unprotected."
        flows_into: ["moonrise", "petal_drill"]
        notes: "Filler only. Avoid using when other skills are available."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
