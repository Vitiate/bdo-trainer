        name: "Whirlwind Frost"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Spinning ice slash with Super Armor and stiffness CC. Good for movement and engage."
        notes: "Preferred L56 Rabam. Fast animation with SA. Good filler and movement."

    winter_veil:
        name: "Winter Veil"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 8000
        description: "SA ice shield dash. Movement skill with brief Super Armor."
        notes: "Preferred L57 Rabam. Safe movement. SA throughout animation."

    frozen_lance:
        name: "Frozen Lance"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 14000
        description: "Long-range ice lance thrust from hotbar. SA with knockdown."
        notes: "Put on hotbar. Neither L58 Rabam is exceptional. Decent ranged poke."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    chase:
        name: "Chase"
        input: "Shift + Direction"
        keys: ["shift", "w"]
        keys_alt: ["shift", "a"]
        protection: "iframe"
        cc: []
        description: "Signature iframe dash. Maehwa's core movement ability. Same as Musa Chase."
        notes: "Best movement in the game. Iframe during animation. Consumes stamina. Spam for mobility."

    red_moon:
        name: "Red Moon"
        input: "Shift + LMB (pre-awakening)"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Pre-awakening blade slash. Still useful for damage filler when swapping."
        notes: "Can be used during weapon swap windows. Decent damage."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe."
        notes: "Useful dodge. Lock in PVP if it interferes with Chase movement."

    blooming:
        name: "Blooming"
        input: "LMB + RMB"
        keys: ["lmb", "rmb"]
        protection: "FG"
        cc: ["knockdown"]
        description: "Forward Guard wide slash. Good pre-awakening filler with frontal protection."
        notes: "Decent filler on weapon swap. FG protection is useful."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "sleet_steps"
              input: "Space"
              keys: ["space"]
              note: "Gap close to pack"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage opener"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "High single-target damage"
            - skill: "frost_pillars"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "AOE cleanup"
            - skill: "flow_tip_of_an_iceberg"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend Frost Pillars"
            - skill: "sleet_steps"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff first, then unload."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "royal_rage"
              input: "Q"
              keys: ["q"]
              note: "AP/crit buff before engaging"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Dash into pack"
            - skill: "stigma"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "DP debuff on mobs"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "frost_pillars"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "AOE damage"
            - skill: "flow_tip_of_an_iceberg"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend AOE"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finish remaining mobs"
            - skill: "flow_petal_drill"
              input: "RMB"
              keys: ["rmb"]
              note: "Extra hits on survivors"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize Chase mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Dash into pack"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot burst"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Dash to next pack"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Burst next pack"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Continue movement chain"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "royal_rage"
              input: "Q"
              keys: ["q"]
              note: "Buff up"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Engage"
            - skill: "stigma"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "DP debuff opener"
            - skill: "flow_december"
              input: "LMB"
              keys: ["lmb"]
              note: "Flow follow-up"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "High damage"
            - skill: "flow_petal_drill"
              input: "RMB"
              keys: ["rmb"]
              note: "Extend burst"
            - skill: "frost_pillars"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "AOE cleanup"
            - skill: "flow_tip_of_an_iceberg"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend AOE"
            - skill: "whirlwind_frost"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"
            - skill: "oppression"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Extra burst from hotbar"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills and Chase iframe.
            Approach with protection, poke with stiffness, then burst.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "royal_rage"
              input: "Q"
              keys: ["q"]
              note: "SA buff before going in"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe gap close"
            - skill: "stigma"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA stiffness + DP debuff"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher burst"

    stiffness_burst:
        name: "Stiffness into Burst (1v1)"
        description: >
            Core Maehwa PVP combo. Fish for a stiffness CC with Sticky Snowflake
            then chain into full burst. No grab available — rely on CC catches.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe approach"
            - skill: "sticky_snowflake"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "stigma"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA stiffness chain + DP debuff"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA knockdown on stiffened target"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage finisher"
            - skill: "flow_petal_drill"
              input: "RMB"
              keys: ["rmb"]
              note: "Extend burst for the kill"

    petal_bloom_catch:
        name: "Petal Bloom Catch Combo"
        description: >
            Use Petal Bloom's Forward Guard to approach and bound the target,
            then follow up with full burst. Good for catching dashes.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "petal_bloom"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG bound — catch the target"
            - skill: "stigma"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA DP debuff on bound target"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage burst"
            - skill: "flow_petal_drill"
              input: "RMB"
              keys: ["rmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Chase in with iframe, unload
            damage quickly while staying in Super Armor.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe into melee range"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA knockdown opener"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage"
            - skill: "flow_petal_drill"
              input: "RMB"
              keys: ["rmb"]
              note: "Extend burst"

    down_attack_punish:
        name: "Down Attack Follow-up (After Ally CC)"
        description: >
            Maximum damage combo when your teammate lands a grab or CC.
            Maehwa has no grab — this is your role when allies CC for you.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "stigma"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "DP debuff on CC'd target"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Highest single-target burst"
            - skill: "flow_petal_drill"
              input: "RMB"
              keys: ["rmb"]
              note: "Extend burst"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Follow-up damage"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use Chase iframes and SA movement
            to create distance. Maehwa excels at disengaging thanks to Chase.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "sleet_steps"
              input: "Space"
              keys: ["space"]
              note: "SA dash away"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe backwards"
            - skill: "chase"
              input: "Shift + A"
              keys: ["shift", "a"]
              note: "Iframe to the side"
            - skill: "winter_veil"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement to create space"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Continue dashing to safety"

    large_scale_siege:
        name: "Large Scale / Node War"
        description: >
            Node war and siege combo. Maehwa is best as a flanker in large scale.
            Dive backline, burst a target, then Chase out. Hit and run.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "royal_rage"
              input: "Q"
              keys: ["q"]
              note: "Buff before flanking"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe approach to backline"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Continue iframe approach"
            - skill: "stigma"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA DP debuff on target"
            - skill: "moonrise"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_moonrise"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "petal_drill"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage to finish"
            - skill: "flow_petal_drill"
              input: "RMB"
              keys: ["rmb"]
              note: "Extend burst"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe disengage out"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Continue retreat to safety"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    chase_chain:
        name: "Chase Chain / Fast Travel"
        description: "Chain Chase dashes for fastest traversal. Maehwa's signature mobility."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
