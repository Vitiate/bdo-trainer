# ============================================================================
# BDO Trainer - Succession Sage Combo Configuration
# ============================================================================
# Class: Sage (Succession)
# Weapons: Kyve (Main) / Talisman (Off)
# Damage Type: Magic/Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Sage Class Discord
#   - Community guides by Dazzler, Eminent, Tatsuya, FakeUni
# ============================================================================

class: Sage
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Pre-Awakening Skills)
# --------------------------------------------------------------------------
awakening_skills:
    rift_chain:
        name: "Rift Chain"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Succession-enhanced spatial slash. SA throughout with knockdown. Extended hit count and range over awakening version."
        flows_into: ["flow_rift_collapse", "spatial_collapse", "void_rift"]
        core_effect: "Core: Rift Chain - Extra hits, increased damage, reduced cooldown"
        notes: "Primary damage skill. Succession enhancement greatly extends range and hit count. Core this first."

    flow_rift_collapse:
        name: "Flow: Rift Collapse"
        input: "LMB (after Rift Chain)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Rift Chain. Succession-enhanced collapse for additional burst."
        flows_into: ["spatial_collapse", "void_rift", "lightning_strike"]
        notes: "Always chain after Rift Chain. Succession version has wider AOE."

    spatial_collapse:
        name: "Spatial Collapse"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Succession-enhanced spatial implosion. SA with bound. Massive AOE and damage."
        flows_into: ["rift_chain", "lightning_strike", "void_rift"]
        core_effect: "Core: Spatial Collapse - Bound on good hits, extended AOE radius"
        notes: "Heavy burst skill. Succession enhancement increases AOE significantly."

    ators_mark:
        name: "Ator's Mark"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Succession-enhanced forward teleport-dash. SA with stiffness. Strong engage tool."
        flows_into: ["flow_ators_implosion", "rift_chain", "spatial_collapse"]
        core_effect: "Core: Ator's Mark - SA on cooldown, stiffness on all hits"
        notes: "Primary engage skill. Succession version has increased dash distance."

    flow_ators_implosion:
        name: "Flow: Ator's Implosion"
        input: "F (after Ator's Mark)"
        keys: ["f"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Ator's Mark. Detonates spatial mark for AOE knockback."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Always chain after Ator's Mark. Good transition into main damage skills."

    void_rift:
        name: "Void Rift"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 6000
        description: "Succession-enhanced backward rift slash. SA with float. Creates void zone."
        flows_into: ["rift_chain", "spatial_collapse", "lightning_strike"]
        notes: "Good defensive option. Succession version leaves a lingering damage zone."

    lightning_strike:
        name: "Lightning Strike"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 9000
        description: "Succession-enhanced lightning barrage. SA throughout. Long range AOE with knockdown."
        flows_into: ["rift_chain", "spatial_collapse", "void_rift"]
        core_effect: "Core: Lightning Strike - Increased hit count and knockdown on all hits"
        notes: "Signature succession ranged nuke. Massive damage at distance."

    kyve_barrier:
        name: "Kyve Barrier"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 3000
        description: "Forward Guard spatial shield. Succession-enhanced with faster recovery."
        flows_into: ["rift_chain", "ators_mark", "spatial_recall"]
        notes: "Hold Q to block. Use between cooldowns and for baiting grabs."

    spatial_recall:
        name: "Spatial Recall"
        input: "Shift + Space"
        keys: ["shift", "space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 10000
        description: "Succession-enhanced teleport. Blinks back to a previously marked position. iframe during teleport."
        flows_into: ["rift_chain", "ators_mark"]
        notes: "Unique Sage utility. Succession version has reduced cooldown. Great escape tool."

    rift_walk:
        name: "Rift Walk"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 5000
        description: "Succession-enhanced spatial dash. iframe throughout. Primary movement skill."
        flows_into: ["rift_chain", "ators_mark", "spatial_collapse"]
        notes: "Core mobility tool. Succession version has iframe instead of SA."

    lightning_prison:
        name: "Lightning Prison"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["stun"]
        damage: low
        cooldown_ms: 8000
        description: "Succession-enhanced ranged lightning cage. Stuns enemies in an area."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Useful ranged CC. Unprotected — use from distance or on CC'd targets."

    dimensional_fracture:
        name: "Dimensional Fracture"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Succession-enhanced rift tear. FG with stiffness. Strong poke at range."
        flows_into: ["rift_chain", "spatial_collapse", "void_rift"]
        notes: "Safe poke with frontal protection. Excellent for fishing for CC in PVP."

    rift_spear:
        name: "Rift Spear"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Succession-enhanced forward thrust. FG with stiffness. Quick ranged poke."
        flows_into: ["rift_chain", "spatial_collapse", "ators_mark"]
        core_effect: "Core: Rift Spear - Forward Guard during the skill"
        notes: "Fast engage tool with frontal protection. Good for starting CC chains."

    convergence:
        name: "Convergence"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 24000
        description: "Self-buff. Increases AP, casting speed, and crit rate. SA during cast."
        flows_into: ["rift_chain", "ators_mark", "rift_walk"]
        core_effect: "Core: Convergence - Extended buff duration and added movement speed"
        notes: "Use before engaging packs or PVP fights. Hotbar recommended for tracking."

    lightning_bolt:
        name: "Lightning Bolt"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Succession-enhanced forward bolt strike. SA with knockback. Good ranged filler."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Solid ranged damage option. Good filler between main skill cooldowns."

    flow_thunder_cascade:
        name: "Flow: Thunder Cascade"
        input: "RMB (after succession skills)"
        keys: ["rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up FG attack available after multiple succession skills."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Can be chained after many skills. Good filler with frontal protection."

    spatial_distortion:
        name: "Spatial Distortion"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["pull"]
        damage: low
        cooldown_ms: 15000
        description: "FG spatial vortex. Pulls enemies into a singularity. Great for grouping."
        flows_into: ["spatial_collapse", "rift_chain"]
        notes: "Hotbar skill. Excellent for grouping mobs in PVE and disrupting in PVP."

    lightning_storm:
        name: "Lightning Storm"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 12000
        description: "SA lightning bombardment over a wide area. Strong AOE burst from hotbar."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Hotbar skill. Excellent burst for large-scale and PVE."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    rift_convergence:
        name: "Rift Convergence"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Spatial burst with stiffness CC. SA throughout. Good for engage and movement."
        notes: "Preferred L56 Rabam. SA movement with CC makes it versatile for PVP and grinding."

    spatial_barrier:
        name: "Spatial Barrier"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 8000
        description: "SA protective spatial dome. Grants DP buff and SA during movement. Preferred L57 Rabam."
        notes: "Preferred choice. Provides protected movement and defensive buff."

    void_collapse:
        name: "Void Collapse"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 14000
        description: "Hotbar spatial detonation. SA with knockdown. Additional burst option."
        notes: "Optional L58 Rabam. Decent burst but long cooldown. Put on hotbar."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Sage PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Sage has one of the better grab ranges. Practice grab timing."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Brief invincibility during the dodge."
        notes: "PVE iframe. Lock in PVP to prevent accidental use if preferred."

    kyve_strike:
        name: "Kyve Strike"
        input: "LMB"
        keys: ["lmb"]
        protection: "none"
        cc: []
        description: "Basic Kyve attack. Enhanced in succession for filler damage."
        notes: "Only use if all other skills are on cooldown. Low priority."

    talisman_defense:
        name: "Talisman Defense"
        input: "RMB (held)"
        keys: ["rmb"]
        protection: "FG"
        cc: []
        description: "Hold Talisman forward for frontal block. Similar to Kyve Barrier."
        notes: "Alternative block to Q. Useful if Q is on cooldown."

    lightning_chain:
        name: "Lightning Chain"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["stiffness"]
        description: "Ranged lightning lash. Unprotected but fast with stiffness CC."
        notes: "Useful ranged poke for catching targets. Put on hotbar."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Iframe dash into pack"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy burst"
            - skill: "lightning_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Ranged AOE filler"
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff first, group, then unload."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "convergence"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "AP buff before engaging"
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Iframe dash into pack"
            - skill: "spatial_distortion"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Pull mobs together"
            - skill: "lightning_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA ranged AOE"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy burst finisher"
            - skill: "void_rift"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Clean up remaining"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize teleport mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Iframe into pack"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot burst"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "rift_convergence"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "convergence"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Engage with iframe"
            - skill: "spatial_distortion"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Pull mobs together"
            - skill: "lightning_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Ranged AOE opener"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy burst"
            - skill: "void_rift"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Filler damage"
            - skill: "ators_mark"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport reposition"
            - skill: "flow_ators_implosion"
              input: "F"
              keys: ["f"]
              note: "Detonate mark"
            - skill: "lightning_storm"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Extra burst from hotbar"
            - skill: "rift_convergence"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using iframe and Super Armor skills.
            Teleport in with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "convergence"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Iframe dash into range"
            - skill: "rift_spear"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Sage PVP combo. Land a grab then chain into full burst.
            Sage's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "lightning_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA knockdown on grabbed target"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy burst finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stiffness,
            then chain into grab and full damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "dimensional_fracture"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "lightning_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA knockdown follow-up"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "ators_mark"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport engage"
            - skill: "flow_ators_implosion"
              input: "F"
              keys: ["f"]
              note: "Detonate mark"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "lightning_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant knockdown on CC'd target"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframe and SA movement to
            create distance. Sage excels at disengaging with teleports.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Iframe dash away"
            - skill: "spatial_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA protective movement"
            - skill: "rift_convergence"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement + stiffness"
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Continue dashing if off cooldown"

    ranged_poke:
        name: "Ranged Poke / Zoning"
        description: >
            Keep enemies at distance using Sage's ranged abilities.
            Succession Sage excels at ranged zoning with enhanced spells.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "dimensional_fracture"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness at range"
            - skill: "lightning_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA ranged nuke"
            - skill: "rift_spear"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG ranged poke"
            - skill: "void_rift"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA retreat + float zone"
            - skill: "kyve_barrier"
              input: "Q"
              keys: ["q"]
              note: "FG block while waiting for cooldowns"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on ranged AOE damage and
            avoid overextending. Succession Sage excels at long range nukes.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "convergence"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Iframe position into range"
            - skill: "spatial_distortion"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Pull enemies together"
            - skill: "lightning_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA ranged nuke"
            - skill: "lightning_storm"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA AOE bombardment"
            - skill: "rift_chain"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_rift_collapse"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "spatial_collapse"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"
            - skill: "spatial_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA reposition out"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Teleport Chain"
        description: "Chain teleports and spatial movement for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Iframe forward dash"
            - skill: "rift_convergence"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement"
            - skill: "ators_mark"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport-dash forward"
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Dash again if off cooldown"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Movement chain for Sage succession. Cycle between Rift Walk,
            Ator's Mark, and Rabam dashes for maximum speed. Succession
            Sage has strong iframe-based mobility.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Iframe forward dash"
            - skill: "ators_mark"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward teleport-dash"
            - skill: "rift_convergence"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement filler"
            - skill: "spatial_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA protected movement"
            - skill: "rift_walk"
              input: "Space"
              keys: ["space"]
              note: "Dash again if off cooldown"

