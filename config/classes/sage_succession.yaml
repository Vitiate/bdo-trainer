# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Rift Chain"
    effect: "Extra hits, increased damage, reduced cooldown"
    reason: >
        Rift Chain with Core becomes the strongest succession skill, gaining
        additional hits and significant damage increases. As Sage's most
        frequently used damage skill, Core Rift Chain maximizes your grinding
        speed and PVP burst. After getting comfortable, experiment with
        Lightning Strike and Spatial Collapse Cores as well for enhanced
        ranged nuking and burst options.
