locked_skills:
    - name: "Evasion"
      reason: "Prevents accidental use that messes up combos in PVP."
    - name: "Kyve Strike"
      reason: "Basic attack can trigger accidentally, slows down rotation."
    - name: "Talisman Throw"
      reason: "Unprotected, not useful in succession rotation."
    - name: "Lightning Bolt"
      reason: "Unprotected base version, can trigger accidentally during combos."
    - name: "Flow: Thunder Clap"
      reason: "Unprotected follow-up, messes up PVP combos."
    - name: "Lightning Prison"
      reason: "Lock from skill bar. Unprotected — use from hotbar only for deliberate CC."
    - name: "Spatial Distortion"
      reason: "Optional lock. Put on HOTBAR if locking from skill bar."
    - name: "Lightning Chain"
      reason: "Lock from skill bar. Put on HOTBAR if needed for ranged poke."

