# ============================================================================
# BDO Trainer - Succession Archer Combo Configuration
# ============================================================================
# Class: Archer (Succession)
# Weapons: Crossbow (Main) / Ra'ghon (Off)
# Damage Type: Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Notes:
#   Succession Archer focuses on enhanced Crossbow skills, trading the
#   Greatbow's massive AOE for faster, more precise ranged attacks.
#   Like Awakening, Archer has NO grab — rely on ranged CC and kiting.
#   Succession gains enhanced versions of crossbow skills with added
#   protections and damage modifiers.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Archer Class Discord
#   - Community guides by Vengeroth, Archetype, Desperado
# ============================================================================

class: Archer
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Crossbow Skills)
# --------------------------------------------------------------------------
awakening_skills:
    radiant_explosion:
        name: "Radiant Explosion"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Super Armor enhanced crossbow blast. Main burst damage skill with knockdown."
        flows_into: ["piercing_cry", "bolt_of_radiance", "arrow_storm"]
        core_effect: "Core: Radiant Explosion - Extra damage and Super Armor on cooldown"
        notes: "Bread-and-butter damage skill. Use off cooldown. Succession-enhanced SA."

    piercing_cry:
        name: "Piercing Cry"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor charged crossbow volley. Rapid multi-hit burst with stiffness."
        flows_into: ["radiant_explosion", "bolt_of_radiance", "focused_arrow"]
        notes: "High sustained damage. Hold for full duration to maximize hits."

    bolt_of_radiance:
        name: "Bolt of Radiance"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor forward charge crossbow shot. Long range with knockback."
        flows_into: ["radiant_explosion", "piercing_cry", "flow_luminous_barrage"]
        notes: "Strong ranged burst with SA. Flows into Luminous Barrage for extra damage."

    flow_luminous_barrage:
        name: "Flow: Luminous Barrage"
        input: "LMB (after Bolt of Radiance)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Bolt of Radiance. Extended volley with Super Armor."
        flows_into: ["radiant_explosion", "piercing_cry"]
        notes: "Always chain after Bolt of Radiance for extra damage and knockdown."

    glissade:
        name: "Glissade"
        input: "Space"
        keys: ["space"]
        protection: "FG"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Forward Guard forward dash. Primary movement skill in Succession."
        flows_into: ["radiant_explosion", "bolt_of_radiance", "piercing_cry"]
        notes: "Main forward movement. FG while dashing makes it safe to reposition."

    tactical_retreat:
        name: "Tactical Retreat"
        input: "Shift + Space"
        keys: ["shift", "space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 5000
        description: "Iframe backward dash. Primary escape and repositioning tool."
        flows_into: ["radiant_explosion", "focused_arrow", "arrow_storm"]
        notes: "Main iframe. Use to create distance. Essential for survival."

    arrow_storm:
        name: "Arrow Storm"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 15000
        description: "Super Armor rain of crossbow bolts over wide area. Massive AOE."
        flows_into: ["flow_storm_surge", "radiant_explosion", "tactical_retreat"]
        notes: "Long cooldown but devastating AOE. Great for PVE pack clearing."

    flow_storm_surge:
        name: "Flow: Storm Surge"
        input: "LMB (after Arrow Storm)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Arrow Storm. Extended bolt barrage with Super Armor."
        flows_into: ["radiant_explosion", "piercing_cry"]
        notes: "Always chain after Arrow Storm for maximum AOE coverage."

    multiple_arrow_shot:
        name: "Multiple Arrow Shot"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor spread shot volley. Hits multiple targets in a cone."
        flows_into: ["radiant_explosion", "focused_arrow", "tactical_retreat"]
        notes: "Good AOE filler. SA makes it safe between main skills."

    focused_arrow:
        name: "Focused Arrow"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 7000
        description: "Forward Guard precision crossbow shot. High single-target damage."
        flows_into: ["radiant_explosion", "bolt_of_radiance", "piercing_cry"]
        notes: "Best single-target damage. FG while aiming makes it safe to use."

    wind_slash:
        name: "Wind Slash"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor spinning crossbow slash with float CC."
        flows_into: ["radiant_explosion", "piercing_cry", "flow_gust"]
        notes: "Float CC for catching opponents. Enables air attack combos."

    flow_gust:
        name: "Flow: Gust"
        input: "LMB (after Wind Slash)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Wind Slash. Downward bolt barrage on floated targets."
        flows_into: ["radiant_explosion", "focused_arrow"]
        notes: "Always chain after Wind Slash to capitalize on float CC."

    charging_wind:
        name: "Charging Wind"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard rushing crossbow strike. Quick engage tool."
        flows_into: ["radiant_explosion", "wind_slash", "piercing_cry"]
        notes: "Fast forward engage with FG protection. Good opener."

    natures_fury:
        name: "Nature's Fury"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward Guard ranged crossbow blast. Safe ranged poke."
        flows_into: ["bolt_of_radiance", "radiant_explosion", "glissade"]
        notes: "Safe ranged poke with FG. Good for zoning in PVP."

    volley_of_light:
        name: "Volley of Light"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Ground-targeted crossbow volley with bound CC. Unprotected."
        flows_into: ["radiant_explosion", "piercing_cry", "tactical_retreat"]
        notes: "Unprotected but bound CC is valuable. Use carefully in PVP."

    piercing_light:
        name: "Piercing Light"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Ranged crossbow burst from hotbar. Super Armor with knockdown."
        flows_into: ["radiant_explosion", "piercing_cry"]
        notes: "Hotbar skill. Good ranged burst with protection."

