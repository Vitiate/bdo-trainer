pvp_combos:
    protected_poke:
        name: "Protected Poke"
        description: >
            Safe ranged engage using Forward Guard and Super Armor skills.
            Poke from range with protection, then reposition. Archer has no
            grab — use ranged CC to control spacing.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "natures_fury"
              input: "Q"
              keys: ["q"]
              note: "FG ranged stiffness poke"
            - skill: "bolt_of_radiance"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge shot follow-up"
            - skill: "flow_luminous_barrage"
              input: "LMB"
              keys: ["lmb"]
              note: "Knockdown follow-up"
            - skill: "tactical_retreat"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe back to safety"

    ranged_burst:
        name: "Ranged Burst Combo"
        description: >
            Full ranged damage combo. Stay at range and unload damage
            skills with Super Armor protection. Punish targets that
            cannot close distance.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "natures_fury"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness opener"
            - skill: "radiant_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "bolt_of_radiance"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge shot"
            - skill: "flow_luminous_barrage"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up volley"
            - skill: "multiple_arrow_shot"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA spread shot while retreating"
            - skill: "tactical_retreat"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe reposition"

    float_chain:
        name: "Float Chain Combo"
        description: >
            Use float CC from Wind Slash to catch an opponent in the
            air, then chain into air attacks for full burst. Succession
            Archer's primary CC chain without a grab.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "wind_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float CC — catch the target"
            - skill: "flow_gust"
              input: "LMB"
              keys: ["lmb"]
              note: "Bolt barrage on floated target"
            - skill: "radiant_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst on CC'd target"
            - skill: "piercing_cry"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit follow-up"
            - skill: "focused_arrow"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG precision finisher"

    stiffness_chain:
        name: "Stiffness Chain (1v1)"
        description: >
            Fish for a stiffness CC at range, then chain into full damage
            on the stiffened target. Succession Archer's catch combo
            since he has no grab to bypass SA.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "natures_fury"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness — catch the target"
            - skill: "charging_wind"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG forward rush on stiffened target"
            - skill: "wind_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float on stiffened target"
            - skill: "flow_gust"
              input: "LMB"
              keys: ["lmb"]
              note: "Air attack follow-up"
            - skill: "radiant_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "piercing_cry"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframe and backward attacks
            to create distance. Succession Archer excels at kiting —
            play to your range advantage and avoid melee trades.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "tactical_retreat"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe backward dash"
            - skill: "multiple_arrow_shot"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA spread shot while retreating"
            - skill: "wind_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA evasive dash away"
            - skill: "natures_fury"
              input: "Q"
              keys: ["q"]
              note: "FG ranged poke while retreating"
            - skill: "tactical_retreat"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe again if off cooldown"

    precision_punish:
        name: "Precision Punish (Aggressive)"
        description: >
            Aggressive engage combo. Dash in with Glissade, burst hard
            with crossbow skills, then escape. High risk, high reward —
            use when you spot an unprotected target.
        difficulty: advanced
