              note: "Multi-hit follow-up"
            - skill: "tactical_retreat"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe escape after burst"
            - skill: "multiple_arrow_shot"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA backward shot for safety"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Stay at range behind your group.
            Focus on protected AOE damage into enemy blobs. Succession
            Archer provides sustained ranged pressure at distance.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "arrow_storm"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA rain of bolts into blob"
            - skill: "flow_storm_surge"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended barrage"
            - skill: "bolt_of_radiance"
