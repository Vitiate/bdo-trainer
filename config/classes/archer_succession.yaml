              note: "Follow-up volley"
            - skill: "radiant_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "focused_arrow"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG precision shot on priority targets"
            - skill: "natures_fury"
              input: "Q"
