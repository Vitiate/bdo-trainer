# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Radiant Explosion"
    effect: "Extra damage and Super Armor on cooldown"
    reason: >
        Radiant Explosion with Core gains additional damage and maintains
        Super Armor even when the skill is on cooldown, making it the
        safest and most consistent damage tool in Succession Archer's
        kit. As the bread-and-butter skill used off cooldown in every
        rotation, this Core provides the largest overall damage increase
        and survivability improvement. Piercing Cry Core is also viable
        for players who prefer sustained multi-hit burst.
