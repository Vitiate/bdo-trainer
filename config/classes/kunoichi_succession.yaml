              keys: ["s", "f"]
              note: "SA knockdown on grabbed target"
            - skill: "crescent_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_rising_moon"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "shadow_clone"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

