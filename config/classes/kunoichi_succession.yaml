              note: "Knockdown follow-up"
            - skill: "crescent_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_rising_moon"
              input: "LMB"
              keys: ["lmb"]
