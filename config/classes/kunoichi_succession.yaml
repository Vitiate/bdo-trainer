# ============================================================================
# BDO Trainer - Succession Kunoichi Combo Configuration
# ============================================================================
# Class: Kunoichi (Succession)
# Weapons: Shortsword (Main) / Kunai (Off) / Enhanced Shortsword+Kunai (Succession)
# Damage Type: Melee / Ranged (Kunai Throw, Shuriken)
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Class Identity:
#   - Enhanced Shortsword and Kunai combat with ninja arts
#   - Mix of melee burst and ranged kunai/shuriken harass
#   - Strong iframe movement with Block Jump and evasion chains
#   - Grab class — Grab (E) bypasses Super Armor
#   - Excellent 1v1 duelist with ranged poke options
#   - High skill ceiling, rewarding precise input timing
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Kunoichi Class Discord
#   - Community guides by VertualSol, NinjaKuno, FakeUni, Awnix
# ============================================================================

class: Kunoichi
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Shortsword + Kunai)
# --------------------------------------------------------------------------
succession_skills:
    kunai_stab:
        name: "Kunai Stab"
        input: "LMB"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic melee combo attack. Fast multi-hit chain with Kunai."
        flows_into: ["crescent_slash", "shadow_clone", "flash_slash"]
        notes: "Filler attack. Mostly used to cancel animations or chain into real skills."

    kunai_throw:
        name: "Kunai Throw"
        input: "RMB"
        keys: ["rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 0
        description: "Ranged kunai projectile. Applies stiffness on hit. Can be used while moving."
        flows_into: ["crescent_slash", "shadow_clone"]
        notes: "Ranged poke tool. Great for catching opponents off guard or confirming into grab."

    crescent_slash:
        name: "Crescent Slash"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Main burst skill. Super Armor spinning slash with high damage and knockdown."
        flows_into: ["flow_rising_moon", "shadow_clone", "kunai_stab"]
        core_effect: "Core: Crescent Slash - Extra damage on last hit, extended SA duration"
        notes: "Bread-and-butter damage skill. Always follow with Flow: Rising Moon."

    flow_rising_moon:
        name: "Flow: Rising Moon"
        input: "LMB (after Crescent Slash)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Crescent Slash. Additional burst slash with Super Armor."
        flows_into: ["shadow_clone", "flash_slash"]
        notes: "Always chain after Crescent Slash for extra damage. Down attack properties."

    shadow_clone:
        name: "Shadow Clone"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 7000
        description: "Super Armor multi-hit clone assault. Bound CC on hit."
        flows_into: ["flow_clone_burst", "crescent_slash", "flash_slash"]
        notes: "Second main damage skill. Bound sets up follow-up damage."

    flow_clone_burst:
        name: "Flow: Clone Burst"
        input: "LMB (after Shadow Clone)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Shadow Clone. Extended clone strikes with Super Armor."
        flows_into: ["crescent_slash", "flash_slash"]
        notes: "Always chain after Shadow Clone for extra damage."

    shadow_stomp:
        name: "Ninjutsu: Shadow Stomp"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor ground slam. Enhanced in Succession with extra damage."
        flows_into: ["crescent_slash", "shadow_clone", "flash_slash"]
        core_effect: "Core: Shadow Stomp - Increased damage and extended Super Armor"
        notes: "Good AOE knockdown. Use to initiate or interrupt."

    flash_slash:
        name: "Flash Slash"
        input: "W + F"
        keys: ["w", "f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick Forward Guard dash slash. Good engage tool with stiffness."
        flows_into: ["crescent_slash", "shadow_clone", "grab"]
        notes: "Great for closing distance with frontal protection. Fish for stiffness into grab."

    shuriken_throw:
        name: "Shuriken Throw"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 4000
        description: "Ranged shuriken barrage. Multiple projectiles with stiffness."
        flows_into: ["crescent_slash", "flash_slash"]
        notes: "Ranged harass tool. Good for poking in PVP before engaging."

    tendon_cutter:
        name: "Tendon Cutter"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard low slash. Applies movement speed debuff on hit."
        flows_into: ["crescent_slash", "shadow_clone"]
        core_effect: "Core: Tendon Cutter - Forward Guard added during skill"
        notes: "Good defensive filler with frontal protection."

    floor_sweeping:
        name: "Floor Sweeping"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "none"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 8000
        description: "Low sweep with knockdown CC. Enhanced damage in Succession."
        flows_into: ["crescent_slash", "shadow_clone"]
        notes: "Unprotected but strong knockdown. Use when target is vulnerable."

    fatal_blow:
        name: "Fatal Blow"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward thrust with float CC."
        flows_into: ["crescent_slash", "shadow_clone"]
        notes: "Good for catching targets. Float CC leads into air combos."

    ankle_cutter:
        name: "Ankle Cutter"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Quick low slash with bound CC."
        flows_into: ["crescent_slash", "shadow_clone", "flash_slash"]
        notes: "Unprotected but fast bound. Use after confirmed CC for extension."

    fox_claw:
        name: "Fox Claw"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard multi-hit claw attack. Fast with stiffness."
        flows_into: ["crescent_slash", "shadow_clone", "grab"]
        notes: "Good protected approach with stiffness for grab setup."

    ninjutsu_shadow_slash:
        name: "Ninjutsu: Shadow Slash"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor shadow dash slash. Good burst from hotbar."
        flows_into: ["crescent_slash", "shadow_clone"]
        notes: "Hotbar skill. Good protected damage filler."

    ninjutsu_concealment:
        name: "Ninjutsu: Concealment"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Stealth skill. Become invisible for a short duration."
        flows_into: ["crescent_slash", "grab", "flash_slash"]
        notes: "Stealth opener for PVP. Use to reposition or initiate surprise attacks."

    kunai_slash:
        name: "Kunai Slash"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Forward Guard defensive slash. Quick stiffness poke."
        flows_into: ["crescent_slash", "shadow_clone", "grab"]
        notes: "Defensive poke tool. FG makes it safe to fish for stiffness."

