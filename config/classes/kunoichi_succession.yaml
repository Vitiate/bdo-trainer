              note: "FG forward dash filler"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Movement chain for Kunoichi Succession. Cycle between Block Jump,
            Ninja Step, evasions, and Smoke Veil for maximum speed and iframes.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "block_jump"
              input: "Space"
              keys: ["space"]
              note: "Iframe forward jump"
            - skill: "ninja_step"
              input: "W + W"
              keys: ["w", "w"]
              note: "Forward iframe dash"
            - skill: "smoke_veil"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "Iframe smoke dash"
            - skill: "block_jump"
              input: "Space"
              keys: ["space"]
              note: "Continue iframe chain"
            - skill: "evasion"
              input: "A or D (double tap)"
              keys: ["a"]
              note: "Sidestep if needed"

