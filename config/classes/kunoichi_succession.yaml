pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Forward Guard skills to approach.
            Fish for a stiffness then chain into grab for the kill.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "flash_slash"
              input: "W + F"
              keys: ["w", "f"]
