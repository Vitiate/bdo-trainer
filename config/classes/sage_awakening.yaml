# ============================================================================
# BDO Trainer - Awakened Sage Combo Configuration
# ============================================================================
# Class: Sage (Awakening)
# Weapons: Kyve (Main) / Talisman (Off) / Ator (Awakening — spatial cube weapon)
# Damage Type: Magic/Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Sage Class Discord
#   - Community guides by Dazzler, Eminent, Tatsuya, FakeUni
# ============================================================================

class: Sage
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    rift_chain:
        name: "Rift Chain"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Super Armor spatial slash that tears a rift through enemies. Main damage skill."
        flows_into: ["flow_rift_collapse", "spatial_collapse", "void_rift"]
        core_effect: "Core: Rift Chain - Extra hits and increased damage on all attacks"
        notes: "Bread-and-butter damage skill. Always follow up with Flow: Rift Collapse."

    flow_rift_collapse:
        name: "Flow: Rift Collapse"
        input: "LMB (after Rift Chain)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Rift Chain. Collapses the spatial rift for additional burst damage."
        flows_into: ["spatial_collapse", "void_rift", "dimensional_fracture"]
        notes: "Always chain after Rift Chain for maximum damage output."

    spatial_collapse:
        name: "Spatial Collapse"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor spatial implosion. Highest damage awakening skill with bound CC."
        flows_into: ["rift_chain", "hyperdimensional_slash", "void_rift"]
        core_effect: "Core: Spatial Collapse - Bound on good hits, increased AOE radius"
        notes: "Primary burst skill. Use on CC'd targets for maximum damage. Core recommended."

    ators_mark:
        name: "Ator's Mark"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward teleport-dash that marks enemies. Excellent engage tool."
        flows_into: ["flow_ators_implosion", "rift_chain", "spatial_collapse"]
        core_effect: "Core: Ator's Mark - Super Armor on cooldown, stiffness on all hits"
        notes: "Primary engage skill. Teleports through enemies. Flows into Ator's Implosion."

    flow_ators_implosion:
        name: "Flow: Ator's Implosion"
        input: "F (after Ator's Mark)"
        keys: ["f"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Ator's Mark. Detonates the spatial mark for AOE knockback."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Always chain after Ator's Mark for extra damage and CC."

    void_rift:
        name: "Void Rift"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor backward rift slash. Creates a void zone that floats enemies."
        flows_into: ["rift_chain", "spatial_collapse", "dimensional_fracture"]
        notes: "Good defensive option. Step back while dealing damage and floating targets."

    hyperdimensional_slash:
        name: "Hyperdimensional Slash"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor ranged slash that sends a spatial wave forward. Long range AOE."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Excellent ranged poke. Strong in large-scale PVP and PVE."

    kyve_barrier:
        name: "Kyve Barrier"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 3000
        description: "Forward Guard spatial shield. Blocks frontal damage while active."
        flows_into: ["rift_chain", "ators_mark", "spatial_shift"]
        notes: "Hold Q to block. Useful between skill cooldowns and for baiting grabs."

    spatial_shift:
        name: "Spatial Shift"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 5000
        description: "Iframe teleport. Blinks forward through space. Primary evasive movement."
        flows_into: ["rift_chain", "ators_mark", "spatial_collapse"]
        notes: "Core mobility tool. Iframe makes it safe for repositioning in PVP and PVE."

    dimensional_fracture:
        name: "Dimensional Fracture"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward Guard rift tear. Creates a spatial fracture with stiffness CC."
        flows_into: ["rift_chain", "spatial_collapse", "void_rift"]
        notes: "Safe poke with frontal protection. Good for fishing for CC in PVP."

    ators_rift:
        name: "Ator's Rift"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor forward charge that opens a rift. Good gap closer with CC."
        flows_into: ["rift_chain", "flow_ators_implosion", "spatial_collapse"]
        notes: "Strong engage tool. Can be used to close distance quickly."

    convergence:
        name: "Convergence"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 24000
        description: "Self-buff. Increases AP, casting speed, and crit rate. Super Armor during cast."
        flows_into: ["rift_chain", "ators_mark", "spatial_shift"]
        core_effect: "Core: Convergence - Extended buff duration and added movement speed"
        notes: "Use before engaging packs or PVP fights. Hotbar recommended for tracking."

    rift_spear:
        name: "Rift Spear"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard spatial thrust. Quick ranged poke with stiffness."
        flows_into: ["rift_chain", "spatial_collapse", "ators_mark"]
        core_effect: "Core: Rift Spear - Forward Guard during the skill"
        notes: "Fast engage tool with frontal protection. Good for initiating CC chains."

    dimensional_rift:
        name: "Dimensional Rift"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 6000
        description: "Quick low rift pulse with bound CC. Unprotected."
        flows_into: ["spatial_collapse", "rift_chain"]
        notes: "Useful CC but unprotected. Be careful when using in PVP."

    flow_dimensional_echo:
        name: "Flow: Dimensional Echo"
        input: "RMB (after awakening skills)"
        keys: ["rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard attack available after multiple awakening skills."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Can be chained after many awakening skills. Good filler with FG."

    ators_judgment:
        name: "Ator's Judgment"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor spatial bombardment from above. Strong AOE burst."
        flows_into: ["rift_chain", "spatial_collapse"]
        notes: "Hotbar skill. Good burst damage with protection for large-scale."

    spatial_distortion:
        name: "Spatial Distortion"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["pull"]
        damage: low
        cooldown_ms: 15000
        description: "Forward Guard spatial vortex. Pulls enemies into a singularity."
        flows_into: ["spatial_collapse", "rift_chain"]
        notes: "Hotbar skill. Excellent for grouping mobs in PVE and disrupting in PVP."

