              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "heavy_strike"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA wide AOE"
            - skill: "flow_heavy_strike"
              input: "LMB"
              keys: ["lmb"]
              note: "Extra sweep damage"
            - skill: "shield_smash"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA self-heal + damage"
            - skill: "ground_stomp"
              input: "S + F"
              keys: ["s", "f"]
              note: "SA reposition out"

