# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Heavy Strike"
    effect: "Forward Guard added, increased damage multiplier"
    reason: >
        Heavy Strike with Core gains Forward Guard protection on top of its
        existing Super Armor, making it one of the safest high-damage skills
        in the game. The increased damage multiplier makes it hit extremely
        hard. Most Succession Guardian players choose this Core first. Axe
        Slash Core is also a strong alternative for raw PVE damage. After
        Heavy Strike, consider Earth Cleave Core for the maintained FG poke.
