        description: "Chain movement skills for fastest traversal between packs. Guardian is the slowest class — use every dash available."
        difficulty: beginner
        combo_window_ms: 350
        steps:
            - skill: "shield_charge"
              input: "Space"
              keys: ["space"]
              note: "SA forward charge"
            - skill: "predatory_leap"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward leap"
            - skill: "flame_of_judgment"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam movement filler"
            - skill: "shield_charge"
              input: "Space"
              keys: ["space"]
              note: "Charge again if off cooldown"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Movement chain for Guardian succession. Cycle between Shield Charge,
            Predatory Leap, and Rabam skills for maximum speed. Succession is
            slightly faster than awakening but still the slowest class overall.
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "shield_charge"
              input: "Space"
              keys: ["space"]
