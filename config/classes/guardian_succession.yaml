pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills. Succession Guardian is
            tanky with lots of SA. March forward and look for an opening.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "battle_roar"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before engaging"
            - skill: "shield_charge"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "predatory_leap"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA leap + stiffness"
            - skill: "flow_predatory_leap"
              input: "LMB"
              keys: ["lmb"]
              note: "Knockdown follow-up"
            - skill: "axe_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_axe_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up slam"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Guardian PVP combo. Land a grab then chain into full burst.
            Guardian's grab bypasses Super Armor — use it to crack open tanky targets.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "wild_swing"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "Float on grabbed target"
            - skill: "axe_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_axe_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "doom_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE nuke finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use stiffness from Predatory Leap or Mountain Crush to catch
            the target, then chain into grab and full damage.
        difficulty: advanced
        combo_window_ms: 200
        steps:
            - skill: "predatory_leap"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA leap — stiffness catch"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "wild_swing"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "Float follow-up"
            - skill: "axe_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_axe_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "heavy_strike"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher sweep"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in SA skills. Out-trade opponents with raw power.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "predatory_leap"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA engage"
            - skill: "flow_predatory_leap"
              input: "LMB"
              keys: ["lmb"]
              note: "Knockdown follow-up"
            - skill: "axe_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_axe_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up slam"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "doom_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant AOE nuke on CC'd target"
            - skill: "axe_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
