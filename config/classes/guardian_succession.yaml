# ============================================================================
# BDO Trainer - Succession Guardian Combo Configuration
# ============================================================================
# Class: Guardian (Succession)
# Weapons: Battle Axe (Main) / Shield (Off) — Enhanced pre-awakening skills
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Guardian Class Discord
#   - Community guides by Derik, Orca, WakeUp, InvenGlobal
# ============================================================================

class: Guardian
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-enhanced pre-awakening skills)
# --------------------------------------------------------------------------
awakening_skills:
    axe_slash:
        name: "Axe Slash"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced overhead axe slam. Super Armor with knockdown. Main burst skill."
        flows_into: ["flow_axe_slash", "heavy_strike", "doom_strike"]
        core_effect: "Core: Axe Slash - Extra damage and increased PVE multiplier"
        notes: "Bread-and-butter skill. Always follow up with Flow: Axe Slash."

    flow_axe_slash:
        name: "Flow: Axe Slash"
        input: "LMB (after Axe Slash)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Axe Slash. Additional slam with Super Armor."
        flows_into: ["heavy_strike", "doom_strike", "shield_smash"]
        notes: "Always chain after Axe Slash for extra burst damage."

    heavy_strike:
        name: "Heavy Strike"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 7000
        description: "Massive horizontal axe sweep with Super Armor. Wide frontal AOE."
        flows_into: ["flow_heavy_strike", "axe_slash", "doom_strike"]
        core_effect: "Core: Heavy Strike - Forward Guard added, increased damage"
        notes: "Big AOE burst. Core adds FG making it very safe. Strong in PVE and PVP."

    flow_heavy_strike:
        name: "Flow: Heavy Strike"
        input: "LMB (after Heavy Strike)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Heavy Strike. Additional sweep with Super Armor."
        flows_into: ["axe_slash", "doom_strike"]
        notes: "Always chain after Heavy Strike for extra damage and AOE coverage."

    predatory_leap:
        name: "Predatory Leap"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor forward leap. Gap closer with ground pound and stiffness."
        flows_into: ["flow_predatory_leap", "axe_slash", "heavy_strike"]
        notes: "Primary engage tool. Good gap closer with SA protection."

    flow_predatory_leap:
        name: "Flow: Predatory Leap"
        input: "LMB (after Predatory Leap)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Predatory Leap. Ground smash with knockdown."
        flows_into: ["axe_slash", "heavy_strike"]
        notes: "Always chain after Predatory Leap for the knockdown CC."

    shield_smash:
        name: "Shield Smash"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 8000
        description: "Shield bash with self-heal. Super Armor with bound CC. Restores HP on hit."
        flows_into: ["flow_shield_smash", "axe_slash", "heavy_strike"]
        notes: "Sustain skill. Self-heal on hit makes grinding very comfortable."

    flow_shield_smash:
        name: "Flow: Shield Smash"
        input: "LMB (after Shield Smash)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Shield Smash. Additional slam with Super Armor."
        flows_into: ["axe_slash", "heavy_strike"]
        notes: "Chain after Shield Smash for extra damage and healing."

    doom_strike:
        name: "Doom Strike"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Massive ground pound AOE. Super Armor with knockdown. High damage nuke."
        flows_into: ["axe_slash", "heavy_strike", "shield_smash"]
        notes: "Big AOE nuke. Use on large packs in PVE and for group fights in PVP."

    block:
        name: "Block"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 0
        description: "Hold to block frontal damage and CC. Succession Guardian's primary defense."
        flows_into: ["axe_slash", "predatory_leap", "shield_charge"]
        notes: "Core defensive tool. Hold Q to block then counter-attack with skills."

    shield_charge:
        name: "Shield Charge"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 5000
        description: "Super Armor forward charge with shield. Primary gap closer and movement skill."
        flows_into: ["axe_slash", "predatory_leap", "heavy_strike"]
        notes: "Main movement skill. SA makes it safe to use for engaging and repositioning."

    mountain_crush:
        name: "Mountain Crush"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward Guard axe slam. Stiffness CC on hit. Defensive counter-attack."
        flows_into: ["axe_slash", "heavy_strike", "shield_smash"]
        notes: "Defensive poke with FG. Good for trading blows and fishing for stiffness."

    ground_stomp:
        name: "Ground Stomp"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor backwards ground pound. Repositioning tool with knockback."
        flows_into: ["axe_slash", "predatory_leap"]
        notes: "Defensive repositioning skill. Creates distance safely with SA."

    battle_roar:
        name: "Battle Roar"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff shout. Increases AP and DP for a duration with Super Armor."
        flows_into: ["axe_slash", "predatory_leap"]
        core_effect: "Core: Battle Roar - Extended buff duration and additional AP"
        notes: "Use before engaging for the AP/DP buff. SA keeps you safe while buffing."

    wild_swing:
        name: "Wild Swing"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor forward axe swing with float CC. Good gap closer."
        flows_into: ["axe_slash", "heavy_strike", "doom_strike"]
        notes: "Good engage with float CC. Follow up with damage while target is airborne."

    earth_cleave:
        name: "Earth Cleave"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Quick forward slash with Forward Guard. Fast engagement poke."
        flows_into: ["axe_slash", "heavy_strike"]
        core_effect: "Core: Earth Cleave - Forward Guard maintained during the skill"
        notes: "Fast FG poke for catching targets with stiffness."

    fury_unleashed:
        name: "Fury Unleashed"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor ground slam from hotbar. Good burst with knockdown."
        flows_into: ["axe_slash", "heavy_strike"]
        notes: "Hotbar skill. Decent burst filler between main cooldowns."

    iron_wall:
        name: "Iron Wall"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 25000
        description: "Self-buff granting additional DP and damage reduction for a duration."
        flows_into: ["axe_slash", "predatory_leap"]
        notes: "Hotbar buff. Use in PVP before engaging for extra tankiness."

