# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    razor_wind:
        name: "Razor Wind"
        input: "S + E"
        keys: ["s", "e"]
        protection: "none"
        cc: ["stiffness"]
        description: "Ranged wind projectile. Unprotected but long-range stiffness poke."
        notes: "Use from range to poke. Unprotected — don't use at close range in PVP."

    blasting_gust:
        name: "Blasting Gust"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["knockback"]
        description: "Ranged wind blast. Knockback utility for peeling or zoning."
        notes: "Put on hotbar. Useful for creating distance against melee classes."

    earth_kick:
        name: "Earth Kick"
        input: "F"
        keys: ["f"]
        protection: "none"
        cc: ["bound"]
        description: "Quick low kick with bound CC. Unprotected but fast animation."
        notes: "Emergency CC tool. Risky in PVP due to no protection."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe."
        notes: "PVE iframe. Lock in PVP to prevent accidental use (use Evasive Explosion Shot instead)."

