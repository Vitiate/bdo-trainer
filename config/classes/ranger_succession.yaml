# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and Forward Guard skills.
            Approach with protection, then look for a CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "elven_grace"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before going in"
            - skill: "will_of_the_wind"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "SA gap close"
            - skill: "pinpointing_gust"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness poke"
            - skill: "descending_current"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_piercing_wind"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "call_of_the_earth"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to fish for a stiffness or bound,
            then chain into full burst damage while target is CC'd.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "pinpointing_gust"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "natures_tremble"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "FG bound on stiffened target"
            - skill: "call_of_the_earth"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float follow-up"
            - skill: "descending_current"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_piercing_wind"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "breezy_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "FG finisher"

    iframe_engage:
        name: "iFrame Engage"
        description: >
            Aggressive approach using Evasive Explosion Shot iframes.
            Close the gap safely, then transition into burst damage.
        difficulty: advanced
        combo_window_ms: 200
        steps:
            - skill: "evasive_explosion_shot"
              input: "A/D + LMB"
              keys: ["a", "lmb"]
              alt_keys: ["d", "lmb"]
              note: "iFrame approach — chain multiple times"
            - skill: "flow_evasive_shot"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended iframe"
            - skill: "descending_current"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst on arrival"
            - skill: "flow_piercing_wind"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "call_of_the_earth"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float"
            - skill: "breezy_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "FG finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No CC setup needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "charging_wind"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA ranged opener"
            - skill: "descending_current"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "flow_piercing_wind"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "breezy_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "FG filler"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            No-grab class alternative. When an ally lands a grab or
            the target is CC'd, Ranger can dump max damage at range
            without needing to engage in melee.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "call_of_the_earth"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float on CC'd target"
            - skill: "descending_current"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_piercing_wind"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "breezy_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "FG finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframes and SA movement
            to create distance. Ranger excels at kiting and repositioning.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "evasive_explosion_shot"
              input: "A/D + LMB"
              keys: ["a", "lmb"]
              alt_keys: ["d", "lmb"]
              note: "iFrame out of danger"
            - skill: "flow_evasive_shot"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended iframe"
            - skill: "will_of_the_wind"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "SA dash to create distance"
            - skill: "evasive_explosion_shot"
              input: "A/D + LMB"
              keys: ["a", "lmb"]
              alt_keys: ["d", "lmb"]
              note: "Chain iframes if still pressured"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on ranged AOE damage
            from a safe distance. Stay behind frontline and use SA skills.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "elven_grace"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "will_of_the_wind"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "SA position into range"
            - skill: "charging_wind"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA ranged AOE — hold for max range"
            - skill: "rain_of_arrows"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "SA ranged AOE volley"
            - skill: "descending_current"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_piercing_wind"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "call_of_the_earth"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA burst into group"
            - skill: "breezy_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "FG filler"
            - skill: "evasive_explosion_shot"
              input: "A/D + LMB"
              keys: ["a", "lmb"]
              alt_keys: ["d", "lmb"]
              note: "iFrame reposition to safety"

