# ============================================================================
# BDO Trainer - Succession Ranger Combo Configuration
# ============================================================================
# Class: Ranger (Succession)
# Weapons: Longbow (Main) / Kamasylven Dagger (Off) — Enhanced Bow Skills
# Damage Type: Ranged / Mid-Range
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Ranger Class Discord
#   - Community guides by Bloo, PreStige, Haerim
# ============================================================================

class: Ranger
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills
# --------------------------------------------------------------------------
awakening_skills:
    descending_current:
        name: "Descending Current"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Enhanced succession bow slam. Super Armor throughout with knockdown."
        flows_into: ["flow_piercing_wind", "breezy_blade", "call_of_the_earth"]
        core_effect: "Core: Descending Current - Extra hits and increased damage"
        notes: "Bread-and-butter succession damage skill. Always flow into Flow: Piercing Wind."

    flow_piercing_wind:
        name: "Flow: Piercing Wind"
        input: "LMB (after Descending Current)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Descending Current. Additional burst with Super Armor."
        flows_into: ["breezy_blade", "charging_wind", "call_of_the_earth"]
        notes: "Always chain after Descending Current for maximum damage output."

    breezy_blade:
        name: "Breezy Blade"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "FG"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 7000
        description: "Enhanced multi-hit Forward Guard slash combo. Strong succession filler."
        flows_into: ["descending_current", "charging_wind", "natures_tremble"]
        core_effect: "Core: Breezy Blade - Forward Guard maintained through full animation"
        notes: "High damage with frontal protection. Core ensures FG on entire skill."

    charging_wind:
        name: "Charging Wind"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor charged arrow. Hold for increased range and damage."
        flows_into: ["descending_current", "breezy_blade", "call_of_the_earth"]
        core_effect: "Core: Charging Wind - Stiffness on all hits and increased damage"
        notes: "Hold input for ranged version. Tap for quick close-range variant."

    will_of_the_wind:
        name: "Will of the Wind"
        input: "Shift + Space"
        keys: ["shift", "space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor forward dash. Primary succession gap closer."
        flows_into: ["descending_current", "charging_wind", "rain_of_arrows"]
        notes: "Primary movement skill. SA protection while closing distance."

    evasive_explosion_shot:
        name: "Evasive Explosion Shot"
        input: "A/D + LMB"
        keys: ["a", "lmb"]
        keys_alt: ["d", "lmb"]
        protection: "iframe"
        cc: []
        damage: medium
        cooldown_ms: 3000
        description: "iFrame sidestep with explosive arrow. Core Ranger survival tool."
        flows_into: ["flow_evasive_shot", "descending_current", "breezy_blade"]
        core_effect: "Core: Evasive Explosion Shot - Reduced cooldown and extra damage"
        notes: "Primary iframe. Can be chained left/right. Essential for PVP survival."

    natures_tremble:
        name: "Nature's Tremble"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard ground slam. Enhanced succession version with bound CC."
        flows_into: ["descending_current", "breezy_blade", "tearing_arrow"]
        notes: "Good CC tool with frontal protection. Use to set up burst combos."

    bow_skill:
        name: "Bow Skill"
        input: "LMB (chain)"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic bow combo chain. Enhanced successive hits in succession spec."
        flows_into: ["descending_current", "charging_wind"]
        notes: "Filler between cooldowns. Cancel into other skills for damage."

    call_of_the_earth:
        name: "Call of the Earth"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor overhead arrow slam with float CC. Heavy burst damage."
        flows_into: ["descending_current", "breezy_blade", "tearing_arrow"]
        core_effect: "Core: Call of the Earth - Float on all hits"
        notes: "Strong burst skill. Float CC enables air combos in PVP."

    tearing_arrow:
        name: "Tearing Arrow"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "none"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "Ranged piercing shot. Unprotected but long range with knockdown."
        flows_into: ["descending_current", "charging_wind"]
        notes: "Long-range poke. Use at distance in PVP. Risky at close range."

    elven_grace:
        name: "Elven Grace"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "none"
        cc: []
        damage: none
        cooldown_ms: 24000
        description: "Self-buff. Increases AP, attack speed, and crit rate for succession."
        flows_into: ["will_of_the_wind", "descending_current"]
        core_effect: "Core: Elven Grace - Super Armor during the skill"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    rain_of_arrows:
        name: "Rain of Arrows"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor ranged AOE arrow volley. Wide area coverage."
        flows_into: ["descending_current", "charging_wind", "breezy_blade"]
        notes: "Good PVE clear and large scale PVP AOE. SA protection throughout."

    pinpointing_gust:
        name: "Pinpointing Gust"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard quick ranged arrow burst. Good approach tool."
        flows_into: ["descending_current", "breezy_blade", "call_of_the_earth"]
        notes: "Quick FG ranged poke. Good for fishing for stiffness CC in PVP."

    spirits_shackles:
        name: "Spirit's Shackles"
        input: "Q"
        keys: ["q"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 5000
        description: "Binding arrow shot with bound CC. Unprotected but fast."
        flows_into: ["descending_current", "call_of_the_earth"]
        notes: "Quick CC tool. Use from range to catch targets. Risky up close."

    flow_evasive_shot:
        name: "Flow: Evasive Shot"
        input: "LMB (after Evasive Explosion Shot)"
        keys: ["lmb"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Follow-up iframe shot after Evasive Explosion Shot."
        flows_into: ["descending_current", "breezy_blade"]
        notes: "Extends iframe protection from EES. Always chain for extra safety."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
