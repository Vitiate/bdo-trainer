    natures_bloom:
        name: "Nature's Bloom"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor AOE burst. Additional damage filler skill."
        notes: "Preferred L57 Rabam. Good for PVE AOE clear and PVP filler."

    kamasylven_leaf:
        name: "Kamasylven Leaf"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
