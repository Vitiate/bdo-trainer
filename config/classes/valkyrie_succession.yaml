# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab / Tackle"
        input: "E (close range)"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Valkyrie PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Succession has easier access to grab than awakening."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Dodge roll."
        notes: "PVE iframe. Lock in PVP to prevent accidental use."

    forward_slash:
        name: "Forward Slash"
        input: "LMB (neutral)"
        keys: ["lmb"]
        protection: "none"
        cc: []
        description: "Basic sword slash filler. Fast animation for weaving between skills."
        notes: "Use to fill gaps between cooldowns. Unprotected."

    just_counter:
        name: "Just Counter"
        input: "LMB (during block, timed)"
        keys: ["lmb"]
        protection: "FG"
        cc: ["knockdown"]
        description: "Timed counter from block stance. Forward Guard with knockdown on perfect timing."
        notes: "Advanced technique. Requires precise timing during enemy attack."

    elions_blessing:
        name: "Elion's Blessing"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Revive a fallen ally with partial HP. Signature Valkyrie utility."
        notes: "Unique class utility. Essential for group PVP and node wars."

