# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Forward Guard and Super Armor skills.
            Approach with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "heavens_echo"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA party AP buff before going in"
            - skill: "righteous_charge"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA gap close"
            - skill: "shield_strike"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG stiffness poke"
            - skill: "celestial_cry"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_celestial_cry"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "sword_of_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Valkyrie PVP combo. Land a grab then chain into full burst.
            Succession has easier access to grab since all skills are
            pre-awakening — no stance swap needed.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "divine_power"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "celestial_cry"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_celestial_cry"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "sword_of_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam finisher"
            - skill: "flow_sword_of_judgment"
              input: "RMB"
              keys: ["rmb"]
              note: "Final burst"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stiffness
            or counter-stun, then chain into grab and full damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "shield_strike"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "divine_power"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "celestial_cry"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_celestial_cry"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "sword_of_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    counter_grab:
        name: "Counter into Grab (1v1)"
        description: >
            Defensive combo. Block with Counter, stun the attacker,
            then grab and chain into full damage. Excels against
            aggressive opponents.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "counter"
              input: "Q"
              keys: ["q"]
              note: "FG block — wait for stun on enemy attack"
            - skill: "flow_counter"
              input: "LMB"
              keys: ["lmb"]
              note: "FG knockdown follow-up"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on knocked-down target"
            - skill: "celestial_cry"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_celestial_cry"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "sword_of_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "glaring_slash"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG forward poke"
            - skill: "celestial_cry"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_celestial_cry"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "sword_of_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy finisher"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "divine_power"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant float on CC'd target"
            - skill: "celestial_cry"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_celestial_cry"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "sword_of_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam finisher"
            - skill: "flow_sword_of_judgment"
              input: "RMB"
              keys: ["rmb"]
              note: "Final burst"

    support_disengage:
        name: "Support / Disengage"
        description: >
            Escape combo when pressured while providing team support.
            Use heals and block to survive, then create distance safely.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "counter"
              input: "Q"
              keys: ["q"]
              note: "FG block incoming pressure"
            - skill: "breath_of_elion"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA heal self and allies"
            - skill: "righteous_charge"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA charge away from danger"
            - skill: "radiant_charge"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "FG movement to create distance"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected damage, party buffs,
            vacuum, and heals. Succession Valkyrie is a tanky frontline support.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "heavens_echo"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Party AP buff before engaging blob"
            - skill: "judgment_of_light"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA self-buff"
            - skill: "righteous_charge"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA engage into group"
            - skill: "sanctitas_de_enslar"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Vacuum pull enemies together"
            - skill: "divine_power"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float"
            - skill: "celestial_cry"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_celestial_cry"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "sword_of_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst finisher"
            - skill: "righteous_charge"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA reposition out"

