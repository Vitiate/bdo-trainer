# ============================================================================
# BDO Trainer - Succession Valkyrie Combo Configuration
# ============================================================================
# Class: Valkyrie (Succession)
# Weapons: Longsword (Main) / Shield (Off)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Valkyrie Class Discord
#   - Community guides by MacHiato, Fuzzlr, DontAsk, Lunyse
# ============================================================================

class: Valkyrie
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Pre-Awakening)
# --------------------------------------------------------------------------
awakening_skills:
    judgment_of_light:
        name: "Judgment of Light"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 28000
        description: "Self-buff. Increases AP, DP, and attack speed. Super Armor during cast."
        flows_into: ["celestial_cry", "sword_of_judgment"]
        core_effect: "Core: Judgment of Light - Super Armor and extended buff duration"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    celestial_cry:
        name: "Celestial Cry"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Main succession damage skill. Super Armor wide slash with knockdown."
        flows_into: ["flow_celestial_cry", "sword_of_judgment", "divine_power"]
        notes: "Bread-and-butter damage skill. Always follow with Flow: Celestial Cry."

    flow_celestial_cry:
        name: "Flow: Celestial Cry"
        input: "LMB (after Celestial Cry)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Celestial Cry. Additional burst with Super Armor."
        flows_into: ["sword_of_judgment", "righteous_charge"]
        notes: "Always chain after Celestial Cry for extra damage."

    sword_of_judgment:
        name: "Sword of Judgment"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Massive overhead slam with Super Armor. Highest damage succession skill. Core adds Bound."
        flows_into: ["flow_sword_of_judgment", "celestial_cry"]
        core_effect: "Core: Sword of Judgment - Bound on good hits, increased damage"
        notes: "Recommended Core skill. Highest burst in the kit. Use off cooldown."

    flow_sword_of_judgment:
        name: "Flow: Sword of Judgment"
        input: "RMB (after Sword of Judgment)"
        keys: ["rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Sword of Judgment. Additional burst slam with Super Armor."
        flows_into: ["celestial_cry", "righteous_charge"]
        notes: "Always chain after Sword of Judgment for maximum burst damage."

    shield_strike:
        name: "Shield Strike"
        input: "W + F"
        keys: ["w", "f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard shield bash. Fast engage tool with stiffness CC."
        flows_into: ["celestial_cry", "sword_of_judgment", "grab"]
        core_effect: "Core: Shield Strike - Forward Guard during the skill"
        notes: "Primary engage tool. FG stiffness into grab is a core PVP pattern."

    righteous_charge:
        name: "Righteous Charge"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward charge with shield. Good gap closer with knockback."
        flows_into: ["celestial_cry", "sword_of_judgment"]
        notes: "Good SA engage or filler. Moderate damage with knockback."

    divine_power:
        name: "Divine Power"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor ground slam with massive AOE and float CC."
        flows_into: ["celestial_cry", "sword_of_judgment"]
        notes: "Strong AOE. Good for PVE clearing and PVP catch with float."

    counter:
        name: "Counter"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stun"]
        damage: low
        cooldown_ms: 4000
        description: "Forward Guard block stance with counter-attack stun on successful block."
        flows_into: ["flow_counter", "celestial_cry", "grab"]
        core_effect: "Core: Counter - Enhanced stun duration on successful block"
        notes: "Core defensive tool. Block into counter-stun into grab is a key PVP pattern."

    flow_counter:
        name: "Flow: Counter"
        input: "LMB (after Counter)"
        keys: ["lmb"]
        protection: "FG"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Counter. Quick slash with Forward Guard and knockdown."
        flows_into: ["celestial_cry", "sword_of_judgment"]
        notes: "Chain after successful Counter stun for guaranteed knockdown."

    shield_throw:
        name: "Shield Throw"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Ranged shield projectile with stiffness. Good for ranged poke and pulling."
        flows_into: ["celestial_cry", "righteous_charge"]
        notes: "Ranged poke and pull tool. Unprotected but useful at range."

    heavens_echo:
        name: "Heaven's Echo"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 25000
        description: "Party-wide AP buff with Super Armor during cast. Key support skill."
        flows_into: ["celestial_cry", "sword_of_judgment"]
        notes: "Essential party buff. Use before engaging for group AP boost."

    celestial_spear:
        name: "Celestial Spear"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor ranged spear throw. Good for ranged engagement."
        flows_into: ["celestial_cry", "shield_strike"]
        notes: "Ranged engage or poke with SA. Useful for initiating fights."

    glaring_slash:
        name: "Glaring Slash"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick Forward Guard slash. Fast protected filler with stiffness."
        flows_into: ["celestial_cry", "sword_of_judgment"]
        notes: "Quick FG poke. Good in 1v1 for safe damage between cooldowns."

    sharp_light:
        name: "Sharp Light"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 6000
        description: "Quick low sweep with bound CC. Unprotected."
        flows_into: ["celestial_cry", "sword_of_judgment"]
        notes: "CC tool but unprotected. Be careful when using in PVP."

    breath_of_elion:
        name: "Breath of Elion"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Channeled heal for self and nearby allies. Super Armor during cast."
        flows_into: ["celestial_cry", "counter"]
        notes: "Group heal. Use between pulls in PVE or to sustain allies in PVP."

    sanctitas_de_enslar:
        name: "Sanctitas de Enslar"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["pull"]
        damage: medium
        cooldown_ms: 14000
        description: "Super Armor vacuum pull. Drags enemies toward Valkyrie."
        flows_into: ["divine_power", "celestial_cry"]
        notes: "Essential vacuum for PVE mob grouping. Hotbar recommended."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
