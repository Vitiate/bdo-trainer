# ============================================================================
# BDO Trainer - Succession Mystic Combo Configuration
# ============================================================================
# Class: Mystic (Succession)
# Weapons: Gauntlet (Main) / Vambrace (Off) / Enhanced Gauntlet (Succession)
# Damage Type: Melee / Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Mystic Class Discord
#   - Community guides by Xenothe, Bigandshiny, Aeternitas
# ============================================================================

class: Mystic
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Gauntlet)
# --------------------------------------------------------------------------
awakening_skills:
    rage_hammer:
        name: "Rage Hammer"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff. Increases AP, attack speed, and movement speed. Super Armor."
        flows_into: ["twisted_collision", "rising_dragon"]
        core_effect: "Core: Rage Hammer - Extended buff duration and extra AP"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    flash_step:
        name: "Flash Step"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 4000
        description: "Iframe forward dash. Primary movement skill in succession."
        flows_into: ["double_flash", "twisted_collision", "rising_dragon"]
        notes: "Main movement tool. Iframe makes Mystic succession very evasive."

    double_flash:
        name: "Double Flash"
        input: "Space (after Flash Step)"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 0
        description: "Second iframe dash chained after Flash Step. Extended mobility."
        flows_into: ["twisted_collision", "rising_dragon", "wolfs_fang"]
        notes: "Always double tap for maximum distance. Both dashes are iframes."

    twisted_collision:
        name: "Twisted Collision"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced spinning fist combo. Super Armor with knockdown. Main burst skill."
        flows_into: ["flow_twisted_collision", "rising_dragon", "crouching_wolf"]
        core_effect: "Core: Twisted Collision - Extra hits and increased damage"
        notes: "Bread-and-butter damage skill. Always follow with Flow: Twisted Collision."

    flow_twisted_collision:
        name: "Flow: Twisted Collision"
        input: "LMB (after Twisted Collision)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Twisted Collision. Additional burst with Super Armor."
        flows_into: ["rising_dragon", "crouching_wolf"]
        notes: "Always chain after Twisted Collision for maximum damage output."

    rising_dragon:
        name: "Rising Dragon"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 7000
        description: "Enhanced rising uppercut. Super Armor with float CC. High burst damage."
        flows_into: ["twisted_collision", "thunder_pound", "flow_landslide"]
        core_effect: "Core: Rising Dragon - Super Armor during skill and extra damage"
        notes: "Heavy hitter with float CC. Core recommended. Key skill for combos."

    tidal_burst:
        name: "Tidal Burst"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Enhanced forward charge. Super Armor with stiffness. Strong gap closer."
        flows_into: ["twisted_collision", "rising_dragon", "flow_landslide"]
        core_effect: "Core: Tidal Burst - Extra damage and increased range"
        notes: "Good engage tool with SA protection. Use to close distance safely."

    crouching_wolf:
        name: "Crouching Wolf"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Enhanced low sweeping strike. Super Armor with bound CC. Strong AOE."
        flows_into: ["twisted_collision", "rising_dragon", "flow_landslide"]
        core_effect: "Core: Crouching Wolf - Bound on hit and increased damage"
        notes: "Strong AOE with bound CC. Good for both PVE clearing and PVP combos."

    thunder_pound:
        name: "Thunder Pound"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Enhanced ground pound AOE. Super Armor with knockdown."
        flows_into: ["twisted_collision", "rising_dragon"]
        notes: "Strong AOE knockdown. Key skill for PVE clearing and PVP burst."

    wolfs_fang:
        name: "Wolf's Fang"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Enhanced forward punch with Forward Guard. Quick engage with stiffness."
        flows_into: ["twisted_collision", "rising_dragon", "crouching_wolf"]
        core_effect: "Core: Wolf's Fang - Forward Guard during the skill"
        notes: "Fast approach with frontal protection and stiffness CC. Good opener."

    roaring_tiger:
        name: "Roaring Tiger"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 9000
        description: "Enhanced back kick combo with Super Armor. Pushes enemies away."
        flows_into: ["twisted_collision", "crouching_wolf"]
        notes: "Good for creating space and hitting behind. SA protection throughout."

    adamantine:
        name: "Adamantine"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 0
        description: "Block stance with Forward Guard. Hold to block incoming damage."
        flows_into: ["twisted_collision", "rising_dragon"]
        notes: "Mystic's block. Hold Q to guard. Can transition into attacks from block."

    spiral_torpedo:
        name: "Spiral Torpedo"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["stun"]
        damage: medium
        cooldown_ms: 7000
        description: "Enhanced spinning torpedo rush. Super Armor with stun CC."
        flows_into: ["twisted_collision", "rising_dragon"]
        notes: "Good CC engage tool. Stun sets up grab or follow-up combos."

    dragons_descent:
        name: "Dragon's Descent"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "Enhanced aerial diving strike. Super Armor with knockdown on landing."
        flows_into: ["twisted_collision", "crouching_wolf"]
        notes: "Aerial engage tool. Good for gap closing from height or after jumps."

    flow_landslide:
        name: "Flow: Landslide"
        input: "F (after succession skills)"
        keys: ["f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Super Armor strike available after multiple succession skills."
        flows_into: ["twisted_collision", "rising_dragon"]
        notes: "Can be chained after many skills. Good filler with SA protection."

    iron_fist_fury:
        name: "Iron Fist Fury"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 12000
        description: "Super Armor rapid punch barrage. High damage hotbar burst skill."
        flows_into: ["twisted_collision", "rising_dragon"]
        notes: "Put on hotbar. Strong burst damage with SA protection."

