              keys: ["s", "lmb"]
              note: "SA bound finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Mystic PVP combo. Land a grab then chain into full burst.
            Mystic's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Ground pound on grabbed target"
            - skill: "twisted_collision"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_twisted_collision"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "rising_dragon"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy uppercut finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, land a stiffness CC,
            then chain into grab and full damage. Classic Mystic pattern.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "wolfs_fang"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Knockdown follow-up"
            - skill: "twisted_collision"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_twisted_collision"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "rising_dragon"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in Super Armor. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "tidal_burst"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush"
            - skill: "twisted_collision"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
