# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using iframes and Super Armor skills. Flash Step in,
            then use SA skills to pressure. Mystic succ is very mobile.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "rage_hammer"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "flash_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe gap close"
            - skill: "wolfs_fang"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "twisted_collision"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_twisted_collision"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "crouching_wolf"
