    earth_shattering_strike:
        name: "Earth Shattering Strike"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 12000
        description: "Enhanced axe slam from hotbar. Super Armor with bound CC."
        notes: "Optional. Put on hotbar. Decent burst with protection."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Berserker PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Berserker is THE grab class. Practice grab timing relentlessly."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Dodge incoming attacks."
        notes: "PVE iframe. Can be locked in PVP to prevent accidental use."

    lava_piercer:
        name: "Lava Piercer"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stiffness"]
        description: "Ranged frontal guard spear attack. Good for poking at range."
        notes: "Put on hotbar. Useful for ranged poke with frontal protection."

    giant_leap:
        name: "Giant Leap"
        input: "Shift + Space"
        keys: ["shift", "space"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Long-range leaping slam. Super Armor engage tool."
        notes: "Good engage from distance. Knockdown on landing. Use to open fights."

    shake_off:
        name: "Shake Off"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Self-buff that removes debuffs. Super Armor during animation."
        notes: "Hotbar recommended. Useful for cleansing slows and debuffs."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "SA charge into pack"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash engage"
            - skill: "slugfest"
              input: "F"
              keys: ["f"]
              note: "Knockdown follow-up"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main spin damage — hold to extend"
            - skill: "ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "Charge to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Use all cooldowns for maximum AOE."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "SA charge into pack center"
            - skill: "raging_thunder"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin for AOE grouping"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main spin damage"
            - skill: "ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "elastic_force"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Shockwave burst"
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float stragglers"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "Reposition if needed"
            - skill: "slugfest"
              input: "F"
              keys: ["f"]
              note: "Clean up remaining"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "Charge into pack"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot spin burst"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "Dash to next pack"
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "Engage into pack"
            - skill: "fearsome_tyrant"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA high burst opener"
            - skill: "raging_thunder"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin AOE"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main spin damage"
            - skill: "ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "elastic_force"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Shockwave burst"
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float for down attack"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "Reposition"
            - skill: "slugfest"
              input: "F"
              keys: ["f"]
              note: "Extend combo"
            - skill: "wrath_of_beast"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA burst filler"
            - skill: "titan_slam"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam knockdown"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills to approach.
            Succession Berserker chains SA skills to trade into grabs.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash engage"
            - skill: "slugfest"
              input: "F"
              keys: ["f"]
              note: "SA knockdown follow-up"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main spin damage"
            - skill: "ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "elastic_force"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher burst"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Berserker PVP combo. Land the grab then chain into full burst.
            Berserker's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float on grabbed target"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main spin burst on CC'd target"
            - skill: "ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "elastic_force"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Shockwave finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Headbutt stun to set up a grab, then chain into
            full damage. Classic Berserker catch rotation.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash in — stiffness on hit"
            - skill: "headbutt"
              input: "S + F"
              keys: ["s", "f"]
              note: "Stun the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stunned target"
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float follow-up"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main spin burst"
            - skill: "elastic_force"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Shockwave finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. High damage quickly while
            staying protected. No grab needed — pure SA trading.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "corpse_storm"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "SA forward rush with stiffness"
            - skill: "slugfest"
              input: "F"
              keys: ["f"]
              note: "SA knockdown"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA spin burst"
            - skill: "ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float on CC'd target"
            - skill: "fearsome_tyrant"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA heavy burst"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main spin damage"
            - skill: "elastic_force"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Shockwave finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use SA movement to create distance.
            Succession Berserker is slow but has strong SA chaining to escape.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA spin movement out"
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "SA charge away"
            - skill: "stomp"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound if they chase"
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "Continue charging if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on SA damage into groups.
            Berserker excels at tanking and grabbing key targets.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "SA engage into group"
            - skill: "predatory_hunt"
              input: "Q"
              keys: ["q"]
              note: "FG/SA opener with bound"
            - skill: "raging_thunder"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin into blob"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA spin AOE burst"
            - skill: "ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "elastic_force"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA shockwave into group"
            - skill: "titan_slam"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam SA knockdown"
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA reposition out"

    stomp_engage:
        name: "Stomp FG Engage"
        description: >
            Use Forward Guard Stomp as a safe poke to fish for bound CC,
            then follow up with grab or full burst combo.
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "stomp"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound poke — safe CC attempt"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on bound target"
            - skill: "frenzied_destroyer"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main spin burst"
            - skill: "ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "elastic_force"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Shockwave finisher"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Mobility Chain"
        description: "Chain movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "SA forward charge"
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA spin movement"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash forward"
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "Charge again if off cooldown"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Movement chain for Berserker succession. Cycle between Tackle,
            Whirlwind Crusher, and Titan Blow for maximum speed. Succession
            Berserker is slow but these chains keep momentum going.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "SA forward charge"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash forward"
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA spin movement"
            - skill: "titan_slam"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA Rabam movement"
            - skill: "tackle"
              input: "Space"
              keys: ["space"]
              note: "Charge again if off cooldown"

