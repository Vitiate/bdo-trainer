# ============================================================================
# BDO Trainer - Succession Berserker Combo Configuration
# ============================================================================
# Class: Berserker (Succession)
# Weapons: Axe (Main) / Ornamental Knot (Off)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Berserker Class Discord
#   - Community guides by Absolute, GrumpyGreen, Vert, Duodecil
# ============================================================================

class: Berserker
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Axe Skills)
# --------------------------------------------------------------------------
awakening_skills:
    frenzied_destroyer:
        name: "Frenzied Destroyer"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Enhanced spinning axe combo with Super Armor. Succession's main damage skill."
        flows_into: ["ancient_power", "raging_thunder", "slugfest"]
        core_effect: "Core: Frenzied Destroyer - Extra hits and increased damage"
        notes: "Bread-and-butter damage skill. Hold LMB to extend spin. Very high total damage."

    raging_thunder:
        name: "Raging Thunder"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 9000
        description: "Enhanced spinning rush with Super Armor. Multi-hit AOE with knockback."
        flows_into: ["frenzied_destroyer", "ancient_power", "slugfest"]
        notes: "Strong AOE damage. Hold F to extend spin. Great for PVE pack clearing."

    titan_blow:
        name: "Titan Blow"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Super Armor forward axe dash. Fast gap closer with stiffness CC."
        flows_into: ["slugfest", "frenzied_destroyer", "raging_thunder"]
        notes: "Primary engage tool. Flows directly into Slugfest with F."

    slugfest:
        name: "Slugfest"
        input: "F"
        keys: ["f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 4000
        description: "Overhead axe slam with Super Armor and knockdown. Standalone or after Titan Blow."
        flows_into: ["frenzied_destroyer", "ancient_power", "ground_lifting"]
        notes: "Can be used standalone or as Titan Blow follow-up. Knockdown sets up combos."

    ground_lifting:
        name: "Ground Lifting"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 7000
        description: "Upward axe strike with Super Armor and float CC."
        flows_into: ["frenzied_destroyer", "raging_thunder", "ancient_power"]
        notes: "Good for popping enemies into the air. Float sets up air attacks."

    elastic_force:
        name: "Elastic Force"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 8000
        description: "Enhanced shockwave slam. Super Armor with heavy knockback."
        flows_into: ["frenzied_destroyer", "ancient_power", "raging_thunder"]
        core_effect: "Core: Elastic Force - Increased damage and extended hitbox"
        notes: "High burst damage. Good for PVE grouping and PVP trading."

    headbutt:
        name: "Headbutt"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["stun"]
        damage: low
        cooldown_ms: 5000
        description: "Quick headbutt with stun CC. Unprotected but fast."
        flows_into: ["grab", "frenzied_destroyer", "slugfest"]
        notes: "Key CC tool. Stun sets up grab. Be careful — unprotected."

    stomp:
        name: "Stomp"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Ground stomp with Forward Guard and bound CC."
        flows_into: ["frenzied_destroyer", "raging_thunder", "ancient_power"]
        core_effect: "Core: Stomp - Forward Guard during the skill"
        notes: "Safe CC with frontal protection. Bound sets up down attacks."

    ancient_power:
        name: "Ancient Power"
        input: "LMB (after succession skills)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up available after many succession skills. Extra burst with SA."
        flows_into: ["frenzied_destroyer", "raging_thunder"]
        notes: "Chain after Frenzied Destroyer, Raging Thunder, or Elastic Force for extra damage."

    predatory_hunt:
        name: "Predatory Hunt"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 10000
        description: "Forward Guard into Super Armor transition. Bound CC on hit."
        flows_into: ["frenzied_destroyer", "slugfest", "raging_thunder"]
        notes: "Starts with FG, transitions to SA. Good protected engage with bound CC."

    beastly_wind_slash:
        name: "Beastly Wind Slash"
        input: "E (Succession)"
        keys: ["e"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Wide-arc axe swing with Super Armor and knockback."
        flows_into: ["frenzied_destroyer", "raging_thunder", "ancient_power"]
        notes: "Note: E also used for Grab in neutral. Input is context-dependent."

    corpse_storm:
        name: "Corpse Storm"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward axe rush with Super Armor and stiffness CC."
        flows_into: ["slugfest", "frenzied_destroyer", "ground_lifting"]
        notes: "Good alternative engage with stiffness. Can flow into Slugfest."

    fearsome_tyrant:
        name: "Fearsome Tyrant"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 12000
        description: "Enhanced succession slam with Super Armor. High burst."
        flows_into: ["frenzied_destroyer", "ancient_power"]
        core_effect: "Core: Fearsome Tyrant - Extra hits and extended Super Armor"
        notes: "Long cooldown but very high damage. Save for burst windows."

    tackle:
        name: "Tackle"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor forward charge. Primary succession movement skill."
        flows_into: ["titan_blow", "frenzied_destroyer", "slugfest"]
        notes: "Main gap closer. PVE iframe (1s invincibility vs monsters)."

    devastation:
        name: "Devastation"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 12000
        description: "Heavy overhead axe slam from hotbar. Super Armor throughout."
        flows_into: ["frenzied_destroyer", "raging_thunder"]
        notes: "Hotbar skill. Strong filler damage with SA protection."

    wrath_of_beast:
        name: "Wrath of Beast"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Ground pound AOE from hotbar. Super Armor with knockdown."
        flows_into: ["frenzied_destroyer", "raging_thunder"]
        notes: "Hotbar skill. Good extra burst with protection."

    rock_smash:
        name: "Rock Smash"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward axe rush with Super Armor. Quick engage tool."
        flows_into: ["slugfest", "frenzied_destroyer", "raging_thunder"]
        notes: "Good alternative engage. Can flow into Slugfest."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    titan_slam:
        name: "Titan Slam"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 9000
        description: "SA enhanced ground slam. Combines Headbutt into a powerful knockdown strike."
        notes: "Preferred L56 Rabam. Good protected engage with knockdown."

    whirlwind_crusher:
        name: "Whirlwind Crusher"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "SA spinning axe rush. Good for movement and AOE damage."
