# ============================================================================
# BDO Trainer - Awakened Hashashin Combo Configuration
# ============================================================================
# Class: Hashashin (Awakening)
# Weapons: Shamshir (Main) / Haladie (Off) / Atoraxxion (Awakening — sand swords)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Hashashin Class Discord
#   - Community guides by Vert, BigandShiny, Desperada, Haste
# ============================================================================

class: Hashashin
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    sandstorm:
        name: "Sandstorm"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Super Armor spinning sand sword slash. Main filler damage with knockdown."
        flows_into: ["flow_sand_slash", "arid_assault", "dune_slash"]
        core_effect: "Core: Sandstorm - Extra hits and increased damage"
        notes: "Bread-and-butter damage skill. Always flow into Sand Slash after."

    flow_sand_slash:
        name: "Flow: Sand Slash"
        input: "LMB (after Sandstorm)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Sandstorm. Additional burst with Super Armor."
        flows_into: ["arid_assault", "dune_slash", "constriction"]
        notes: "Always chain after Sandstorm for extra damage and continued SA."

    arid_assault:
        name: "Arid Assault"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Heavy SA slam with sand swords. Highest single-hit awakening damage."
        flows_into: ["flow_sandspout", "sandstorm", "dune_slash"]
        core_effect: "Core: Arid Assault - Super Armor and increased damage"
        notes: "Primary burst skill. Core is the recommended first pick. Use off cooldown."

    constriction:
        name: "Constriction"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor forward dash strike. Fast engage tool with stiffness."
        flows_into: ["flow_desert_mirage", "sandstorm", "arid_assault"]
        notes: "Primary engage skill. Flows into Desert Mirage for extended combo."

    flow_desert_mirage:
        name: "Flow: Desert Mirage"
        input: "LMB (after Constriction)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Constriction. Extra hits and continued Super Armor."
        flows_into: ["sandstorm", "arid_assault", "dune_slash"]
        notes: "Always chain after Constriction for extra damage and SA extension."

    dune_slash:
        name: "Dune Slash"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor downward slam with bound CC. Strong PVP and PVE skill."
        flows_into: ["sandstorm", "arid_assault", "flow_sandspout"]
        core_effect: "Core: Dune Slash - Bound on good hits"
        notes: "High damage with bound CC. Down attack properties on bound targets."

    sand_warp:
        name: "Sand Warp"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor short-range sand teleport. Repositions behind target."
        flows_into: ["sandstorm", "arid_assault", "serpents_coil"]
        notes: "Teleport engage or reposition. Can be used to get behind blocking targets."

    desert_collapse:
        name: "Desert Collapse"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 12000
        description: "Forward Guard AOE sand eruption. Large area knockdown."
        flows_into: ["sandstorm", "arid_assault", "constriction"]
        core_effect: "Core: Desert Collapse - Forward Guard during the skill"
        notes: "Large AOE with FG protection. Good for PVE pack clearing and PVP zoning."

    sand_dash:
        name: "Sand Dash"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Iframe/SA sand movement dash. Primary mobility skill in awakening."
        flows_into: ["sandstorm", "constriction", "arid_assault"]
        notes: "Primary movement in awakening. Iframe on first dash, SA on extended movement."

    serpents_coil:
        name: "Serpent's Coil"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard defensive counter. Stiffness on hit."
        flows_into: ["sandstorm", "arid_assault", "dune_slash"]
        notes: "Defensive tool with FG. Use when pressured to fish for stiffness CC."

    quicksand:
        name: "Quicksand"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["pull"]
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor forward sand pull. Groups enemies for combo follow-up."
        flows_into: ["sandstorm", "arid_assault", "dune_slash"]
        notes: "Useful for grouping mobs in PVE and pulling targets in PVP."

    flow_sandspout:
        name: "Flow: Sandspout"
        input: "RMB (after various skills)"
        keys: ["rmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up sand eruption available after multiple awakening skills."
        flows_into: ["sandstorm", "constriction", "dune_slash"]
        notes: "Flows from Arid Assault, Dune Slash, and other awakening skills."

    sand_vortex:
        name: "Sand Vortex"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 7000
        description: "Quick sand sweep with bound CC. Unprotected."
        flows_into: ["sandstorm", "arid_assault"]
        notes: "Unprotected but fast CC. Use cautiously in PVP."

    desert_blast:
        name: "Desert Blast"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor sand explosion from hotbar. AOE burst."
        flows_into: ["sandstorm", "arid_assault"]
        notes: "Put on hotbar. Good protected AOE for pack clearing."

    haladie_wheel:
        name: "Haladie Wheel"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 11000
        description: "Spinning haladie throw from hotbar with Forward Guard."
        flows_into: ["sandstorm", "constriction"]
        notes: "Hotbar skill. Ranged poke with frontal protection."

