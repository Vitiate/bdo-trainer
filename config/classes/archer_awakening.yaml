# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Essential survival tool for ranged class."
        notes: "Important iframe. Can lock to prevent accidental use if preferred."

    breath_of_the_spirit:
        name: "Breath of the Spirit"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Self-heal skill. Recovers HP over time. Hotbar recommended."
        notes: "Important sustain. Use between packs in PVE or when safe in PVP."

    uproot:
        name: "Uproot"
        input: "F"
        keys: ["f"]
