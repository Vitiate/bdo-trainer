    earth_kick:
        name: "Earth Kick"
        input: "S + E"
        keys: ["s", "e"]
        protection: "none"
        cc: ["bound"]
        description: "Backward kick with bound CC. Creates distance after hit."
        notes: "Emergency close-range peel. Unprotected but bound CC is strong."

