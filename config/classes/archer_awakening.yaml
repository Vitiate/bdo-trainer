# ============================================================================
# BDO Trainer - Awakened Archer Combo Configuration
# ============================================================================
# Class: Archer (Awakening)
# Weapons: Crossbow (Main) / Ra'ghon (Off) / Greatbow (Awakening)
# Damage Type: Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Notes:
#   Archer is unique — originally released as an awakening-only class.
#   He seamlessly uses both Crossbow and Greatbow skills without stance
#   swapping. Archer has NO grab, relying on ranged CC and mobility.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Archer Class Discord
#   - Community guides by Vengeroth, Archetype, Desperado
# ============================================================================

class: Archer
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    earth_shatter:
        name: "Earth Shatter"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Super Armor ground AOE slam. Main greatbow damage skill with knockdown."
        flows_into: ["meteor_dive", "full_bloom", "flow_tempest"]
        core_effect: "Core: Earth Shatter - Extra damage and increased AOE range"
        notes: "Bread-and-butter damage skill. Use off cooldown in PVE rotations."

    meteor_dive:
        name: "Meteor Dive"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor aerial leap into ground slam with bound CC."
        flows_into: ["earth_shatter", "full_bloom", "luthraghons_call"]
        core_effect: "Core: Meteor Dive - Bound on good hits, increased damage"
        notes: "Jump slam. Great for engaging packs in PVE and catching in PVP."

    luthraghons_call:
        name: "Luthraghon's Call"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor charged greatbow shot. Long range with stiffness."
        flows_into: ["flow_lights_trail", "earth_shatter", "winged_strike"]
        notes: "Strong ranged poke with SA. Always follow with Flow: Light's Trail."

    flow_lights_trail:
        name: "Flow: Light's Trail"
        input: "LMB (after Luthraghon's Call)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Luthraghon's Call. Fires additional piercing shots."
        flows_into: ["earth_shatter", "meteor_dive"]
        notes: "Always chain after Luthraghon's Call for extra damage and knockback."

    full_bloom:
        name: "Full Bloom"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Super Armor massive radial AOE explosion. Huge damage area."
        flows_into: ["earth_shatter", "tactical_retreat", "volant"]
        notes: "One of the biggest AOE skills. Amazing for PVE pack clearing."

    winged_strike:
        name: "Winged Strike"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor aerial launch attack with float CC."
        flows_into: ["meteor_dive", "earth_shatter", "flow_call_from_sky"]
        notes: "Float CC enables air combos in PVP. Good for catching opponents."

    flow_call_from_sky:
        name: "Flow: Call from Sky"
        input: "LMB (after Winged Strike)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Aerial follow-up after Winged Strike. Dive attack with knockdown."
        flows_into: ["earth_shatter", "full_bloom"]
        notes: "Always follow Winged Strike with this for extra air damage."

    radiant_explosion:
        name: "Radiant Explosion"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard ranged greatbow blast. Safe poke with stiffness."
        flows_into: ["luthraghons_call", "earth_shatter", "glissade"]
        notes: "Safe ranged poke with FG. Great for zoning in PVP."

    tactical_retreat:
        name: "Tactical Retreat"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 5000
        description: "Iframe backward dash. Primary escape and repositioning tool."
        flows_into: ["radiant_explosion", "luthraghons_call", "arrow_storm"]
        notes: "Main iframe. Use to reposition and create distance. PVP essential."

    glissade:
        name: "Glissade"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Forward Guard forward slide. Primary forward movement skill."
        flows_into: ["earth_shatter", "luthraghons_call", "meteor_dive"]
        notes: "Main forward movement. FG while moving makes it safe to approach."

    volant:
        name: "Volant"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor backward leap with arrow volley. Creates distance."
        flows_into: ["radiant_explosion", "luthraghons_call", "arrow_storm"]
        notes: "Backward jump + ranged damage. Good for kiting in PVP."

    arrow_storm:
        name: "Arrow Storm"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 15000
        description: "Super Armor rain of arrows over wide area. Massive AOE damage."
        flows_into: ["flow_tempest", "earth_shatter", "tactical_retreat"]
        notes: "Long cooldown but devastating AOE. Great for large PVE packs."

    flow_tempest:
        name: "Flow: Tempest"
        input: "LMB (after Arrow Storm)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Arrow Storm. Extended arrow barrage with SA."
        flows_into: ["earth_shatter", "meteor_dive"]
        notes: "Always chain after Arrow Storm for maximum AOE damage."

    zephyr_leap:
        name: "Zephyr Leap"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Super Armor forward jump attack. Quick engage tool."
        flows_into: ["earth_shatter", "winged_strike", "meteor_dive"]
        notes: "Fast forward engage with SA. Good transition into burst skills."

    wrath_of_nature:
        name: "Wrath of Nature"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 6000
        description: "Ground shockwave that knocks back nearby enemies. Unprotected."
        flows_into: ["tactical_retreat", "volant", "radiant_explosion"]
        notes: "Unprotected but useful peel. Be careful using in PVP."

    natures_tremble:
        name: "Nature's Tremble"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Ranged greatbow shot from hotbar. Super Armor with knockdown."
        flows_into: ["earth_shatter", "meteor_dive"]
        notes: "Hotbar skill. Good ranged burst with protection."

