# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_poke:
        name: "Protected Poke"
        description: >
            Safe ranged engage using Forward Guard and Super Armor skills.
            Poke from range with protection, then reposition. Archer has no
            grab — use ranged CC to control spacing.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "radiant_explosion"
              input: "Q"
              keys: ["q"]
              note: "FG ranged stiffness poke"
            - skill: "luthraghons_call"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge shot follow-up"
            - skill: "flow_lights_trail"
              input: "LMB"
              keys: ["lmb"]
              note: "Piercing knockback"
            - skill: "tactical_retreat"
              input: "Space"
              keys: ["space"]
              note: "Iframe back to safety"

    ranged_burst:
        name: "Ranged Burst Combo"
        description: >
            Full ranged damage combo. Stay at range and unload damage
            skills with Super Armor protection. Punish targets that
            cannot close distance.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "radiant_explosion"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness opener"
            - skill: "luthraghons_call"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge shot"
            - skill: "flow_lights_trail"
              input: "LMB"
              keys: ["lmb"]
              note: "Piercing follow-up"
            - skill: "earth_shatter"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA ground burst"
            - skill: "volant"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA backward leap + arrows"
            - skill: "tactical_retreat"
              input: "Space"
              keys: ["space"]
              note: "Iframe reposition"

    aerial_catch:
        name: "Aerial Catch Combo"
        description: >
            Use float CC from Winged Strike to catch an opponent in the
            air, then chain into air attacks for full burst. Archer's
            primary CC chain without grab.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "winged_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float CC — catch the target"
            - skill: "flow_call_from_sky"
              input: "LMB"
              keys: ["lmb"]
              note: "Aerial knockdown follow-up"
            - skill: "earth_shatter"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA ground slam on downed target"
            - skill: "meteor_dive"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Jump slam bound"
            - skill: "full_bloom"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA big AOE finisher"

    stiffness_chain:
        name: "Stiffness Chain (1v1)"
        description: >
            Fish for a stiffness CC at range, then chain into full damage
            on the stiffened target. Archer's version of a catch combo
            since he has no grab to bypass SA.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "radiant_explosion"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness — catch the target"
            - skill: "zephyr_leap"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "SA forward jump engage"
            - skill: "winged_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float on stiffened target"
            - skill: "flow_call_from_sky"
              input: "LMB"
              keys: ["lmb"]
              note: "Aerial knockdown"
            - skill: "earth_shatter"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA ground slam"
            - skill: "meteor_dive"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Jump slam finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframe and backward jumps
            to create distance. Archer excels at kiting — play to your
            range advantage and avoid melee.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "tactical_retreat"
              input: "Space"
              keys: ["space"]
              note: "Iframe backward dash"
            - skill: "volant"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA backward jump + arrows"
            - skill: "breath_of_the_wind"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA wind dash away"
            - skill: "radiant_explosion"
              input: "Q"
              keys: ["q"]
              note: "FG ranged poke while retreating"
            - skill: "tactical_retreat"
              input: "Space"
              keys: ["space"]
              note: "Iframe again if off cooldown"

    meteor_engage:
        name: "Meteor Engage (Aggressive)"
        description: >
            Aggressive dive-in combo. Jump in with Meteor Dive, burst
            hard, then escape. High risk, high reward — use when you
            spot an unprotected target.
        difficulty: advanced
        combo_window_ms: 200
        steps:
