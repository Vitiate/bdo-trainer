              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG forward approach"
            - skill: "meteor_dive"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA jump slam — bound CC"
            - skill: "earth_shatter"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA ground AOE on bound target"
            - skill: "full_bloom"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA massive AOE burst"
            - skill: "tactical_retreat"
              input: "Space"
              keys: ["space"]
              note: "Iframe escape after burst"
            - skill: "volant"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA backward jump for safety"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Stay at range behind your group.
            Focus on protected AOE damage into enemy blobs. Archer
            excels at large scale with massive ranged AOE.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "arrow_storm"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA rain of arrows into blob"
            - skill: "flow_tempest"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended barrage"
            - skill: "luthraghons_call"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA long-range charge shot"
            - skill: "flow_lights_trail"
              input: "LMB"
              keys: ["lmb"]
              note: "Piercing follow-up"
            - skill: "earth_shatter"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA ground AOE"
            - skill: "full_bloom"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA massive radial AOE"
            - skill: "radiant_explosion"
              input: "Q"
              keys: ["q"]
              note: "FG ranged stiffness poke"
            - skill: "natures_tremble"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Hotbar ranged burst"
            - skill: "tactical_retreat"
              input: "Space"
              keys: ["space"]
              note: "Iframe reposition if pressured"

