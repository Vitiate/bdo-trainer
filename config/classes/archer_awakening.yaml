# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Earth Shatter"
    effect: "Extra damage and increased AOE range"
    reason: >
        Earth Shatter with Core gains additional damage and a wider
        AOE radius, making it even more devastating in PVE grinding.
        As Archer's bread-and-butter skill used off cooldown, this
        Core provides the most consistent damage increase. Meteor Dive
        Core is also a strong choice for the Bound CC and burst damage
        in PVP scenarios.
