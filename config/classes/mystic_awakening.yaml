              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot burst"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "tidal_dagger"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "tip_of_an_iceberg"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "mystic_leap"
              input: "Space"
              keys: ["space"]
              note: "Engage"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE opener"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy damage"
            - skill: "tidal_burst"
              input: "W + F"
              keys: ["w", "f"]
              note: "Charge through"
            - skill: "flow_dragon_rip"
              input: "LMB"
              keys: ["lmb"]
