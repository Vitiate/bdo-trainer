# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Dragon Shatter"
    effect: "Bound on last hit"
    reason: >
        Dragon Shatter with Core gains Bound CC on the final hit, making it
        a devastating PVP and PVE tool. The Bound sets up follow-up damage
        and extended CC chains. Most Mystic players choose this Core first
        as it transforms the class's burst potential. After getting
        comfortable, experiment with Tidal Burst and Wave Orb Cores
        as well.
