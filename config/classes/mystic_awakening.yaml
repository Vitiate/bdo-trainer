              input: "Hotbar"
              keys: ["hotbar"]
              note: "AOE burst"
            - skill: "dragon_strike"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills. Approach with protection,
            then look for a grab or CC opening. Mystic excels at this.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "tip_of_an_iceberg"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "mystic_leap"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "rapid_stream"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG dash approach"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Mystic PVP combo. Land a grab then chain into full burst.
            Mystic's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Ground pound on grabbed target"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use protected skills to approach, land a stiffness CC,
            then chain into grab and full damage. Classic Mystic 1v1 pattern.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "rapid_stream"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Knockdown follow-up"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in Super Armor. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "tidal_burst"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush"
            - skill: "flow_dragon_rip"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant knockdown on CC'd target"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy finisher"

    float_chain:
        name: "Float Chain (Extended CC)"
        description: >
            Use Rising Dragon float to start a CC chain, then burst
            the target while they are airborne. High risk, high reward.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "rising_dragon"
              input: "S + F"
              keys: ["s", "f"]
              note: "Float the target — unprotected"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Air attack on floated target"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam on downed target"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Ground pound finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use SA movement and iframes to
            create distance. Mystic has strong escape tools.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "tidal_dagger"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA dash out"
            - skill: "mystic_leap"
              input: "Space"
              keys: ["space"]
              note: "SA leap away"
            - skill: "dragons_pit"
              input: "Q"
              keys: ["q"]
              note: "FG heal if safe"
            - skill: "mystic_leap"
              input: "Space"
              keys: ["space"]
              note: "Continue dashing if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected damage and
            avoid overextending. Stay with your group and use SA skills.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "tip_of_an_iceberg"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "mystic_leap"
              input: "Space"
              keys: ["space"]
              note: "SA engage into group"
            - skill: "flow_prey_hunt"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA lunge into enemies"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE knockdown"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"
            - skill: "tidal_dagger"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA reposition out"

