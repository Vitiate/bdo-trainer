# ============================================================================
# BDO Trainer - Awakened Mystic Combo Configuration
# ============================================================================
# Class: Mystic (Awakening)
# Weapons: Gauntlet (Main) / Vambrace (Off) / Cestus (Awakening — Water Dragon)
# Damage Type: Melee / Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Mystic Class Discord
#   - Community guides by Xenothe, Bigandshiny, Aeternitas
# ============================================================================

class: Mystic
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    tip_of_an_iceberg:
        name: "Tip of an Iceberg"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff. Increases AP and attack speed. Super Armor during cast."
        flows_into: ["sea_burial", "dragon_shatter"]
        core_effect: "Core: Tip of an Iceberg - Extra AP bonus and reduced cooldown"
        notes: "Use before engaging packs or PVP fights. Hotbar recommended for tracking."

    mystic_leap:
        name: "Mystic Leap"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor forward leap. PVE iframe. Primary awakening movement."
        flows_into: ["sea_burial", "dragon_shatter", "tidal_burst"]
        notes: "Main movement skill in awakening. PVE iframe (1s invincibility vs monsters)."

    sea_burial:
        name: "Sea Burial"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Water dragon slam. Super Armor throughout with knockdown on hit."
        flows_into: ["flow_sea_burial", "dragon_shatter", "wave_orb"]
        notes: "Bread-and-butter damage skill. Always follow up with Flow: Sea Burial."

    flow_sea_burial:
        name: "Flow: Sea Burial"
        input: "LMB (after Sea Burial)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Sea Burial. Additional water dragon burst with Super Armor."
        flows_into: ["dragon_shatter", "wave_orb"]
        notes: "Always chain after Sea Burial for maximum damage output."

    dragon_shatter:
        name: "Dragon Shatter"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Heavy water dragon punch with Super Armor. Core adds Bound on hit."
        flows_into: ["sea_burial", "thunder_pound", "flow_hangover"]
        core_effect: "Core: Dragon Shatter - Bound on last hit"
        notes: "Highest damage awakening skill. Core recommended first. Strong in PVE and PVP."

    tidal_burst:
        name: "Tidal Burst"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward water charge with Super Armor. Good engage and gap closer."
        flows_into: ["flow_dragon_rip", "sea_burial", "dragon_shatter"]
        core_effect: "Core: Tidal Burst - Extra damage and increased range"
        notes: "Good engage tool. Flows into Flow: Dragon Rip for extra burst."

    flow_dragon_rip:
        name: "Flow: Dragon Rip"
        input: "LMB (after Tidal Burst)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up punch after Tidal Burst. Additional damage with Super Armor."
        flows_into: ["sea_burial", "dragon_shatter"]
        notes: "Always chain after Tidal Burst for extended damage and CC."

    wave_orb:
        name: "Wave Orb"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 9000
        description: "Ranged water orb projectile with Super Armor. Only ranged awakening skill."
        flows_into: ["sea_burial", "dragon_shatter"]
        core_effect: "Core: Wave Orb - Increased projectile size and damage"
        notes: "Mystic's only ranged awakening skill. Good for poking in PVP and pulling in PVE."

    thunder_pound:
        name: "Thunder Pound"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor ground pound AOE. Strong knockdown on hit."
        flows_into: ["sea_burial", "dragon_shatter", "flow_hangover"]
        notes: "Strong AOE damage and knockdown. Key skill for PVE clearing and PVP burst."

    dragons_pit:
        name: "Dragon's Pit"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: low
        cooldown_ms: 10000
        description: "Forward Guard healing pool. Recovers HP over time while held."
        flows_into: ["sea_burial", "rapid_stream"]
        notes: "Healing skill with Forward Guard. Hold Q to recover HP. Use between pulls."

    rapid_stream:
        name: "Rapid Stream"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard dashing punch combo. Protected forward movement."
        flows_into: ["sea_burial", "dragon_shatter", "tidal_burst"]
        notes: "Good protected approach with Forward Guard. Use to close distance safely."

    tsunami:
        name: "Tsunami"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Large AOE water wave with Super Armor. Pushes enemies back."
        flows_into: ["sea_burial", "dragon_shatter"]
        notes: "Good AOE for large packs and node wars. Knockback useful for peeling."

    rising_dragon:
        name: "Rising Dragon"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["float"]
        damage: medium
        cooldown_ms: 6000
        description: "Uppercut with float CC. Unprotected but strong CC tool."
        flows_into: ["sea_burial", "dragon_shatter"]
        notes: "Float CC for combos. Unprotected — use after a stiffness or on CC'd targets."

    flow_hangover:
        name: "Flow: Hangover"
        input: "F (after awakening skills)"
        keys: ["f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Super Armor attack available after multiple awakening skills."
        flows_into: ["sea_burial", "dragon_shatter"]
        notes: "Can be chained after many awakening skills. Good filler with SA protection."

    flow_prey_hunt:
        name: "Flow: Prey Hunt"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor lunging strike. Hotbar recommended."
        flows_into: ["sea_burial", "dragon_shatter"]
        notes: "Put on hotbar. Good SA engage or burst filler between cooldowns."

    crouching_wolf:
        name: "Crouching Wolf"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Spinning AOE strike from hotbar. Super Armor with knockdown."
        flows_into: ["sea_burial", "dragon_shatter"]
        notes: "Hotbar skill. Good AOE burst with protection in PVE and large scale."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    dragon_strike:
        name: "Dragon Strike"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Water-infused forward strike with stiffness CC. Super Armor. Good for engage."
        notes: "Preferred L56 Rabam. Good for movement and engage with protection."

    tidal_dagger:
        name: "Tidal Dagger"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 8000
        description: "SA forward dash with water dragon. Movement skill with protection."
        notes: "Preferred L57 Rabam. Useful for protected movement and gap closing."

    sea_storm:
        name: "Sea Storm"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 14000
        description: "AOE water explosion from hotbar. Super Armor with knockdown CC."
        notes: "Decent L58 Rabam for PVE. Use from hotbar for extra burst in rotations."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Mystic PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Mystic is a grab class — practice grab timing constantly."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. PVE iframe as well."
        notes: "PVE iframe. Can use in PVP but costs stamina. Lock if causing issues."

    dragons_descent:
        name: "Dragon's Descent"
        input: "Space (while airborne)"
        keys: ["space"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Aerial slam from the air. Super Armor. Useful for repositioning."
        notes: "Use after jumps or Mystic Leap for aerial slam engage. SA throughout."

    flash_step:
        name: "Flash Step"
        input: "W + W (double tap)"
        keys: ["w", "w"]
        protection: "iframe"
        cc: []
        description: "Quick forward dash iframe. Primary pre-awakening movement tool."
        notes: "Fast forward dash. Can be chained for movement. Important for repositioning."

    spiral_torpedo:
        name: "Spiral Torpedo"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stun"]
        description: "Spinning forward rush with stun CC. Super Armor during the skill."
        notes: "Good pre-awakening CC tool. Use from hotbar for protected engage."

