              keys: ["shift", "e"]
              note: "AP buff before engaging"
            - skill: "mystic_leap"
              input: "Space"
              keys: ["space"]
              note: "Gap close into pack"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE knockdown, group mobs"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst damage"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy finisher"
            - skill: "tidal_burst"
              input: "W + F"
