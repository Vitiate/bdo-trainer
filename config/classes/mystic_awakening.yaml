        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "mystic_leap"
              input: "Space"
              keys: ["space"]
              note: "Gap close to pack"
            - skill: "sea_burial"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage slam"
            - skill: "flow_sea_burial"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "dragon_shatter"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy water punch"
            - skill: "thunder_pound"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE ground pound"
            - skill: "mystic_leap"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
