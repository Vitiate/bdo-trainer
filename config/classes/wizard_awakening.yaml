# ============================================================================
# BDO Trainer - Awakened Wizard Combo Configuration
# ============================================================================
# Class: Wizard (Awakening)
# Weapons: Staff (Main) / Dagger (Off) / Godr Sphera (Awakening — fire/water orbs)
# Damage Type: Magic / Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Wizard/Witch Class Discord
#   - Community guides by Akirah, BigandShiny, Lapiku, Unruhe
# ============================================================================

class: Wizard
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    aqua_jail_explosion:
        name: "Aqua Jail Explosion"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor water-element explosion. Large AOE with bound CC. Primary water nuke."
        flows_into: ["flow_aqua_bomb", "bolide_of_destruction", "chilling_wave"]
        core_effect: "Core: Aqua Jail Explosion - Extra hit on explosion"
        notes: "Main water damage skill. Always follow up with Flow: Aqua Bomb for extra burst."

    flow_aqua_bomb:
        name: "Flow: Aqua Bomb"
        input: "LMB (after Aqua Jail Explosion)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Aqua Jail Explosion. Additional water burst with knockdown."
        flows_into: ["bolide_of_destruction", "cataclysm", "chilling_wave"]
        notes: "Always chain after Aqua Jail Explosion. Massive extra damage for free."

    bolide_of_destruction:
        name: "Bolide of Destruction"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor fire-element meteor slam. Highest damage awakening skill. Massive AOE."
        flows_into: ["aqua_jail_explosion", "cataclysm", "hellfire"]
        core_effect: "Core: Bolide of Destruction - Extra hit and increased damage"
        notes: "Bread-and-butter damage skill. Best single nuke in awakening kit. Use on cooldown."

    cataclysm:
        name: "Cataclysm"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 10000
        description: "Super Armor fire-element forward slam. Large AOE knockback. Core adds extra hits."
        flows_into: ["flow_flame_knot", "bolide_of_destruction", "aqua_jail_explosion"]
        core_effect: "Core: Cataclysm - Additional hits on impact"
        notes: "Strong AOE engage. Always follow with Flow: Flame Knot for extra damage."

    flow_flame_knot:
        name: "Flow: Flame Knot"
        input: "LMB (after Cataclysm)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Cataclysm. Fire whip that pulls enemies in with stiffness."
        flows_into: ["bolide_of_destruction", "aqua_jail_explosion"]
        notes: "Always chain after Cataclysm. Pulls mobs together for follow-up AOE."

    chilling_wave:
        name: "Chilling Wave"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor water-element wave. Good filler with stiffness CC."
        flows_into: ["aqua_jail_explosion", "bolide_of_destruction"]
        notes: "Solid filler with SA protection. Use between main skill cooldowns."

    hellfire:
        name: "Hellfire"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 12000
        description: "Super Armor fire-element eruption. Large AOE with knockdown. Long cooldown."
        flows_into: ["bolide_of_destruction", "cataclysm", "aqua_jail_explosion"]
        notes: "Strong AOE burst. Long cooldown so use wisely. Good in PVE pack clear."

    water_sphere:
        name: "Water Sphere"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: low
        cooldown_ms: 6000
        description: "Forward Guard water sphere that heals on hit. Self-sustain tool."
        flows_into: ["aqua_jail_explosion", "chilling_wave"]
        core_effect: "Core: Water Sphere - Increased HP recovery"
        notes: "Sustain skill. Use between pulls for healing. FG provides frontal protection."

    teleport_awakening:
        name: "Teleport"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 5000
        description: "Iframe teleport. Primary movement and defensive skill. Blinks forward."
        flows_into: ["bolide_of_destruction", "aqua_jail_explosion", "cataclysm"]
        notes: "Best defensive skill. Use to dodge grabs and CCs. Can be chained twice."

    lava_field:
        name: "Lava Field"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor fire-element ground DOT. Places a burning zone that damages over time."
        flows_into: ["bolide_of_destruction", "cataclysm"]
        notes: "Good area denial in PVP. Persistent AOE useful in node wars."

    flame_armor:
        name: "Flame Armor"
        input: "E (Awakening)"
        keys: ["e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Super Armor self-buff. Grants DP increase and fire damage reduction."
        flows_into: ["bolide_of_destruction", "aqua_jail_explosion"]
        notes: "Use before engaging for defensive buff. Long cooldown — save for important fights."

    godr_grab:
        name: "Godr Grab"
        input: "E (hold in Awakening)"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        damage: low
        cooldown_ms: 5000
        description: "Awakening grab. Grapples a single target. Bypasses Super Armor."
        flows_into: ["bolide_of_destruction", "hellfire", "aqua_jail_explosion"]
        notes: "Wizard has a grab — rare for a ranged class. Essential PVP tool."

    water_bomb:
        name: "Water Bomb"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor water bomb slam. Bound CC on hit."
        flows_into: ["aqua_jail_explosion", "chilling_wave"]
        notes: "Good CC tool. Bound into Aqua Jail Explosion for massive follow-up damage."

    fire_breath:
        name: "Inferno"
        input: "RMB"
        keys: ["rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 3000
        description: "Basic awakening attack. Fire breath with stiffness on good hits."
        flows_into: ["bolide_of_destruction", "cataclysm"]
        notes: "Basic filler. Avoid in PVP due to no protection."

    flow_earth_response:
        name: "Flow: Earth's Response"
        input: "Shift + Q"
        keys: ["shift", "q"]
        protection: "FG"
        cc: ["float"]
        damage: medium
        cooldown_ms: 12000
        description: "Forward Guard earth eruption. Float CC on hit."
        flows_into: ["bolide_of_destruction", "aqua_jail_explosion"]
        notes: "Situational CC tool. Float sets up aerial combos in PVP."

    rime_chill:
        name: "Rime Chill"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward ice blast. Decent filler with stiffness."
        flows_into: ["aqua_jail_explosion", "bolide_of_destruction"]
        notes: "Good filler skill. SA makes it safe to use between main cooldowns."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    scorching_earth:
        name: "Scorching Earth"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Fire AOE ground eruption with Super Armor and knockdown. Good PVE filler."
        notes: "Preferred L56 choice. SA with knockdown makes it safe and useful in both PVE and PVP."

    glacial_prison:
        name: "Glacial Prison"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Ice prison eruption with SA. Good filler in PVE and PVP."
        notes: "Preferred L57 choice. SA protection makes it a safe skill to weave in."

    elemental_smite:
        name: "Elemental Smite"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 12000
        description: "Combined fire/water explosion from hotbar. Decent extra burst."
        notes: "Optional. Put on hotbar. Neither L58 Rabam is essential but this adds burst."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Pre-awakening grab / grapple CC. Essential for Wizard PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Practice grab timing. Wizard is rare among casters for having a grab."

    teleport:
        name: "Teleport"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        description: "Iframe blink teleport. Primary defensive and movement skill. Works in all stances."
        notes: "Your best defensive tool. Can chain two teleports. Use to dodge grabs and engage/disengage."

    speed_spell:
        name: "Speed Spell"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Party buff. Increases movement speed and attack/casting speed for all nearby allies."
        notes: "Signature party buff. Keep up at all times in group content. Huge value in node wars."

    healing_lighthouse:
        name: "Healing Lighthouse"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Places a healing beacon that restores HP to all allies in range over time."
        notes: "Strong group healing. Place in safe spots during siege and node wars."

    healing_aura:
        name: "Healing Aura"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Super Armor self and party heal. Instant cast from hotbar."
        notes: "Emergency heal. SA makes it safe to use under pressure."

    protected_area:
        name: "Protected Area"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Signature Wizard skill. Grants 100% CC resist to all nearby party members for duration."
        notes: "THE reason Wizards are wanted in group PVP. Use on cooldown during pushes in node wars."

    magical_evasion:
        name: "Magical Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Emergency dodge in any direction."
        notes: "Use when Teleport is on cooldown. Can save your life in PVP."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing mob packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Teleport into pack"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main fire nuke — highest damage"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Water burst"
            - skill: "flow_aqua_bomb"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up water burst"
            - skill: "cataclysm"
              input: "W + F"
              keys: ["w", "f"]
              note: "Fire AOE cleanup"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Teleport to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Uses all major cooldowns for maximum AOE."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "flame_armor"
              input: "E"
              keys: ["e"]
              note: "DP buff before engaging"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Teleport into center of pack"
            - skill: "cataclysm"
              input: "W + F"
              keys: ["w", "f"]
              note: "Fire AOE — group mobs with knockback"
            - skill: "flow_flame_knot"
              input: "LMB"
              keys: ["lmb"]
              note: "Pull mobs in tight"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main fire nuke on grouped mobs"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Water burst on remaining"
            - skill: "flow_aqua_bomb"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up water burst"
            - skill: "hellfire"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Fire eruption for cleanup"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility between packs."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Teleport into pack"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "One-shot nuke"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Clean up if anything survives"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Teleport to next pack immediately"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns and buffs."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "flame_armor"
              input: "E"
              keys: ["e"]
              note: "DP buff up"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Engage into pack"
            - skill: "cataclysm"
              input: "W + F"
              keys: ["w", "f"]
              note: "Fire AOE opener"
            - skill: "flow_flame_knot"
              input: "LMB"
              keys: ["lmb"]
              note: "Pull and stiffness"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main nuke"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Water burst"
            - skill: "flow_aqua_bomb"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "hellfire"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Fire eruption"
            - skill: "chilling_wave"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Water filler"
            - skill: "lava_field"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "DOT zone"
            - skill: "scorching_earth"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"
            - skill: "water_sphere"
              input: "Q"
              keys: ["q"]
              note: "Heal between pulls"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor awakening skills.
            Approach with Teleport iframe, then unload SA nukes.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Iframe into range"
            - skill: "cataclysm"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA fire AOE knockback"
            - skill: "flow_flame_knot"
              input: "LMB"
              keys: ["lmb"]
              note: "Pull target in"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main nuke"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA water burst"
            - skill: "flow_aqua_bomb"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Wizard PVP combo. Land a grab then chain into full burst.
            Wizard grab bypasses Super Armor — use it to catch tanky targets.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Iframe into grab range"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main nuke on grabbed target"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Water burst follow-up"
            - skill: "flow_aqua_bomb"
              input: "LMB"
              keys: ["lmb"]
              note: "Extra water burst"
            - skill: "hellfire"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Finisher nuke if still alive"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use water bound skills to catch, then chain into full burst.
            Water Bomb bound into Aqua Jail Explosion for devastating follow-up.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "water_bomb"
              input: "S + F"
              keys: ["s", "f"]
              note: "SA bound — catch the target"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main nuke on bound target"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Water burst"
            - skill: "flow_aqua_bomb"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "cataclysm"
              input: "W + F"
              keys: ["w", "f"]
              note: "Fire AOE if still standing"
            - skill: "flow_flame_knot"
              input: "LMB"
              keys: ["lmb"]
              note: "Pull and finish"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly while
            staying in SA-protected skills. Good when grab is on cooldown.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "cataclysm"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA fire engage"
            - skill: "flow_flame_knot"
              input: "LMB"
              keys: ["lmb"]
              note: "Pull in"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main nuke"
            - skill: "chilling_wave"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA filler"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground. Pure damage dump.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Instant nuke on CC'd target"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Water burst"
            - skill: "flow_aqua_bomb"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "hellfire"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Fire finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use Teleport iframes and SA
            skills to create distance. Wizard excels at kiting with Teleport.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Iframe out immediately"
            - skill: "magical_evasion"
              input: "A or D (double tap)"
              keys: ["a"]
              note: "Sidestep iframe for extra distance"
            - skill: "water_sphere"
              input: "Q"
              keys: ["q"]
              note: "FG heal while retreating"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Second teleport if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Wizard is a god-tier siege class.
            Buff allies with Protected Area and Speed Spell, then nuke.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "protected_area"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "100% CC resist for party — cast before push"
            - skill: "speed_spell"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Speed buff for party"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Iframe into enemy blob"
            - skill: "cataclysm"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA fire AOE on group"
            - skill: "flow_flame_knot"
              input: "LMB"
              keys: ["lmb"]
              note: "Pull enemies together"
            - skill: "bolide_of_destruction"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main nuke on blob"
            - skill: "aqua_jail_explosion"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA water burst on blob"
            - skill: "flow_aqua_bomb"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "hellfire"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA fire eruption"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "Iframe reposition out"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Teleport Chain"
        description: "Chain Teleports and movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "teleport_awakening"
              input: "Space"
