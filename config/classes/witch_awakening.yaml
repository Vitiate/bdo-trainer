# ============================================================================
# BDO Trainer - Awakened Witch Combo Configuration
# ============================================================================
# Class: Witch (Awakening)
# Weapons: Staff (Main) / Dagger (Off) / Aad Sphera (Awakening — earth/lightning orbs)
# Damage Type: Magic / Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Witch/Wizard Class Discord
#   - Community guides by Absoloote, BigandShiny, HelenaAtreides
#
# Notes:
#   - Witch has NO grab (unlike Wizard who has a grab)
#   - Known for best-in-class party buffs (Protected Area, Speed Spell, heals)
#   - Strong large-scale AOE, easy PVE, weaker 1v1 due to no grab
# ============================================================================

class: Witch
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    voltaic_pulse:
        name: "Voltaic Pulse"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 8000
        description: "Lightning orb barrage with Super Armor. Main lightning damage skill."
        flows_into: ["flow_conductor", "equilibrium_break", "fissure_wave"]
        core_effect: "Core: Voltaic Pulse - Extra hits and increased damage"
        notes: "Bread-and-butter damage skill. Always follow with Flow: Conductor."

    flow_conductor:
        name: "Flow: Conductor"
        input: "LMB (after Voltaic Pulse)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Voltaic Pulse. Additional lightning burst with Super Armor."
        flows_into: ["equilibrium_break", "thunder_storm"]
        notes: "Always chain after Voltaic Pulse for extra damage."

    equilibrium_break:
        name: "Equilibrium Break"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 9000
        description: "Massive earth AOE slam with Super Armor. Highest damage awakening skill."
        flows_into: ["voltaic_pulse", "fissure_wave", "yoke_of_ordeal"]
        core_effect: "Core: Equilibrium Break - Extra damage and improved AOE range"
        notes: "Core skill recommendation. Massive AOE and damage. Use off cooldown in PVE."

    yoke_of_ordeal:
        name: "Yoke of Ordeal"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Earth-element forward slam with Super Armor and knockdown CC."
        flows_into: ["flow_mass_destruction", "equilibrium_break", "voltaic_pulse"]
        notes: "Strong engage and damage. Flows into Flow: Mass Destruction."

    flow_mass_destruction:
        name: "Flow: Mass Destruction"
        input: "LMB (after Yoke of Ordeal)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Yoke of Ordeal. Additional earth slam with Super Armor."
        flows_into: ["equilibrium_break", "voltaic_pulse"]
        notes: "Always chain after Yoke of Ordeal for extra burst."

    fissure_wave:
        name: "Fissure Wave"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Earth-element ground fissure with Super Armor. Good AOE and knockback."
        flows_into: ["equilibrium_break", "voltaic_pulse"]
        notes: "Good filler skill. Pushes mobs together in PVE."

    thunder_storm:
        name: "Thunder Storm"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 10000
        description: "Lightning AOE storm with Super Armor. Large area and high damage."
        flows_into: ["voltaic_pulse", "equilibrium_break"]
        notes: "Large AOE for pack clearing. Strong in PVE and large-scale PVP."

    gorr_sphera:
        name: "Gorr Sphera"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Forward Guard healing sphere. Heals self and nearby allies."
        flows_into: ["voltaic_pulse", "equilibrium_break"]
        core_effect: "Core: Gorr Sphera - Additional HP recovery amount"
        notes: "Emergency heal with frontal protection. Use when HP is low."

    teleport_awakening:
        name: "Teleport (Awakening)"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 7000
        description: "Iframe teleport. Primary mobility skill. Moves in facing direction."
        flows_into: ["voltaic_pulse", "equilibrium_break", "yoke_of_ordeal"]
        notes: "Core movement skill. iframe makes it the safest repositioning tool."

    detonative_flow:
        name: "Detonative Flow"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 9000
        description: "Explosive earth detonation with Super Armor and float CC."
        flows_into: ["equilibrium_break", "voltaic_pulse"]
        notes: "Good CC and decent damage. Float can set up follow-up damage in PVP."

    toxic_flood:
        name: "Toxic Flood"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 12000
        description: "Poison pool AOE with Super Armor. Lingering damage zone."
        flows_into: ["voltaic_pulse", "equilibrium_break"]
        notes: "Good for area denial and lingering damage. Strong in large-scale."

    earth_response:
        name: "Earth Response"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 8000
        description: "Earth slam with Super Armor and knockdown. Down attack properties."
        flows_into: ["equilibrium_break", "voltaic_pulse"]
        notes: "Down attack on knocked targets. Good damage filler."

    flow_earth_tremor:
        name: "Flow: Earth Tremor"
        input: "F (after awakening skills)"
        keys: ["f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up earth tremor available after multiple awakening skills."
        flows_into: ["equilibrium_break", "voltaic_pulse"]
        notes: "Can be chained after many awakening skills. Good filler."

    thunder_bolt:
        name: "Thunder Bolt"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward lightning bolt with Forward Guard. Quick ranged poke."
        flows_into: ["voltaic_pulse", "thunder_storm"]
        notes: "Quick forward poke with frontal protection. Good for PVP spacing."

    gorr_roll:
        name: "Gorr Roll"
        input: "A or D + RMB"
        keys: ["a", "rmb"]
        keys_alt: ["d", "rmb"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Sideways roll with Super Armor. Secondary movement tool."
        flows_into: ["voltaic_pulse", "equilibrium_break"]
        notes: "Quick SA repositioning. Useful for dodging in PVP."

    voltaic_chain:
        name: "Voltaic Chain"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Lightning chain attack from hotbar. Super Armor throughout."
        flows_into: ["voltaic_pulse", "equilibrium_break"]
        notes: "Hotbar skill. Good extra burst damage with protection."

