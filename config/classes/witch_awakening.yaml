              keys: ["hotbar"]
              note: "PA for party 100% CC resist"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "iframe into casting range"
            - skill: "thunder_storm"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA large AOE on enemy blob"
            - skill: "equilibrium_break"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA earth nuke"
            - skill: "toxic_flood"
              input: "E"
              keys: ["e"]
              note: "SA poison zone on enemy"
            - skill: "voltaic_pulse"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA lightning burst"
            - skill: "flow_conductor"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "yoke_of_ordeal"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA earth slam"
            - skill: "flow_mass_destruction"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "iframe reposition to safety"

