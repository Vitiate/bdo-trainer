pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills. Approach with protection
            and unload AOE damage. Witch relies on SA trading, not grabs.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "iframe into range"
            - skill: "voltaic_pulse"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA lightning poke"
            - skill: "flow_conductor"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "equilibrium_break"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main nuke"
            - skill: "yoke_of_ordeal"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA knockdown attempt"
            - skill: "flow_mass_destruction"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"

    sa_trade_combo:
        name: "SA Trade Combo (1v1)"
        description: >
            Core Witch 1v1 approach. Since Witch has NO grab, you must
            out-trade with Super Armor skills and land CC through them.
        difficulty: advanced
        combo_window_ms: 200
        steps:
            - skill: "teleport_awakening"
              input: "Space"
              keys: ["space"]
              note: "iframe to reposition"
            - skill: "detonative_flow"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA float attempt — key CC"
            - skill: "equilibrium_break"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA nuke on floated target"
            - skill: "voltaic_pulse"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst follow-up"
            - skill: "flow_conductor"
              input: "LMB"
              keys: ["lmb"]
              note: "SA lightning follow-up"
            - skill: "earth_response"
              input: "S + F"
              keys: ["s", "f"]
              note: "SA down attack finisher"

    cc_chain_combo:
        name: "CC Chain (On Catch)"
        description: >
            Damage combo once you land a CC on the target. Since Witch
            has no grab, capitalize on every CC opportunity.
        difficulty: advanced
        combo_window_ms: 200
        steps:
            - skill: "detonative_flow"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Float CC — catch the target"
            - skill: "equilibrium_break"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Bound follow-up on CC'd target"
            - skill: "yoke_of_ordeal"
              input: "W + F"
              keys: ["w", "f"]
              note: "Knockdown extend"
            - skill: "flow_mass_destruction"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up earth burst"
            - skill: "voltaic_pulse"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Lightning burst finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in Super Armor. No grab needed.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "thunder_bolt"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "voltaic_pulse"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_conductor"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "equilibrium_break"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    punish_combo:
        name: "Punish Combo (After Ally CC)"
        description: >
            Maximum damage combo when your teammate lands a grab or CC.
            Dump all damage onto the CC'd target immediately.
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "equilibrium_break"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Nuke on CC'd target"
            - skill: "yoke_of_ordeal"
              input: "W + F"
              keys: ["w", "f"]
              note: "Earth slam follow-up"
            - skill: "flow_mass_destruction"
              input: "LMB"
              keys: ["lmb"]
              note: "Earth burst"
            - skill: "voltaic_pulse"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Lightning burst"
            - skill: "flow_conductor"
              input: "LMB"
              keys: ["lmb"]
              note: "Lightning follow-up finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Witch has strong kiting tools
            with Teleport iframe and heals. Create distance and recover.
        difficulty: intermediate
        combo_window_ms: 300
        steps:
