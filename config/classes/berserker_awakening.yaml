# ============================================================================
# BDO Trainer - Awakened Berserker Combo Configuration
# ============================================================================
# Class: Berserker (Awakening)
# Weapons: Axe (Main) / Ornamental Knot (Off) / Iron Buster (Awakening cannon)
# Damage Type: Melee / Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Berserker Class Discord
#   - Community guides by Absolute, GrumpyGreen, Vert, Duodecil
# ============================================================================

class: Berserker
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    flame_buster:
        name: "Flame Buster"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 9000
        description: "Channeled cannon blast dealing massive frontal damage. Super Armor throughout."
        flows_into: ["ancient_wave", "ground_lifting"]
        core_effect: "Core: Flame Buster - Extra hits and increased damage"
        notes: "Hold LMB to extend channel. Very high total damage but locks you in place."

    ancient_wave:
        name: "Ancient Wave"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Powerful cannon slam with huge AOE and Super Armor. Core adds knockdown."
        flows_into: ["flow_ancient_power", "flame_buster", "raging_thunder"]
        core_effect: "Core: Ancient Wave - Knockdown on good hits"
        notes: "Bread-and-butter burst skill. Use off cooldown in PVE."

    titan_blow:
        name: "Titan Blow"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Super Armor forward dash slam. Fast gap closer with stiffness."
        flows_into: ["flow_slugfest", "ancient_wave", "flame_buster"]
        notes: "Primary engage tool. Flows directly into Slugfest with F."

    flow_slugfest:
        name: "Flow: Slugfest"
        input: "F (after Titan Blow)"
        keys: ["f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Titan Blow. Overhead cannon slam with knockdown."
        flows_into: ["ancient_wave", "flame_buster", "ground_lifting"]
        notes: "Always chain after Titan Blow for extra damage and knockdown CC."

    ground_lifting:
        name: "Ground Lifting"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 7000
        description: "Upward cannon strike with Super Armor and float CC."
        flows_into: ["flame_buster", "ancient_wave", "flow_ancient_power"]
        notes: "Good for popping enemies into the air. Combo starter in PVP."

    blasting:
        name: "Blasting"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard ranged cannon shot. Good for poking at range."
        flows_into: ["flame_buster", "ancient_wave"]
        core_effect: "Core: Blasting - Forward Guard during the skill"
        notes: "Safe ranged poke with frontal protection. Use to harass in PVP."

    predatory_hunt:
        name: "Predatory Hunt"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 10000
        description: "Forward Guard into Super Armor transition. Bound on hit."
        flows_into: ["ancient_wave", "flame_buster", "titan_blow"]
        notes: "Starts with FG, transitions to SA. Good protected engage with bound CC."

    raging_thunder:
        name: "Raging Thunder"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor spinning cannon attack. Multi-hit AOE with knockback."
        flows_into: ["ancient_wave", "flame_buster", "flow_ancient_power"]
        notes: "Strong AOE damage. Hold F to extend spin. Good for PVE pack clearing."

    flow_ancient_power:
        name: "Flow: Ancient Power"
        input: "LMB (after awakening skills)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up available after many awakening skills. Extra burst with SA."
        flows_into: ["ancient_wave", "flame_buster"]
        notes: "Chain after Ancient Wave, Raging Thunder, or Ground Lifting for extra damage."

    beastly_wind_slash:
        name: "Beastly Wind Slash"
        input: "E (Awakening)"
        keys: ["e"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Wide-arc cannon swing with Super Armor and knockback."
        flows_into: ["ancient_wave", "titan_blow", "flame_buster"]
        notes: "Note: E also used for Grab in pre-awakening. Context-dependent."

    cannon_leap:
        name: "Cannon Leap"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Super Armor leap forward. Primary awakening movement skill."
        flows_into: ["titan_blow", "ancient_wave", "flame_buster"]
        notes: "Main gap closer in awakening. PVE iframe (1s invincibility vs monsters)."

    iron_buster_shot:
        name: "Iron Buster Shot"
        input: "LMB (Awakening auto)"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic cannon strike. Used as filler between cooldowns."
        flows_into: ["flame_buster", "ancient_wave"]
        notes: "Basic attack. Low priority — use actual skills instead."

    flow_earth_shatter:
        name: "Flow: Earth Shatter"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Ground pound AOE from hotbar. Super Armor with knockdown."
        flows_into: ["ancient_wave", "flame_buster"]
        notes: "Hotbar skill. Good extra burst with protection."

    devastation:
        name: "Devastation"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 12000
        description: "Heavy overhead slam from hotbar. Super Armor throughout."
        flows_into: ["ancient_wave", "flame_buster"]
        notes: "Hotbar skill. Strong filler damage with SA protection."

    cannon_barrage:
        name: "Cannon Barrage"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Multiple ranged cannon shots from hotbar. Forward Guard."
        flows_into: ["flame_buster", "ancient_wave"]
        notes: "Hotbar skill. Good ranged damage with frontal protection."

    rock_smash:
        name: "Rock Smash"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward cannon rush with Super Armor. Quick engage tool."
        flows_into: ["flow_slugfest", "ancient_wave", "flame_buster"]
        notes: "Good alternative engage. Can flow into Slugfest."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    titan_slam:
        name: "Titan Slam"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 9000
        description: "SA enhanced ground slam. Combines Headbutt into a powerful knockdown strike."
        notes: "Preferred L56 Rabam. Good protected engage with knockdown."

    whirlwind_crusher:
        name: "Whirlwind Crusher"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "SA spinning axe rush. Good for movement and AOE damage."
        notes: "Preferred L57 Rabam. Useful for protected movement and pack clearing."

    earth_shattering_strike:
        name: "Earth Shattering Strike"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 12000
        description: "Enhanced cannon slam from hotbar. Super Armor with bound CC."
        notes: "Optional. Put on hotbar. Decent burst with protection."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Berserker PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Berserker is THE grab class. Practice grab timing relentlessly."

    headbutt:
        name: "Headbutt"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["stun"]
        description: "Quick headbutt with stun CC. Unprotected but fast."
        notes: "Good stun for setting up grab. Use in pre-awakening stance for PVP."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Dodge incoming attacks."
        notes: "PVE iframe. Can be locked in PVP to prevent accidental use."

    frenzied_destroyer:
        name: "Frenzied Destroyer"
        input: "Shift + LMB (Pre-awakening)"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Pre-awakening spinning axe attack with Super Armor and knockdown."
        notes: "Used in pre-awakening stance. Strong filler when awakening skills on cooldown."

    lava_piercer:
        name: "Lava Piercer"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stiffness"]
        description: "Ranged frontal guard spear attack. Good for poking at range."
        notes: "Put on hotbar. Useful for ranged poke with frontal protection."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "SA leap into pack"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash engage"
            - skill: "flow_slugfest"
              input: "F"
              keys: ["f"]
              note: "Follow-up slam"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main AOE burst"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Channel cannon into remaining mobs"
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "Leap to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Use all cooldowns for maximum AOE."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "SA leap into pack center"
            - skill: "raging_thunder"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin for AOE grouping"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy AOE burst"
            - skill: "flow_ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Channel cannon on survivors"
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float stragglers"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "Reposition if needed"
            - skill: "flow_slugfest"
              input: "F"
              keys: ["f"]
              note: "Clean up remaining"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "Leap into pack"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "One-shot burst"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "Dash to next pack"
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "Engage into pack"
            - skill: "predatory_hunt"
              input: "Q"
              keys: ["q"]
              note: "FG/SA opener with bound"
            - skill: "raging_thunder"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin AOE"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst"
            - skill: "flow_ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Channel cannon damage"
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float for down attack"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "Reposition"
            - skill: "flow_slugfest"
              input: "F"
              keys: ["f"]
              note: "Extend combo"
            - skill: "flow_earth_shatter"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA burst filler"
            - skill: "titan_slam"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam knockdown"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills to approach.
            Berserker relies on SA to close distance then grab.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash engage"
            - skill: "flow_slugfest"
              input: "F"
              keys: ["f"]
              note: "SA knockdown follow-up"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main burst"
            - skill: "flow_ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA finisher — hold if target is CC'd"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Berserker PVP combo. Land the grab then chain into full burst.
            Berserker's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float on grabbed target"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Channel cannon finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Headbutt stun to set up a grab, then chain into
            full damage. Classic Berserker catch rotation.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash in — stiffness on hit"
            - skill: "headbutt"
              input: "S + F"
              keys: ["s", "f"]
              note: "Stun the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stunned target"
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float follow-up"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Channel cannon finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. High damage quickly while
            staying protected. No grab needed — pure SA trading.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush"
            - skill: "flow_slugfest"
              input: "F"
              keys: ["f"]
              note: "SA knockdown follow-up"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst"
            - skill: "flow_ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "ground_lifting"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Float on CC'd target"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst"
            - skill: "flow_ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Channel cannon finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use SA movement to create distance.
            Berserker is slow but has strong SA chaining to escape.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA spin movement out"
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "SA leap away"
            - skill: "blasting"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG ranged poke while retreating"
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "Continue leaping if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on SA damage into groups.
            Berserker excels at tanking and grabbing key targets.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "SA engage into group"
            - skill: "predatory_hunt"
              input: "Q"
              keys: ["q"]
              note: "FG/SA opener with bound"
            - skill: "raging_thunder"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin into blob"
            - skill: "ancient_wave"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA AOE burst"
            - skill: "flow_ancient_power"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA channel into group"
            - skill: "titan_slam"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam SA knockdown"
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA reposition out"

    cannon_poke:
        name: "Cannon Ranged Poke"
        description: >
            Use Berserker's unique ranged cannon skills to harass
            from distance. Good for softening targets before engaging.
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "blasting"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG ranged shot"
            - skill: "cannon_barrage"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "FG ranged multi-shot"
            - skill: "flame_buster"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA ranged channel — punish if they rush in"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash engage if target closes distance"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab if in range"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Mobility Chain"
        description: "Chain movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "SA forward leap"
            - skill: "whirlwind_crusher"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA spin movement"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash forward"
