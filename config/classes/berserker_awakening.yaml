        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "cannon_leap"
              input: "Space"
              keys: ["space"]
              note: "SA forward leap"
            - skill: "titan_blow"
              input: "W + F"
              keys: ["w", "f"]
