              note: "Roll again if off cooldown"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Full movement chain for Corsair succession. Cycle between Barrel Roll,
            Ocean Drift, Wave Cut, and Rabam dashes for maximum speed.
            Succession Corsair trades mermaid transform for faster roll iframes.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "barrel_roll_enhanced"
              input: "Space"
              keys: ["space"]
              note: "iframe forward roll"
            - skill: "ocean_drift"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA water dash"
            - skill: "wave_cut"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush"
            - skill: "storm_anchor"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement + stiffness"
            - skill: "barrel_roll_enhanced"
              input: "Space"
              keys: ["space"]
              note: "If off cooldown, roll again"

