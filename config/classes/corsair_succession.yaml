              note: "SA AOE float"
            - skill: "serenaca_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_tidal_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "mareca_blast"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
