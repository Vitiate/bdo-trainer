pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor sword and Mareca skills.
            Approach with protection, then fish for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "suns_eye_enhanced"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "wave_cut"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward engage with stiffness"
            - skill: "sun_strike"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "serenaca_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_tidal_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "anchor_toss"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA AOE finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Corsair succession PVP combo. Land a grab then chain into
            full burst. Corsair's grab bypasses Super Armor — primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "oceans_fury"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "serenaca_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_tidal_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "mareca_blast"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Ranged magic finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stiffness,
            then chain into grab and full burst damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "mareca_volley"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "oceans_fury"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "serenaca_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_tidal_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "mareca_blast"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "wave_cut"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward engage"
            - skill: "flow_crashing_wave"
              input: "F"
              keys: ["f"]
              note: "SA follow-up bound"
            - skill: "serenaca_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_tidal_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "mareca_blast"
