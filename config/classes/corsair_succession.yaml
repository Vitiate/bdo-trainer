# ============================================================================
# BDO Trainer - Succession Corsair Combo Configuration
# ============================================================================
# Class: Corsair (Succession)
# Weapons: Serenaca (Main — Sword) / Mareca (Off — Magic Device)
# Damage Type: Melee / Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Corsair Class Discord
#   - Community guides by Caphras, AerielBDO, Hachiman
# ============================================================================

class: Corsair
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Enhanced Succession Skills — no mermaid transformation)
# --------------------------------------------------------------------------
awakening_skills:
    serenaca_slash:
        name: "Serenaca Slash"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced succession sword combo. Super Armor multi-hit slash with knockdown."
        flows_into: ["flow_tidal_slash", "mareca_blast", "wave_cut"]
        core_effect: "Core: Serenaca Slash - additional hits and increased damage multiplier"
        notes: "Primary damage skill. Fast animation with high multiplier. Core priority."

    flow_tidal_slash:
        name: "Flow: Tidal Slash"
        input: "LMB (after Serenaca Slash)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Serenaca Slash. Extended sword combo with Super Armor."
        flows_into: ["mareca_blast", "anchor_toss"]
        notes: "Always chain after Serenaca Slash for maximum burst. Down attack properties."

    mareca_blast:
        name: "Mareca Blast"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 7000
        description: "Enhanced Mareca magic burst. Super Armor ranged blast with knockback."
        flows_into: ["flow_mareca_barrage", "serenaca_slash", "anchor_toss"]
        core_effect: "Core: Mareca Blast - extended range and extra magic projectiles"
        notes: "Strong ranged burst. Good for finishing or poking from mid-range."

    flow_mareca_barrage:
        name: "Flow: Mareca Barrage"
        input: "RMB (after Mareca Blast)"
        keys: ["rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Mareca Blast. Rapid-fire Mareca projectiles with Super Armor."
        flows_into: ["serenaca_slash", "wave_cut"]
        notes: "Always chain after Mareca Blast for sustained ranged pressure."

    wave_cut:
        name: "Wave Cut"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor forward rushing sword slash. Fast engage with stiffness."
        flows_into: ["flow_crashing_wave", "serenaca_slash", "mareca_blast"]
        core_effect: "Core: Wave Cut - Forward Guard on first hit, extended SA duration"
        notes: "Primary engage tool. Good gap closer with protection and CC."

    flow_crashing_wave:
        name: "Flow: Crashing Wave"
        input: "F (after Wave Cut)"
        keys: ["f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Wave Cut. Downward sword slam with bound CC."
        flows_into: ["serenaca_slash", "anchor_toss"]
        notes: "Always chain after Wave Cut. Bound CC sets up big damage follow-ups."

    anchor_toss:
        name: "Anchor Toss"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Heavy anchor slam with Super Armor. Slams the ground binding enemies."
        flows_into: ["serenaca_slash", "mareca_blast", "oceans_fury"]
        core_effect: "Core: Anchor Toss - extended AOE radius and additional bound duration"
        notes: "Strong AOE CC skill. Good for both PVE grouping and PVP lockdown."

    oceans_fury:
        name: "Ocean's Fury"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor water-infused sword uppercut. Floats enemies hit."
        flows_into: ["serenaca_slash", "mareca_blast", "anchor_toss"]
        notes: "Good AOE CC. Float sets up aerial damage. Strong in group fights."

    sun_strike:
        name: "Sun Strike"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick forward Serenaca thrust with Forward Guard. Fast stiffness poke."
        flows_into: ["serenaca_slash", "wave_cut", "mareca_blast"]
        notes: "Fast engagement tool. Good for fishing for CC with frontal protection."

    mareca_shield:
        name: "Mareca Shield"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 5000
        description: "Forward Guard Mareca barrier. Blocks frontal attacks and retaliates with stiffness."
        flows_into: ["serenaca_slash", "mareca_blast"]
        notes: "Corsair's block skill. Absorb pressure then counter-attack."

    mareca_volley:
        name: "Mareca Volley"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard Mareca projectile spread. Multiple magic bolts with stiffness."
        flows_into: ["flow_mareca_storm", "serenaca_slash", "mareca_blast"]
        notes: "Ranged poke with protection. Good for fishing for CC in PVP."

    flow_mareca_storm:
        name: "Flow: Mareca Storm"
        input: "RMB (after Mareca Volley)"
        keys: ["rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Mareca Volley. Sustained Mareca fire with Forward Guard."
        flows_into: ["serenaca_slash", "mareca_blast"]
        notes: "Chain after Mareca Volley for continued ranged pressure with protection."

    suns_eye_enhanced:
        name: "Sun's Eye (Enhanced)"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 22000
        description: "Enhanced self-buff. Increases AP, attack speed, and critical rate for succession skills."
        flows_into: ["serenaca_slash", "wave_cut"]
        core_effect: "Core: Sun's Eye - additional +15 AP buff and HP recovery on use"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    barrel_roll_enhanced:
        name: "Barrel Roll (Enhanced)"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Enhanced acrobatic roll. Brief iframe with good distance. Primary movement skill."
        flows_into: ["serenaca_slash", "wave_cut", "mareca_blast"]
        notes: "Primary movement in succession. Fast iframe dash. Chain for mobility."

    sea_mist:
        name: "Sea Mist"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Low sweeping water attack. Unprotected but has bound CC."
        flows_into: ["serenaca_slash", "mareca_blast"]
        notes: "Useful CC but unprotected. Be careful in PVP. Better suited for PVE."

    tempest_blade:
        name: "Tempest Blade"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward charging blade combo with water enhancement. SA with knockdown."
        flows_into: ["serenaca_slash", "mareca_blast", "anchor_toss"]
        notes: "Good mid-range engage. Can catch opponents off guard with the forward rush."

    high_tide:
        name: "High Tide"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor water eruption from hotbar. Floats nearby enemies."
        flows_into: ["serenaca_slash", "mareca_blast"]
        notes: "Hotbar skill. Good protected AOE with float CC."

    sea_breeze:
        name: "Sea Breeze"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Self-buff restoring HP and granting movement speed. Super Armor during cast."
        flows_into: []
        notes: "Hotbar only. Use for sustain during long grinds or between PVP fights."

