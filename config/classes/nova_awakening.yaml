# ============================================================================
# BDO Trainer - Awakened Nova Combo Configuration
# ============================================================================
# Class: Nova (Awakening)
# Weapons: Morning Star (Main) / Quoratum (Off — shield) / Sting (Awakening — ice rapier)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Nova Awakening Notes:
#   Nova awakening wields the Sting, an ice rapier, combining elegant fencing
#   with devastating ice magic. Known for strong AOE, ice-themed abilities,
#   summoning ice soldiers in pre-awakening, and having a grab (E). Awakening
#   focuses on flowing between protected skills with excellent sustained damage.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Nova Class Discord
#   - Community guides by Hethram, Akanthe, BDO Nova Community
# ============================================================================

class: Nova
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    winters_bite:
        name: "Winter's Bite"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick forward ice rapier thrust with Super Armor. Stiffness on hit."
        flows_into: ["flow_frost_slash", "ice_thorns", "glacial_strike"]
        core_effect: "Core: Winter's Bite - Extra hit with increased damage"
        notes: "Fast protected poke. Use to initiate or chain between skills."

    flow_frost_slash:
        name: "Flow: Frost Slash"
        input: "LMB (after Winter's Bite)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up slash after Winter's Bite. Knockdown on hit with Super Armor."
        flows_into: ["ice_thorns", "glacial_strike", "frozen_vortex"]
        notes: "Always chain after Winter's Bite for extra damage and knockdown CC."

    ice_thorns:
        name: "Ice Thorns"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Main awakening damage skill. Summons ice thorns from the ground with Super Armor. High burst."
        flows_into: ["flow_northern_wind", "winters_bite", "glacial_strike"]
        core_effect: "Core: Ice Thorns - Super Armor during the skill, increased damage"
        notes: "Bread-and-butter damage skill. Highest burst in awakening kit. Prioritize this off cooldown."

    frozen_vortex:
        name: "Frozen Vortex"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor forward dash with ice trail. Knockback on hit. Good gap closer."
        flows_into: ["flow_shattered_ice", "ice_thorns", "winters_bite"]
        notes: "Primary forward engage tool. SA dash into enemy, then chain into damage."

    flow_shattered_ice:
        name: "Flow: Shattered Ice"
        input: "LMB (after Frozen Vortex)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up slam after Frozen Vortex. Shatters ice with bound CC."
        flows_into: ["ice_thorns", "glacial_strike", "winters_bite"]
        notes: "Always follow Frozen Vortex with this for extra damage and bound CC."

    glacial_strike:
        name: "Glacial Strike"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Heavy downward ice rapier slam with Super Armor. Float CC. Down attack damage."
        flows_into: ["ice_thorns", "frozen_vortex", "rime_waltz"]
        core_effect: "Core: Glacial Strike - Float on hit, increased damage"
        notes: "Strong burst with float CC. Use after bound or knockdown for down attack bonus."

    rime_waltz:
        name: "Rime Waltz"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor spinning ice slash AOE. Multi-hit with stiffness."
        flows_into: ["flow_northern_wind", "ice_thorns", "glacial_strike"]
        core_effect: "Core: Rime Waltz - Super Armor during the skill"
        notes: "Strong AOE clear. Good for grouping mobs in PVE and zoning in PVP."

    ice_shield:
        name: "Ice Shield"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 12000
        description: "Forward Guard ice barrier. Blocks incoming attacks and grants DP/DR buff on use."
        flows_into: ["winters_bite", "frozen_vortex", "ice_thorns"]
        notes: "Hold for FG block. Use to absorb pressure, then counter-attack. Grants defensive buff."

    stars_call:
        name: "Star's Call"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Super Armor forward movement leap. Primary mobility in awakening."
        flows_into: ["ice_thorns", "frozen_vortex", "winters_bite"]
        notes: "Main movement skill in awakening. SA gap closer. Use to reposition between skills."

    blizzard_queen:
        name: "Blizzard Queen"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Forward Guard ice rapier flurry. Multi-hit with stiffness CC."
        flows_into: ["flow_northern_wind", "ice_thorns", "glacial_strike"]
        notes: "Safe damage with frontal protection. Good filler between main skill cooldowns."

    absolute_zero:
        name: "Absolute Zero"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Forward rushing ice rapier combo with Super Armor. Knockdown on last hit."
        flows_into: ["flow_northern_wind", "ice_thorns", "glacial_strike"]
        notes: "Strong forward-moving burst. Use for engage or finishing downed targets."

    flow_northern_wind:
        name: "Flow: Northern Wind"
        input: "F (after various skills)"
        keys: ["f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up ice wind blast. Available after Ice Thorns, Rime Waltz, and Blizzard Queen."
        flows_into: ["ice_thorns", "winters_bite", "frozen_vortex"]
        notes: "Can be chained after many awakening skills. Good filler with SA protection."

    frost_lance:
        name: "Frost Lance"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 6000
        description: "Quick low ice lance sweep. Bound CC but unprotected."
        flows_into: ["ice_thorns", "glacial_strike"]
        notes: "Useful CC but unprotected. Be careful using in PVP. Good for PVE bound setup."

    winter_storm:
        name: "Winter Storm"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "AOE ice explosion from hotbar. Super Armor knockback."
        flows_into: ["ice_thorns", "frozen_vortex"]
        notes: "Hotbar skill. Good AOE burst with SA protection."

    frozen_prison:
        name: "Frozen Prison"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stun"]
        damage: low
        cooldown_ms: 12000
        description: "Forward Guard ice cage that stuns enemies. Ranged CC tool."
        flows_into: ["ice_thorns", "glacial_strike"]
        notes: "Hotbar skill. Ranged stun with FG. Good PVP catch tool from distance."

    glacial_waltz:
        name: "Glacial Waltz"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor spinning ice dance AOE. Multi-hit with knockdown."
        flows_into: ["ice_thorns", "glacial_strike"]
        notes: "Hotbar AOE skill. Good for large pack clear and node wars."

