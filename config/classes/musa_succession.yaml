# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    chase:
        name: "Chase"
        input: "Shift + Direction"
        keys: ["shift", "w"]
        keys_alt: ["shift", "a"]
        protection: "iframe"
        cc: []
        description: "Signature Musa movement. Iframe dash that can be spammed. Fastest movement in the game."
        notes: "Core identity of Musa. Spam for fastest traversal. Consumes WP."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Additional dodge option."
        notes: "Useful as supplementary iframe. Lock if causing accidental triggers."

    stub_arrow:
        name: "Stub Arrow"
        input: "RMB (with Horn Bow)"
        keys: ["rmb"]
        protection: "none"
        cc: ["stiffness"]
        description: "Quick ranged arrow shot. Applies stiffness. Good for poking."
        notes: "Use for ranged poke in PVP. Unprotected."

    counter_assassination:
        name: "Counter Assassination"
        input: "S + E"
        keys: ["s", "e"]
        protection: "iframe"
        cc: []
        description: "Backwards iframe dodge. Emergency escape tool."
        notes: "Use when pressured. Good panic button."

    bow_skill:
        name: "Bow Skill"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Ranged bow attack. Useful for pulling monsters or ranged damage."
        notes: "Situational. Mostly for pulling mobs in PVE."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Dash to pack"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main AOE damage — core skill"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Big spin AOE"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Filler damage"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Dash to next pack"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage again"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff then unload everything."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "musa_spirit"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up before engaging"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Dash into pack"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Core AOE burst"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Big spin clear"
            - skill: "blooming"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Huge burst"
            - skill: "flow_blooming_phantom"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up damage"
            - skill: "fiery_crevice"
              input: "W + F"
              keys: ["w", "f"]
              note: "Fire trail damage"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Clean up remaining"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fastest rotation for spots where mobs die in one skill. Maximize Chase movement."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Dash to pack"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot the pack"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Instant dash to next"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE if Rising Storm on cooldown"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Keep moving, never stop"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns efficiently."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "musa_spirit"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Dash engage"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Core damage"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Big spin AOE"
            - skill: "fiery_crevice"
              input: "W + F"
              keys: ["w", "f"]
              note: "Fire charge damage"
            - skill: "blooming"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Burst damage"
            - skill: "flow_blooming_phantom"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Filler damage"
            - skill: "dragon_bite"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Extra damage"
            - skill: "fury_blade"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam burst"
            - skill: "torch_strike"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Extra burst from hotbar"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and Forward Guard skills.
            Approach with Chase iframe, then fish for CC with protected skills.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe engage"
            - skill: "dragon_bite"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA float attempt"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst on floated target"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA follow-up spin"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA extra damage"
            - skill: "below_the_belt"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound to extend CC"

    cc_chain_combo:
        name: "CC Chain Combo (1v1)"
        description: >
            Core Musa PVP combo. Fish for stiffness with Blind Thrust,
            then chain into full burst. Musa has no grab so CC chains are essential.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "blind_thrust"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "below_the_belt"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound on stiffened target"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst on CC'd target"
            - skill: "blooming"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Huge burst on downed target"
            - skill: "flow_blooming_phantom"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA finisher"

    float_burst:
        name: "Float Burst"
        description: >
            Use Dragon Bite float to initiate, then pour all damage
            onto the airborne target. Works well as a punish combo.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe into range"
            - skill: "dragon_bite"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA float to launch target"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst on floated target"
            - skill: "blooming"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Burst finisher on downed target"
            - skill: "flow_blooming_phantom"
              input: "LMB"
              keys: ["lmb"]
              note: "Extra burst"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA clean-up damage"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly while
            staying in protected skills. No grab available so speed is key.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "fiery_crevice"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge engage"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA filler"
            - skill: "below_the_belt"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound finisher"

    poke_and_punish:
        name: "Poke and Punish"
        description: >
            Use Forward Guard skills to safely poke, wait for the enemy
            to overcommit, then punish with burst. Musa 1v1 style.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "blind_thrust"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG poke — fish for stiffness"
            - skill: "stampede_slash"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness follow-up"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst on stiffened target"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin follow-up"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe retreat after combo"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Musa excels at disengaging
            with Chase iframe spam. No class can catch a retreating Musa.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe backwards"
            - skill: "chase"
              input: "Shift + A"
              keys: ["shift", "a"]
              note: "Iframe sideways"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Keep dashing away"
            - skill: "stub_arrow"
              input: "RMB"
              keys: ["rmb"]
              note: "Ranged poke while kiting"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Re-engage when safe"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on SA protected damage skills.
            Musa is a flanker — dash in, burst, dash out. Don't stay in the blob.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "musa_spirit"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe dash into flank"
            - skill: "fury_blade"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA Rabam engage"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA AOE damage on group"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA big spin into group"
            - skill: "fiery_crevice"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA fire charge"
            - skill: "blooming"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Burst if targets CC'd"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe retreat immediately"

