        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe dash forward"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Chain dash immediately"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Keep dashing — spam Shift+W"
            - skill: "musa_spirit"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "WP recovery when low on stamina"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
