    torch_strike:
        name: "Torch Strike"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 12000
        description: "Fire explosion from hotbar. SA with knockback. Extra PVE damage."
