        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe into range"
            - skill: "rising_storm"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA damage on arrival"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Reposition to next target"
            - skill: "fiery_crevice"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge through enemies"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Continue repositioning"
            - skill: "divider"
              input: "Space"
              keys: ["space"]
              note: "SA leap for vertical repositioning"

