# ============================================================================
# BDO Trainer - Succession Musa Combo Configuration
# ============================================================================
# Class: Musa (Succession)
# Weapons: Blade (Main) / Horn Bow (Off)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Musa Class Discord
#   - Community guides by Alథena, Fanboi, YuuShia, MrClegg
# ============================================================================

class: Musa
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Pre-Awakening)
# --------------------------------------------------------------------------
awakening_skills:
    rising_storm:
        name: "Rising Storm"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Main succession damage skill. 360-degree SA spin with massive AOE and knockdown."
        flows_into: ["below_the_belt", "crosscut", "blind_thrust"]
        core_effect: "Core: Rising Storm - Extra hits and increased damage"
        notes: "Bread-and-butter skill. Use off cooldown in PVE. Core is essential."

    below_the_belt:
        name: "Below the Belt"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard sweep with bound CC. Core adds Forward Guard."
        flows_into: ["rising_storm", "crosscut", "blind_thrust"]
        core_effect: "Core: Below the Belt - Forward Guard during the skill"
        notes: "Key CC tool in PVP. FG makes it safe to fish for bound."

    blind_thrust:
        name: "Blind Thrust"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Forward Guard thrust. Quick stiffness poke with frontal protection."
        flows_into: ["rising_storm", "crosscut", "whirlwind_cut"]
        notes: "Good neutral poke. FG makes it safe to use in PVP."

    crosscut:
        name: "Crosscut"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 5000
        description: "Super Armor slash with knockback. Enhanced in succession with extra hits."
        flows_into: ["rising_storm", "below_the_belt", "whirlwind_cut"]
        notes: "Good filler skill. SA protection makes it reliable in PVP."

    whirlwind_cut:
        name: "Whirlwind Cut"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Super Armor spinning slash. Large AOE with knockdown. Enhanced in succession."
        flows_into: ["rising_storm", "crosscut", "dragon_bite"]
        notes: "Excellent PVE clear. Big AOE and high damage."

    dragon_bite:
        name: "Dragon Bite"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor lunging slash. Enhanced in succession with float CC."
        flows_into: ["rising_storm", "crosscut", "whirlwind_cut"]
        notes: "Good engage skill. Float CC chains into ground combos."

    fiery_crevice:
        name: "Fiery Crevice"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor forward charge with fire trail. High damage with stiffness."
        flows_into: ["rising_storm", "whirlwind_cut", "crosscut"]
        notes: "Strong engage with good damage. Use for gap closing with protection."

    blooming:
        name: "Blooming"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 8000
        description: "Massive damage explosion. Enhanced in succession. Use from hotbar."
        flows_into: ["rising_storm", "chase"]
        notes: "Very high damage but unprotected. Use when target is CC'd."

    flow_blooming_phantom:
        name: "Flow: Blooming Phantom"
        input: "LMB (after Blooming)"
        keys: ["lmb"]
        protection: "none"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Blooming. Additional burst damage."
        flows_into: ["rising_storm", "chase"]
        notes: "Always chain after Blooming for extra damage."

    gale:
        name: "Gale"
        input: "LMB + RMB"
        keys: ["lmb", "rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Quick forward slash. Succession enhanced with extra damage."
        flows_into: ["rising_storm", "crosscut"]
        notes: "Filler skill. Unprotected so be careful in PVP."

    divider:
        name: "Divider"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor leap attack. Movement and damage in one skill."
        flows_into: ["rising_storm", "crosscut", "whirlwind_cut"]
        notes: "Used for gap closing and repositioning. SA makes it safe."

    musa_spirit:
        name: "Musa Spirit"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Self-buff. Recovers WP and increases AP for a duration."
        flows_into: ["rising_storm", "chase"]
        notes: "Use before engaging large packs. Keep on cooldown in PVE."

    projection:
        name: "Projection"
        input: "Shift + RMB (hold)"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "Dashing blade attack. Super Armor with knockdown on hit."
        flows_into: ["rising_storm", "crosscut"]
        notes: "Alternate to Dragon Bite. Good for closing distance."

    spinner:
        name: "Spinner"
        input: "F"
        keys: ["f"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 3000
        description: "Quick spinning attack with stiffness. Unprotected."
        flows_into: ["rising_storm", "crosscut"]
        notes: "Quick filler. Lock in PVP if causing issues."

    stampede_slash:
        name: "Stampede Slash"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard slash. Good neutral tool with frontal protection."
        flows_into: ["rising_storm", "blind_thrust"]
        notes: "Decent neutral poke in PVP with Forward Guard."

    lunar_dash:
        name: "Lunar Dash"
        input: "W + W"
        keys: ["w", "w"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 3000
        description: "Quick forward dash with Super Armor. Succession enhanced speed."
        flows_into: ["rising_storm", "fiery_crevice"]
        notes: "Fast repositioning tool. Chains well into attacks."

