              input: "Q"
              keys: ["q"]
              note: "Stun CC — catch the target"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Nuke on stunned target"
            - skill: "chain_lightning"
              input: "W + F"
              keys: ["w", "f"]
              note: "Knockdown on CC'd target"
            - skill: "fireball"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Fire burst follow-up"
            - skill: "flow_fireball_explosion"
              input: "LMB"
              keys: ["lmb"]
              note: "Explosion finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in Super Armor. No grab needed.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "magic_missile"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "fireball"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_fireball_explosion"
              input: "LMB"
              keys: ["lmb"]
              note: "SA explosion"
            - skill: "lightning"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
