    punish_combo:
        name: "Punish Combo (After Ally CC)"
        description: >
            Maximum damage combo when your teammate lands a grab or CC.
            Dump all damage onto the CC'd target immediately.
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Biggest nuke on CC'd target"
            - skill: "earthquake"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Earth AOE follow-up"
