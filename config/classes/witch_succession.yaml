    sa_trade_combo:
        name: "SA Trade Combo (1v1)"
        description: >
            Core Witch succession 1v1 approach. Since Witch has NO grab,
            you must out-trade with Super Armor skills and land CC through them.
        difficulty: advanced
        combo_window_ms: 200
        steps:
            - skill: "teleport_succession"
              input: "Space"
              keys: ["space"]
              note: "iframe to reposition"
            - skill: "freeze"
              input: "Q"
              keys: ["q"]
              note: "SA stun — key CC opener"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA nuke on stunned target"
            - skill: "fireball"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA fire burst"
            - skill: "flow_fireball_explosion"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up explosion"
            - skill: "earthquake"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA knockdown finisher"

