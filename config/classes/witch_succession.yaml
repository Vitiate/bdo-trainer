# ============================================================================
# BDO Trainer - Succession Witch Combo Configuration
# ============================================================================
# Class: Witch (Succession)
# Weapons: Staff (Main) / Dagger (Off) — Enhanced Staff skills, no Aad Sphera
# Damage Type: Magic / Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Witch/Wizard Class Discord
#   - Community guides by Absoloote, BigandShiny, HelenaAtreides
#
# Notes:
#   - Witch has NO grab (unlike Wizard who has a grab)
#   - Succession enhances pre-awakening Staff skills with extra hits and damage
#   - Retains all party buffs (Protected Area, Speed Spell, heals)
#   - Strongest ranged AOE caster in the game; excels in large-scale PVP
#   - Weaker in 1v1 due to no grab and cast times
# ============================================================================

class: Witch
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Staff Skills)
# --------------------------------------------------------------------------
awakening_skills:
    fireball:
        name: "Fireball"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced fireball with Super Armor. Fast cast, high damage, good AOE."
        flows_into: ["flow_fireball_explosion", "lightning", "meteor_shower"]
        core_effect: "Core: Fireball - Extra hits and increased damage"
        notes: "Bread-and-butter damage skill. Fast and spammable. Always chain into explosion."

    flow_fireball_explosion:
        name: "Flow: Fireball Explosion"
        input: "LMB (after Fireball)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Fireball. Detonates for massive AOE explosion."
        flows_into: ["lightning", "meteor_shower"]
        notes: "Always chain after Fireball for extra burst. Large AOE."

    lightning:
        name: "Lightning"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 6000
        description: "Enhanced lightning bolt barrage with Super Armor. Multi-hit ranged skill."
        flows_into: ["residual_lightning", "chain_lightning", "fireball"]
        core_effect: "Core: Lightning - Extra hits and improved range"
        notes: "Strong ranged damage skill. Flows naturally into Residual Lightning."

    residual_lightning:
        name: "Residual Lightning"
        input: "LMB (after Lightning)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Lightning. Lingering lightning strikes on the ground."
        flows_into: ["fireball", "chain_lightning", "earthquake"]
        notes: "Chain after Lightning for additional ticking damage."

    meteor_shower:
        name: "Meteor Shower"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 12000
        description: "Calls down a massive meteor strike. Highest damage succession skill."
        flows_into: ["fireball", "lightning", "earthquake"]
        core_effect: "Core: Meteor Shower - Extra damage and increased AOE"
        notes: "Core skill recommendation. Huge nuke with long cast time. Use when safe."

    blizzard:
        name: "Blizzard"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 10000
        description: "Ice storm AOE with Super Armor. Wide area and multi-hit damage."
        flows_into: ["fireball", "lightning", "frigid_fog"]
        notes: "Large AOE for pack clearing. Slows enemies hit."

    chain_lightning:
        name: "Chain Lightning"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Forward lightning chain with Super Armor and knockdown."
        flows_into: ["lightning", "fireball", "earthquake"]
        notes: "Strong forward damage with CC. Good engage tool."

    earthquake:
        name: "Earthquake"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Earth-shattering AOE with Super Armor. Wide knockdown CC."
        flows_into: ["fireball", "lightning", "meteor_shower"]
        notes: "Strong AOE with CC. Good in large-scale and PVE."

    frigid_fog:
        name: "Frigid Fog"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 12000
        description: "Ice fog AOE with Super Armor. Lingering damage zone with slow effect."
        flows_into: ["fireball", "blizzard", "lightning"]
        notes: "Area denial tool. Good for zoning in PVP and extra PVE damage."

    lightning_storm:
        name: "Lightning Storm"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 15000
        description: "Massive lightning storm AOE with Super Armor. Float CC."
        flows_into: ["fireball", "lightning"]
        core_effect: "Core: Lightning Storm - Extra hits and increased damage"
        notes: "Large nuke with long cast time. Best used in large-scale or safe PVE."

    multiple_magic_arrows:
        name: "Multiple Magic Arrows"
        input: "RMB"
        keys: ["rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Forward Guard ranged multi-shot. Quick filler with frontal protection."
        flows_into: ["fireball", "lightning"]
        notes: "Quick filler with FG protection. Useful for poking in PVP."

    magic_missile:
        name: "Magic Missile"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard magic bolt. Quick ranged poke with frontal protection."
        flows_into: ["fireball", "lightning", "chain_lightning"]
        notes: "Quick forward poke for PVP spacing with frontal protection."

    earth_quake_fall:
        name: "Earthquake Fall"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 8000
        description: "Ground slam with Super Armor and bound. Down attack properties."
        flows_into: ["fireball", "lightning", "meteor_shower"]
        notes: "Down attack on knocked targets. Good damage filler."

    sage_rage:
        name: "Sage's Rage"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Hotbar fire explosion with Super Armor. Good burst filler."
        flows_into: ["fireball", "lightning"]
        notes: "Hotbar skill. Put on bar for extra burst."

    freeze:
        name: "Freeze"
        input: "Q"
        keys: ["q"]
        protection: "SA"
        cc: ["stun"]
        damage: low
        cooldown_ms: 18000
        description: "AOE stun field with Super Armor. Freezes targets in place."
        flows_into: ["meteor_shower", "fireball", "lightning"]
        notes: "Strong CC tool. Stun into Meteor Shower is powerful in PVP."

    teleport_succession:
        name: "Teleport"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 7000
        description: "iframe teleport. Primary mobility skill. Moves in facing direction."
        flows_into: ["fireball", "lightning", "meteor_shower"]
        notes: "Core movement skill. iframe makes it the safest repositioning tool."

