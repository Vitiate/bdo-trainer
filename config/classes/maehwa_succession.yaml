        notes: "Good repositioning flow. Use after Blind Thrust for safe disengage."

    chase:
        name: "Chase"
        input: "Shift + Direction"
        keys: ["shift", "w"]
        keys_alt: ["shift", "a"]
        protection: "iframe"
        cc: []
        damage: none
