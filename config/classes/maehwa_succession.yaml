    - "Whirlwind Cut"
    - "Frost Pillars"
    - "Blooming"
    - "Crimson Gust"
    - "Winter Veil"
    - "Decapitation"
    - "Stub Arrow"
    - "Rising Storm"

# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Red Moon"
    effect: "Extra hits, increased damage, and extended Super Armor"
    reason: >
        Red Moon with Core gains additional hits and a massive damage boost,
        making it the strongest skill in Maehwa's succession kit. As the
        defining blade skill of the class, Core Red Moon turns an already
        powerful slash into a devastating burst tool. Most succession Maehwa
        players choose this Core first. After getting comfortable, experiment
        with Whirlwind Cut and Decapitation Cores as well.
