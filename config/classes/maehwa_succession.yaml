        core_effect: "Core: Whirlwind Cut - Increased hits, Super Armor extended"
        notes: "Strong AOE with float CC. Good for grouping and PVE clear."

    dragon_bite:
        name: "Dragon Bite"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
