# ============================================================================
# BDO Trainer - Succession Maehwa Combo Configuration
# ============================================================================
# Class: Maehwa (Succession)
# Weapons: Blade (Main) / Horn Bow (Off) / Enhanced Blade (Succession)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Note: Maehwa has NO grab. She relies on CC chains and burst to secure kills.
# Succession enhances all pre-awakening Blade skills with bonus damage,
# larger hitboxes, and improved protection. Chase remains the core movement.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Maehwa Class Discord
#   - Community guides by Vert, JinHiYo, FlexTape, Heedun
# ============================================================================

class: Maehwa
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Blade)
# --------------------------------------------------------------------------
awakening_skills:
    red_moon:
        name: "Red Moon"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Signature enhanced blade slash. Super Armor with knockdown. Main damage dealer."
        flows_into: ["flow_red_moon", "blind_thrust", "whirlwind_cut"]
        core_effect: "Core: Red Moon - Extra hits, increased damage, and extended Super Armor"
        notes: "Bread-and-butter skill. Core priority. Best single-target DPS in succession kit."

    flow_red_moon:
        name: "Flow: Red Moon"
        input: "LMB (after Red Moon)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Red Moon. Additional slash combo with Super Armor."
        flows_into: ["blind_thrust", "decapitation", "whirlwind_cut"]
        notes: "Always chain after Red Moon. Down attack properties for extra damage."

    blind_thrust:
        name: "Blind Thrust"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 6000
        description: "Forward piercing thrust with Super Armor. Enhanced range in succession."
        flows_into: ["red_moon", "decapitation", "dragon_bite"]
        notes: "Fast forward engage with SA. Good for catching targets and gap closing."

    decapitation:
        name: "Decapitation"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 7000
        description: "Heavy overhead slash with Super Armor. Enhanced damage and protection in succession."
        flows_into: ["red_moon", "whirlwind_cut", "frost_pillars"]
        core_effect: "Core: Decapitation - Increased damage and knockback distance"
        notes: "Big burst skill. Use after CC for maximum down/air attack damage."

    frost_pillars:
        name: "Frost Pillars"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Ground ice eruption with Super Armor. Enhanced AOE radius in succession."
        flows_into: ["flow_frost_pillars", "red_moon", "whirlwind_cut"]
        notes: "Strong AOE clear. Flows into follow-up. Good PVE and PVP damage."

    flow_frost_pillars:
        name: "Flow: Frost Pillars"
