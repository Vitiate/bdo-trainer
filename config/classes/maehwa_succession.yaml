        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Frost Pillars. Extends ice eruption with additional hits."
        flows_into: ["red_moon", "blind_thrust", "decapitation"]
        notes: "Always chain after Frost Pillars for extra damage."

    whirlwind_cut:
        name: "Whirlwind Cut"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 8000
        description: "Spinning blade tornado with Super Armor. Float CC on hit."
