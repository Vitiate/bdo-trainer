# --------------------------------------------------------------------------
# Recommended Skills to Lock
# --------------------------------------------------------------------------
locked_skills:
    - name: "Evasion"
      reason: "Can interfere with Chase inputs. Lock to prevent accidental use."
    - name: "Moon Slash"
      reason: "Basic chain is too slow. Interferes with flow inputs."
    - name: "Stub Arrow"
      reason: "Ranged poke is unprotected and slow. Not useful in main rotation."
    - name: "Backstep Slash"
      reason: "Can trigger accidentally during S-key combos."
    - name: "Forward Slash"
      reason: "Unprotected, can misfire during movement inputs."
    - name: "Cyclone Slash"
      reason: "Optional lock. Put on HOTBAR if locking from skill bar."
    - name: "Divider"
      reason: "Unprotected. Useful CC but risky — lock if interfering with combos."
    - name: "Tiger Blade"
      reason: "Optional lock in PVE. Keep unlocked for PVP stiffness fishing."

# --------------------------------------------------------------------------
