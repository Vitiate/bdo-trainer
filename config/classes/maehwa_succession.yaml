movement_combos:
    chase_chain:
        name: "Chase Chain / Fast Travel"
        description: "Chain Chase dashes for fastest traversal. Succession enhances stamina efficiency."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe forward dash"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Chain dash (stamina permitting)"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Continue chain"
            - skill: "crimson_gust"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA filler while stamina recovers"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Resume Chase chain"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Continue dashing"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Movement chain for succession Maehwa. Cycle between Chase iframes,
            Rabam dashes, and blade skills for maximum speed and protection.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe forward dash"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Chain iframe"
            - skill: "blind_thrust"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA forward thrust for distance"
            - skill: "winter_veil"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement filler"
            - skill: "crimson_gust"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement + stamina regen"
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Resume Chase when stamina allows"
            - skill: "blooming"
              input: "LMB + RMB"
              keys: ["lmb", "rmb"]
              note: "FG forward rush filler if needed"

