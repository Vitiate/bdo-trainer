# ============================================================================
# BDO Trainer - Awakened Warrior Combo Configuration
# ============================================================================
# Class: Warrior (Awakening)
# Weapons: Longsword (Main) / Shield (Off) / Greatsword (Awakening)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Warrior Class Discord
#   - Community guides by Tylondys, Mazuu, BPGaming, Goldsteinburg
# ============================================================================

class: Warrior
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    solar_flare:
        name: "Solar Flare"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "none"
        cc: []
        damage: none
        cooldown_ms: 24000
        description: "Self-buff. Increases AP, attack speed, and crit. Core adds Super Armor."
        flows_into: ["head_chase", "reckless_blow"]
        core_effect: "Core: Solar Flare - Super Armor during the skill"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    head_chase:
        name: "Head Chase"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Super Armor gap closer / movement dash. PVE iframe."
        flows_into: ["reckless_blow", "slashing_the_dead", "grave_digging"]
        notes: "Primary movement skill in awakening. PVE iframe (1s invincibility vs monsters)."

    reckless_blow:
        name: "Reckless Blow"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Main awakening damage skill. Super Armor throughout with knockdown."
        flows_into: ["flow_reckless_blow", "grave_digging", "merciless"]
        notes: "Bread-and-butter damage skill. Flows into Flow: Reckless Blow."

    flow_reckless_blow:
        name: "Flow: Reckless Blow"
        input: "LMB (after Reckless Blow)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Reckless Blow. Additional burst with Super Armor."
        flows_into: ["grave_digging", "slashing_the_dead"]
        notes: "Always follow Reckless Blow with this for extra damage."

    grave_digging:
        name: "Grave Digging"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Heavy ground slam with Super Armor. Core adds Bound on smash hits."
        flows_into: ["reckless_blow", "merciless"]
        core_effect: "Core: Grave Digging - Bound on smash attack hits"
        notes: "High damage slam. Also works from hotbar. Strong in PVE and PVP."

    merciless:
        name: "Merciless"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard multi-hit slash. Core adds Forward Guard on cooldown."
        flows_into: ["flow_armor_break", "reckless_blow"]
        core_effect: "Core: Merciless - Forward Guard during the skill (nullified on cooldown)"
        notes: "Good filler with frontal protection."

    slashing_the_dead:
        name: "Slashing the Dead"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor spinning slash combo with knockdown."
        flows_into: ["flow_slashing_the_dead", "reckless_blow"]
        notes: "Good filler between main skills. Flows into Flow: Slashing the Dead."

    flow_slashing_the_dead:
        name: "Flow: Slashing the Dead"
        input: "LMB (after Slashing the Dead)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Slashing the Dead. Down attack properties."
        flows_into: ["grave_digging", "reckless_blow"]
        notes: "Always chain after Slashing the Dead for extra damage."

    balance_strike:
        name: "Balance Strike"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Quick forward slash with Forward Guard. Core adds Forward Guard."
        flows_into: ["reckless_blow", "grave_digging"]
        core_effect: "Core: Balance Strike - Forward Guard during the skill"
        notes: "Fast engagement tool with frontal protection and stiffness CC."

    pulverize:
        name: "Pulverize"
        input: "W + F"
        keys: ["w", "f"]
        protection: "FG"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 9000
        description: "Forward charge and slam with Forward Guard. Core adds Knockdown."
        flows_into: ["reckless_blow", "slashing_the_dead"]
        core_effect: "Core: Pulverize - Knockdown on last attack hits"
        notes: "Good engage tool. Can also be used from hotbar."

    ground_smash:
        name: "Ground Smash"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor ground pound AOE with float CC."
        flows_into: ["reckless_blow", "grave_digging"]
        notes: "Strong AOE damage. Used in PVE for clearing and PVP for catch."

    ankle_break:
        name: "Ankle Break"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 5000
        description: "Quick low sweep with bound CC. Unprotected."
        flows_into: ["reckless_blow", "grave_digging"]
        notes: "Useful CC but unprotected. Be careful when using in PVP."

    flow_armor_break:
        name: "Flow: Armor Break"
        input: "F (after awakening skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard attack available after multiple awakening skills."
        flows_into: ["reckless_blow", "slashing_the_dead"]
        notes: "Can be chained after many awakening skills. Good filler with FG."

    flow_overwhelm:
        name: "Flow: Overwhelm"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor charge attack. Hotbar recommended."
        flows_into: ["reckless_blow", "grave_digging"]
        notes: "Put on hotbar. Good protected engage or filler."

    chain_heavens_cleave:
        name: "Chain: Heaven's Cleave"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 12000
        description: "Powerful overhead cleave from hotbar. Super Armor."
        flows_into: ["reckless_blow", "grave_digging"]
        notes: "Hotbar skill. Good burst damage with protection."

    scars_of_dusk:
        name: "Scars of Dusk"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Ranged Forward Guard slash from hotbar."
        flows_into: ["reckless_blow", "slashing_the_dead"]
        notes: "Hotbar skill. Good for ranged poke with frontal protection."

    frenzied_strikes:
        name: "Frenzied Strikes"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Multi-hit slash combo. Unprotected base, FG with Core."
        flows_into: ["reckless_blow"]
        core_effect: "Core: Frenzied Strikes - Forward Guard during the skill"
        notes: "Lock from skill bar in PVP, use from hotbar only."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    frenzied_spear:
        name: "Frenzied Spear"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Spear thrust with stiffness CC. Good for 1v1 PVP and movement. Gives +15 Magic DP buff."
        notes: "Preferred over Seismic Strike for general PVP and 1v1. Good for movement."

    shield_tide:
        name: "Shield Tide"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 8000
        description: "SA on first hit, then Forward Guard. Movement skill. Preferred L57 Rabam."
        notes: "Preferred choice. Useful for protected movement. SA → FG transition."

    dusk_slash:
        name: "Dusk Slash"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["knockdown"]
        damage: low
        cooldown_ms: 12000
        description: "Slash follow-up. Neither L58 Rabam is particularly strong."
        notes: "Optional. Can mess up movement if triggered accidentally after Shield Tide."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Warrior PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Practice grab timing in duels."

    piercing_spear:
        name: "Piercing Spear"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["stiffness"]
        description: "Ranged spear throw. Unprotected but useful for ranged poke."

    upper_shield_strike:
        name: "Upper Shield Strike"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["float"]
        description: "Forward Guard uppercut with float CC. Good PVP catch tool."

    war_cry:
        name: "War Cry"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "AOE debuff shout. Reduces enemy DP. Super Armor."
        notes: "Use before burst for DP shred. Hotbar recommended."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. PVE iframe as well."
        notes: "PVE iframe. Lock in PVP to prevent accidental use."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "Gap close to pack"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "grave_digging"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Heavy slam"
            - skill: "slashing_the_dead"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Filler damage"
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff first, then unload."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "solar_flare"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "AP buff before engaging"
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "Gap close into pack"
            - skill: "ground_smash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float, group mobs"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "grave_digging"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Heavy slam finisher"
            - skill: "slashing_the_dead"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Clean up remaining"
            - skill: "flow_slashing_the_dead"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend damage"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "Dash into pack"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot burst"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "shield_tide"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "solar_flare"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "Engage"
            - skill: "ground_smash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE opener"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "grave_digging"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Heavy slam"
            - skill: "slashing_the_dead"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Filler damage"
            - skill: "flow_slashing_the_dead"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend combo"
            - skill: "flow_overwhelm"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA burst"
            - skill: "chain_heavens_cleave"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Extra burst"
            - skill: "frenzied_spear"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and Forward Guard skills.
            Approach with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "solar_flare"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "balance_strike"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "grave_digging"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Warrior PVP combo. Land a grab then chain into full burst.
            Warrior's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "ground_smash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "grave_digging"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Heavy slam finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stiffness,
            then chain into grab and full damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "balance_strike"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "ground_smash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "grave_digging"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "pulverize"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG forward rush"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "slashing_the_dead"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA filler"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "ground_smash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant float on CC'd target"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "grave_digging"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use SA movement to create distance.
            Warrior has strong block but limited escape tools.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "shield_tide"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement out"
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "SA dash away"
            - skill: "frenzied_spear"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Movement + damage while retreating"
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "Continue dashing if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected damage and
            avoid overextending. Stay with your group and use SA skills.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "solar_flare"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "head_chase"
              input: "Space"
              keys: ["space"]
              note: "SA engage into group"
            - skill: "flow_overwhelm"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA charge into enemies"
            - skill: "ground_smash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float"
            - skill: "reckless_blow"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_reckless_blow"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "grave_digging"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA burst"
            - skill: "shield_tide"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA reposition out"

