        combo_window_ms: 300
        steps:
            - skill: "cloud_drift"
              input: "Space"
              keys: ["space"]
              note: "Iframe dash to pack"
            - skill: "janggeom_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA core damage skill"
            - skill: "flow_janggeom_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up thrust"
            - skill: "lightning_blade"
              input: "Shift + RMB"
