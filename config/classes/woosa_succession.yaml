# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Janggeom Strike"
    effect: "Extra hit damage, HP recovery on hit"
    reason: >
        Janggeom Strike with Core gains significant bonus damage and
        self-healing on hit, making it Woosa succession's most impactful
        Core upgrade. It is the most frequently used skill in your rotation
        and the sustain from HP recovery keeps you grinding without potions.
        Lightning Blade Core is an equally valid alternative if you prefer
        raw burst over sustain. Most Woosa succession players choose
        Janggeom Strike Core first, then pick up Lightning Blade Core next.
