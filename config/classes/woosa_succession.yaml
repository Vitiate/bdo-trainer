# ============================================================================
# BDO Trainer - Succession Woosa Combo Configuration
# ============================================================================
# Class: Woosa (Succession)
# Weapons: Janggeom (Main — Korean sword) / Daedo (Off — inner power)
# Damage Type: Magic/Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Notes:
#   - Woosa has NO grab. Relies on protected CC chains and spacing.
#   - Succession enhances Janggeom and Daedo (inner power) skills.
#   - Korean-themed wind/cloud/lightning magic with enhanced sword techniques.
#   - Strong self-healing and excellent ranged/melee hybrid playstyle.
#   - Part of the newest class wave in BDO.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Woosa Class Discord
#   - Community guides by Arukas, JinSeoul, CloudKR
# ============================================================================

class: Woosa
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Janggeom + Daedo)
# --------------------------------------------------------------------------
awakening_skills:
    janggeom_strike:
        name: "Janggeom Strike"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced sword slash channeling inner Daedo power. Super Armor with stiffness. Succession's core damage skill."
        flows_into: ["flow_janggeom_thrust", "lightning_blade", "cloud_slash"]
        core_effect: "Core: Janggeom Strike - Extra hit damage, HP recovery on hit"
        notes: "Bread-and-butter skill. High base damage enhanced by Succession passives. Always follow with Flow."

    flow_janggeom_thrust:
        name: "Flow: Janggeom Thrust"
        input: "LMB (after Janggeom Strike)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Piercing thrust follow-up to Janggeom Strike. Additional burst with Super Armor."
        flows_into: ["lightning_blade", "wind_cutter", "rain_blade"]
        notes: "Always chain after Janggeom Strike for extended SA and extra damage."

    lightning_blade:
        name: "Lightning Blade"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Channels lightning through the Janggeom for a devastating overhead slash. SA with knockdown."
        flows_into: ["flow_lightning_arc", "janggeom_strike", "rain_blade"]
        core_effect: "Core: Lightning Blade - Down attack damage +15%, extra lightning slash"
        notes: "Highest single-hit damage. Core priority alongside Janggeom Strike. Use on cooldown in PVE."

    flow_lightning_arc:
        name: "Flow: Lightning Arc"
        input: "LMB (after Lightning Blade)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Arcing lightning wave follow-up to Lightning Blade. Sends a crescent forward."
        flows_into: ["janggeom_strike", "wind_cutter"]
        notes: "Always chain after Lightning Blade. Knockback creates safe distance."

    cloud_slash:
        name: "Cloud Slash"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Dashing sword slash wreathed in cloud energy. SA gap closer with stiffness."
        flows_into: ["flow_cloud_pierce", "janggeom_strike", "lightning_blade"]
        core_effect: "Core: Cloud Slash - Movement speed +10% for 10 sec on use"
        notes: "Primary engage tool. SA throughout the dash. Flows into Cloud Pierce for extended rush."

    flow_cloud_pierce:
        name: "Flow: Cloud Pierce"
        input: "F (after Cloud Slash)"
        keys: ["f"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Extended forward thrust follow-up to Cloud Slash. Additional forward movement with SA."
        flows_into: ["janggeom_strike", "lightning_blade", "wind_cutter"]
        notes: "Always use after Cloud Slash for extended range. SA throughout."

    rain_blade:
        name: "Rain Blade"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 8000
        description: "Channels qi into the Janggeom, releasing a cascade of blade projections. Ranged AOE with float."
        flows_into: ["flow_rain_burst", "lightning_blade", "janggeom_strike"]
        core_effect: "Core: Rain Blade - AOE range increased, extra blade projection added"
        notes: "Ranged AOE damage. Great for PVE clearing and PVP zoning. Float opens follow-up combos."

    flow_rain_burst:
        name: "Flow: Rain Burst"
        input: "LMB (after Rain Blade)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Rain Blade. A second wave of blade projections cascades outward."
        flows_into: ["lightning_blade", "wind_cutter"]
        notes: "Chain after Rain Blade for extended ranged AOE damage."

    wind_cutter:
        name: "Wind Cutter"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Massive spinning slash unleashing cutting wind in a wide arc. SA with knockdown."
        flows_into: ["janggeom_strike", "lightning_blade", "rain_blade"]
        notes: "Large AOE burst. Long cooldown but devastating in PVE and large scale PVP."

    inner_harmony:
        name: "Inner Harmony"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Forward Guard self-heal and qi buff. Restores HP and grants AP/DP buff for 10 sec."
        flows_into: ["janggeom_strike", "cloud_slash"]
        core_effect: "Core: Inner Harmony - Heal amount +30%, grants SA for 2 sec after cast"
        notes: "Key sustain tool. FG keeps you protected during cast. Use between engagements."

    cloud_drift:
        name: "Cloud Drift"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Iframe dash riding the wind. Primary succession movement skill."
        flows_into: ["janggeom_strike", "lightning_blade", "cloud_slash"]
        notes: "Primary movement skill. Iframe for 1 sec. Use to reposition and dodge grabs."

    thunder_brand:
        name: "Thunder Brand"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stun"]
        damage: medium
        cooldown_ms: 7000
        description: "Brands the ground with a lightning seal, stunning nearby enemies. Forward Guard."
        flows_into: ["lightning_blade", "janggeom_strike", "rain_blade"]
        notes: "Defensive CC with frontal protection. Use to create openings or punish aggression."

    gale_strike:
        name: "Gale Strike"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward lunging blade strike with a gale of wind energy. SA knockback."
        flows_into: ["janggeom_strike", "lightning_blade", "cloud_slash"]
        notes: "Good approach skill. Knockback keeps opponents at desired range."

    tempest_blade:
        name: "Tempest Blade"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 8000
        description: "Spinning low sweep channeling tempest energy. Super Armor with bound."
        flows_into: ["lightning_blade", "janggeom_strike"]
        notes: "Bound CC for combo setup. Good filler between main skill cooldowns."

    qi_explosion:
        name: "Qi Explosion"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 9000
        description: "Releases a burst of inner qi in all directions. 360-degree knockback."
        flows_into: ["cloud_drift", "janggeom_strike"]
        notes: "Self-peel tool. No grab on Woosa so this is your emergency escape when surrounded."

    phantom_blade:
        name: "Phantom Blade"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Projects a phantom copy of the Janggeom forward. Super Armor. Hotbar recommended."
        flows_into: ["lightning_blade", "janggeom_strike"]
        notes: "Hotbar skill. Good ranged burst filler with SA protection."

    qi_lance:
        name: "Qi Lance"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Concentrates qi into a piercing lance projectile. Forward Guard."
        flows_into: ["lightning_blade", "rain_blade"]
        notes: "Hotbar skill. Ranged poke with Forward Guard. Safe to use in PVP."

