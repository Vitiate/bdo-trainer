            - skill: "flow_lightning_arc"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up arc"
            - skill: "cloud_drift"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
