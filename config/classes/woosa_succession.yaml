              input: "Space"
              keys: ["space"]
              note: "Iframe reposition out"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Mobility Chain"
        description: "Chain movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "cloud_drift"
              input: "Space"
              keys: ["space"]
              note: "Iframe forward dash"
            - skill: "cloud_ride"
              input: "W + W"
              keys: ["w", "w"]
              note: "SA cloud mount movement"
            - skill: "cloud_slash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward dash"
            - skill: "flow_cloud_pierce"
              input: "F"
              keys: ["f"]
              note: "Extended forward dash"
            - skill: "cloud_drift"
              input: "Space"
              keys: ["space"]
              note: "Dash again if off cooldown"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Movement chain for Woosa succession. Cycle between Cloud Drift,
            Cloud Ride, Cloud Slash, and Qi Shield Wave for maximum traversal
            speed with protection throughout.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "cloud_drift"
              input: "Space"
              keys: ["space"]
              note: "Iframe forward dash"
            - skill: "cloud_slash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush"
            - skill: "flow_cloud_pierce"
              input: "F"
              keys: ["f"]
              note: "Extended dash"
            - skill: "qi_shield_wave"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement filler"
            - skill: "cloud_ride"
              input: "W + W"
              keys: ["w", "w"]
              note: "SA cloud ride filler"
            - skill: "cloud_drift"
              input: "Space"
              keys: ["space"]
              note: "If off cooldown"

