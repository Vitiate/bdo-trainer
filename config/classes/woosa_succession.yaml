              keys: ["s", "lmb"]
              note: "SA ranged AOE"
            - skill: "flow_rain_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended blade projection"
            - skill: "lightning_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst on grouped enemies"
            - skill: "flow_lightning_arc"
