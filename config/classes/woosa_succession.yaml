        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on large AOE damage and
            self-sustain. Stay with your group and use SA skills.
            Succession Woosa excels with sustained ranged AOE pressure.
        difficulty: advanced
        combo_window_ms: 250
