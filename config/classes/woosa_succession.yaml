# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor movement skills.
            Approach with protection, then fish for CC openings.
            Woosa has no grab so you must rely on protected CC chains.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "inner_harmony"
              input: "Q"
              keys: ["q"]
              note: "FG buff before going in"
            - skill: "cloud_slash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close"
            - skill: "flow_cloud_pierce"
              input: "F"
              keys: ["f"]
              note: "Extended SA engage"
            - skill: "gale_strike"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA knockback to disrupt"
            - skill: "janggeom_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA stiffness poke"
            - skill: "flow_janggeom_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"

    stiffness_chain:
        name: "Stiffness Chain (1v1)"
        description: >
            Core Woosa succession 1v1 combo. Land a stiffness CC then
            chain into knockdown and full burst. No grab needed — rely on
            stiffness into extended CC chain for kill potential.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "janggeom_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA stiffness opener"
            - skill: "thunder_brand"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stun on stiffened target"
            - skill: "lightning_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main burst — knockdown"
            - skill: "flow_lightning_arc"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up arc"
            - skill: "rain_blade"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "AOE float on downed target"
            - skill: "flow_rain_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended blades finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stun,
            then chain into knockdown and full damage. Woosa has no grab
            so catching with FG-protected CC is essential.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "thunder_brand"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stun — catch the target"
            - skill: "tempest_blade"
              input: "S + F"
              keys: ["s", "f"]
              note: "SA bound on stunned target"
            - skill: "lightning_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst — knockdown"
            - skill: "flow_lightning_arc"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up arc"
            - skill: "wind_cutter"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Large AOE finisher"
            - skill: "janggeom_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Cleanup damage"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in SA-protected skills. No CC needed to open.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "cloud_slash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA rush in"
            - skill: "lightning_blade"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main burst"
            - skill: "flow_lightning_arc"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up arc"
            - skill: "janggeom_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA filler damage"
            - skill: "flow_janggeom_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"

    knockdown_punish:
        name: "Knockdown Punish (After Ally CC)"
        description: >
            Maximum damage combo when your teammate lands a CC
            or the target is already knocked down on the ground.
        difficulty: beginner
        combo_window_ms: 250
