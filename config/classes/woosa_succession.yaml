              keys: ["lmb"]
              note: "Follow-up arc"
            - skill: "cloud_ride"
              input: "W + W"
              keys: ["w", "w"]
              note: "SA cloud movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns and flows."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "inner_harmony"
              input: "Q"
              keys: ["q"]
              note: "Heal and AP/DP buff"
            - skill: "cloud_slash"
              input: "W + F"
              keys: ["w", "f"]
