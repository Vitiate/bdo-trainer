# ============================================================================
# BDO Trainer - Succession Tamer Combo Configuration
# ============================================================================
# Class: Tamer (Succession)
# Weapons: Shortsword (Main) / Trinket (Off)
# Damage Type: Melee
# Pet: Heilang (assists in combat, merges with Tamer for enhanced attacks)
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Tamer Class Discord
#   - Community guides by Akanthe, Tett, Nayeli, FlameRose
# ============================================================================

class: Tamer
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Shortsword Skills)
# --------------------------------------------------------------------------
awakening_skills:
    bolt_wave:
        name: "Bolt Wave"
        input: "LMB combo"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Enhanced LMB chain combo. Multi-hit Shortsword slashes with Heilang assist."
        flows_into: ["jolt_wave", "whiplash", "surging_tide"]
        core_effect: "Core: Bolt Wave - Extra hits and increased damage on the combo chain"
        notes: "Basic filler combo. Chain into Jolt Wave for full Bolt/Jolt loop."

    jolt_wave:
        name: "Jolt Wave"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Backward slash with Heilang-infused shockwave. Super Armor throughout."
        flows_into: ["bolt_wave", "whiplash", "legendary_beast_power"]
        notes: "Good filler with SA protection. Pairs with Bolt Wave for sustained damage."

    whiplash:
        name: "Whiplash"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Succession-enhanced forward lash. High damage with Super Armor and knockdown."
        flows_into: ["surging_tide", "legendary_beast_power", "flash"]
        core_effect: "Core: Whiplash - Additional damage hits and extended Super Armor"
        notes: "Primary damage filler. Fast animation with high multiplier. Use on cooldown."

    surging_tide:
        name: "Surging Tide"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 7000
        description: "Succession-enhanced forward rush combo. Heilang charges alongside for bound CC."
        flows_into: ["whiplash", "legendary_beast_power", "void_lightning"]
        core_effect: "Core: Surging Tide - Increased damage and bound duration"
        notes: "Strong burst and CC skill. Good for both PVE clearing and PVP engages."

    legendary_beast_power:
        name: "Legendary Beast Power"
        input: "W + F"
        keys: ["w", "f"]
        protection: "FG"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Succession-enhanced multi-hit rush with Forward Guard. Heilang attacks in sync."
        flows_into: ["flow_beast_power", "whiplash", "surging_tide"]
        core_effect: "Core: Legendary Beast Power - Forward Guard and extra damage hits"
        notes: "Highest single-skill damage in succession kit. Core priority for most players."

    flow_beast_power:
        name: "Flow: Beast Power"
        input: "F (after Legendary Beast Power)"
        keys: ["f"]
        protection: "FG"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up slam after Legendary Beast Power. Forward Guard with knockdown."
        flows_into: ["whiplash", "surging_tide", "jolt_wave"]
        notes: "Always chain after LBP for extended damage. Down attack properties."

    flash:
        name: "Flash"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 9000
        description: "Succession-enhanced spinning slash. Super Armor with float CC and wide AOE."
        flows_into: ["whiplash", "surging_tide", "legendary_beast_power"]
        notes: "Strong AOE with float. Good for grouping mobs in PVE and catch in PVP."

    void_lightning:
        name: "Void Lightning"
        input: "S + F"
        keys: ["s", "f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Succession-enhanced Heilang lightning. Forward Guard with ranged stiffness."
        flows_into: ["legendary_beast_power", "whiplash", "surging_tide"]
        notes: "Ranged poke with FG protection. Good for initiating in PVP from a distance."

    heilang_roar:
        name: "Heilang: Roar"
        input: "Q"
        keys: ["q"]
        protection: "SA"
        cc: ["stun"]
        damage: low
        cooldown_ms: 18000
        description: "Heilang roars, buffing AP and stunning nearby enemies. Super Armor during cast."
        flows_into: ["whiplash", "surging_tide", "legendary_beast_power"]
        core_effect: "Core: Heilang: Roar - Increased AP buff and stun radius"
        notes: "Use before engaging for buff. AOE stun is strong for PVP setups."

    leaves_dropping:
        name: "Leaves Dropping"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 7000
        description: "Succession-enhanced aerial slam. Super Armor with bound CC on landing."
        flows_into: ["whiplash", "legendary_beast_power", "jolt_wave"]
        notes: "Good CC tool with SA protection. Down attack on bound targets."

    scratch:
        name: "Scratch"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Succession-enhanced forward claw attack with Forward Guard. Quick stiffness CC."
        flows_into: ["whiplash", "surging_tide", "legendary_beast_power"]
        notes: "Fast FG engage tool. Good for fishing for stiffness in PVP."

    trample:
        name: "Trample"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "Heilang charges forward trampling enemies. Super Armor with knockdown."
        flows_into: ["whiplash", "legendary_beast_power", "flash"]
        notes: "Good engage tool with SA. Heilang rushes alongside for extra hits."

    heilang_bite:
        name: "Heilang: Bite"
        input: "LMB + RMB"
        keys: ["lmb", "rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 6000
        description: "Command Heilang to bite the target. Ranged Heilang attack with stiffness."
        flows_into: ["whiplash", "surging_tide"]
        notes: "Ranged Heilang poke. Useful for catching fleeing targets in PVP."

    fearful_trembling:
        name: "Fearful Trembling"
        input: "Shift + Q"
        keys: ["shift", "q"]
        protection: "SA"
        cc: ["knockback"]
        damage: low
        cooldown_ms: 12000
        description: "Succession-enhanced Heilang intimidation. SA with knockback and DP debuff."
        flows_into: ["legendary_beast_power", "whiplash", "surging_tide"]
        notes: "DP shred debuff is strong before burst combos. Use for setup."

    soaring_kick:
        name: "Soaring Kick"
        input: "S + E"
        keys: ["s", "e"]
        protection: "none"
        cc: ["float"]
        damage: low
        cooldown_ms: 8000
        description: "Upward kick with float CC. Unprotected but useful for CC chains."
        flows_into: ["whiplash", "surging_tide"]
        notes: "Unprotected CC tool. Use only when target is already stiffened."

    cloud_stomping:
        name: "Cloud Stomping"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Aerial leap with Super Armor. Primary movement skill and iframe in PVE."
        flows_into: ["whiplash", "legendary_beast_power", "surging_tide"]
        notes: "Primary succession movement. PVE iframe (1s invincibility vs monsters)."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    echo_pierce:
        name: "Echo Pierce"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Heilang-infused forward thrust with Super Armor and stiffness CC."
        notes: "Preferred L56 Rabam. Good protected movement and CC option."

    heilang_storm:
        name: "Heilang: Storm"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Heilang creates a whirlwind around the Tamer. Super Armor with knockback."
        notes: "Preferred L57 Rabam. Good AOE protection and damage. SA movement option."

    beast_claw:
        name: "Beast Claw"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 12000
        description: "Heilang leaps forward with a claw slash. Bound CC on hit."
        notes: "Hotbar skill. Good ranged engage but unprotected. Use with caution in PVP."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Tamer PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Tamer is one of the best 1v1 classes because of this grab."

    heilang_summon:
        name: "Summon Heilang"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Summons or recalls Heilang. Keep Heilang alive for combos and buffs."
        notes: "Re-summon if Heilang dies. Heilang must be alive for pet-based skills."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. PVE iframe as well."
        notes: "Short iframe. Can be used to dodge key abilities in PVP."

    cloud_ride:
        name: "Cloud Ride"
        input: "W + W (hold)"
        keys: ["w", "w"]
        protection: "none"
        cc: []
        description: "Sprint on Heilang's back for fast traversal. Unprotected."
        notes: "Fastest base movement. Unprotected so do not use in PVP combat."

    absorb_heilang:
        name: "Absorb Heilang"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Absorbs Heilang into the Tamer for an AP buff at the cost of pet attacks."
        notes: "Succession Tamer can absorb Heilang for more personal damage in some rotations."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Leap into mob pack"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG main nuke"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG follow-up slam"
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA filler damage"
            - skill: "surging_tide"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst finisher"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Leap to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff first, then unload."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "heilang_roar"
              input: "Q"
              keys: ["q"]
              note: "AP buff before engaging"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Leap into pack center"
            - skill: "flash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE spin, group mobs"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG main nuke on grouped mobs"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG follow-up slam"
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA filler burst"
            - skill: "surging_tide"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA bound finisher"
            - skill: "jolt_wave"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA clean up remaining"
            - skill: "bolt_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend damage chain"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Leap into pack"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "One-shot burst"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "Quick follow-up"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Leap to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "heilang_roar"
              input: "Q"
              keys: ["q"]
              note: "Buff up"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Engage pack"
            - skill: "flash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE opener"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG main nuke"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG follow-up"
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst damage"
            - skill: "surging_tide"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA bound burst"
            - skill: "leaves_dropping"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA bound slam"
            - skill: "jolt_wave"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA filler"
            - skill: "bolt_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "Chain filler"
            - skill: "echo_pierce"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"
            - skill: "fearful_trembling"
              input: "Shift + Q"
              keys: ["shift", "q"]
              note: "DP shred for next cycle"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills and Heilang.
            Approach with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "heilang_roar"
              input: "Q"
              keys: ["q"]
              note: "SA buff and stun opener"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "SA leap gap close"
            - skill: "scratch"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG main damage"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG knockdown follow-up"
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Tamer PVP combo. Land a grab then chain into full burst.
            Tamer's grab bypasses Super Armor — this is your primary kill tool in duels.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG nuke on grabbed target"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG follow-up slam"
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA extended burst"
            - skill: "surging_tide"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA bound finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard and Heilang skills to approach, fish for a stiffness,
            then chain into grab and full damage. Classic Tamer 1v1 pattern.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "scratch"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG nuke follow-up"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG knockdown slam"
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst damage"
            - skill: "surging_tide"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA engage damage"
            - skill: "surging_tide"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA bound follow-up"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG main nuke"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG knockdown finish"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "Instant FG nuke on CC'd target"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG follow-up slam"
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA extended burst"
            - skill: "surging_tide"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher damage"

    heilang_engage:
        name: "Heilang Engage (Pet Opener)"
        description: >
            Use Heilang to initiate from range. Send Heilang to stiffness
            then follow up with a grab or protected rush. Classic Tamer PVP opener.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "heilang_bite"
              input: "LMB + RMB"
              keys: ["lmb", "rmb"]
              note: "Ranged Heilang stiffness"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "SA leap to target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab stiffened target"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG nuke after grab"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG knockdown follow-up"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Tamer is very mobile and can
            use Cloud Stomping and Heilang to kite effectively.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "leaves_dropping"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA backward slam, create distance"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "SA leap away"
            - skill: "heilang_storm"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA Rabam movement"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Continue leaping if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected burst and
            avoid overextending. Stay mobile and pick off isolated targets.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "heilang_roar"
              input: "Q"
              keys: ["q"]
              note: "SA buff and stun before engaging blob"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "SA leap into group"
            - skill: "fearful_trembling"
              input: "Shift + Q"
              keys: ["shift", "q"]
              note: "SA knockback and DP shred"
            - skill: "flash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float"
            - skill: "legendary_beast_power"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG main nuke"
            - skill: "flow_beast_power"
              input: "F"
              keys: ["f"]
              note: "FG follow-up"
            - skill: "whiplash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "SA reposition out"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Mobility Chain"
        description: "Chain movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "SA forward leap"
            - skill: "heilang_storm"
              input: "Shift + Z"
              keys: ["shift", "z"]
