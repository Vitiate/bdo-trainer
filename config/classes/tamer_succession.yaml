core_skill:
    recommended: "Legendary Beast Power"
    effect: "Forward Guard and extra damage hits"
    reason: >
        Legendary Beast Power with Core gains significant extra damage
        and reliable Forward Guard protection, making it the strongest
        single ability in the Tamer succession kit. It is your primary
        nuke in both PVE grinding and PVP burst combos. Most succession
        Tamer players choose this Core first. After getting comfortable,
        experiment with Whiplash Core for an alternative damage-focused
        build that excels in fast 1v1 scenarios.
