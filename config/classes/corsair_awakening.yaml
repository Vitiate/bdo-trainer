pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor movement and water skills.
            Approach with protection, then fish for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "tidal_crash"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "mermaid_dash"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "wave_surge"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "torrential_wave"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_raging_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "whirlpool"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA AOE finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Corsair PVP combo. Land a grab then chain into full burst.
            Corsair's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "siren_song"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "torrential_wave"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_raging_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "seafarers_fury"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy cannon blast finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stiffness,
            then chain into grab and full burst damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "coral_spike"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "siren_song"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "torrential_wave"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_raging_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "seafarers_fury"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "oceans_embrace"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward dive engage"
            - skill: "flow_deep_dive"
              input: "F"
              keys: ["f"]
              note: "SA follow-up bound"
            - skill: "torrential_wave"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst damage"
            - skill: "flow_raging_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "seafarers_fury"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA cannon finisher"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "siren_song"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant float on CC'd target"
