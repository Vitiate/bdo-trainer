              note: "SA AOE float"
            - skill: "torrential_wave"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_raging_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "seafarers_fury"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy cannon"
            - skill: "ocean_current"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA reposition out"

