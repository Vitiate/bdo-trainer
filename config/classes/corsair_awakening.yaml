# ============================================================================
# BDO Trainer - Awakened Corsair Combo Configuration
# ============================================================================
# Class: Corsair (Awakening)
# Weapons: Serenaca (Main — Sword) / Mareca (Off — Magic Device) / Patraca (Awakening — Mermaid Transformation / Water Cannon)
# Damage Type: Melee / Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Corsair Class Discord
#   - Community guides by Caphras, AerielBDO, Hachiman
# ============================================================================

class: Corsair
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    tidal_crash:
        name: "Tidal Crash"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 22000
        description: "Self-buff. Increases AP, attack speed, and critical rate. Mermaid aura surrounds you."
        flows_into: ["mermaid_dash", "torrential_wave"]
        core_effect: "Core: Tidal Crash - additional +15 AP buff and HP recovery on use"
        notes: "Use before engaging packs or PVP fights. Hotbar recommended for tracking cooldown."

    mermaid_dash:
        name: "Mermaid Dash"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor mermaid transformation dash. Primary awakening movement skill."
        flows_into: ["torrential_wave", "seafarers_fury", "oceans_embrace"]
        notes: "Primary movement in awakening. Transforms into mermaid briefly. Very fast gap closer."

    torrential_wave:
        name: "Torrential Wave"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Main awakening water blast. Super Armor throughout with knockdown on hit."
        flows_into: ["flow_raging_wave", "seafarers_fury", "whirlpool"]
        notes: "Bread-and-butter damage skill. Always follow up with Flow: Raging Wave."

    flow_raging_wave:
        name: "Flow: Raging Wave"
        input: "LMB (after Torrential Wave)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Torrential Wave. Unleashes a secondary water burst with Super Armor."
        flows_into: ["seafarers_fury", "whirlpool"]
        notes: "Always chain after Torrential Wave for extra damage. Down attack properties."

    seafarers_fury:
        name: "Seafarer's Fury"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 8000
        description: "High damage water cannon blast. Super Armor with knockback. Core adds extra hits."
        flows_into: ["torrential_wave", "coral_spike", "whirlpool"]
        core_effect: "Core: Seafarer's Fury - extra cannon hits and increased damage"
        notes: "Highest single-skill damage. Long animation but fully protected. Core priority."

    oceans_embrace:
        name: "Ocean's Embrace"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward dash/dive. Mermaid transformation charge with stiffness."
        flows_into: ["flow_deep_dive", "torrential_wave", "seafarers_fury"]
        core_effect: "Core: Ocean's Embrace - Forward Guard on first hit, extended SA"
        notes: "Great engage tool. Use for gap closing with protection. Flows into Deep Dive."

    flow_deep_dive:
        name: "Flow: Deep Dive"
        input: "F (after Ocean's Embrace)"
        keys: ["f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Ocean's Embrace. Diving attack with bound CC."
        flows_into: ["torrential_wave", "whirlpool"]
        notes: "Always chain after Ocean's Embrace for extra CC and damage."

    whirlpool:
        name: "Whirlpool"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["pull", "bound"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor AOE whirlpool. Pulls enemies in then binds. Core adds extended pull."
        flows_into: ["torrential_wave", "seafarers_fury"]
        core_effect: "Core: Whirlpool - Extended pull duration and increased AOE radius"
        notes: "Excellent AOE for PVE. Pulls and groups mobs. Strong in large-scale PVP."

    siren_song:
        name: "Siren Song"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor sonic blast in mermaid form. Floats enemies hit."
        flows_into: ["torrential_wave", "seafarers_fury", "whirlpool"]
        notes: "Good AOE CC. Use to float enemies then follow up with damage."

    tidal_guard:
        name: "Tidal Guard"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 5000
        description: "Forward Guard water shield. Blocks frontal attacks and retaliates with stiffness."
        flows_into: ["torrential_wave", "coral_spike"]
        notes: "Corsair's block skill. Use to absorb pressure then counter-attack."

    coral_spike:
        name: "Coral Spike"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard coral projectile attack. Stiffness on hit."
        flows_into: ["flow_coral_burst", "torrential_wave", "seafarers_fury"]
        notes: "Ranged poke with frontal protection. Good for fishing for CC in PVP."

    flow_coral_burst:
        name: "Flow: Coral Burst"
        input: "RMB (after Coral Spike)"
        keys: ["rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Coral Spike. Additional coral projectiles with Forward Guard."
        flows_into: ["torrential_wave", "seafarers_fury"]
        notes: "Always chain after Coral Spike for extra damage and continued protection."

    abyssal_cannon:
        name: "Abyssal Cannon"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward rushing water cannon blast. Super Armor with knockdown."
        flows_into: ["torrential_wave", "seafarers_fury", "whirlpool"]
        notes: "Good mid-range engage with protection. Can catch opponents off guard."

    wave_surge:
        name: "Wave Surge"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick forward water slash with Forward Guard. Fast stiffness poke."
        flows_into: ["torrential_wave", "whirlpool"]
        notes: "Fast engagement tool. Good for fishing for CC with frontal protection."

    neptunes_wrath:
        name: "Neptune's Wrath"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Ground slam water eruption. Unprotected but has bound CC."
        flows_into: ["torrential_wave", "seafarers_fury"]
        notes: "Useful CC but unprotected. Be careful in PVP. Better suited for PVE."

    rising_tide:
        name: "Rising Tide"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor water column eruption from hotbar. Floats nearby enemies."
        flows_into: ["torrential_wave", "seafarers_fury"]
        notes: "Hotbar skill. Good protected AOE with float CC."

    mermaids_blessing:
        name: "Mermaid's Blessing"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Self-buff that restores HP and grants movement speed. Super Armor during cast."
        flows_into: []
        notes: "Hotbar only. Use for sustain during long grinds or between PVP fights."

