        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "SA forward roll toward party"
            - skill: "evasion"
              input: "A / D (double tap)"
              keys: ["a"]
              note: "Iframe reposition"
            - skill: "misty_haze"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Heal while repositioning (SA)"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Continue rolling to position"
            - skill: "sun_moon_stars"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Rebuff once in position"

