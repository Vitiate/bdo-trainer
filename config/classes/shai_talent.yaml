# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Misty Haze"
    effect: "Increased healing amount and Super Armor duration extended"
    reason: >
        Misty Haze with Core significantly boosts your party healing output,
        which is Shai's primary role. The extended Super Armor duration also
        keeps you safer while channeling heals in dangerous content. Sun,
        Moon, Stars Core is a strong second choice if your party has
        sufficient healing from other sources and needs more AP. Most Shai
        players prioritize Misty Haze Core first for its reliability.
