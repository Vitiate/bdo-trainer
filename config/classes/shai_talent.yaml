        name: "Fast Travel / Mobility Chain"
        description: "Chain movement skills for traversal between packs or repositioning."
        difficulty: beginner
        combo_window_ms: 350
        steps:
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "SA forward roll"
            - skill: "evasion"
              input: "A / D (double tap)"
              keys: ["a"]
              note: "Iframe sidestep for direction change"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "SA roll again"
            - skill: "ricocheting_florang"
              input: "Shift + X"
              keys: ["shift", "x"]
