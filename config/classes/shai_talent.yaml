# ============================================================================
# BDO Trainer - Talent Shai Combo Configuration
# ============================================================================
# Class: Shai (Talent)
# Weapons: Florang (Main) / Vitclari (Off) / Sol (Talent Instrument)
# Damage Type: Melee / Support
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# NOTE: Shai is a UNIQUE support class. Her "Awakening" is called "Talent"
# and revolves around playing musical instruments (Sol) to buff and heal
# allies. She has NO grab, severely limited PVP damage, and cannot
# effectively solo PVP. She excels in group PVE, party support, node wars,
# and life skills (gathering/alchemy bonuses).
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Shai Class Discord
#   - Community guides by Desperada, Archetype, YellowMouse
# ============================================================================

class: Shai
spec: Talent

# --------------------------------------------------------------------------
# Talent Skills (Awakening-equivalent — Support / Music Kit)
# --------------------------------------------------------------------------
awakening_skills:
    misty_haze:
        name: "Misty Haze"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 10000
        description: "Party heal over time. Plays a soothing melody that regenerates HP for all nearby allies."
        flows_into: ["sun_moon_stars", "do_re_mi"]
        core_effect: "Core: Misty Haze - Increased healing amount and Super Armor duration extended"
        notes: "Primary party heal. Keep this on cooldown in group content. SA throughout."

    sun_moon_stars:
        name: "Sun, Moon, Stars"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 15000
        description: "Party AP buff. Plays an inspiring melody that increases AP for all nearby allies."
        flows_into: ["misty_haze", "do_re_mi"]
        core_effect: "Core: Sun, Moon, Stars - Enhanced AP buff amount and duration"
        notes: "Core party buff. Massive AP boost for group. Use before pulls in PVE."

    do_re_mi:
        name: "Do Re Mi"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 15000
        description: "Party DP buff. Plays a protective melody that increases DP for all nearby allies."
        flows_into: ["sun_moon_stars", "misty_haze"]
        notes: "Essential defensive buff. Stack with Sun, Moon, Stars for full party support."

    shout_to_the_sky:
        name: "Shout to the Sky"
        input: "Q"
        keys: ["q"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Party special buff. Powerful shout that grants attack speed and movement speed to allies."
        flows_into: ["misty_haze", "sun_moon_stars"]
        notes: "Strong speed buff. Use at start of engagement or before big pulls."

    twirl_three:
        name: "Twirl-Three"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 12000
        description: "Party MP/WP/SP recovery. Plays a melody that restores resource points for nearby allies."
        flows_into: ["misty_haze", "do_re_mi"]
        notes: "MP sustain for party. Very helpful for mana-hungry classes in group grinding."

    come_out_come_out:
        name: "Come Out, Come Out"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 8000
        description: "Talent-mode attack that summons musical notes. One of Shai's few damaging Talent skills."
        flows_into: ["misty_haze", "summer_rain"]
        notes: "One of the rare Talent skills that deals damage. Stiffness CC helps in emergencies."

    summer_rain:
        name: "Summer Rain"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 14000
        description: "Large AOE party heal. Calls down a gentle rain that heals all allies in a wide area."
        flows_into: ["misty_haze", "sun_moon_stars"]
        notes: "Wide-area heal. Better range than Misty Haze. Use for spread-out parties."

    time_to_shine:
        name: "Time to Shine"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 18000
        description: "Party critical hit rate buff. Empowering melody that boosts critical chance for allies."
        flows_into: ["sun_moon_stars", "shout_to_the_sky"]
        notes: "Stack with Sun, Moon, Stars and Shout to the Sky for maximum party DPS."

    one_two_three_talent:
        name: "One-Two-Three (Talent)"
        input: "LMB (Talent stance)"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic Talent auto-attack with Sol instrument. Very low damage, mainly for animation cancels."
        flows_into: ["misty_haze", "come_out_come_out"]
        notes: "Filler between buff cooldowns. Not a meaningful damage source."

    over_here:
        name: "Over Here!"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 25000
        description: "Party pull/gather skill. Beckons allies toward Shai, useful for repositioning."
        flows_into: ["misty_haze", "do_re_mi"]
        notes: "Situational utility. Can help regroup scattered allies in large-scale."

    suns_warmth:
        name: "Sun's Warmth"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Powerful burst heal on hotbar. Instantly restores large amount of HP to nearby party."
        flows_into: []
        notes: "Emergency heal. Save for critical moments when party HP is dangerously low."

    moonlight_sonata:
        name: "Moonlight Sonata"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Party evasion buff from hotbar. Increases evasion rate for all nearby allies."
        flows_into: []
        notes: "Defensive buff for PVP situations. Hotbar only — track cooldown carefully."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    ricocheting_florang:
        name: "Ricocheting Florang"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Enhanced boomerang throw that ricochets between enemies. SA with knockback."
        notes: "Shai's best Rabam for PVE damage. Bounces between mobs for decent AOE."

    sparkling_melody:
        name: "Sparkling Melody"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 12000
        description: "Party cleanse and heal. Removes debuffs from nearby allies and restores HP."
        notes: "Preferred L57 Rabam. Debuff cleanse is invaluable in PVP group content."

    artinas_promise:
        name: "Artina's Promise"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Party resurrection support. Reduces resurrection time or grants revival buff."
        notes: "Situational. Useful in node wars and siege. Hotbar only."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Talent play)
# --------------------------------------------------------------------------
preawakening_utility:
    eat_this:
        name: "Eat This!"
        input: "S + LMB (Pre-Awk)"
        keys: ["s", "lmb"]
        protection: "FG"
        cc: ["knockback"]
        description: "Boomerang throw with Forward Guard. Shai's best ranged poke and damage skill."
        notes: "Main damage skill in pre-awakening. FG makes it relatively safe."

    come_out_donkey:
        name: "Come Out, Come Out (Donkey)"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Summons Shai's donkey companion. Used for travel and some skill interactions."
        notes: "Life skill utility. Donkey has its own abilities."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Shai's primary defensive iframe."
        notes: "Critical survival tool. Shai relies heavily on iframes and SA for defense."

    twirl_boom:
        name: "Twirl Boom"
        input: "Shift + F (Pre-Awk)"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Spinning Florang attack with Super Armor and knockdown."
        notes: "Pre-awakening filler. Good AOE for PVE when Talent skills are on cooldown."

    get_well:
        name: "Get Well"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Self and nearby ally heal. Pre-awakening healing skill."
        notes: "Backup heal when Talent heals are on cooldown. Hotbar recommended."

    tuck_and_roll:
        name: "Tuck and Roll"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        description: "Forward roll with Super Armor. Primary movement and gap closer."
        notes: "Spam for movement. SA protects during the roll animation."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    support_grind_rotation:
        name: "Party Support Grind Rotation"
        description: "Standard party grinding rotation. Buff allies, heal, then contribute limited damage."
        difficulty: beginner
        combo_window_ms: 400
        steps:
            - skill: "sun_moon_stars"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AP buff for party before pull"
            - skill: "do_re_mi"
              input: "W + F"
              keys: ["w", "f"]
              note: "DP buff to keep party alive"
            - skill: "shout_to_the_sky"
              input: "Q"
              keys: ["q"]
              note: "Speed buff for faster clearing"
            - skill: "misty_haze"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Heal over time on party"
            - skill: "come_out_come_out"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Contribute some damage"
            - skill: "summer_rain"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Wide AOE heal to top off"

    solo_grind_rotation:
        name: "Solo Grind Rotation"
        description: "Solo PVE rotation for Shai. Use pre-awakening damage skills since Talent is support-only."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Roll into mob pack"
            - skill: "twirl_boom"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE knockdown on pack"
            - skill: "eat_this"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Boomerang for main damage"
            - skill: "ricocheting_florang"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam bouncing damage"
            - skill: "come_out_come_out"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Talent damage filler"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Roll to next pack"

    buff_cycle:
        name: "Full Buff Cycle"
        description: "Apply all party buffs in optimal order. Use at start of grind session or before boss."
        difficulty: beginner
        combo_window_ms: 500
        steps:
            - skill: "sun_moon_stars"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AP buff first — biggest DPS increase"
            - skill: "do_re_mi"
              input: "W + F"
              keys: ["w", "f"]
              note: "DP buff for survivability"
            - skill: "shout_to_the_sky"
              input: "Q"
              keys: ["q"]
              note: "Speed buffs for party"
            - skill: "time_to_shine"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "Crit rate buff for extra DPS"
            - skill: "twirl_three"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "MP recovery so party can sustain"

    endgame_party_grind:
        name: "Endgame Party Grind"
        description: "High-end grind spot rotation. Maximize buff uptime and healing while contributing damage between cooldowns."
        difficulty: advanced
        combo_window_ms: 300
        steps:
            - skill: "sun_moon_stars"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AP buff — always first priority"
            - skill: "do_re_mi"
              input: "W + F"
              keys: ["w", "f"]
              note: "DP buff for party"
            - skill: "shout_to_the_sky"
              input: "Q"
              keys: ["q"]
              note: "Speed buffs"
            - skill: "misty_haze"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Heal over time"
            - skill: "time_to_shine"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "Crit buff"
            - skill: "twirl_three"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "MP recovery for party"
            - skill: "come_out_come_out"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Damage filler while buffs tick"
            - skill: "summer_rain"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Wide heal if party spreads"
            - skill: "ricocheting_florang"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam damage filler"
            - skill: "eat_this"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Pre-awk damage while waiting on Talent CDs"

# --------------------------------------------------------------------------
# PVP Combos (Support-Focused — Shai cannot effectively solo PVP)
# --------------------------------------------------------------------------
pvp_combos:
    group_heal_rotation:
        name: "Group Heal Rotation"
        description: >
            Emergency healing rotation for node wars and siege.
            Spam heals to keep frontline alive during engagements.
        difficulty: beginner
        combo_window_ms: 350
        steps:
            - skill: "misty_haze"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA heal over time — start here"
            - skill: "summer_rain"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Wide AOE heal for spread party"
            - skill: "suns_warmth"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Burst heal if party is critical"
            - skill: "get_well"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Backup heal while main heals on CD"
            - skill: "sparkling_melody"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "Cleanse debuffs from allies"

    full_buff_engage:
        name: "Full Buff Engage (Node War)"
        description: >
            Pre-engagement buff stacking for node war pushes.
            Apply all buffs before your guild charges in.
        difficulty: intermediate
        combo_window_ms: 400
        steps:
            - skill: "sun_moon_stars"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AP buff — biggest impact"
            - skill: "do_re_mi"
              input: "W + F"
              keys: ["w", "f"]
              note: "DP buff for survivability"
            - skill: "shout_to_the_sky"
              input: "Q"
              keys: ["q"]
              note: "Speed buffs for engage"
            - skill: "time_to_shine"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "Crit buff for burst"
            - skill: "moonlight_sonata"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Evasion buff for defense"
            - skill: "misty_haze"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Pre-emptive heal as they engage"

    survival_kite:
        name: "Survival Kite (Under Attack)"
        description: >
            Escape and survive when targeted in PVP. Shai has no grab
            and limited damage — your only goal is to not die and keep healing.
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "evasion"
              input: "A / D (double tap)"
              keys: ["a"]
              note: "Iframe out of danger"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "SA roll away from attacker"
            - skill: "misty_haze"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA heal yourself while retreating"
            - skill: "sparkling_melody"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "Cleanse any debuffs on yourself"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Keep rolling to safety"

    siege_support:
        name: "Siege Full Support"
        description: >
            Large-scale siege warfare support rotation. Stay behind frontline,
            cycle buffs and heals continuously. You are the backbone of your team.
        difficulty: advanced
        combo_window_ms: 400
        steps:
            - skill: "sun_moon_stars"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AP buff for push"
            - skill: "do_re_mi"
              input: "W + F"
              keys: ["w", "f"]
              note: "DP buff for frontline"
            - skill: "shout_to_the_sky"
              input: "Q"
              keys: ["q"]
              note: "Speed buff for mobility"
            - skill: "misty_haze"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Sustain heal on group"
            - skill: "summer_rain"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Wide heal for spread formation"
            - skill: "twirl_three"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "MP recovery — party needs resources"
            - skill: "sparkling_melody"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "Cleanse debuffs from frontline"
            - skill: "suns_warmth"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Emergency burst heal if frontline drops"

