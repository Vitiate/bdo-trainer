# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_florang_grind:
        name: "Basic Florang Grind"
        description: "Standard Succession grinding rotation. Simple Florang combos for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Roll into mob pack"
            - skill: "twirl_boom_enhanced"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE knockdown on pack"
            - skill: "eat_this_enhanced"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Main burst damage"
            - skill: "one_two_three_enhanced"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG filler damage"
            - skill: "go_away"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA knockback cleanup"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Roll to next pack"

    pull_and_clear:
        name: "Pull and Clear"
        description: "Group mobs together then burst them down. Efficient for dense spawn areas."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "over_here_succession"
              input: "E"
              keys: ["e"]
              note: "Pull mobs together"
            - skill: "twirl_boom_enhanced"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE on grouped mobs"
            - skill: "eat_this_enhanced"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Main damage on group"
            - skill: "give_it_back"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound for more CC"
            - skill: "ricocheting_florang"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam bouncing damage on group"
            - skill: "go_away"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Clean up survivors"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility between packs."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Roll into pack"
            - skill: "eat_this_enhanced"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "One-shot burst on weak mobs"
            - skill: "twirl_boom_enhanced"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE cleanup if needed"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Immediately roll to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Use all cooldowns and maximize DPS uptime."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "looking_good"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA engage into pack"
            - skill: "over_here_succession"
              input: "E"
              keys: ["e"]
              note: "Pull stragglers in"
            - skill: "twirl_boom_enhanced"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE main clear"
            - skill: "eat_this_enhanced"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Primary burst damage"
            - skill: "give_it_back"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound for CC chain"
            - skill: "one_two_three_enhanced"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG filler"
            - skill: "go_away"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA knockback"
            - skill: "ricocheting_florang"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler damage"
            - skill: "hop_skip_jump"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Hotbar burst on remaining"
            - skill: "all_around"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "360 AOE cleanup"
            - skill: "get_well_enhanced"
              input: "Q"
              keys: ["q"]
              note: "Self-heal between packs"

# --------------------------------------------------------------------------
# PVP Combos (Limited — Shai cannot effectively solo PVP)
# --------------------------------------------------------------------------
pvp_combos:
    defensive_poke:
        name: "Defensive Poke"
        description: >
            Safe ranged poke using Forward Guard skills. Do not overcommit.
            Shai Succession has slightly more damage than Talent but still
            cannot duel effectively. Focus on poking and retreating.
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "florang_toss"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "FG ranged poke from safety"
            - skill: "eat_this_enhanced"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "FG boomerang for damage"
            - skill: "evasion"
              input: "A / D (double tap)"
              keys: ["a"]
              note: "Iframe out after poking"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "SA roll to create distance"

    cc_and_run:
        name: "CC and Run"
        description: >
            Land a CC to peel for yourself or an ally, then disengage.
            Shai cannot follow up with kill damage but the CC buys time
            for your team.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "give_it_back"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound — CC the attacker"
            - skill: "go_away"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA knockback to push them away"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "SA roll away immediately"
            - skill: "get_well_enhanced"
              input: "Q"
              keys: ["q"]
              note: "SA self-heal while retreating"
            - skill: "evasion"
              input: "A / D (double tap)"
              keys: ["a"]
              note: "Iframe to dodge any chase"

    survival_kite:
        name: "Survival Kite (Under Attack)"
        description: >
            Escape when being focused. Use every iframe and SA skill
            to survive. Your goal is to not die and regroup with allies.
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "evasion"
              input: "A / D (double tap)"
              keys: ["a"]
              note: "Iframe out of danger"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "SA roll away"
            - skill: "go_away"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA knockback if they follow"
            - skill: "healing_bloom"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA heal + damage reduction"
            - skill: "tuck_and_roll"
              input: "Space"
              keys: ["space"]
              note: "Keep rolling to safety"

    group_peel_support:
        name: "Group Peel Support"
        description: >
            Support allies in group PVP by peeling attackers off them.
            Use CC and knockbacks to disrupt enemies targeting your team.
            Succession Shai still serves a support role even without Talent buffs.
        difficulty: advanced
        combo_window_ms: 300
        steps:
            - skill: "over_here_succession"
              input: "E"
              keys: ["e"]
              note: "SA pull to disrupt enemy positioning"
            - skill: "twirl_boom_enhanced"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA knockdown on grouped enemies"
            - skill: "give_it_back"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound on CC'd targets"
            - skill: "go_away"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA knockback to scatter them"
            - skill: "get_well_enhanced"
              input: "Q"
              keys: ["q"]
              note: "SA heal yourself and nearby allies"
            - skill: "healing_bloom"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA group heal + damage reduction"

