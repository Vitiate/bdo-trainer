# ============================================================================
# BDO Trainer - Succession Shai Combo Configuration
# ============================================================================
# Class: Shai (Succession)
# Weapons: Florang (Main) / Vitclari (Off)
# Damage Type: Melee / Support
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# NOTE: Shai Succession enhances her Florang (boomerang) pre-awakening kit
# rather than using the Talent music instrument. She gains improved damage
# on her main-hand skills but loses access to the powerful party buffs and
# heals of Talent. She still has NO grab, limited PVP effectiveness, and
# remains a support-leaning class even in Succession. Her solo grinding
# improves but she sacrifices her unique party utility.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Shai Class Discord
#   - Community guides by Desperada, Archetype, YellowMouse
# ============================================================================

class: Shai
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Florang Skills)
# --------------------------------------------------------------------------
awakening_skills:
    eat_this_enhanced:
        name: "Eat This! (Enhanced)"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "FG"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 6000
        description: "Enhanced boomerang throw with Forward Guard. Succession's primary damage skill with increased hits and range."
        flows_into: ["twirl_boom_enhanced", "go_away"]
        core_effect: "Core: Eat This! - Extra hit on return, increased damage and Forward Guard duration"
        notes: "Bread-and-butter damage skill. FG protects during throw and return. Always use off cooldown."

    twirl_boom_enhanced:
        name: "Twirl Boom (Enhanced)"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Enhanced spinning Florang attack with Super Armor. Succession adds extra spins and knockdown."
        flows_into: ["eat_this_enhanced", "one_two_three_enhanced"]
        core_effect: "Core: Twirl Boom - Additional spin attacks and increased AOE radius"
        notes: "Main AOE clear skill. SA throughout makes it safe. Strong knockdown for PVE grouping."

    go_away:
        name: "Go Away!"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Powerful forward shove with Super Armor. Pushes enemies away with enhanced force."
        flows_into: ["eat_this_enhanced", "twirl_boom_enhanced"]
        notes: "Defensive damage skill. Use when surrounded to create space and deal damage."

    one_two_three_enhanced:
        name: "One-Two-Three (Enhanced)"
        input: "W + F"
        keys: ["w", "f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Enhanced three-hit Florang combo with Forward Guard. Quick stiffness CC on last hit."
        flows_into: ["eat_this_enhanced", "twirl_boom_enhanced"]
        notes: "Fast filler combo. FG on approach makes it a safer engage tool."

    florang_toss:
        name: "Florang Toss"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Ranged Florang throw with Forward Guard. Enhanced range and damage in Succession."
        flows_into: ["eat_this_enhanced", "go_away"]
        notes: "Ranged poke skill. Use to pull mobs or initiate safely from distance."

    get_well_enhanced:
        name: "Get Well (Enhanced)"
        input: "Q"
        keys: ["q"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 15000
        description: "Enhanced self and party heal. Succession improves healing amount and adds Super Armor."
        flows_into: ["eat_this_enhanced", "twirl_boom_enhanced"]
        notes: "Succession retains some healing. Weaker than Talent heals but still useful for self-sustain."

    looking_good:
        name: "Looking Good!"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward rushing strike with Super Armor. Gap closer with stiffness on hit."
        flows_into: ["twirl_boom_enhanced", "one_two_three_enhanced"]
        notes: "Engage tool. SA movement + damage makes it good for approaching packs."

    give_it_back:
        name: "Give It Back!"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 9000
        description: "Overhead Florang slam with Forward Guard. Bound CC on hit."
        flows_into: ["eat_this_enhanced", "go_away"]
        notes: "Strong CC for PVE. Bound groups mobs for follow-up AOE skills."

    quick_trick:
        name: "Quick Trick"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 4000
        description: "Quick low sweep with Florang. Fast animation but unprotected."
        flows_into: ["eat_this_enhanced", "twirl_boom_enhanced"]
        notes: "Fast filler. Unprotected so use carefully. Good for animation cancels."

    over_here_succession:
        name: "Over Here!"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: ["pull"]
        damage: low
        cooldown_ms: 12000
        description: "Pull enemies toward Shai with Super Armor. Groups mobs for AOE follow-up."
        flows_into: ["twirl_boom_enhanced", "eat_this_enhanced"]
        notes: "Mob grouping tool. Pull then Twirl Boom for efficient pack clearing."

    hop_skip_jump:
        name: "Hop, Skip, Jump"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Jumping Florang attack from hotbar. Super Armor with ground-pound knockdown."
        flows_into: ["eat_this_enhanced", "twirl_boom_enhanced"]
        notes: "Hotbar burst. Good for initiating on packs from range."

    all_around:
        name: "All Around"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "360-degree Florang spin from hotbar. Hits all surrounding enemies."
        flows_into: ["eat_this_enhanced"]
        notes: "Hotbar AOE. Use when surrounded for safe damage in all directions."

