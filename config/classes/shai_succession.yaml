# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Eat This! (Enhanced)"
    effect: "Extra hit on return, increased damage and Forward Guard duration"
    reason: >
        Eat This! with Core is the strongest choice for Succession Shai
        because it is your primary and most frequently used damage skill.
        The extra hit on boomerang return significantly boosts clear speed,
        and the extended Forward Guard duration keeps you safer during the
        animation. Twirl Boom Core is a viable alternative if you prefer
        AOE clearing, but most Succession Shai players prioritize Eat This!
        Core first for consistent single-target and pack damage.
