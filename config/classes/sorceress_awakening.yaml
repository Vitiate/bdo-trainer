# ============================================================================
# BDO Trainer - Awakened Sorceress Combo Configuration
# ============================================================================
# Class: Sorceress (Awakening)
# Weapons: Amulet (Main) / Talisman (Off) / Scythe (Awakening)
# Damage Type: Melee / Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sorceress Identity:
#   - Best iframe class in BDO with highest skill ceiling
#   - Constantly weaves between pre-awakening and awakening stance
#   - Night Crow (iframe) is the core identity skill for repositioning
#   - Relies on iframe rotations rather than Super Armor trading
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Sorceress Class Discord
#   - Community guides by Akiree, JinYiHan, Vert, Shirna
# ============================================================================

class: Sorceress
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    grim_reapers_judgment:
        name: "Grim Reaper's Judgment"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 9000
        description: "Massive scythe slam nuke. Super Armor throughout. Primary burst skill."
        flows_into: ["violation", "dead_hunt", "night_crow"]
        core_effect: "Core: Grim Reaper's Judgment - Extra hit and increased damage"
        notes: "Main damage skill. Always use off cooldown. Can be charged for extra damage."

    violation:
        name: "Violation"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 4000
        description: "Super Armor forward dash with scythe. Primary gap closer in awakening."
        flows_into: ["flow_rushing_crow", "grim_reapers_judgment", "dead_hunt"]
        notes: "Core movement skill in awakening. Chains into Flow: Rushing Crow."

    flow_rushing_crow:
        name: "Flow: Rushing Crow"
        input: "F (after Violation)"
        keys: ["f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up dash after Violation. Super Armor with stiffness on hit."
        flows_into: ["grim_reapers_judgment", "dead_hunt", "night_crow"]
        notes: "Always chain after Violation for extra distance and damage."

    dead_hunt:
        name: "Dead Hunt"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Super Armor scythe combo. Multi-hit with knockdown. High damage."
        flows_into: ["flow_cry_of_darkness", "violation", "night_crow"]
        notes: "Second highest damage skill. Use between GRJ cooldowns."

    flow_cry_of_darkness:
        name: "Flow: Cry of Darkness"
        input: "LMB (after Dead Hunt)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Dead Hunt. Additional scythe swings with Super Armor."
        flows_into: ["violation", "grim_reapers_judgment", "night_crow"]
        notes: "Always follow Dead Hunt with this for extra damage."

    cartians_nightmare:
        name: "Cartian's Nightmare"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "AOE ground slam with Super Armor. Bound CC on hit. Good PVE clear."
        flows_into: ["dead_hunt", "grim_reapers_judgment", "night_crow"]
        core_effect: "Core: Cartian's Nightmare - Bound on hit and increased damage"
        notes: "Strong AOE for PVE. Bound CC useful for PVP combos."

    cartians_protection:
        name: "Cartian's Protection"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff that grants Forward Guard and Super Armor. Increases AP."
        flows_into: ["violation", "grim_reapers_judgment", "dead_hunt"]
        core_effect: "Core: Cartian's Protection - Extended buff duration"
        notes: "Use before engaging. Provides 10 sec SA/FG buff. Essential for PVP."

    turn_back_slash:
        name: "Turn-back Slash"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard backstep slash. Good defensive poke tool."
        flows_into: ["grim_reapers_judgment", "dead_hunt", "night_crow"]
        notes: "Safe FG poke. Use to fish for stiffness in PVP."

    blade_of_darkness:
        name: "Blade of Darkness"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 10000
        description: "Super Armor scythe sweep with float CC. Large AOE."
        flows_into: ["grim_reapers_judgment", "dead_hunt", "violation"]
        notes: "Good AOE damage and float CC. Strong in large scale PVP."

    shadow_leap:
        name: "Shadow Leap"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 4000
        description: "Iframe leap. Primary iframe in awakening stance."
        flows_into: ["violation", "grim_reapers_judgment", "dead_hunt"]
        notes: "Key defensive tool. Use to iframe incoming attacks then punish."

    night_crow:
        name: "Night Crow"
        input: "Shift + Direction"
        keys: ["shift", "w"]
        keys_alt_left: ["shift", "a"]
        keys_alt_right: ["shift", "d"]
        keys_alt_back: ["shift", "s"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 3000
        description: "Directional iframe dash. Core Sorceress identity skill. Can chain multiple times with shard management."
        flows_into: ["violation", "grim_reapers_judgment", "dead_hunt", "shadow_leap"]
        notes: "THE identity skill of Sorceress. Spammable iframe with shards. Master this to master Sorc."

    midnight_stinger:
        name: "Midnight Stinger"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 4000
        description: "Quick Forward Guard poke with stiffness. Fast animation."
        flows_into: ["grim_reapers_judgment", "dead_hunt", "violation"]
        notes: "Quick FG poke for fishing stiffness in PVP. Switches to awakening."

    engulfing_shadow:
        name: "Engulfing Shadow"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor pull-in attack. Gathers enemies and stiffens."
        flows_into: ["grim_reapers_judgment", "dead_hunt", "cartians_nightmare"]
        notes: "Good for gathering mobs in PVE. Stiffness useful in PVP."

    soul_reaper:
        name: "Soul Reaper"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 12000
        description: "Scythe sweep from hotbar. Super Armor with knockback."
        flows_into: ["grim_reapers_judgment", "dead_hunt"]
        notes: "Hotbar skill. Good extra burst on cooldown."

    flow_dark_wave:
        name: "Flow: Dark Wave"
        input: "LMB (after Turn-back Slash)"
        keys: ["lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Turn-back Slash. Forward Guard with stiffness."
        flows_into: ["grim_reapers_judgment", "violation"]
        notes: "Chain after Turn-back Slash for extra FG damage."

    grim_reaper_landing:
        name: "Grim Reaper Landing"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 8000
        description: "Scythe ground slam with bound CC. Super Armor."
        flows_into: ["dead_hunt", "grim_reapers_judgment"]
        notes: "Additional SA skill with bound CC. Good filler."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    shadow_ignition:
        name: "Shadow Ignition"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Dark explosion with Super Armor. Stiffness CC and good burst. Preferred L56 Rabam."
        notes: "Preferred for PVP. Good protected burst with CC."

    abyssal_bite:
        name: "Abyssal Bite"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor lunging bite attack. Knockdown on hit. Good engage tool."
        notes: "Preferred L57 Rabam. Extra knockdown and SA engage option."

    dark_torrent:
        name: "Dark Torrent"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 14000
        description: "Hotbar dark energy burst. Super Armor with bound CC."
        notes: "Decent hotbar filler. Use when other skills are on cooldown."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    dark_flame:
        name: "Dark Flame"
        input: "S + LMB (pre-awk stance)"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        description: "Pre-awakening SA burst. Switch to pre-awk, use, then swap back. Core Sorc weaving skill."
        notes: "Essential weaving skill. Use between awakening cooldowns for extra SA damage."

    shadow_eruption:
        name: "Shadow Eruption"
        input: "S + F (pre-awk stance)"
        keys: ["s", "f"]
        protection: "none"
        cc: ["float"]
        description: "Pre-awakening float skill. Strong CC for starting PVP combos."
        notes: "Key catch tool. Float into full awakening burst combo."

    dream_of_doom:
        name: "Dream of Doom"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stun"]
        description: "100% crit rate debuff on target. Super Armor. Stun on good hit. Essential PVP debuff."
        notes: "Always use before burst. 100% crit debuff is massive. Put on hotbar."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Short distance dodge."
        notes: "Extra iframe option. Sorc has many iframes — use them all."

    storming_crow:
        name: "Storming Crow"
        input: "W + F (pre-awk stance)"
        keys: ["w", "f"]
        protection: "SA"
        cc: []
        description: "Pre-awakening SA forward dash. Good for swapping stance with protection."
        notes: "Use to transition back to pre-awk safely."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash into pack"
            - skill: "flow_rushing_crow"
              input: "F"
              keys: ["f"]
              note: "Follow-up dash into mobs"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main nuke on pack"
            - skill: "dead_hunt"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Second burst skill"
            - skill: "flow_cry_of_darkness"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up damage"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Gather then nuke."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "cartians_protection"
              input: "Q"
              keys: ["q"]
              note: "Buff up before engaging"
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash into pack center"
            - skill: "flow_rushing_crow"
              input: "F"
              keys: ["f"]
              note: "Position in middle of pack"
            - skill: "blade_of_darkness"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE sweep to group mobs"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main nuke on grouped mobs"
            - skill: "cartians_nightmare"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "AOE ground slam"
            - skill: "dead_hunt"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Clean up remaining mobs"
            - skill: "flow_cry_of_darkness"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend damage on stragglers"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "Dash into pack"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "One-shot nuke"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe dash to next pack"
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "Continue to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns and weaving."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "cartians_protection"
              input: "Q"
              keys: ["q"]
              note: "Buff up"
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA engage"
            - skill: "flow_rushing_crow"
              input: "F"
              keys: ["f"]
              note: "Follow-up dash"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main nuke"
            - skill: "dead_hunt"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Second burst"
            - skill: "flow_cry_of_darkness"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up damage"
            - skill: "cartians_nightmare"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "AOE slam"
            - skill: "blade_of_darkness"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA sweep"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe reposition"
            - skill: "dark_flame"
              input: "S + LMB (swap)"
              keys: ["s", "lmb"]
              note: "Pre-awk weave for extra damage"
            - skill: "shadow_ignition"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam burst filler"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using iframe and Super Armor skills.
            Approach with iframes, then fish for CC with protected pokes.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "cartians_protection"
              input: "Q"
              keys: ["q"]
              note: "Buff for SA/FG before going in"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe approach"
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash to close distance"
            - skill: "midnight_stinger"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness poke"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main nuke if stiffness lands"
            - skill: "dead_hunt"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA follow-up burst"

    iframe_catch_combo:
        name: "Iframe Catch Combo (1v1)"
        description: >
            Classic Sorc 1v1 combo. Use iframes to bait enemy attacks,
            catch with stiffness or float, then chain into full burst.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe through enemy attack"
            - skill: "midnight_stinger"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness catch"
            - skill: "shadow_eruption"
              input: "S + F (swap)"
              keys: ["s", "f"]
              note: "Float the stiffened target"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main nuke on CC'd target"
            - skill: "dead_hunt"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Follow-up burst"
            - skill: "flow_cry_of_darkness"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher"

    dark_flame_weave:
        name: "Dark Flame Weave Combo"
        description: >
            Advanced weaving combo. Swap to pre-awk for Dark Flame SA damage,
            then swap back for awakening burst. Core Sorc playstyle.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe to close distance"
            - skill: "dark_flame"
              input: "S + LMB (swap)"
              keys: ["s", "lmb"]
              note: "Pre-awk SA burst"
            - skill: "shadow_eruption"
              input: "S + F"
              keys: ["s", "f"]
              note: "Float CC"
            - skill: "midnight_stinger"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "Swap back to awakening"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main awakening nuke"
            - skill: "dead_hunt"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Follow-up burst"

    dream_of_doom_engage:
        name: "Dream of Doom Engage"
        description: >
            Engage with Dream of Doom debuff for 100% crit on target,
            then chain into full burst for maximum damage.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "dream_of_doom"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "100% crit debuff — stun if it lands"
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA close distance"
            - skill: "flow_rushing_crow"
              input: "F"
              keys: ["f"]
              note: "Follow-up gap close"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main nuke with crit buff active"
            - skill: "dead_hunt"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Follow-up burst"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No weaving needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close"
            - skill: "flow_rushing_crow"
              input: "F"
              keys: ["f"]
              note: "SA follow-up"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main burst"
            - skill: "cartians_nightmare"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA AOE bound"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Sorc excels at disengaging
            with multiple iframes. Chain Night Crow for distance.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "night_crow"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe backwards"
            - skill: "shadow_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe leap away"
            - skill: "night_crow"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Chain another iframe if shards available"
            - skill: "turn_back_slash"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG backstep for spacing"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected AOE damage.
            Stay on the edges, use iframes to reposition, and nuke.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "cartians_protection"
              input: "Q"
              keys: ["q"]
              note: "Buff before engaging blob"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe into position"
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA engage into group"
            - skill: "blade_of_darkness"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float"
            - skill: "grim_reapers_judgment"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main nuke on clump"
            - skill: "dead_hunt"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA follow-up burst"
            - skill: "flow_cry_of_darkness"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend damage"
            - skill: "night_crow"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe out to safety"
            - skill: "shadow_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe reposition"

