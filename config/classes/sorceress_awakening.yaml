        name: "Iframe Movement Chain"
        description: >
            Advanced movement using iframe chaining. Sorceress can maintain
            near-permanent iframe uptime while moving by managing Dark Shards.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe dash — consumes shards"
            - skill: "shadow_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe leap"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe dash again"
            - skill: "violation"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash while shards regen"
            - skill: "flow_rushing_crow"
              input: "F"
              keys: ["f"]
              note: "SA follow-up dash"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Shards regenerated, iframe again"

