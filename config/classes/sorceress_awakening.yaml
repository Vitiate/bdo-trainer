# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Grim Reaper's Judgment"
    effect: "Extra hit and increased damage"
    reason: >
        Grim Reaper's Judgment with Core adds an extra hit and significantly
        increases the skill's damage output. This is the Sorceress's primary
        nuke and the first Core most players should prioritize. The extra
        damage makes a noticeable difference in both PVE clearing speed and
        PVP burst potential. After this, consider Cartian's Nightmare Core
        for PVE or Cartian's Protection Core for PVP survivability.
