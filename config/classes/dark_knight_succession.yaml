              note: "Follow-up burst"
            - skill: "unveiled_dagger"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AOE damage"
            - skill: "air_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Heavy slam"
            - skill: "seed_of_catastrophe"
