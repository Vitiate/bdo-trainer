pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and Forward Guard skills.
            Approach with protection, then look for a CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "corrupt_ground"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before going in"
            - skill: "lunacy_of_vedir"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close"
            - skill: "pervasive_darkness"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "spirit_legacy"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_spirit_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "unveiled_dagger"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to fish for a stiffness or bound,
            then chain into full burst damage while target is CC'd.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "pervasive_darkness"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness — catch the target"
            - skill: "kamasylvia_slash"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "FG stiffness on CC'd target"
            - skill: "air_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float follow-up"
            - skill: "spirit_legacy"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_spirit_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "unveiled_dagger"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    iframe_engage:
        name: "iFrame Engage"
        description: >
            Aggressive approach using Twilight Dash iframe to close safely.
            Transition into burst damage after dodging enemy skills.
        difficulty: advanced
        combo_window_ms: 200
        steps:
            - skill: "twilight_dash"
              input: "Space"
              keys: ["space"]
              note: "iFrame through enemy skills"
            - skill: "lunacy_of_vedir"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash to close remaining distance"
            - skill: "spirit_legacy"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst on arrival"
            - skill: "flow_spirit_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "air_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float"
            - skill: "unveiled_dagger"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No CC setup needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "wheel_of_fortune"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA AOE opener"
            - skill: "spirit_legacy"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "flow_spirit_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "air_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA heavy slam"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            No-grab class alternative. When an ally lands a grab or
            the target is CC'd, DK dumps maximum damage with SA skills
            while the enemy cannot retaliate.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "air_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float on CC'd target"
            - skill: "spirit_legacy"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_spirit_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "unveiled_dagger"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframe and SA movement
            to create distance. DK has strong mobility for disengaging.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "twilight_dash"
              input: "Space"
              keys: ["space"]
              note: "iFrame out of danger"
            - skill: "lunacy_of_vedir"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash to create distance"
            - skill: "shadow_strike_rabam"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA ranged damage while retreating"
            - skill: "twilight_dash"
              input: "Space"
              keys: ["space"]
              note: "Chain iframes if still pressured"

    large_scale_siege:
