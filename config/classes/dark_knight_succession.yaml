              note: "AP buff before engaging"
            - skill: "lunacy_of_vedir"
              input: "W + F"
              keys: ["w", "f"]
              note: "Gap close into pack"
            - skill: "wheel_of_fortune"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "AOE knockdown, group mobs"
            - skill: "spirit_legacy"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_spirit_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "unveiled_dagger"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AOE multi-hit"
            - skill: "air_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
