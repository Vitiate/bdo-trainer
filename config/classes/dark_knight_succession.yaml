              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "twilight_dash"
              input: "Space"
              keys: ["space"]
              note: "iFrame movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "corrupt_ground"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "lunacy_of_vedir"
              input: "W + F"
              keys: ["w", "f"]
              note: "Engage"
            - skill: "wheel_of_fortune"
