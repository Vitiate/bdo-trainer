        description: "Standard succession grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "lunacy_of_vedir"
              input: "W + F"
              keys: ["w", "f"]
              note: "Gap close to pack"
            - skill: "spirit_legacy"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage"
            - skill: "flow_spirit_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "unveiled_dagger"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AOE clear"
            - skill: "air_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Heavy slam"
            - skill: "lunacy_of_vedir"
              input: "W + F"
              keys: ["w", "f"]
              note: "Dash to next pack"

    large_pack_clear:
