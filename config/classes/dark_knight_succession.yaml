# ============================================================================
# BDO Trainer - Succession Dark Knight Combo Configuration
# ============================================================================
# Class: Dark Knight (Succession)
# Weapons: Kriegsmesser (Main) / Ornamental Knot (Off) — Enhanced Dark Magic Sword
# Damage Type: Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Dark Knight Class Discord
#   - Community guides by Harshsin, NotTheWorst, JStep
# ============================================================================

class: Dark Knight
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills
# --------------------------------------------------------------------------
awakening_skills:
    spirit_legacy:
        name: "Spirit Legacy"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Enhanced succession dark slash. Super Armor throughout with knockdown."
        flows_into: ["unveiled_dagger", "air_strike", "wheel_of_fortune"]
        core_effect: "Core: Spirit Legacy - Extra hits and increased damage"
        notes: "Bread-and-butter succession damage skill. Primary burst in all situations."

    unveiled_dagger:
        name: "Unveiled Dagger"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 8000
        description: "Enhanced multi-hit dagger combo with Super Armor. Strong AOE succession skill."
        flows_into: ["spirit_legacy", "air_strike", "kamasylvia_slash"]
        core_effect: "Core: Unveiled Dagger - Bound on last hit"
        notes: "High damage AOE. Core version adds Bound for combo extension in PVP."

    lunacy_of_vedir:
        name: "Lunacy of Vedir"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor forward dash. Primary succession gap closer and movement tool."
        flows_into: ["spirit_legacy", "unveiled_dagger", "wheel_of_fortune"]
        notes: "Primary movement skill. SA protection while closing distance quickly."

    kamasylvia_slash:
        name: "Kamasylvia Slash"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard quick slash. Enhanced succession version with stiffness CC."
        flows_into: ["spirit_legacy", "air_strike", "unveiled_dagger"]
        notes: "Good CC tool with frontal protection. Use to set up burst combos in PVP."

    air_strike:
        name: "Air Strike"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor aerial slam with float CC. Heavy burst damage."
        flows_into: ["spirit_legacy", "unveiled_dagger", "wheel_of_fortune"]
        core_effect: "Core: Air Strike - Float on all hits"
        notes: "Strong burst skill. Float CC enables air combos in PVP."

    twilight_dash:
        name: "Twilight Dash"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 4000
        description: "iFrame forward dash. Primary evasive movement skill in succession."
        flows_into: ["spirit_legacy", "lunacy_of_vedir", "kamasylvia_slash"]
        notes: "Primary iframe. Use to dodge CC and reposition. Chain with Lunacy of Vedir."

    shadow_bullet:
        name: "Shadow Bullet"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard ranged dark projectile. Good for poking from distance."
        flows_into: ["spirit_legacy", "unveiled_dagger", "air_strike"]
        notes: "Ranged FG poke. Use at mid-range in PVP. Good for fishing for stiffness."

    wheel_of_fortune:
        name: "Wheel of Fortune"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor spinning strike with knockdown. Wide AOE succession skill."
        flows_into: ["spirit_legacy", "unveiled_dagger", "air_strike"]
        core_effect: "Core: Wheel of Fortune - Knockdown on all hits"
        notes: "Good AOE opener and filler. Large area coverage for pack clearing."

    obsidian_ashes:
        name: "Obsidian Ashes"
        input: "Q"
        keys: ["q"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 5000
        description: "Quick dark magic burst with bound CC. Unprotected but fast."
        flows_into: ["spirit_legacy", "air_strike", "unveiled_dagger"]
        notes: "Quick CC tool. Use from range to catch targets. Risky at close range."

    seed_of_catastrophe:
        name: "Seed of Catastrophe"
        input: "S + F"
        keys: ["s", "f"]
        protection: "FG"
        cc: ["bound"]
        damage: high
        cooldown_ms: 9000
        description: "Enhanced Forward Guard AOE slam. Succession version with bound CC."
        flows_into: ["spirit_legacy", "wheel_of_fortune", "air_strike"]
        core_effect: "Core: Seed of Catastrophe - Super Armor during skill"
        notes: "Strong damage with FG. Core version upgrades to full SA — highly recommended."

    corrupt_ground:
        name: "Corrupt Ground"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "none"
        cc: []
        damage: none
        cooldown_ms: 24000
        description: "Self-buff. Increases AP, attack speed, and crit rate for succession."
        flows_into: ["lunacy_of_vedir", "spirit_legacy"]
        core_effect: "Core: Corrupt Ground - Super Armor during the skill"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    flow_spirit_slash:
        name: "Flow: Spirit Slash"
        input: "LMB (after Spirit Legacy)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Spirit Legacy. Additional burst with Super Armor."
        flows_into: ["unveiled_dagger", "air_strike", "wheel_of_fortune"]
        notes: "Always chain after Spirit Legacy for maximum damage output."

    pervasive_darkness:
        name: "Pervasive Darkness"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard rushing dark slash. Quick approach with stiffness CC."
        flows_into: ["spirit_legacy", "air_strike", "unveiled_dagger"]
        notes: "Good PVP engage tool. FG while approaching makes it relatively safe."

    hidden_strike:
        name: "Hidden Strike"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor shadow strike. Enhanced succession version with knockdown."
        flows_into: ["spirit_legacy", "air_strike"]
        notes: "Put on hotbar. Good protected engage or burst filler."

    dark_nebula:
        name: "Dark Nebula"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stun"]
        damage: low
        cooldown_ms: 8000
        description: "Forward Guard dark vortex with stun. PVP catch tool from hotbar."
        flows_into: ["spirit_legacy", "unveiled_dagger"]
        notes: "Hotbar skill. Stun allows follow-up burst on CC'd targets."

