            - skill: "spirit_legacy"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_spirit_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "unveiled_dagger"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst"
            - skill: "twilight_dash"
