              input: "Space"
              keys: ["space"]
              note: "Continue dashing if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected AOE damage and
            avoid overextending. Drakania excels in large scale with SA trading.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "untamed_surge"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "dragon_flight"
              input: "Space"
              keys: ["space"]
              note: "SA aerial engage into group"
            - skill: "trion_burst"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE knockdown on group"
            - skill: "hexeblood"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_hexeblood"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "markthanans_wings"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA aerial burst on group"
            - skill: "dragonfire"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA breath attack AOE"
            - skill: "draconic_descent"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA slam burst"
            - skill: "wing_tempest"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA AOE cleanup"
