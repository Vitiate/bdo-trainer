# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Markthanan's Wings"
    effect: "Extra damage on all hits and additional Air Attack damage"
    reason: >
        Markthanan's Wings with Core gains significantly increased damage and
        enhanced Air Attack multipliers, making Drakania's signature aerial dive
        even more devastating. This is the highest priority Core for Drakania
        Awakening. After getting comfortable, experiment with Dragonfire Core
        for better PVE clearing and Trion Burst Core for large scale PVP.
        Drakania has no grab, so maximizing burst damage on CC'd targets
        is critical — Markthanan's Wings Core achieves exactly that.
