# ============================================================================
# BDO Trainer - Awakened Drakania Combo Configuration
# ============================================================================
# Class: Drakania (Awakening)
# Weapons: Slayer (Main — Greatsword) / Shard (Off) / Trion (Awakening — Dragon Lance + Wings)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Class Notes:
#   - Drakania has NO grab — must rely on CC chains and protected trading
#   - Dragon / lance theme with aerial attacks and high burst damage
#   - Tanky class with strong Super Armor and Forward Guard coverage
#   - Awakening uses the Trion (dragon lance + draconic wings)
#   - Excels at trading damage in Super Armor and punishing with burst
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Drakania Class Discord
#   - Community guides by Aethon, Drakthar, HexeDrak
# ============================================================================

class: Drakania
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    hexeblood:
        name: "Hexeblood"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Powerful spear thrust with Super Armor. Main awakening damage skill."
        flows_into: ["flow_hexeblood", "dragonfire", "markthanans_wings"]
        notes: "Bread-and-butter damage skill. Always follow up with Flow: Hexeblood."

    flow_hexeblood:
        name: "Flow: Hexeblood"
        input: "LMB (after Hexeblood)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up lance strike after Hexeblood. Additional burst with Super Armor."
        flows_into: ["dragonfire", "draconic_charge", "markthanans_wings"]
        notes: "Always chain after Hexeblood for extra damage. Down attack properties."

    markthanans_wings:
        name: "Markthanan's Wings"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 9000
        description: "Flying dive attack using draconic wings. Highest burst damage skill. Super Armor throughout."
        flows_into: ["hexeblood", "trion_burst", "dragonfire"]
        core_effect: "Core: Markthanan's Wings - Extra damage on all hits and additional Air Attack damage"
        notes: "Signature Drakania burst skill. Aerial dive with massive damage. Core priority."

    draconic_charge:
        name: "Draconic Charge"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor lance charge forward. Good gap closer with knockback."
        flows_into: ["flow_scale_strike", "hexeblood", "markthanans_wings"]
        notes: "Primary engage tool. Covers good distance with SA protection."

    flow_scale_strike:
        name: "Flow: Scale Strike"
        input: "F (after Draconic Charge)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard strike after Draconic Charge. Quick stiffness CC."
        flows_into: ["hexeblood", "markthanans_wings", "trion_burst"]
        notes: "Always chain after Draconic Charge. FG transitions well into burst skills."

    dragonfire:
        name: "Dragonfire"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Draconic breath attack in a cone. Super Armor with stiffness on hit."
        flows_into: ["flow_dragonfire", "hexeblood", "markthanans_wings"]
        core_effect: "Core: Dragonfire - Increased AOE range and extra hit"
        notes: "Good AOE for PVE clearing. Stiffness useful for PVP catch setups."

    flow_dragonfire:
        name: "Flow: Dragonfire"
        input: "LMB (after Dragonfire)"
        keys: ["lmb"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 0
        description: "Extended breath attack after Dragonfire. Additional fire damage."
        flows_into: ["hexeblood", "draconic_charge"]
        notes: "Extends the Dragonfire hit window. Good filler in PVE rotations."

    trion_burst:
        name: "Trion Burst"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Massive AOE explosion centered on Drakania. Super Armor with knockdown."
        flows_into: ["hexeblood", "markthanans_wings", "draconic_charge"]
        core_effect: "Core: Trion Burst - Additional knockdown hit and increased AOE radius"
        notes: "Strong AOE burst. Use in PVE for packs and PVP for group fights."

    dragon_scale:
        name: "Dragon Scale"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Activates draconic guard shield. Forward Guard with DP buff and HP recovery."
        flows_into: ["hexeblood", "draconic_charge", "tail_whip"]
        notes: "Defensive buff. Use to recover HP and tank damage from the front."

    dragon_flight:
        name: "Dragon Flight"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Super Armor aerial dash using wings. Primary movement skill in awakening."
        flows_into: ["markthanans_wings", "hexeblood", "draconic_charge"]
        notes: "Main movement skill. SA throughout. PVE iframe (1s invincibility vs monsters)."

    tail_whip:
        name: "Tail Whip"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard sweeping tail attack with bound CC."
        flows_into: ["hexeblood", "markthanans_wings", "trion_burst"]
        notes: "Good defensive CC tool. FG keeps you protected while fishing for bound."

    wing_strike:
        name: "Wing Strike"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "none"
        cc: ["float"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward rushing wing slash with float CC. Unprotected."
        flows_into: ["hexeblood", "markthanans_wings"]
        notes: "Float is useful for extending CC chains but skill is unprotected. Use carefully."

    trion_sweep:
        name: "Trion Sweep"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Quick forward lance sweep with Forward Guard. Fast stiffness poke."
        flows_into: ["hexeblood", "draconic_charge", "markthanans_wings"]
        core_effect: "Core: Trion Sweep - Forward Guard maintained during the full animation"
        notes: "Fast FG poke. Good for testing opponent's defense in PVP."

    dragon_pierce:
        name: "Dragon Pierce"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Ranged lance thrust from hotbar. Super Armor with knockback."
        flows_into: ["hexeblood", "draconic_charge"]
        notes: "Hotbar skill. Good ranged poke with SA protection."

    wing_tempest:
        name: "Wing Tempest"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "AOE wing gust attack from hotbar. Super Armor with knockdown."
        flows_into: ["hexeblood", "markthanans_wings"]
        notes: "Hotbar skill. Strong AOE for group fights and PVE clearing."

    draconic_descent:
        name: "Draconic Descent"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 14000
        description: "Aerial slam from hotbar. Leaps into the air and crashes down with bound."
        flows_into: ["hexeblood", "trion_burst"]
        notes: "Hotbar skill. Powerful burst with bound. Good for punishing CC'd targets."

