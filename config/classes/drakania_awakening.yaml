        name: "Awakening Movement Guide"
        description: >
            Movement chain for Drakania awakening. Cycle between Dragon Flight,
            Draconic Barrier, and Flame Lance for maximum traversal speed.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "dragon_flight"
              input: "Space"
              keys: ["space"]
              note: "SA aerial dash — primary movement"
            - skill: "draconic_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA dash with DP buff"
            - skill: "flame_lance"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement + stiffness"
            - skill: "draconic_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward lance charge"
            - skill: "dragon_flight"
              input: "Space"
              keys: ["space"]
              note: "If off cooldown, loop back"
            - skill: "draconic_slash"
              input: "W + RMB (pre-awakening)"
              keys: ["w", "rmb"]
              note: "Pre-awakening filler movement"

