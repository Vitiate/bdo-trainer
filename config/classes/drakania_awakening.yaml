locked_skills:
    - name: "Evasion"
      reason: "Prevents accidental use that messes up combos in PVP."
    - name: "Wing Strike"
      reason: "Unprotected, can trigger accidentally during combos."
    - name: "Brimbolt"
      reason: "Unprotected ranged poke. Lock from skill bar to avoid accidental use."
    - name: "Slayer: Sideways Slash"
      reason: "Pre-awakening filler. Unprotected and slows down rotation."
    - name: "Slayer: Upward Slash"
      reason: "Unprotected, not useful in awakening rotation."
    - name: "Shard Toss"
      reason: "Unprotected, low damage, messes up PVP combos."
    - name: "Dragon Pierce"
      reason: "Lock from skill bar. Put on HOTBAR instead."
    - name: "Wing Tempest"
      reason: "Lock from skill bar. Put on HOTBAR instead."
