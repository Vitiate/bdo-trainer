# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills. Approach with SA protection
            then look for a CC opening. Drakania has no grab so must trade or CC.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "untamed_surge"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "dragon_flight"
              input: "Space"
              keys: ["space"]
              note: "SA aerial gap close"
            - skill: "draconic_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA lance charge into target"
            - skill: "flow_scale_strike"
              input: "F"
              keys: ["f"]
              note: "FG stiffness poke"
            - skill: "hexeblood"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage on stiffened target"
            - skill: "flow_hexeblood"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"

    aerial_burst:
        name: "Aerial Burst (Signature Combo)"
        description: >
            Drakania's signature aerial combo. Dive from the air with
            Markthanan's Wings then chain into full burst. High risk, high reward.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "dragon_flight"
              input: "Space"
              keys: ["space"]
              note: "SA aerial approach"
            - skill: "markthanans_wings"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Flying dive — bound on hit"
            - skill: "hexeblood"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst on bound target"
            - skill: "flow_hexeblood"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "trion_burst"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE explosion finisher"
            - skill: "dragonfire"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA breath if target survives"

    cc_chain:
        name: "CC Chain (No Grab)"
        description: >
            CC chain combo for Drakania. Since Drakania has no grab, you must
            fish for stiffness or float into bound, then burst. Requires patience.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "trion_sweep"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness — catch the target"
            - skill: "wing_strike"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "Float on stiffened target"
            - skill: "markthanans_wings"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Diving bound — extend CC"
            - skill: "hexeblood"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_hexeblood"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "trion_burst"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE knockdown finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly while
            staying in SA skills. No CC setup needed — pure damage trade.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "draconic_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge into target"
            - skill: "hexeblood"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_hexeblood"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "markthanans_wings"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA aerial finisher"

    dragon_dive:
        name: "Dragon Dive (Trade Combo)"
        description: >
            SA trading combo. Stay in Super Armor throughout and out-damage
            the opponent. Drakania is tanky enough to trade effectively.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "dragon_scale"
              input: "Q"
              keys: ["q"]
              note: "FG shield — absorb initial hit"
            - skill: "hexeblood"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA counter-attack"
            - skill: "flow_hexeblood"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "markthanans_wings"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA aerial dive"
            - skill: "trion_burst"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE burst"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use SA movement to create distance.
            Drakania has good escape tools with Dragon Flight and Rabam dash.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
