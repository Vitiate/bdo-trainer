              input: "Q"
              keys: ["q"]
              note: "FG shield to absorb pressure"
            - skill: "draconic_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA dash out with DP buff"
            - skill: "dragon_flight"
              input: "Space"
              keys: ["space"]
              note: "SA aerial dash away"
            - skill: "flame_lance"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement + damage while retreating"
