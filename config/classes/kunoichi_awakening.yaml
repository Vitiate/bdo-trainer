        combo_window_ms: 300
        steps:
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe into pack"
            - skill: "lethal_spin_spree"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst damage"
            - skill: "flow_wrath"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "chain_crash_sah_chakram"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Second burst skill"
            - skill: "wheel_of_wrath"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Filler damage"
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe to next pack"

