    floor_sweeping:
        name: "Floor Sweeping"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["knockdown"]
        description: "Low sweep with knockdown. Extra CC option from hotbar."
        notes: "Put on hotbar for extra CC. Unprotected — use on CC'd targets."

