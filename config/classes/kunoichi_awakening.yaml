# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using iframes and Forward Guard skills.
            Approach unseen, fish for stiffness, then grab for combo.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "delighted_blast"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe gap close"
            - skill: "lunar_dash"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG approach with stiffness"
            - skill: "lethal_spin_spree"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_wrath"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "chain_crash_sah_chakram"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher with bound"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Kunoichi PVP kill combo. Land a grab then chain into full burst.
            Kunoichi's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "danse_macabre"
              input: "W + F"
              keys: ["w", "f"]
              note: "Float on grabbed target"
            - skill: "flow_indignation"
              input: "F"
              keys: ["f"]
              note: "Follow-up slam on floated target"
            - skill: "lethal_spin_spree"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_wrath"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst — should kill most targets"
            - skill: "chain_crash_sah_chakram"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher if target still alive"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard and iframe to approach, fish for a stiffness,
            then chain into grab and full burst damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe approach"
            - skill: "halo"
              input: "Q"
              keys: ["q"]
              note: "FG ranged stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "danse_macabre"
              input: "W + F"
              keys: ["w", "f"]
              note: "Float follow-up"
            - skill: "lethal_spin_spree"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_wrath"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "chain_crash_sah_chakram"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    iframe_burst:
        name: "Iframe Burst (1v1)"
        description: >
            Fast burst combo for duels. Use iframe to engage safely
            then dump all burst while in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe engage"
            - skill: "danse_macabre"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA float opener"
            - skill: "lethal_spin_spree"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "flow_wrath"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "half_moon_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA filler"

    grab_punish:
        name: "Grab Punish (After Ally CC)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "danse_macabre"
              input: "W + F"
              keys: ["w", "f"]
              note: "Float on CC'd target"
            - skill: "flow_indignation"
              input: "F"
              keys: ["f"]
              note: "Follow-up slam"
            - skill: "lethal_spin_spree"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_wrath"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "chain_crash_sah_chakram"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Kunoichi excels at disengaging
            thanks to multiple iframe options. Chain iframes to escape.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe out"
            - skill: "block_jump"
              input: "Space (pre-awk)"
              keys: ["space"]
              note: "Chain iframe"
            - skill: "crimson_moon"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement away"
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe again if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Kunoichi plays as an assassin — iframe
            in, dump burst on a target, then iframe out. Do not overextend.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "delighted_blast"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before diving in"
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe into backline"
            - skill: "dark_veil"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Extended iframe / stealth approach"
            - skill: "danse_macabre"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA float opener"
            - skill: "flow_indignation"
              input: "F"
              keys: ["f"]
              note: "Follow-up knockdown"
            - skill: "lethal_spin_spree"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_wrath"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "chain_crash_sah_chakram"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe out — do not overstay"

