# ============================================================================
# BDO Trainer - Awakened Kunoichi Combo Configuration
# ============================================================================
# Class: Kunoichi (Awakening)
# Weapons: Shortsword (Main) / Kunai (Off) / Sah Chakram (Awakening)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Class Identity:
#   Kunoichi is a high-burst iframe-heavy assassin class. She excels in 1v1
#   PVP thanks to her grab, extensive iframe chains, and devastating burst
#   damage windows. Known as one of the strongest duelists in BDO.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Kunoichi Class Discord
#   - Community guides by Nia, Vixion, JinLun, Orca
# ============================================================================

class: Kunoichi
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills (Sah Chakram)
# --------------------------------------------------------------------------
awakening_skills:
    lethal_spin_spree:
        name: "Lethal Spin Spree"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Main awakening burst skill. Fast multi-hit spin with Super Armor and knockdown."
        flows_into: ["flow_wrath", "chain_crash_sah_chakram", "ghost_step"]
        core_effect: "Core: Lethal Spin Spree - Extra hits and increased damage"
        notes: "Bread-and-butter damage skill. Always follow with Flow: Wrath for maximum burst."

    flow_wrath:
        name: "Flow: Wrath"
        input: "LMB (after Lethal Spin Spree)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Lethal Spin Spree. Additional burst with Super Armor."
        flows_into: ["chain_crash_sah_chakram", "ghost_step", "wheel_of_wrath"]
        notes: "Always chain after Lethal Spin Spree. Down attack properties for extra damage."

    chain_crash_sah_chakram:
        name: "Chain Crash: Sah Chakram"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 7000
        description: "Spinning chakram assault with Super Armor and bound. Core adds extra damage."
        flows_into: ["flow_indignation", "lethal_spin_spree", "ghost_step"]
        core_effect: "Core: Chain Crash - Increased number of hits and damage"
        notes: "Second main burst skill. Bound CC useful for extending combos in PVP."

    danse_macabre:
        name: "Danse Macabre"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Lunging forward slash combo with Super Armor and float CC."
        flows_into: ["flow_indignation", "lethal_spin_spree", "chain_crash_sah_chakram"]
        notes: "Strong engage tool. Float CC sets up aerial combos. Good in PVE and PVP."

    flow_indignation:
        name: "Flow: Indignation"
        input: "F (after Danse Macabre or Chain Crash)"
        keys: ["f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up slam after Danse Macabre or Chain Crash. Super Armor with knockdown."
        flows_into: ["lethal_spin_spree", "ghost_step", "wheel_of_wrath"]
        notes: "Free follow-up. Always chain for extra damage and CC extension."

    wheel_of_wrath:
        name: "Wheel of Wrath"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 5000
        description: "Backward spinning slash with Super Armor and knockdown."
        flows_into: ["lethal_spin_spree", "chain_crash_sah_chakram", "ghost_step"]
        core_effect: "Core: Wheel of Wrath - Forward Guard during the skill"
        notes: "Good filler with SA. Use between main skills or as a defensive option."

    half_moon_slash:
        name: "Half Moon Slash"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 8000
        description: "Wide crescent slash with Super Armor and stiffness CC. Strong AOE."
        flows_into: ["lethal_spin_spree", "chain_crash_sah_chakram", "danse_macabre"]
        notes: "Large AOE skill. Great for PVE pack clearing and PVP stiffness catch."

    halo:
        name: "Halo"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard ranged chakram throw with stiffness. Good poke tool."
        flows_into: ["lethal_spin_spree", "danse_macabre", "lunar_dash"]
        core_effect: "Core: Halo - Super Armor during the skill"
        notes: "Safe poke with frontal protection. Use to fish for stiffness in PVP."

    ghost_step:
        name: "Ghost Step"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Signature Kunoichi iframe dash. Primary movement and evasion tool."
        flows_into: ["lethal_spin_spree", "chain_crash_sah_chakram", "danse_macabre", "halo"]
        notes: "Core movement skill. Chain with other iframes for extended invulnerability."

    lunar_dash:
        name: "Lunar Dash"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard dash-slash with stiffness. Gap closer with frontal protection."
        flows_into: ["lethal_spin_spree", "chain_crash_sah_chakram", "danse_macabre"]
        notes: "Good for approaching with protection. Stiffness into grab is a key PVP pattern."

    blade_spin:
        name: "Blade Spin"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "none"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 6000
        description: "Backward spinning chakram with knockback. Unprotected."
        flows_into: ["ghost_step", "lethal_spin_spree"]
        notes: "Unprotected — use cautiously in PVP. Down attack properties on CC'd targets."

    delighted_blast:
        name: "Delighted Blast"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff skill. Increases AP, attack speed, and critical rate."
        flows_into: ["ghost_step", "lethal_spin_spree", "danse_macabre"]
        core_effect: "Core: Delighted Blast - Super Armor during the skill and extended buff duration"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    chain_moonrise:
        name: "Chain: Moonrise"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward rushing strike with Super Armor and knockdown."
        flows_into: ["lethal_spin_spree", "chain_crash_sah_chakram", "flow_indignation"]
        notes: "Good filler engage with SA protection. Useful between main cooldowns."

    flow_cloud_stomp:
        name: "Flow: Cloud Stomp"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 10000
        description: "Aerial stomp attack from hotbar. Super Armor with float CC."
        flows_into: ["lethal_spin_spree", "chain_crash_sah_chakram"]
        notes: "Hotbar skill. Good for AOE damage and float CC setup."

    sah_chakram_rise:
        name: "Sah Chakram Rise"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Rising slash from hotbar. Forward Guard with stiffness CC."
        flows_into: ["lethal_spin_spree", "danse_macabre"]
        notes: "Hotbar skill. Forward Guard poke for safe engagement."

    flow_spiritual_bond:
        name: "Flow: Spiritual Bond"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Self-heal and DP buff. Super Armor during cast."
        flows_into: []
        notes: "Emergency heal. Hotbar recommended. SA makes it safe in combat."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    shadow_explosion:
        name: "Shadow Explosion"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 9000
        description: "Shadow burst with knockdown. Super Armor. Good for 1v1 and extra CC."
