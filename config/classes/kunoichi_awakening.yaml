    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns efficiently."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "delighted_blast"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
