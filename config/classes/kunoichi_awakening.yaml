# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Kunoichi PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Land stiffness then grab for guaranteed combo."

    block_jump:
        name: "Block Jump"
        input: "Space (in pre-awakening)"
        keys: ["space"]
        protection: "iframe"
        cc: []
        description: "Quick iframe jump. Transitions to pre-awakening stance."
        notes: "Extra iframe tool. Chain with Ghost Step for extended iframe windows."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Works in both pre-awakening and awakening."
        notes: "PVE iframe. Can be chained for lateral movement."

    ninjutsu_shadow_stomp:
        name: "Ninjutsu: Shadow Stomp"
        input: "S + F (in pre-awakening)"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        description: "Ground stomp with bound CC and Super Armor. Pre-awakening catch tool."
