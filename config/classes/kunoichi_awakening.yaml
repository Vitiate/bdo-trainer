# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Mobility Chain"
        description: "Chain iframe and movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "ghost_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe forward dash"
            - skill: "crimson_moon"
              input: "Shift + Z"
              keys: ["shift", "z"]
