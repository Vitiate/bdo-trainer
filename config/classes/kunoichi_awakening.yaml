    crimson moon:
        name: "Crimson Moon"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor lunging slash with stiffness. Movement and damage skill."
        notes: "Preferred L57 Rabam. Good for protected movement and extra CC option."

    dark_veil:
        name: "Dark Veil"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 15000
        description: "Extended iframe with brief invisibility. Strong defensive Rabam."
