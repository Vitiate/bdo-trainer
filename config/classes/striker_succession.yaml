core_skill:
    recommended: "Crimson Fang"
    effect: "Extra hits and increased PVE damage"
    reason: >
        Crimson Fang with Core gains additional hits and a significant
        damage boost, making it the strongest skill in the succession kit.
        This is the foundation of all Striker succession combos and the
        primary damage source for both PVE grinding and PVP burst. Most
        Striker succession players choose this Core first. After getting
        comfortable, experiment with Skull Crusher and Massive Suppression
        Cores as well.
