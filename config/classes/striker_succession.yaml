# ============================================================================
# BDO Trainer - Succession Striker Combo Configuration
# ============================================================================
# Class: Striker (Succession)
# Weapons: Gauntlet (Main) / Vambrace (Off) / Enhanced Gauntlet (Succession)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Striker Class Discord
#   - Community guides by Vert, BigandShiny, Preach, DontAsk
# ============================================================================

class: Striker
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Gauntlet Skills)
# --------------------------------------------------------------------------
awakening_skills:
    crimson_fang:
        name: "Crimson Fang"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced fist barrage with Super Armor. Core succession damage skill with knockdown."
        flows_into: ["skull_crusher", "roaring_tiger", "crouching_wolf"]
        core_effect: "Core: Crimson Fang - Extra hits and increased PVE damage"
        notes: "Bread-and-butter succession skill. High hit count for massive damage."

    skull_crusher:
        name: "Skull Crusher"
        input: "Shift + RMB"
