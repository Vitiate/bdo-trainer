pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor movement skills.
            Approach with protection, then fish for CC openings.
            Woosa has no grab so you must rely on protected CC chains.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "inner_peace"
              input: "Q"
              keys: ["q"]
              note: "FG buff before going in"
            - skill: "cloud_step"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close"
            - skill: "flow_wind_step"
              input: "F"
              keys: ["f"]
              note: "Extended SA engage"
            - skill: "gust_blade"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA knockback to disrupt"
            - skill: "cloud_veil"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA stiffness poke"
            - skill: "flow_mist_slash"
