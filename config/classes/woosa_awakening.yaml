        name: "Stiffness Chain (1v1)"
        description: >
            Core Woosa 1v1 combo. Land a stiffness CC then chain into
            knockdown and full burst. No grab needed — rely on stiffness
            into extended CC chain for kill potential.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "cloud_veil"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA stiffness opener"
            - skill: "lightning_rod"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stun on stiffened target"
            - skill: "thunderstrike"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main burst — knockdown"
            - skill: "flow_thunder_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up wave"
            - skill: "rain_of_light"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "AOE float on downed target"
            - skill: "flow_celestial_rain"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended rain finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stun,
            then chain into knockdown and full damage. Woosa has no grab
            so catching with FG-protected CC is essential.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "lightning_rod"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stun — catch the target"
            - skill: "storm_lotus"
              input: "S + F"
              keys: ["s", "f"]
              note: "SA bound on stunned target"
            - skill: "thunderstrike"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst — knockdown"
            - skill: "flow_thunder_wave"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "heavens_gate"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Large AOE finisher"
            - skill: "cloud_veil"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Cleanup damage"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in SA-protected skills. No CC needed to open.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "cloud_step"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA rush in"
