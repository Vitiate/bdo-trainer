# ============================================================================
# BDO Trainer - Awakened Woosa Combo Configuration
# ============================================================================
# Class: Woosa (Awakening)
# Weapons: Janggeom (Main — Korean sword) / Daedo (Off — inner power) / Sageongeom (Awakening — celestial fan sword)
# Damage Type: Magic/Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Notes:
#   - Woosa has NO grab. Relies on protected CC chains and spacing.
#   - Korean-themed wind/cloud/lightning magic class.
#   - Strong self-healing via Inner Peace. Excellent in PVP and large scale.
#   - Part of the newest class wave in BDO.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Woosa Class Discord
#   - Community guides by Arukas, JinSeoul, CloudKR
# ============================================================================

class: Woosa
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    cloud_veil:
        name: "Cloud Veil"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Fan slash wreathed in cloud energy. Super Armor throughout with stiffness."
        flows_into: ["flow_mist_slash", "thunderstrike", "cloud_step"]
        core_effect: "Core: Cloud Veil - Extra hit damage and healing on hit"
        notes: "Bread-and-butter skill. Always follow with Flow: Mist Slash for full damage."

    flow_mist_slash:
        name: "Flow: Mist Slash"
        input: "LMB (after Cloud Veil)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up fan slash trailing mist. Additional burst with Super Armor."
        flows_into: ["thunderstrike", "heavens_gate", "rain_of_light"]
        notes: "Always chain after Cloud Veil for extra damage and extended SA protection."

    thunderstrike:
        name: "Thunderstrike"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Calls down a devastating lightning strike. Super Armor with knockdown. Highest damage awakening skill."
        flows_into: ["flow_thunder_wave", "cloud_veil", "rain_of_light"]
        core_effect: "Core: Thunderstrike - Down attack damage +15%, extra lightning hit"
        notes: "Primary damage skill. Core priority. Use on cooldown in PVE, save for CC'd targets in PVP."

    flow_thunder_wave:
        name: "Flow: Thunder Wave"
        input: "LMB (after Thunderstrike)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up lightning wave after Thunderstrike. Sends out a forward shockwave."
        flows_into: ["cloud_veil", "heavens_gate"]
        notes: "Always chain after Thunderstrike. Knockback keeps targets at comfortable range."

    cloud_step:
        name: "Cloud Step"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 5000
        description: "Super Armor dash forward through clouds. Quick gap closer with stiffness."
        flows_into: ["flow_wind_step", "cloud_veil", "thunderstrike"]
        core_effect: "Core: Cloud Step - Movement speed +10% for 10 sec on use"
        notes: "Primary engage tool. Flows into Wind Step for extended mobility."

    flow_wind_step:
        name: "Flow: Wind Step"
        input: "F (after Cloud Step)"
        keys: ["f"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Extended dash follow-up to Cloud Step. Additional forward movement with SA."
        flows_into: ["cloud_veil", "thunderstrike", "gust_blade"]
        notes: "Always use after Cloud Step for extended distance. SA throughout."

    rain_of_light:
        name: "Rain of Light"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 8000
        description: "Channels celestial energy into a ranged AOE rain of light beams. Float CC."
        flows_into: ["flow_celestial_rain", "thunderstrike", "cloud_veil"]
        core_effect: "Core: Rain of Light - AOE range increased, extra hit added"
        notes: "Ranged AOE skill. Great for PVE pack clearing and PVP zoning. Float opens combo opportunities."

    flow_celestial_rain:
        name: "Flow: Celestial Rain"
        input: "LMB (after Rain of Light)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Rain of Light. Additional light beams cascade down."
        flows_into: ["thunderstrike", "heavens_gate"]
        notes: "Chain after Rain of Light for extended AOE damage."

    heavens_gate:
        name: "Heaven's Gate"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Opens a celestial gate, unleashing a massive AOE blast. SA with knockdown."
        flows_into: ["thunderstrike", "cloud_veil", "rain_of_light"]
        notes: "Large AOE skill. Long cooldown but devastating in both PVE and large scale PVP."

    inner_peace:
        name: "Inner Peace"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Forward Guard self-heal and buff. Restores HP and grants AP/DP buff for 10 sec."
        flows_into: ["cloud_veil", "cloud_step"]
        core_effect: "Core: Inner Peace - Heal amount +30%, grants Super Armor for 2 sec after cast"
        notes: "Key self-sustain tool. FG during cast keeps you safe. Use between engagements or when pressured."

    cloud_dance:
        name: "Cloud Dance"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Iframe dash through clouds. Primary awakening movement skill. PVE iframe."
        flows_into: ["cloud_veil", "thunderstrike", "cloud_step"]
        notes: "Primary movement skill in awakening. Iframe for 1 sec. Use to reposition and dodge grabs."

    lightning_rod:
        name: "Lightning Rod"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stun"]
        damage: medium
        cooldown_ms: 7000
        description: "Plants a lightning rod that stuns nearby enemies. Forward Guard during cast."
        flows_into: ["thunderstrike", "cloud_veil", "rain_of_light"]
        notes: "Defensive CC tool with frontal protection. Use to create space or set up combos."

    gust_blade:
        name: "Gust Blade"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward fan thrust sending a blade of wind. SA with knockback."
        flows_into: ["cloud_veil", "thunderstrike", "cloud_step"]
        notes: "Good approach skill with knockback. Can be used to push enemies into walls."

    storm_lotus:
        name: "Storm Lotus"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 8000
        description: "Spinning fan strike channeling storm energy. Super Armor with bound."
        flows_into: ["thunderstrike", "cloud_veil"]
        notes: "Bound CC enables follow-up damage. Good filler between main cooldowns."

    wind_scatter:
        name: "Wind Scatter"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 9000
        description: "360-degree wind burst around the caster. Knocks enemies back."
        flows_into: ["cloud_dance", "cloud_veil"]
        notes: "Panic button and self-peel tool. Use when surrounded. No grab on Woosa so this is your escape."

    celestial_slash:
        name: "Celestial Slash"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Overhead fan slash channeling celestial power. Super Armor. Hotbar recommended."
        flows_into: ["thunderstrike", "cloud_veil"]
        notes: "Hotbar skill. Good burst filler with protection."

    cloud_burst:
        name: "Cloud Burst"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Concentrated cloud explosion from hotbar. Forward Guard."
        flows_into: ["thunderstrike", "rain_of_light"]
        notes: "Hotbar skill. Forward Guard makes it safe to use in PVP."

