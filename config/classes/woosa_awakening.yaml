# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Thunderstrike"
    effect: "Down attack damage +15%, extra lightning hit added"
    reason: >
        Thunderstrike with Core gains significant bonus damage with a down
        attack modifier and an additional lightning hit. This is Woosa's
        highest damage skill and the Core makes it substantially stronger
        in both PVE and PVP. Most Woosa players choose this Core first.
        After getting comfortable, experiment with Cloud Veil Core for
        sustain and Cloud Step Core for mobility.
