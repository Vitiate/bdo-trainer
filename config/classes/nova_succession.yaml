              note: "AOE bound"
            - skill: "frozen_tempest"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and Forward Guard skills.
            Approach with protection, fish for CC, then burst.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "frozen_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close"
            - skill: "shield_bash"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "FG stun — catch target"
            - skill: "morning_star_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst on stunned target"
            - skill: "flow_ice_shatter"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "ice_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"
            - skill: "flow_blizzard_sweep"
              input: "LMB"
              keys: ["lmb"]
              note: "Clean up damage"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Nova PVP combo. Land a grab then chain into full burst.
            Nova's grab bypasses Super Armor — primary kill tool in duels.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "quoratum_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "morning_star_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_ice_shatter"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "ice_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stun with
            Shield Bash, then chain into grab and full damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "frozen_needle"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG ranged poke — stiffness catch"
            - skill: "frozen_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA close gap"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "quoratum_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "morning_star_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_ice_shatter"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. High damage quickly while
            staying protected. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "frozen_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA engage"
            - skill: "ice_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst"
            - skill: "flow_blizzard_sweep"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "morning_star_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA filler"

    soldier_pressure:
        name: "Soldier Pressure (1v1)"
        description: >
            Use soldiers to create pressure while you fish for openings.
            Soldiers distract and deal chip damage while you engage safely.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "stars_call"
              input: "Space"
              keys: ["space"]
              note: "Summon soldiers first"
            - skill: "soldier_command"
              input: "RMB"
              keys: ["rmb"]
              note: "Send soldiers at target"
            - skill: "frozen_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA engage while soldiers distract"
            - skill: "shield_bash"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "FG stun catch"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab stunned target"
            - skill: "morning_star_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Burst"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use SA movement and block to
            create distance. Nova has good disengage tools with soldiers.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "block"
              input: "Q"
              keys: ["q"]
              note: "FG block incoming damage"
            - skill: "frozen_tempest"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA Rabam movement out"
            - skill: "frozen_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash away"
            - skill: "frozen_needle"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG ranged poke while retreating"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Soldiers add sustained damage in blobs.
            Focus on protected AOE skills and keep soldiers active.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "winter_veil"
              input: "Shift + Q"
              keys: ["shift", "q"]
              note: "Buff before engaging blob"
            - skill: "stars_call"
              input: "Space"
              keys: ["space"]
              note: "Summon soldiers"
            - skill: "frozen_charge"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA engage into group"
            - skill: "frost_explosion"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Big AOE nuke"
            - skill: "ice_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA AOE bound"
            - skill: "flow_blizzard_sweep"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up sweep"
            - skill: "quoratum_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float"
            - skill: "frozen_tempest"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA Rabam reposition"

