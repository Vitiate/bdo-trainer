# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Ice Storm"
    effect: "Bound on last hit and increased damage"
    reason: >
        Ice Storm with Core gains Bound CC on the last hit and significantly
        increased damage, making it the strongest AOE tool in succession.
        This is the first Core most Nova succession players choose. The bound
        CC also enables follow-up combos in PVP. After getting comfortable,
        experiment with Morning Star Slash and Star's Call Cores as well.
