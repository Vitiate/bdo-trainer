# ============================================================================
# BDO Trainer - Succession Nova Combo Configuration
# ============================================================================
# Class: Nova (Succession)
# Weapons: Morning Star (Main) / Quoratum (Off — shield)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Nova Succession Notes:
#   Nova succession is unique for summoning ice soldiers that fight alongside
#   her. The soldiers persist and attack independently, adding sustained damage.
#   Succession enhances Morning Star and Quoratum (shield) skills with ice
#   magic and soldier commands. Strong in PVE due to soldier AOE clear and
#   sustained damage. Has a grab (E) for PVP utility.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Nova Class Discord
#   - Community guides by Alucard, Yulna, NovaPD, Kritika
# ============================================================================

class: Nova
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Pre-Awakening)
# --------------------------------------------------------------------------
awakening_skills:
    morning_star_slash:
        name: "Morning Star Slash"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Enhanced overhead Morning Star slam. Super Armor with knockdown on hit."
        flows_into: ["flow_ice_shatter", "ice_storm", "shield_bash"]
        core_effect: "Core: Morning Star Slash - Extra hit and increased damage"
        notes: "Primary burst skill. Always follow up with Flow: Ice Shatter for maximum damage."

    flow_ice_shatter:
        name: "Flow: Ice Shatter"
        input: "LMB (after Morning Star Slash)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up slam that shatters ice on the ground. Down attack properties."
        flows_into: ["ice_storm", "frozen_charge"]
        notes: "Always chain after Morning Star Slash. Massive damage on downed targets."

    ice_storm:
        name: "Ice Storm"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Spin the Morning Star overhead creating a blizzard vortex. Super Armor with bound CC."
        flows_into: ["flow_blizzard_sweep", "morning_star_slash", "frozen_charge"]
        core_effect: "Core: Ice Storm - Bound on last hit and increased damage"
        notes: "Strongest succession AOE skill. High damage in PVE. Core priority."

    flow_blizzard_sweep:
        name: "Flow: Blizzard Sweep"
        input: "LMB (after Ice Storm)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up sweeping slash after Ice Storm. Sends out wave of ice."
        flows_into: ["morning_star_slash", "frozen_charge"]
        notes: "Always chain after Ice Storm for extra AOE damage."

    frozen_charge:
        name: "Frozen Charge"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Dash forward with shield raised, trailing ice. Super Armor gap closer."
        flows_into: ["morning_star_slash", "ice_storm", "shield_bash"]
        notes: "Primary movement and engage tool. Use to close gaps quickly."

    shield_bash:
        name: "Shield Bash"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "FG"
        cc: ["stun"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard shield strike that stuns. Freezes targets on hit."
        flows_into: ["morning_star_slash", "ice_storm", "quoratum_strike"]
        core_effect: "Core: Shield Bash - Forward Guard during entire animation"
        notes: "Good PVP catch tool. Stun sets up combos. FG keeps you safe."

    quoratum_strike:
        name: "Quoratum Strike"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Leap and slam the Quoratum shield down, creating ice spikes. Float CC."
        flows_into: ["morning_star_slash", "ice_storm", "frozen_charge"]
        notes: "Strong AOE with float. Good for grouping mobs and catching in PVP."

    stars_call:
        name: "Star's Call"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 12000
        description: "Summon ice soldiers that fight alongside you. Soldiers attack independently."
        flows_into: ["morning_star_slash", "frozen_charge"]
        core_effect: "Core: Star's Call - Soldiers gain increased attack and duration"
        notes: "Unique succession mechanic. Keep soldiers active for sustained DPS. Resummon on cooldown."

    soldier_command:
        name: "Soldier: Command"
        input: "RMB (while soldiers active)"
        keys: ["rmb"]
        protection: "none"
        cc: []
        damage: medium
        cooldown_ms: 3000
        description: "Command ice soldiers to charge forward and attack your target."
        flows_into: ["morning_star_slash", "ice_storm"]
        notes: "Direct soldiers to focus targets. Useful for boss damage and PVP pressure."

    soldier_rally:
        name: "Soldier: Rally"
        input: "F (while soldiers active)"
        keys: ["f"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Command soldiers to rally at target location with AOE stiffness."
        flows_into: ["morning_star_slash", "ice_storm"]
        notes: "Soldiers create ice field at target. Good for zone control."

    block:
        name: "Block"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 0
        description: "Hold Quoratum shield in front. Blocks incoming frontal damage and CC."
        flows_into: ["shield_bash", "morning_star_slash", "frozen_charge"]
        notes: "Nova's guard. Use to absorb attacks then counter with Shield Bash."

    frozen_needle:
        name: "Frozen Needle"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Fire a barrage of ice needles forward. Forward Guard ranged poke."
        flows_into: ["morning_star_slash", "ice_storm"]
        notes: "Ranged skill for poking. Safe with Forward Guard. Good in PVP at range."

    ice_pillar:
        name: "Ice Pillar"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 10000
        description: "Slam ground to create erupting ice pillars. Super Armor with bound."
        flows_into: ["morning_star_slash", "ice_storm"]
        notes: "Good AOE CC. Bound into Morning Star Slash for follow-up damage."

    cold_snap:
        name: "Cold Snap"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Forward lunging strike that releases a wave of frost. Super Armor."
        flows_into: ["morning_star_slash", "flow_ice_shatter"]
        notes: "Good filler with Super Armor. Use between main skill cooldowns."

    frost_explosion:
        name: "Frost Explosion"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 15000
        description: "Channel ice energy then release a massive AOE frost explosion."
        flows_into: ["morning_star_slash", "frozen_charge"]
        notes: "Big AOE nuke. Long cooldown. Use in PVE for pack clear or PVP for blob fights."

    winter_veil:
        name: "Winter Veil"
        input: "Shift + Q"
        keys: ["shift", "q"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff that grants DP, attack speed, and freezing aura to nearby allies."
        flows_into: ["frozen_charge", "morning_star_slash"]
        notes: "Use before engaging. Buff yourself and soldiers for increased damage."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    frozen_tempest:
        name: "Frozen Tempest"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Spinning shield and Morning Star attack with ice trail. Super Armor."
        notes: "Preferred L56 Rabam. Good AOE with SA protection and movement."

    glacial_guard:
        name: "Glacial Guard"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "FG"
        cc: ["bound"]
        damage: low
        cooldown_ms: 10000
        description: "Forward Guard shield advance that creates ice wall. Bound on hit."
        notes: "Defensive option with bound CC. Good for PVP counterplay."

    permafrost:
        name: "Permafrost"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 14000
        description: "Create a field of permanent frost that slows and damages enemies."
        notes: "Hotbar skill. Useful for zone control in node wars and PVE."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Nova PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Practice grab timing in duels. Nova has a reliable grab."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Brief invincibility during dodge."
        notes: "Primary defensive iframe. Use to dodge grabs and unprotected windows."

    quoratum_leap:
        name: "Quoratum Leap"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Leap into the air and slam down with the Quoratum shield. Super Armor."
        notes: "Good engage tool from hotbar. SA during leap."

    ice_wall:
        name: "Ice Wall"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Summon a wall of ice that blocks projectiles and enemy movement."
        notes: "Useful in node wars for blocking choke points."

    frozen_strike:
        name: "Frozen Strike"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stiffness"]
        description: "Quick Forward Guard Morning Star strike. Good filler from hotbar."
        notes: "Safe poke with FG protection. Put on hotbar for easy access."

