    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns and soldiers."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "winter_veil"
              input: "Shift + Q"
              keys: ["shift", "q"]
              note: "Buff up"
            - skill: "stars_call"
              input: "Space"
              keys: ["space"]
              note: "Summon soldiers"
            - skill: "frozen_charge"
              input: "W + F"
