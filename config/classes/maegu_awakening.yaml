# ============================================================================
# BDO Trainer - Awakened Maegu Combo Configuration
# ============================================================================
# Class: Maegu (Awakening)
# Weapons: Foxspirit Charm (Main) / Talisman (Off) / Enchanted Scroll (Awakening)
# Damage Type: Magic/Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Notes:
#   Maegu is the female counterpart to Woosa but plays differently.
#   She uses fox spirit magic with ranged burst damage and fast movement.
#   Maegu has NO grab — she relies on protected CC and burst to kill.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Maegu Class Discord
#   - Community guides by Vert, SumoBDO, BigandShiny
# ============================================================================

class: Maegu
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    foxfire_veil:
        name: "Foxfire Veil"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 22000
        description: "Self-buff. Increases AP, magic AP, and casting speed. Fox spirit aura surrounds Maegu."
        flows_into: ["spirit_flame", "fox_claw"]
        core_effect: "Core: Foxfire Veil - Additional magic DP buff for 10 sec"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    spirit_flame:
        name: "Spirit Flame"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 6000
        description: "Fox fire burst projectile. Super Armor throughout with knockback on hit."
        flows_into: ["flow_fox_fire", "fox_claw", "charm_blast"]
        notes: "Bread-and-butter damage skill. Ranged burst with SA. Flows into Flow: Fox Fire."

    flow_fox_fire:
        name: "Flow: Fox Fire"
        input: "LMB (after Spirit Flame)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Spirit Flame. Additional fox fire volley with Super Armor."
        flows_into: ["fox_claw", "spirit_barrage"]
        notes: "Always follow Spirit Flame with this for extra damage."

    fox_claw:
        name: "Fox Claw"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "High damage multi-hit fox spirit claw strikes. Super Armor with knockdown."
        flows_into: ["flow_spirit_claw", "spirit_flame", "charm_blast"]
        core_effect: "Core: Fox Claw - Extra hit count and increased damage"
        notes: "Highest damage awakening skill. Core is the recommended first choice."

    flow_spirit_claw:
        name: "Flow: Spirit Claw"
        input: "LMB (after Fox Claw)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Fox Claw. Spirit claw swipe with knockdown."
        flows_into: ["spirit_flame", "spirit_barrage"]
        notes: "Always chain after Fox Claw for extra damage and extended SA."

    spirit_dash:
        name: "Spirit Dash"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 5000
        description: "Teleport dash forward through fox spirit energy. Super Armor throughout."
        flows_into: ["flow_spirit_trail", "spirit_flame", "fox_claw"]
        notes: "Primary awakening engage tool. Teleports through enemies."

    flow_spirit_trail:
        name: "Flow: Spirit Trail"
        input: "LMB (after Spirit Dash)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Spirit Dash. Leaves a trail of fox fire that damages enemies."
        flows_into: ["spirit_flame", "fox_claw"]
        notes: "Adds damage and stiffness after Spirit Dash. Good for engage combos."

    charm_blast:
        name: "Charm Blast"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stun"]
        damage: medium
        cooldown_ms: 7000
        description: "Ranged charm projectile burst. Super Armor with stun on hit."
        flows_into: ["spirit_flame", "fox_claw", "spirit_barrage"]
        core_effect: "Core: Charm Blast - Stun duration increased, extra damage"
        notes: "Good ranged CC tool. Stun enables follow-up damage."

    spirit_barrage:
        name: "Spirit Barrage"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Large AOE fox spirit explosion. Super Armor with float CC."
        flows_into: ["spirit_flame", "fox_claw"]
        core_effect: "Core: Spirit Barrage - AOE radius increased, additional damage"
        notes: "Best AOE skill. Strong in PVE for clearing packs and PVP for large scale."

    spirit_shield:
        name: "Spirit Shield"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 12000
        description: "Fox spirit barrier. Forward Guard with magic DP buff on block."
        flows_into: ["spirit_flame", "charm_blast"]
        notes: "Defensive tool. Use to block incoming damage then counter-attack."

    fox_leap:
        name: "Fox Leap"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Fox spirit movement leap. Iframe during dash, SA on landing."
        flows_into: ["spirit_flame", "fox_claw", "spirit_dash"]
        notes: "Primary movement skill in awakening. Iframe makes it the safest repositioning tool."

    binding_charm:
        name: "Binding Charm"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 10000
        description: "Forward Guard charm that binds target in place. Ranged CC."
        flows_into: ["fox_claw", "spirit_flame"]
        notes: "Key CC skill. Bound enables full burst combo. FG keeps you safe while casting."

    spirit_arrow:
        name: "Spirit Arrow"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Quick ranged spirit arrow. Fast animation but unprotected."
        flows_into: ["spirit_flame", "fox_claw"]
        notes: "Fast filler skill. Use at range to poke. Unprotected — be careful in PVP."

    spirit_rend:
        name: "Spirit Rend"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "Backwards leap with fox fire explosion at prior location. Knockdown CC."
        flows_into: ["charm_blast", "spirit_flame"]
        notes: "Repositioning tool with knockdown. Unprotected but creates distance."

    flow_charm_wave:
        name: "Flow: Charm Wave"
        input: "F (after awakening skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard charm wave available after multiple awakening skills."
        flows_into: ["spirit_flame", "fox_claw"]
        notes: "Can be chained after many awakening skills. Good filler with FG."

    fox_spirit_frenzy:
        name: "Fox Spirit: Frenzy"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 12000
        description: "Multi-hit fox spirit assault. Summons multiple fox spirits to attack."
        flows_into: ["spirit_flame", "fox_claw"]
        notes: "Put on hotbar. Strong burst damage with full SA throughout."

    spirit_volley:
        name: "Spirit Volley"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Barrage of spirit projectiles from hotbar. Super Armor."
        flows_into: ["spirit_flame", "charm_blast"]
        notes: "Hotbar skill. Good ranged burst with protection at distance."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    spirit_fox_rush:
        name: "Spirit Fox Rush"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Summon fox spirits that charge forward in a line. Super Armor with stiffness. Gives +15 Magic DP buff."
        notes: "Preferred L56 Rabam. Good for movement and engage with protection."

    foxfire_shield:
        name: "Foxfire Shield"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 8000
        description: "SA barrier that absorbs damage, then releases fox fire. Preferred L57 Rabam."
        notes: "Preferred choice. Defensive tool with SA. Good for absorbing burst then counter-attacking."

    spirit_chain:
        name: "Spirit Chain"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 14000
        description: "Ranged charm chain that binds target. Forward Guard. L58 Rabam with CC utility."
        notes: "Useful in PVP for additional ranged CC. Put on hotbar."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. PVE iframe as well."
        notes: "PVE iframe. Lock in PVP to prevent accidental use."

    spirit_step:
        name: "Spirit Step"
        input: "Shift + A / Shift + D"
        keys: ["shift", "a"]
        keys_alt: ["shift", "d"]
        protection: "iframe"
        cc: []
        description: "Quick spirit teleport to the side. Iframe movement for repositioning."
        notes: "Core PVP movement tool. Use to reposition and dodge grabs."

    foxspirit_guard:
        name: "Foxspirit: Guard"
        input: "Q (Pre-Awakening)"
        keys: ["q"]
        protection: "FG"
        cc: []
        description: "Talisman-based Forward Guard. Blocks incoming damage from the front."
        notes: "Emergency block when Spirit Shield is on cooldown."

    talisman_shield:
        name: "Talisman Shield"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Talisman barrier that grants DP buff and Super Armor. Short duration."
        notes: "Defensive buff. Use before engaging or when under pressure."

    foxspirit_mark:
        name: "Foxspirit: Mark"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["stiffness"]
        description: "Ranged charm mark that debuffs target magic DP. Unprotected."
        notes: "Use at range before engaging for DP shred. Hotbar recommended."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe into pack"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main fox fire burst"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fox_claw"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "High damage multi-hit"
            - skill: "flow_spirit_claw"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend claw damage"
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff first, then unload AOE."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "foxfire_veil"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "AP buff before engaging"
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe into pack center"
            - skill: "spirit_barrage"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float, group mobs"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst damage"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fox_claw"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit finisher"
            - skill: "flow_spirit_claw"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend damage"
            - skill: "charm_blast"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Clean up remaining"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe into pack"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot burst"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "spirit_fox_rush"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "foxfire_veil"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Engage into pack"
            - skill: "spirit_barrage"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE opener"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fox_claw"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit damage"
            - skill: "flow_spirit_claw"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend combo"
            - skill: "charm_blast"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ranged stun filler"
            - skill: "fox_spirit_frenzy"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA hotbar burst"
            - skill: "spirit_volley"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Extra ranged burst"
            - skill: "spirit_fox_rush"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and iframe skills.
            Approach with protection, then look for a CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "foxfire_veil"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe gap close"
            - skill: "spirit_dash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport into range"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "fox_claw"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    bind_burst:
        name: "Bind Burst (1v1)"
        description: >
            Core Maegu PVP combo. Land Binding Charm for bound CC,
            then chain into full burst. Maegu has no grab so bound is the
            primary kill tool to lock targets down.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "spirit_dash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport into range"
            - skill: "binding_charm"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound — locks target in place"
            - skill: "spirit_barrage"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float on bound target"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fox_claw"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use charm stun to catch target, then chain into bound
            and full burst. No grab means you rely on CC chaining.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "charm_blast"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ranged stun — catch the target"
            - skill: "binding_charm"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound on stunned target"
            - skill: "spirit_barrage"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float follow-up"
            - skill: "fox_claw"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main multi-hit burst"
            - skill: "flow_spirit_claw"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend claw damage"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Fox fire finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in Super Armor skills. No CC needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "spirit_dash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport engage"
            - skill: "flow_spirit_trail"
              input: "LMB"
              keys: ["lmb"]
              note: "SA trail damage"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "fox_claw"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA multi-hit finisher"

    ally_punish:
        name: "Ally CC Punish (After Ally CC)"
        description: >
            Maximum damage combo when your teammate lands a CC
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "spirit_barrage"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant AOE on CC'd target"
            - skill: "fox_claw"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit main burst"
            - skill: "flow_spirit_claw"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend claw damage"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Fox fire finisher"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframe and SA movement to
            create distance. Maegu excels at ranged kiting with no grab.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe out"
            - skill: "spirit_step"
              input: "Shift + A"
              keys: ["shift", "a"]
              note: "Iframe sidestep"
            - skill: "foxfire_shield"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA barrier while retreating"
            - skill: "spirit_fox_rush"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement away"
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Continue dashing if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on ranged SA damage and
            avoid overextending. Stay at range and use AOE skills.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "foxfire_veil"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe reposition"
            - skill: "spirit_barrage"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float into group"
            - skill: "fox_spirit_frenzy"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA multi-hit burst"
            - skill: "spirit_flame"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA ranged burst"
            - skill: "flow_fox_fire"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "spirit_volley"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA ranged barrage"
            - skill: "foxfire_shield"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA barrier reposition out"
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe disengage"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Mobility Chain"
        description: "Chain movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe forward leap"
            - skill: "spirit_dash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport forward"
            - skill: "spirit_fox_rush"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA rush movement"
            - skill: "fox_leap"
              input: "Space"
              keys: ["space"]
              note: "Leap again if off cooldown"

    awakening_movement:
        name: "Awakening Movement Guide"
        description: >
            Movement chain for Maegu awakening. Cycle between Fox Leap,
            Spirit Dash, and Rabam dashes for maximum speed. Maegu is
            one of the fastest classes due to fox spirit teleports.
        difficulty: intermediate
