# ============================================================================
# BDO Trainer - Succession Scholar Combo Configuration
# ============================================================================
# Class: Scholar (Succession)
# Weapons: Grimoire (Main) / Compass (Off) — Enhanced via Succession
# Damage Type: Magic/Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Scholar Class Discord
#   - Community guides and testing
#   - Scholar is one of the newest BDO classes, uses astronomical/celestial magic
#   - Succession enhances Grimoire and Compass skills instead of Astrolabe
# ============================================================================

class: Scholar
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Pre-Awakening)
# --------------------------------------------------------------------------
awakening_skills:
    grimoire_blast:
        name: "Grimoire Blast"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced Grimoire projectile volley. Fires concentrated magic pages that explode on impact. Super Armor throughout."
        flows_into: ["flow_page_volley", "ink_storm", "gravity_pulse"]
        core_effect: "Core: Grimoire Blast - Extra projectile wave with increased damage and AOE"
        notes: "Bread-and-butter succession damage skill. Always follow with Flow: Page Volley."

    flow_page_volley:
        name: "Flow: Page Volley"
        input: "LMB (after Grimoire Blast)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Grimoire Blast. Rapid-fire magic pages that shred targets with knockdown."
        flows_into: ["ink_storm", "gravity_pulse"]
        notes: "Always chain after Grimoire Blast for maximum burst damage."

    ink_storm:
        name: "Ink Storm"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Conjures a swirling vortex of enchanted ink around the Scholar. Massive multi-hit AOE with bound CC."
        flows_into: ["grimoire_blast", "bookmark_strike", "compass_spin"]
        core_effect: "Core: Ink Storm - Bound on last hit, increased number of hits"
        notes: "Highest raw damage in succession kit. Core is a strong alternative to Grimoire Blast."

    page_turn:
        name: "Page Turn"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick forward dash leaving a trail of magic pages. Super Armor with stiffness on contact."
        flows_into: ["flow_chapter_skip", "grimoire_blast", "ink_storm"]
        notes: "Primary succession gap closer. Faster animation than awakening Astral Shift."

    flow_chapter_skip:
        name: "Flow: Chapter Skip"
        input: "LMB (after Page Turn)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Page Turn. Additional burst of magic pages at the arrival point."
        flows_into: ["grimoire_blast", "ink_storm"]
        notes: "Free follow-up after Page Turn. Good for extra damage on engage."

    gravity_pulse:
        name: "Gravity Pulse"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["pull", "stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Enhanced gravity magic that pulls enemies inward with a crushing pulse. Super Armor throughout."
        flows_into: ["grimoire_blast", "ink_storm", "bookmark_strike"]
        core_effect: "Core: Gravity Pulse - Increased pull radius and added extra damage tick"
        notes: "Key grouping tool for PVE. Pull CC is extremely valuable in large-scale PVP."

    bookmark_strike:
        name: "Bookmark Strike"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown", "float"]
        damage: high
        cooldown_ms: 10000
        description: "Slams an enlarged magic bookmark into the ground, causing a massive shockwave. SA with knockdown and float."
        flows_into: ["grimoire_blast", "gravity_pulse"]
        notes: "Largest AOE in succession kit. Great for PVE pack clear and large-scale PVP."

    compass_spin:
        name: "Compass Spin"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Spins the Compass offhand rapidly, projecting a cone of cutting magic. Forward Guard during cast."
        flows_into: ["grimoire_blast", "ink_storm"]
        core_effect: "Core: Compass Spin - Forward Guard persists for 0.5s after skill ends"
        notes: "Ranged FG poke. Good for fishing for stiffness in PVP while staying protected."

    ink_splash:
        name: "Ink Splash"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Hurls a concentrated glob of enchanted ink at range. Super Armor during cast, explodes on impact."
        flows_into: ["grimoire_blast", "page_turn", "ink_storm"]
        notes: "Ranged SA poke. Good opener before dashing in with Page Turn."

    scholars_insight:
        name: "Scholar's Insight"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 25000
        description: "Self-buff. Increases AP, casting speed, and critical hit rate for 30 seconds. Enhanced in succession."
        flows_into: ["page_turn", "grimoire_blast"]
        core_effect: "Core: Scholar's Insight - Adds All Evasion +5% during buff duration"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    grimoire_shield:
        name: "Grimoire Shield"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 3000
        description: "Opens the Grimoire as a magical shield providing Forward Guard. Blocks damage and CC from front."
        flows_into: ["grimoire_blast", "compass_spin", "gravity_pulse"]
        notes: "Hold Q for sustained block. Use to bait grabs or wait for cooldowns safely."

    ink_barrage:
        name: "Ink Barrage"
        input: "S + F"
        keys: ["s", "f"]
        protection: "FG"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 6000
        description: "Rapid succession of ink projectiles while maintaining Forward Guard. Defensive ranged filler."
        flows_into: ["grimoire_blast", "gravity_pulse"]
        notes: "Defensive filler with Forward Guard. Useful between main cooldowns."

    compass_ward:
        name: "Compass Ward"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 5000
        description: "Quick spatial warp using compass magic. Full invincibility frames during teleport."
        flows_into: ["grimoire_blast", "ink_storm", "page_turn"]
        notes: "Primary iframe. Use defensively to dodge grabs and key CC skills. PVE iframe as well."

