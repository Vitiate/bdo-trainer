# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Scholar PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Scholar retains grab in succession — extremely valuable."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Short invincibility during the dash."
        notes: "PVE iframe. Lock in PVP if triggering accidentally during combos."

    bookmark_teleport:
        name: "Bookmark Teleport"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "iframe"
        cc: []
        description: "Teleport to a previously marked location. Short iframe on activation."
        notes: "Set up escape points before fights. Unique utility for repositioning."

    ink_wave:
        name: "Ink Wave"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stiffness"]
        description: "Sweeping wave of ink magic with Forward Guard. Enhanced in succession for more range."

    compass_reading:
        name: "Compass Reading"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Short SA buff that reveals hidden enemies and grants movement speed. Utility skill."
        notes: "Useful for scouting in node wars and extra movement speed between packs."

