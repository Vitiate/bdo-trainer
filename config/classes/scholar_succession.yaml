            - skill: "bookmark_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE burst follow-up"
            - skill: "grimoire_blast"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_page_volley"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up rapid fire"
            - skill: "gravity_pulse"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Pull finisher if target survives"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "page_turn"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash engage"
            - skill: "grimoire_blast"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
