pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor dash and Forward Guard skills.
            Approach with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "scholars_insight"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "page_turn"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash gap close"
            - skill: "compass_spin"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness poke"
            - skill: "grimoire_blast"
              input: "Shift + LMB"
