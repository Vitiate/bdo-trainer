              note: "SA main burst"
            - skill: "flow_page_volley"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up volley"
            - skill: "ink_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Scholar PVP combo. Land a grab then chain into full Grimoire burst.
            Scholar's grab bypasses Super Armor — use Page Turn to close distance first.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "page_turn"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash to melee range"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "bookmark_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE burst on grabbed target"
            - skill: "grimoire_blast"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_page_volley"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up rapid fire"
            - skill: "ink_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher — maximum damage"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard and ranged skills to fish for a stiffness,
            then chain into grab and full damage. Succession Scholar excels at ranged poke.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "compass_spin"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "page_turn"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash to stiffened target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
