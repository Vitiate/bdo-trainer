              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "ink_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage"
            - skill: "gravity_pulse"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA pull + stiffness"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "bookmark_strike"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant AOE on CC'd target"
            - skill: "grimoire_blast"
