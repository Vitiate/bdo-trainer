        combo_window_ms: 300
        steps:
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe into pack"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main charm burst"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fox_fire"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit fox spirits"
            - skill: "flow_fox_frenzy"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend fox fire damage"
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
