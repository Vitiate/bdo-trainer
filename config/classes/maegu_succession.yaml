    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe into pack"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot burst"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "spirit_fox_rush"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "spirit_wave"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Engage into pack"
            - skill: "spirit_explosion"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE opener"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fox_fire"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit damage"
            - skill: "flow_fox_frenzy"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend combo"
            - skill: "talisman_blast"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ranged stun filler"
            - skill: "charm_spiral"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA hotbar burst"
            - skill: "fox_spirit_hunt"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Extra ranged burst"
            - skill: "spirit_fox_rush"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"

