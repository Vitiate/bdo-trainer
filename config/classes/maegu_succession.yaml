# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Charm Strike"
    effect: "Extra hit count and increased damage on all hits"
    reason: >
        Charm Strike with Core gains additional hits and significantly
        increased damage, making it Succession Maegu's strongest burst
        tool. Most players choose this Core first. Fox Fire Core is a
        strong alternative for players who prefer its multi-hit style.
        After getting comfortable, experiment with Talisman Blast Core
        for better CC utility or Spirit Explosion Core for improved AOE.
