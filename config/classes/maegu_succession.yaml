              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA rush movement"
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Teleport again if off cooldown"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Movement chain for Maegu succession. Cycle between Spirit Step,
            Spirit Rush, and Rabam dashes for maximum speed. Succession
            Maegu has strong teleport-based movement from enhanced base kit.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe forward teleport"
            - skill: "spirit_rush"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA rush forward"
            - skill: "charm_flurry"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG forward movement filler"
            - skill: "spirit_fox_rush"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA rush filler"
            - skill: "foxfire_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement filler"
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "If off cooldown"

