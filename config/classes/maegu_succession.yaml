              input: "Space"
              keys: ["space"]
              note: "Iframe into pack center"
            - skill: "spirit_explosion"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float, group mobs"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst damage"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fox_fire"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit finisher"
            - skill: "flow_fox_frenzy"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend fox fire"
            - skill: "talisman_blast"
              input: "S + LMB"
