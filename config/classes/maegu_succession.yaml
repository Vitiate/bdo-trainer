              note: "Charm burst"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframe and SA movement to
            create distance. Succession Maegu excels at ranged kiting.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe out"
            - skill: "spirit_sidestep"
              input: "Shift + A"
              keys: ["shift", "a"]
              note: "Iframe sidestep"
