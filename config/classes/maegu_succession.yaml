# ============================================================================
# BDO Trainer - Succession Maegu Combo Configuration
# ============================================================================
# Class: Maegu (Succession)
# Weapons: Foxspirit Charm (Main) / Talisman (Off) / Enhanced Pre-Awakening
# Damage Type: Magic/Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Notes:
#   Maegu Succession enhances her Foxspirit Charm and Talisman skills
#   instead of using the Enchanted Scroll awakening weapon. She gains
#   empowered versions of her base kit with longer range, more hits,
#   and stronger protection. Maegu has NO grab — she relies on CC
#   chaining and burst damage to secure kills.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Maegu Class Discord
#   - Community guides by Vert, SumoBDO, BigandShiny
# ============================================================================

class: Maegu
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Pre-Awakening)
# --------------------------------------------------------------------------
awakening_skills:
    spirit_wave:
        name: "Spirit Wave"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 22000
        description: "Self-buff. Increases AP, magic AP, and casting speed. Enhanced fox spirit aura."
        flows_into: ["charm_strike", "fox_fire"]
        core_effect: "Core: Spirit Wave - Additional magic DP buff and HP recovery for 10 sec"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    charm_strike:
        name: "Charm Strike"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 6000
        description: "Enhanced foxspirit charm slash. Multi-hit ranged burst with Super Armor throughout."
        flows_into: ["flow_charm_burst", "fox_fire", "talisman_blast"]
        core_effect: "Core: Charm Strike - Extra hit count and increased damage on all hits"
        notes: "Primary damage skill. Succession version has more hits and longer range than base."

    flow_charm_burst:
        name: "Flow: Charm Burst"
        input: "LMB (after Charm Strike)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Charm Strike. Sends additional charm projectiles outward."
        flows_into: ["fox_fire", "spirit_explosion"]
        notes: "Always follow Charm Strike with this for extra damage."

    fox_fire:
        name: "Fox Fire"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Summon fox spirits that slash forward in rapid succession. High damage multi-hit with knockdown."
        flows_into: ["flow_fox_frenzy", "charm_strike", "talisman_blast"]
        core_effect: "Core: Fox Fire - Extra hits and increased critical hit rate during skill"
        notes: "Highest burst damage in succession kit. Core is a strong alternative to Charm Strike Core."

    flow_fox_frenzy:
        name: "Flow: Fox Frenzy"
        input: "LMB (after Fox Fire)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Fox Fire. Fox spirits continue slashing with extended knockdown."
        flows_into: ["charm_strike", "spirit_explosion"]
        notes: "Always chain after Fox Fire for maximum damage and extended SA window."

    spirit_rush:
        name: "Spirit Rush"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Enhanced spirit charge forward. Teleport rush with Super Armor and stiffness on contact."
        flows_into: ["charm_strike", "fox_fire", "spirit_explosion"]
        notes: "Primary engage and movement skill. Succession version travels further than base."

    talisman_blast:
        name: "Talisman Blast"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stun"]
        damage: medium
        cooldown_ms: 7000
        description: "Enhanced talisman burst. Sends charm energy outward in a cone with stun CC."
        flows_into: ["charm_strike", "fox_fire", "spirit_explosion"]
        core_effect: "Core: Talisman Blast - Stun duration increased and extra magic DP shred"
        notes: "Good ranged CC. Stun enables follow-up damage when you have no grab."

    spirit_explosion:
        name: "Spirit Explosion"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Massive AOE fox spirit detonation. Enhanced version has larger radius and more damage."
        flows_into: ["charm_strike", "fox_fire"]
        core_effect: "Core: Spirit Explosion - AOE radius increased, adds pull effect before float"
        notes: "Best AOE skill. Strong in PVE for clearing and PVP for large scale fights."

    charm_flurry:
        name: "Charm Flurry"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Quick forward charm barrage with Forward Guard. Enhanced with more projectiles."
        flows_into: ["charm_strike", "fox_fire"]
        core_effect: "Core: Charm Flurry - Forward Guard maintained throughout full animation"
        notes: "Fast engagement tool with frontal protection and stiffness CC."

    talisman_shield:
        name: "Talisman Shield"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 10000
        description: "Enhanced talisman barrier that counters with bound CC. Forward Guard throughout."
        flows_into: ["fox_fire", "charm_strike"]
        notes: "Key CC skill. Bound enables full burst combo. FG keeps you safe while casting."

    foxspirit_guard:
        name: "Foxspirit: Guard"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 12000
        description: "Enhanced fox spirit barrier. Forward Guard with magic DP and evasion buffs on successful block."
        flows_into: ["charm_strike", "talisman_blast"]
        notes: "Defensive tool. Enhanced version grants stronger buffs on block than base."

    spirit_step:
        name: "Spirit Step"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Enhanced spirit movement. Iframe teleport with longer distance in succession."
        flows_into: ["charm_strike", "fox_fire", "spirit_rush"]
        notes: "Primary movement skill. Iframe makes it the safest repositioning tool."

    fox_spirit_barrage:
        name: "Fox Spirit Barrage"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "Backwards leap releasing fox spirits at prior location. Knockdown on hit."
        flows_into: ["talisman_blast", "charm_strike"]
        notes: "Repositioning tool with knockdown. Unprotected but creates distance."

    flow_spirit_pierce:
        name: "Flow: Spirit Pierce"
        input: "F (after succession skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard charm pierce. Available after multiple succession skills."
        flows_into: ["charm_strike", "fox_fire"]
        notes: "Can be chained after many skills. Good filler with FG protection."

    charm_spiral:
        name: "Charm Spiral"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 12000
        description: "Spinning charm vortex that pulls then expels enemies. Super Armor throughout."
        flows_into: ["charm_strike", "fox_fire"]
        notes: "Put on hotbar. Strong burst with SA. Good for both PVE packs and PVP."

    fox_spirit_hunt:
        name: "Fox Spirit: Hunt"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Command fox spirits to attack in a line. Ranged SA barrage from hotbar."
        flows_into: ["charm_strike", "talisman_blast"]
        notes: "Hotbar skill. Good ranged poke with full protection at distance."

    spirit_arrow:
        name: "Spirit Arrow"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Quick ranged spirit arrow volley. Fast animation but unprotected."
        flows_into: ["charm_strike", "fox_fire"]
        notes: "Fast ranged filler. Use to poke at range. Unprotected — be careful in PVP."

