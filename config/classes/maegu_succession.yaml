              input: "Space"
              keys: ["space"]
              note: "Continue dashing if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on ranged SA damage and
            avoid overextending. Stay at range and use AOE skills.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "spirit_wave"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe reposition"
            - skill: "spirit_explosion"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float into group"
            - skill: "charm_spiral"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA vortex burst"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA ranged burst"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "fox_spirit_hunt"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA ranged barrage"
            - skill: "foxfire_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA barrier reposition out"
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe disengage"

