        name: "Spirit Sidestep"
        input: "Shift + A / Shift + D"
        keys: ["shift", "a"]
        keys_alt: ["shift", "d"]
        protection: "iframe"
        cc: []
        description: "Quick spirit teleport to the side. Iframe movement for repositioning."
        notes: "Core PVP movement tool. Use to reposition and dodge grabs."

