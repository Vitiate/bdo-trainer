# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and iframe skills.
            Approach with protection, then look for a CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "spirit_wave"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "spirit_step"
              input: "Space"
              keys: ["space"]
              note: "Iframe gap close"
            - skill: "spirit_rush"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA rush into range"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "fox_fire"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    bind_burst:
        name: "Bind Burst (1v1)"
        description: >
            Core Maegu Succession PVP combo. Land Talisman Shield for
            bound CC, then chain into full burst. Maegu has no grab so
            bound is the primary kill tool to lock targets down.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "spirit_rush"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA rush into range"
            - skill: "talisman_shield"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound — locks target in place"
            - skill: "spirit_explosion"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float on bound target"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fox_fire"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use talisman stun to catch target, then chain into bound
            and full burst. No grab means you rely on CC chaining.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "talisman_blast"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ranged stun — catch the target"
            - skill: "talisman_shield"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound on stunned target"
            - skill: "spirit_explosion"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float follow-up"
            - skill: "fox_fire"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Multi-hit main burst"
            - skill: "flow_fox_frenzy"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend fox fire damage"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Charm finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in Super Armor skills. No CC needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "spirit_rush"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA rush engage"
            - skill: "charm_flurry"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "charm_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_charm_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "fox_fire"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA multi-hit finisher"

    ally_punish:
        name: "Ally CC Punish (After Ally CC)"
        description: >
            Maximum damage combo when your teammate lands a CC
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "spirit_explosion"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant AOE on CC'd target"
