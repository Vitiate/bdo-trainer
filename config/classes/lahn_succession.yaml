    death_march:
        name: "Death March"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor rush attack with bound CC. Hotbar only."
        notes: "Decent L58 Rabam. Put on hotbar. SA engage option."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab (Aerial Grab)"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Lahn's signature aerial grab — can be used while airborne from Nimbus Stride. Bypasses Super Armor."
        notes: "Core PVP tool. Aerial grab from Nimbus Stride remains Lahn's defining PVP mechanic in Succession."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Short invincibility during the dodge."
        notes: "Standard iframe. Use to avoid incoming CC. Chains into succession skills."

    nimbus_stride_utility:
        name: "Nimbus Stride (Flight)"
        input: "Space (hold)"
        keys: ["space"]
        protection: "SA"
        cc: []
        description: "Aerial glide. Lahn's unique flight mechanic. Hold Space to glide across terrain. SA while airborne."
        notes: "Available in Succession. Use for repositioning, engaging via aerial grab, and escaping."

    bridled_despair:
        name: "Bridled Despair"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        description: "Super Armor dash attack with stiffness. Utility filler with protection."
        notes: "Put on hotbar. Good protected movement option and filler."

    furor:
        name: "Furor"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Self-buff that increases attack speed and movement speed."
        notes: "Hotbar buff. Use before grinding for the speed boost."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs with enhanced pendulum skills."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Glide to next pack"
            - skill: "flying_strike"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash into pack"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy AOE burst"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up damage"
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Fly to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff first, then unload all succession skills."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "sacred_step"
              input: "Q"
              keys: ["q"]
              note: "AP buff before engaging"
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Glide into pack"
            - skill: "blade_dance"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float opener"
            - skill: "flow_dancing_blades"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up damage"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy AOE burst"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended damage"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "deadly_restraint"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Clean up remaining mobs"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize flight mobility between packs."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Glide into pack — fastest travel"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Quick AOE burst to one-shot"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up if needed"
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Glide to next pack immediately"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns for maximum clear speed."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "sacred_step"
              input: "Q"
              keys: ["q"]
              note: "Buff up"
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Engage from the air"
            - skill: "blade_dance"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float opener"
            - skill: "flow_dancing_blades"
              input: "LMB"
              keys: ["lmb"]
              note: "Extended follow-up"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Highest damage skill"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "soul_slash"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA filler damage"
            - skill: "deadly_restraint"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Reposition and damage"
            - skill: "flying_strike"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close to stragglers"
            - skill: "pendulum_waltz"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"
            - skill: "nocturne"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "Rabam burst"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor succession skills. Approach
            with protection, apply pressure, and look for a grab opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "sacred_step"
              input: "Q"
              keys: ["q"]
              note: "FG AP buff before engaging"
            - skill: "flying_strike"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close with stiffness"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up knockback"
            - skill: "blade_dance"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA finisher with float"

    aerial_grab_combo:
        name: "Aerial Grab Combo (Signature)"
        description: >
            Lahn's signature PVP combo — available in Succession. Fly above
            the target with Nimbus Stride then aerial grab. This bypasses
            Super Armor and is nearly impossible to react to.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly above the target — SA while airborne"
            - skill: "grab"
              input: "E (while airborne)"
              keys: ["e"]
              note: "Aerial grab — bypasses SA, nearly unreactable"
            - skill: "blade_dance"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Finisher burst"

    ground_grab_combo:
        name: "Ground Grab Combo (1v1)"
        description: >
            Standard ground grab combo for 1v1 situations. Fish for stiffness
            from Moon Dance then chain into grab and full burst.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "moon_dance"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "blade_dance"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly while
            staying in Super Armor protected skills. No grab required.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "flying_strike"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush engage"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "blade_dance"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA extended AOE"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab or the
            target is already CC'd on the ground. Dump all burst.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "blade_dance"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on CC'd target"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst on downed target"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use Nimbus Stride flight to create
            distance. Lahn has the best disengage in the game via flight.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "deadly_restraint"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA backward leap to create space"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly away — SA while airborne, hold to glide"
            - skill: "pendulum_waltz"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement if they follow"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Continue flying to safety"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Fly above the blob, dive in with
            SA skills, dump damage, then fly out. Lahn excels at flanking.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "sacred_step"
              input: "Q"
              keys: ["q"]
              note: "FG buff before dive"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly above the enemy group"
            - skill: "blade_dance"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float on landing"
            - skill: "crimson_dance"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main AOE burst"
            - skill: "flow_crimson_blaze"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up damage"
            - skill: "pendulum_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA continued burst"
            - skill: "soul_slash"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA push through enemies"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly out to safety — do not overextend"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    flight_travel:
        name: "Flight Travel / Mobility Chain"
        description: "Chain flight and movement skills for fastest traversal. Lahn has the best overworld mobility."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Hold to glide — primary traversal"
            - skill: "flying_strike"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash when landing"
            - skill: "pendulum_waltz"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement filler"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly again once stamina recovers"

    succession_movement:
        name: "Succession Combat Movement"
        description: >
            Movement chain for Lahn succession in combat. Cycle between
            Nimbus Stride, Flying Strike, and SA skills for maximum
            mobility while staying protected.
        difficulty: intermediate
