# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Crimson Dance"
    effect: "Super Armor enhancement, additional damage on final hit"
    reason: >
        Crimson Dance with Core gains enhanced Super Armor and deals
        significantly more damage on the final hit. This is Lahn's highest
        burst damage succession skill and benefits the most from Core
        enhancement. Improves both PVE clear speed and PVP burst potential.
        Pendulum Slash Core is a strong alternative for consistent damage.
        After getting comfortable, experiment with Blade Dance and
        Pendulum Slash Cores as well.
