# ============================================================================
# BDO Trainer - Succession Lahn Combo Configuration
# ============================================================================
# Class: Lahn (Succession)
# Weapons: Crescent Pendulum (Main) / Noble Sword (Off)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Lahn Class Discord
#   - Community guides by Eminent, Ristelle, Danelle, FlexTape
# ============================================================================

class: Lahn
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Pre-Awakening Skills)
# --------------------------------------------------------------------------
awakening_skills:
    pendulum_slash:
        name: "Pendulum Slash"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced pendulum slash combo. Super Armor with knockdown. Succession-enhanced main damage skill with extended hit count."
        flows_into: ["crimson_dance", "deadly_restraint", "blade_dance"]
        core_effect: "Core: Pendulum Slash - Additional hit on last attack, increased damage"
        notes: "Bread-and-butter damage skill. Succession enhancement adds extra hits and higher multipliers."

    crimson_dance:
        name: "Crimson Dance"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Succession-enhanced spinning pendulum assault. Super Armor with massive AOE and knockdown. Highest burst damage skill."
        flows_into: ["flow_crimson_blaze", "pendulum_slash", "deadly_restraint"]
        core_effect: "Core: Crimson Dance - Super Armor enhancement, additional damage on final hit"
        notes: "Hardest hitting succession skill. Use off cooldown in PVE. Key burst in PVP."

    flow_crimson_blaze:
        name: "Flow: Crimson Blaze"
        input: "LMB (after Crimson Dance)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Crimson Dance. Extended spinning slash with Super Armor and knockback."
        flows_into: ["pendulum_slash", "blade_dance", "deadly_restraint"]
        notes: "Always chain after Crimson Dance for maximum damage output."

    flying_strike:
        name: "Flying Strike"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor forward leaping pendulum strike. Primary gap closer with stiffness on hit."
        flows_into: ["pendulum_slash", "crimson_dance", "blade_dance"]
        notes: "Main engage tool. SA throughout. Good for closing distance in PVE and PVP."

    deadly_restraint:
        name: "Deadly Restraint"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor backward pendulum sweep into ground slam. Bound CC on hit."
        flows_into: ["pendulum_slash", "crimson_dance", "blade_dance"]
        notes: "Good repositioning tool. Bound CC sets up follow-up combos in PVP."

    blade_dance:
        name: "Blade Dance"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Succession-enhanced overhead pendulum slam with float CC. Strong AOE with Super Armor."
        flows_into: ["pendulum_slash", "crimson_dance", "flow_dancing_blades"]
        core_effect: "Core: Blade Dance - Float on good hits, increased damage"
        notes: "Strong AOE. Float CC sets up aerial combos in PVP. Key PVE clear skill."

    flow_dancing_blades:
        name: "Flow: Dancing Blades"
        input: "LMB (after Blade Dance)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Blade Dance. Extended pendulum combo with Super Armor and knockdown."
        flows_into: ["pendulum_slash", "crimson_dance"]
        notes: "Chain after Blade Dance for extra damage and extended CC."

    moon_dance:
        name: "Moon Dance"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard multi-hit pendulum combo with stiffness CC. Good defensive option."
        flows_into: ["pendulum_slash", "crimson_dance", "blade_dance"]
        notes: "Use for frontal protection when pressured. Stiffness sets up grabs in PVP."

    nimbus_stride:
        name: "Nimbus Stride"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 3000
        description: "Signature aerial glide. Super Armor while airborne. Hold Space to glide across the battlefield. Can use aerial grab from this."
        flows_into: ["grab", "flying_strike", "pendulum_slash"]
        notes: "Lahn's signature flight. Hold Space to glide. Available in both Succession and Awakening. SA while airborne."

    crescent_barrage:
        name: "Crescent Barrage"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Succession-enhanced forward pendulum rush with Forward Guard. Quick stiffness poke."
        flows_into: ["pendulum_slash", "crimson_dance"]
        core_effect: "Core: Crescent Barrage - Forward Guard during the skill"
        notes: "Fast engagement tool with frontal protection. Good PVP poke."

    soul_slash:
        name: "Soul Slash"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward rushing pendulum strike. Knockback on hit. Good gap closer."
        flows_into: ["pendulum_slash", "crimson_dance", "blade_dance"]
        notes: "SA engage tool. Useful for pushing through enemies in large scale."

    pendulum_kick:
        name: "Pendulum Kick"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 5000
        description: "Quick low sweep with bound CC. Unprotected."
        flows_into: ["pendulum_slash", "crimson_dance"]
        notes: "Bound CC but unprotected. Use carefully in PVP."

    whiplash:
        name: "Whiplash"
        input: "LMB LMB LMB"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic succession auto-attack chain. Three consecutive pendulum strikes."
        flows_into: ["pendulum_slash", "crimson_dance"]
        notes: "Basic attack. Use only if all other skills are on cooldown."

    sacred_step:
        name: "Sacred Step"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Forward Guard self-buff. Increases AP, attack speed, and critical hit rate for 30 seconds."
        flows_into: ["flying_strike", "pendulum_slash"]
        notes: "Use before engaging. FG while casting. Keep this buff up at all times."

    pendulum_bloom:
        name: "Pendulum Bloom"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor ranged pendulum throw. Hotbar skill with knockback."
        flows_into: ["pendulum_slash"]
        notes: "Hotbar recommended. Good ranged poke with SA protection."

    phantom_dance:
        name: "Phantom Dance"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor dash attack from hotbar. Stiffness CC on hit."
        flows_into: ["pendulum_slash", "crimson_dance"]
        notes: "Hotbar skill. Good protected engage option."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
