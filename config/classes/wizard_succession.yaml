# ============================================================================
# BDO Trainer - Succession Wizard Combo Configuration
# ============================================================================
# Class: Wizard (Succession)
# Weapons: Staff (Main) / Dagger (Off) / Enhanced Staff Skills (no orbs)
# Damage Type: Magic / Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Wizard/Witch Class Discord
#   - Community guides by Akirah, BigandShiny, Lapiku, Unruhe
# ============================================================================

class: Wizard
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Staff Skills)
# --------------------------------------------------------------------------
awakening_skills:
    fireball:
        name: "Fireball"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Super Armor enhanced fireball. Fast cast fire projectile with stiffness."
        flows_into: ["fireball_explosion", "lightning_storm", "meteor_shower"]
        core_effect: "Core: Fireball - Extra hit and increased damage"
        notes: "Quick fire skill. Flows into Fireball Explosion for extra damage."

    fireball_explosion:
        name: "Fireball Explosion"
        input: "LMB (after Fireball)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Fireball. Detonates the fireball for AOE knockdown."
        flows_into: ["lightning_storm", "meteor_shower", "chain_lightning"]
        notes: "Always chain after Fireball for extra AOE burst. Free follow-up."

    lightning_storm:
        name: "Lightning Storm"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor enhanced lightning rain. Massive AOE with knockdown. Core primary nuke."
        flows_into: ["residual_lightning", "meteor_shower", "chain_lightning"]
        core_effect: "Core: Lightning Storm - Extra hit and increased damage"
        notes: "One of your main damage skills. Huge AOE makes it excellent in PVE and large scale."

    meteor_shower:
        name: "Meteor Shower"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 12000
        description: "Super Armor meteor bombardment. Highest damage succession skill. Massive AOE with bound."
        flows_into: ["lightning_storm", "chain_lightning", "earthquake"]
        core_effect: "Core: Meteor Shower - Extra hit and significantly increased damage"
        notes: "Hardest hitting skill in kit. Long cooldown — use wisely. Best used on grouped packs."

    blizzard:
        name: "Blizzard"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor ice storm. Large AOE with stiffness. Strong in both PVE and PVP."
        flows_into: ["lightning_storm", "meteor_shower", "frigid_fog"]
        core_effect: "Core: Blizzard - Extra hit and increased slow duration"
        notes: "Excellent AOE damage with CC. Good filler between Meteor and Lightning cooldowns."

    chain_lightning:
        name: "Chain Lightning"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward lightning bolt. Chains to nearby enemies. Stiffness on hit."
        flows_into: ["lightning_storm", "residual_lightning", "earthquake"]
        core_effect: "Core: Chain Lightning - Increased chain range and hit count"
        notes: "Good engage skill. Chains between mobs making it great for PVE clear."

    earthquake:
        name: "Earthquake"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Super Armor ground eruption. Large AOE knockdown around caster."
        flows_into: ["meteor_shower", "lightning_storm", "chain_lightning"]
        notes: "Strong AOE with knockdown. Good for grouping and follow-up damage."

    residual_lightning:
        name: "Residual Lightning"
        input: "F"
        keys: ["f"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor lightning burst. Float CC on hit. Enhanced in Succession."
        flows_into: ["lightning_storm", "chain_lightning", "meteor_shower"]
        notes: "Good CC tool. Float sets up aerial combos. Use as quick burst filler."

    frigid_fog:
        name: "Frigid Fog"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 6000
        description: "Forward Guard ice fog. Slows enemies and applies stiffness. Defensive utility."
        flows_into: ["blizzard", "lightning_storm"]
        notes: "Defensive utility skill. Use to slow melee attackers and create distance."

    lightning:
        name: "Lightning"
        input: "S + E"
        keys: ["s", "e"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Super Armor enhanced lightning strike. Quick cast with stiffness."
        flows_into: ["chain_lightning", "residual_lightning", "lightning_storm"]
        notes: "Fast filler. Use between main cooldowns for sustained damage."

    multiple_magic_arrows:
        name: "Multiple Magic Arrows"
        input: "RMB"
        keys: ["rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 4000
        description: "Rapid fire magic projectiles. Enhanced range and damage in Succession."
        flows_into: ["fireball", "lightning_storm"]
        notes: "Basic ranged poke. Avoid in PVP due to no protection."

    earth_response:
        name: "Earth's Response"
        input: "Shift + Q"
        keys: ["shift", "q"]
        protection: "FG"
        cc: ["float"]
        damage: medium
        cooldown_ms: 10000
        description: "Forward Guard earth eruption. Float CC. Good defensive catch tool."
        flows_into: ["meteor_shower", "earthquake"]
        notes: "Situational CC tool with frontal protection. Float sets up aerial combos."

    magic_lighthouse:
        name: "Magic Lighthouse"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 15000
        description: "Super Armor persistent AOE beacon. Damages enemies in area over time."
        flows_into: ["meteor_shower", "lightning_storm"]
        notes: "Area denial. Place on grouped mobs then follow up with nukes."

    thunderbolt:
        name: "Thunderbolt"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor forward lightning bolt. Knockback on hit. Good engage."
        flows_into: ["chain_lightning", "lightning_storm", "residual_lightning"]
        notes: "Good engage with SA. Knockback can reposition targets."

    flame_strike:
        name: "Flame Strike"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard fire slash. Quick forward attack with stiffness."
        flows_into: ["fireball", "chain_lightning", "meteor_shower"]
        notes: "Quick engage with frontal protection. Good for poking in PVP."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    infernal_storm:
        name: "Infernal Storm"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Fire and lightning combined AOE with Super Armor and knockdown. Good PVE burst."
        notes: "Preferred L56 choice. SA with knockdown makes it versatile in both PVE and PVP."

    frost_prison:
        name: "Frost Prison"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Ice prison eruption with SA. AOE stiffness and slow."
        notes: "Preferred L57 choice. SA protection and AOE slow make it a safe filler."

    arcane_bombardment:
        name: "Arcane Bombardment"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 12000
        description: "Combined elemental explosion from hotbar. Extra burst skill."
        notes: "Optional. Put on hotbar for additional burst damage between main cooldowns."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Wizard PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Wizard is rare among casters for having a grab. Practice grab timing."

    teleport:
        name: "Teleport"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        description: "Iframe blink teleport. Primary defensive and movement skill. Works in all stances."
        notes: "Best defensive tool. Can chain two teleports. Use to dodge grabs and engage/disengage."

    speed_spell:
        name: "Speed Spell"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Party buff. Increases movement speed and attack/casting speed for all nearby allies."
        notes: "Signature party buff. Keep up at all times in group content. Huge value in node wars."

    healing_lighthouse:
        name: "Healing Lighthouse"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Places a healing beacon that restores HP to all allies in range over time."
        notes: "Strong group healing. Place in safe spots during siege and node wars."

    healing_aura:
        name: "Healing Aura"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Super Armor self and party heal. Instant cast from hotbar."
        notes: "Emergency heal. SA makes it safe to use under pressure."

    protected_area:
        name: "Protected Area"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Signature Wizard skill. Grants 100% CC resist to all nearby party members for duration."
        notes: "THE reason Wizards are wanted in group PVP. Use on cooldown during pushes in node wars."

    magical_evasion:
        name: "Magical Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Emergency dodge in any direction."
        notes: "Use when Teleport is on cooldown. Can save your life in PVP."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple staff nukes for clearing mob packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Teleport into pack"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Main nuke — highest damage"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Lightning AOE follow-up"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ice AOE cleanup"
            - skill: "chain_lightning"
              input: "W + F"
              keys: ["w", "f"]
              note: "Chain filler"
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Teleport to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Uses all major cooldowns for maximum AOE."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Teleport into center of pack"
            - skill: "earthquake"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE knockdown — group mobs"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Main nuke on grouped mobs"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Lightning rain on pack"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ice AOE on remaining"
            - skill: "chain_lightning"
              input: "W + F"
              keys: ["w", "f"]
              note: "Chain between survivors"
            - skill: "fireball"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Quick fire burst"
            - skill: "fireball_explosion"
              input: "LMB"
              keys: ["lmb"]
              note: "Detonate for AOE cleanup"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility between packs."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Teleport into pack"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "One-shot nuke"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Clean up if anything survives"
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Teleport to next pack immediately"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns and flows."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Engage into pack"
            - skill: "earthquake"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE opener — group mobs"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Main nuke on grouped mobs"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Lightning rain"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ice AOE"
            - skill: "chain_lightning"
              input: "W + F"
              keys: ["w", "f"]
              note: "Chain burst"
            - skill: "residual_lightning"
              input: "F"
              keys: ["f"]
              note: "Float and burst"
            - skill: "fireball"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Fire burst"
            - skill: "fireball_explosion"
              input: "LMB"
              keys: ["lmb"]
              note: "Detonate"
            - skill: "infernal_storm"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"
            - skill: "magic_lighthouse"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Place beacon for DOT"
            - skill: "frigid_fog"
              input: "Q"
              keys: ["q"]
              note: "Slow and heal up between pulls"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Teleport iframe and SA succession skills.
            Approach with iframe, then unload SA nukes at range.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Iframe into range"
            - skill: "chain_lightning"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward engage with stiffness"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main lightning nuke"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA meteor follow-up"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA ice burst"
            - skill: "earthquake"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA knockdown finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Wizard PVP combo. Land a grab then chain into full burst.
            Wizard grab bypasses Super Armor — use it to catch tanky targets.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Iframe into grab range"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Main nuke on grabbed target"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Lightning burst follow-up"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ice burst"
            - skill: "earthquake"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Knockdown finisher if still alive"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use stiffness and float skills to catch, then chain into full burst.
            Residual Lightning float into Meteor Shower for devastating follow-up.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "flame_strike"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness — catch the target"
            - skill: "residual_lightning"
              input: "F"
              keys: ["f"]
              note: "Float on stiffened target"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Main nuke on floated target"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Lightning burst"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ice burst follow-up"
            - skill: "chain_lightning"
              input: "W + F"
              keys: ["w", "f"]
              note: "Chain finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly while
            staying in SA-protected skills. Good when grab is on cooldown.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "chain_lightning"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward engage"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main damage"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA ice burst"
            - skill: "fireball"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA quick fire"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground. Pure damage dump.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Instant nuke on CC'd target"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Lightning follow-up"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Ice burst"
            - skill: "earthquake"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Knockdown finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use Teleport iframes and ranged
            skills to create distance. Succession Wizard excels at kiting.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Iframe out immediately"
            - skill: "magical_evasion"
              input: "A or D (double tap)"
              keys: ["a"]
              note: "Sidestep iframe for extra distance"
            - skill: "frigid_fog"
              input: "Q"
              keys: ["q"]
              note: "FG slow to discourage chase"
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Second teleport if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Wizard is a god-tier siege class.
            Buff allies with Protected Area and Speed Spell, then nuke at range.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "protected_area"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "100% CC resist for party — cast before push"
            - skill: "speed_spell"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Speed buff for party"
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Iframe into casting range"
            - skill: "earthquake"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE knockdown on blob"
            - skill: "meteor_shower"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA main nuke on group"
            - skill: "lightning_storm"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA lightning rain on blob"
            - skill: "blizzard"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA ice storm on group"
            - skill: "chain_lightning"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA chain damage"
            - skill: "infernal_storm"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam burst"
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Iframe reposition out"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Teleport Chain"
        description: "Chain Teleports and movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Iframe teleport forward"
            - skill: "magical_evasion"
              input: "W + W"
              keys: ["w"]
              note: "Forward dash filler"
            - skill: "infernal_storm"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam with forward movement"
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Teleport again if off cooldown"

    succession_movement:
        name: "Succession Movement Guide"
        description: >
            Movement chain for Succession Wizard. Cycle between Teleport,
            Rabam movement, and basic dashes. Succession has slightly more
            fluid movement due to no stance-swap penalty.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "teleport"
              input: "Space"
              keys: ["space"]
              note: "Iframe teleport forward"
            - skill: "frost_prison"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA Rabam with forward momentum"
