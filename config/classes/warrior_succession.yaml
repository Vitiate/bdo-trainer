              keys: ["space"]
              note: "SA forward dash"
            - skill: "shield_tide"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA/FG movement"
            - skill: "frenzied_spear"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Movement + stiffness"
