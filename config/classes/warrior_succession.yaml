              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot burst"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "shield_tide"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "ground_slash"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "Engage"
            - skill: "ground_roar"
              input: "W + F"
              keys: ["w", "f"]
              note: "AOE opener"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "scars_of_dusk"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AOE damage"
            - skill: "deep_thrust"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Heavy slam"
            - skill: "spinning_slash"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Filler damage"
            - skill: "take_down"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA burst"
            - skill: "frenzied_spear"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "Reposition to next pack"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and Forward Guard skills.
            Approach with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "ground_slash"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "heavy_strike"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness poke"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "scars_of_dusk"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Warrior PVP combo. Land a grab then chain into full burst.
            Warrior's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "deep_thrust"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "scars_of_dusk"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stiffness,
            then chain into grab and full damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "heavy_strike"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "deep_thrust"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "scars_of_dusk"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "ground_roar"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "deep_thrust"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA heavy slam"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "deep_thrust"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant float on CC'd target"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "scars_of_dusk"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use SA movement to create distance.
            Warrior succession has strong block and shield mobility.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "shield_tide"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement out"
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "SA dash away"
            - skill: "frenzied_spear"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Movement + damage while retreating"
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "Continue dashing if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected damage and
            avoid overextending. Stay with your group and use SA skills.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "ground_slash"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "SA engage into group"
            - skill: "take_down"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA charge into enemies"
            - skill: "ground_roar"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA AOE knockdown"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "scars_of_dusk"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst"
            - skill: "shield_tide"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA reposition out"

