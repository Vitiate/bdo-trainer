# ============================================================================
# BDO Trainer - Succession Warrior Combo Configuration
# ============================================================================
# Class: Warrior (Succession)
# Weapons: Longsword (Main) / Shield (Off) — Enhanced Pre-Awakening Skills
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Warrior Class Discord
#   - Community guides by Tylondys, Mazuu, BPGaming, Goldsteinburg
# ============================================================================

class: Warrior
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills
# --------------------------------------------------------------------------
awakening_skills:
    charging_thrust:
        name: "Charging Thrust"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Enhanced succession lunge. Super Armor throughout with knockdown."
        flows_into: ["flow_charging_thrust", "scars_of_dusk", "deep_thrust"]
        core_effect: "Core: Charging Thrust - Extra hits and increased damage"
        notes: "Bread-and-butter succession damage skill. Always flow into Flow: Charging Thrust."

    flow_charging_thrust:
        name: "Flow: Charging Thrust"
        input: "LMB (after Charging Thrust)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Charging Thrust. Additional burst with Super Armor."
        flows_into: ["scars_of_dusk", "ground_roar", "deep_thrust"]
        notes: "Always chain after Charging Thrust for maximum damage output."

    scars_of_dusk:
        name: "Scars of Dusk"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 8000
        description: "Enhanced multi-hit slash with Super Armor. Strong AOE succession skill."
        flows_into: ["charging_thrust", "deep_thrust", "spinning_slash"]
        core_effect: "Core: Scars of Dusk - Bound on last hit"
        notes: "High damage AOE. Core version adds Bound for combo extension in PVP."

    ground_roar:
        name: "Ground Roar"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor ground slam AOE. Enhanced succession version with wide reach."
        flows_into: ["charging_thrust", "scars_of_dusk", "deep_thrust"]
        core_effect: "Core: Ground Roar - Knockdown on all hits"
        notes: "Good opener and filler. Large AOE for pack clearing in PVE."

    counter:
        name: "Counter"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 4000
        description: "Forward Guard block stance. Counter-attacks with stiffness on successful block."
        flows_into: ["charging_thrust", "shield_strike", "grab"]
        notes: "Core defensive tool. Hold Q to block, release to counter-attack with stiffness."

    shield_strike:
        name: "Shield Strike"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "FG"
        cc: ["stun"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard shield bash with stun CC. Quick and protected."
        flows_into: ["charging_thrust", "deep_thrust", "spinning_slash"]
        notes: "Good CC tool in PVP. Stun leads into grab or burst combos."

    deep_thrust:
        name: "Deep Thrust"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor overhead slam with float CC. Heavy single-target damage."
        flows_into: ["charging_thrust", "scars_of_dusk", "spinning_slash"]
        notes: "Strong burst skill. Float CC allows for air combos in PVP."

    spinning_slash:
        name: "Spinning Slash"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "none"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "360-degree spinning attack. Unprotected but wide AOE clear."
        flows_into: ["charging_thrust", "shield_chase"]
        notes: "Good for clearing mobs in PVE. Risky in PVP due to no protection."

    forward_slash:
        name: "Forward Slash"
        input: "LMB (chain)"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic longsword combo chain. Enhanced successive hits in succession spec."
        flows_into: ["charging_thrust", "shield_strike"]
        notes: "Filler between cooldowns. Cancel into other skills for damage."

    shield_chase:
        name: "Shield Chase"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor shield dash. Primary movement skill in succession."
        flows_into: ["charging_thrust", "ground_roar", "shield_strike"]
        notes: "Primary gap closer and movement tool. SA protection while dashing."

    heavy_strike:
        name: "Heavy Strike"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard rushing strike. Quick approach tool with stiffness CC."
        flows_into: ["charging_thrust", "deep_thrust", "grab"]
        notes: "Good PVP engage. FG while approaching makes it relatively safe."

    chopping_kick:
        name: "Chopping Kick"
        input: "F"
        keys: ["f"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 5000
        description: "Quick kick with bound CC. Unprotected but fast animation."
        flows_into: ["charging_thrust", "deep_thrust"]
        notes: "Quick CC tool. Use after catching someone with stiffness to extend."

    ground_slash:
        name: "Ground Slash"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "none"
        cc: []
        damage: none
        cooldown_ms: 24000
        description: "Self-buff. Increases AP, attack speed, and crit rate for succession."
        flows_into: ["shield_chase", "charging_thrust"]
        core_effect: "Core: Ground Slash - Super Armor during the skill"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    flow_ankle_break:
        name: "Flow: Ankle Break"
        input: "F (after succession skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard sweep available after multiple succession skills."
        flows_into: ["charging_thrust", "scars_of_dusk"]
        notes: "Can be chained after many skills. Good filler with frontal protection."

    take_down:
        name: "Take Down"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor tackle. Enhanced succession version with knockdown CC."
        flows_into: ["charging_thrust", "deep_thrust"]
        notes: "Put on hotbar. Good protected engage or burst filler."

    hilt_strike:
        name: "Hilt Strike"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stun"]
        damage: low
        cooldown_ms: 8000
        description: "Forward Guard pommel strike with stun. PVP catch tool."
        flows_into: ["charging_thrust", "grab"]
        notes: "Hotbar skill. Stun into grab for guaranteed kill combo."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    frenzied_spear:
        name: "Frenzied Spear"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Spear thrust with stiffness CC. Gives +15 Magic DP buff. Good for movement."
        notes: "Preferred over Seismic Strike for general PVP and movement."

    shield_tide:
        name: "Shield Tide"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 8000
        description: "SA on first hit, then Forward Guard. Preferred L57 Rabam for movement."
        notes: "Preferred choice. Useful for protected movement. SA → FG transition."

    dusk_slash:
        name: "Dusk Slash"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["knockdown"]
        damage: low
        cooldown_ms: 12000
        description: "Slash follow-up from hotbar. Neither L58 Rabam is particularly strong."
        notes: "Optional. Can use from hotbar as extra damage filler."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Warrior PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Practice grab timing in duels."

    block:
        name: "Block"
        input: "Q (hold)"
        keys: ["q"]
        protection: "FG"
        cc: []
        description: "Shield block stance. Hold to block incoming attacks from the front."
        notes: "Warrior's core passive defense. Regenerates WP while blocking."

    war_cry:
        name: "War Cry"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "AOE debuff shout. Reduces enemy DP. Super Armor during cast."
        notes: "Use before burst for DP shred. Hotbar recommended."

    piercing_spear:
        name: "Piercing Spear"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["stiffness"]
        description: "Ranged spear throw. Unprotected but useful for long-range poke."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. PVE iframe as well."
        notes: "PVE iframe. Lock in PVP to prevent accidental use."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard succession grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "Gap close to pack"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "scars_of_dusk"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AOE clear"
            - skill: "deep_thrust"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Heavy slam"
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff first, then unload."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "ground_slash"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "AP buff before engaging"
            - skill: "shield_chase"
              input: "Space"
              keys: ["space"]
              note: "Gap close into pack"
            - skill: "ground_roar"
              input: "W + F"
              keys: ["w", "f"]
              note: "AOE knockdown, group mobs"
            - skill: "charging_thrust"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_charging_thrust"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "scars_of_dusk"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "AOE multi-hit"
            - skill: "deep_thrust"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Heavy slam finisher"
            - skill: "spinning_slash"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "Clean up remaining mobs"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "shield_chase"
