# ============================================================================
# BDO Trainer - Awakened Scholar Combo Configuration
# ============================================================================
# Class: Scholar (Awakening)
# Weapons: Grimoire (Main) / Compass (Off) / Astrolabe (Awakening)
# Damage Type: Magic/Ranged
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Scholar Class Discord
#   - Community guides and testing
#   - Scholar is one of the newest BDO classes, uses astronomical/celestial magic
# ============================================================================

class: Scholar
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    celestial_impact:
        name: "Celestial Impact"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 6000
        description: "Channels celestial energy through the Astrolabe to unleash a star burst. Super Armor throughout."
        flows_into: ["flow_nova_burst", "constellation", "gravity_well"]
        core_effect: "Core: Celestial Impact - Extra hit on star burst with increased damage"
        notes: "Bread-and-butter awakening damage skill. Always follow with Flow: Nova Burst."

    flow_nova_burst:
        name: "Flow: Nova Burst"
        input: "LMB (after Celestial Impact)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Celestial Impact. Exploding star nova with knockdown."
        flows_into: ["constellation", "gravity_well"]
        notes: "Always chain after Celestial Impact for maximum burst damage."

    constellation:
        name: "Constellation"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Traces a constellation pattern in the air, dealing massive damage. Super Armor with bound CC."
        flows_into: ["celestial_impact", "supernova", "cosmic_ray"]
        core_effect: "Core: Constellation - Bound on final hit, increased AOE range"
        notes: "Highest single-skill damage in awakening kit. Core is the primary recommendation."

    astral_shift:
        name: "Astral Shift"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Teleport dash forward through astral space. Super Armor with stiffness on arrival."
        flows_into: ["flow_star_trail", "celestial_impact", "constellation"]
        notes: "Primary awakening gap closer. Teleport makes it excellent for closing distance quickly."

    flow_star_trail:
        name: "Flow: Star Trail"
        input: "LMB (after Astral Shift)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Astral Shift. Leaves a trail of star energy dealing damage along the path."
        flows_into: ["celestial_impact", "constellation"]
        notes: "Free follow-up after Astral Shift. Good for tagging mobs while dashing through packs."

    gravity_well:
        name: "Gravity Well"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["pull", "bound"]
        damage: high
        cooldown_ms: 9000
        description: "Creates a gravity singularity that pulls enemies in and binds them. Super Armor."
        flows_into: ["celestial_impact", "constellation", "supernova"]
        core_effect: "Core: Gravity Well - Increased pull radius and added bound on final hit"
        notes: "Incredible grouping tool for PVE. Pull CC is rare and extremely useful in PVP."

    supernova:
        name: "Supernova"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown", "float"]
        damage: high
        cooldown_ms: 10000
        description: "Massive celestial explosion in a large AOE. Super Armor with knockdown and float."
        flows_into: ["celestial_impact", "gravity_well"]
        notes: "Largest AOE in Scholar kit. Excellent for PVE pack clear and large-scale PVP."

    star_shield:
        name: "Star Shield"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 3000
        description: "Conjures a celestial barrier providing Forward Guard. Blocks incoming damage and CC from front."
        flows_into: ["celestial_impact", "cosmic_ray", "gravity_well"]
        notes: "Hold Q for sustained block. Use to bait grabs or wait for cooldowns safely."

    warp_step:
        name: "Warp Step"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 5000
        description: "Short-range teleport with full invincibility frames. Primary defensive iframe."
        flows_into: ["celestial_impact", "constellation", "astral_shift"]
        notes: "Primary iframe. Use defensively to dodge grabs and key CC skills. PVE iframe as well."

    cosmic_ray:
        name: "Cosmic Ray"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Fires a concentrated beam of cosmic energy at range. Forward Guard during cast."
        flows_into: ["constellation", "celestial_impact"]
        core_effect: "Core: Cosmic Ray - Forward Guard persists for 0.5s after skill ends"
        notes: "Ranged poke with frontal protection. Good for fishing for stiffness in PVP."

    meteor_call:
        name: "Meteor Call"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 8000
        description: "Calls down a meteor at the target location. Super Armor during cast."
        flows_into: ["celestial_impact", "gravity_well", "constellation"]
        notes: "Ranged AOE with SA protection. Good opener before dashing in with Astral Shift."

    stellar_flare:
        name: "Stellar Flare"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 25000
        description: "Self-buff. Increases AP, casting speed, and critical hit rate for 30 seconds."
        flows_into: ["astral_shift", "celestial_impact"]
        core_effect: "Core: Stellar Flare - Adds All Evasion +5% during buff duration"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    astral_orbit:
        name: "Astral Orbit"
        input: "S + F"
        keys: ["s", "f"]
        protection: "FG"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 6000
        description: "Spins the Astrolabe defensively, creating an orbital barrier with Forward Guard."
        flows_into: ["celestial_impact", "gravity_well"]
        notes: "Defensive filler with Forward Guard. Useful between main cooldowns."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    celestial_binding:
        name: "Celestial Binding"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Projects celestial chains that bind and damage enemies. Super Armor with stiffness. Grants +15 All DP buff."
        notes: "Preferred L56 Rabam for PVP. Good protected CC with DP buff."

    nova_shield:
        name: "Nova Shield"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 8000
        description: "SA on activation, transitions to Forward Guard. Creates a moving star shield for protected movement."
        notes: "Preferred L57 Rabam. Excellent for protected repositioning. SA → FG transition."

    starfall_strike:
        name: "Starfall Strike"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Rains down a barrage of star fragments in a wide area. Super Armor throughout."
        notes: "Decent L58 Rabam. Good for extra burst in PVE. Hotbar only."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Scholar PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Scholar is one of the few ranged-oriented classes with a grab."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Short invincibility during the dash."
        notes: "PVE iframe. Lock in PVP if triggering accidentally during combos."

    gravity_pulse:
        name: "Gravity Pulse"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stiffness"]
        description: "Pre-awakening ranged attack with Forward Guard. Good for poking at range."

    bookmark:
        name: "Bookmark"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "iframe"
        cc: []
        description: "Teleport to a previously marked location. Short iframe on activation."
        notes: "Set up escape points before fights. Unique utility for repositioning."

    ink_splash:
        name: "Ink Splash"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["stiffness"]
        description: "Ranged ink projectile with stiffness CC. Unprotected but fast."
        notes: "Quick ranged CC. Useful for catching targets but be aware of no protection."

