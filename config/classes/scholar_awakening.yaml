            - skill: "nova_shield"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns and grouping tools."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "stellar_flare"
