# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor teleport and Forward Guard skills.
            Approach with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "stellar_flare"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "astral_shift"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport gap close"
            - skill: "cosmic_ray"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness poke"
            - skill: "celestial_impact"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_nova_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up explosion"
            - skill: "constellation"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Scholar PVP combo. Land a grab then chain into full celestial burst.
            Scholar's grab bypasses Super Armor — use teleport to close distance first.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "astral_shift"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport to melee range"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "supernova"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE burst on grabbed target"
            - skill: "celestial_impact"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_nova_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up explosion"
            - skill: "constellation"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher — maximum damage"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard and ranged skills to fish for a stiffness,
            then chain into grab and full damage. Scholar excels at ranged poke.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "cosmic_ray"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "astral_shift"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport to stiffened target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "supernova"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE burst follow-up"
            - skill: "celestial_impact"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_nova_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up explosion"
            - skill: "gravity_well"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Pull finisher if target survives"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "astral_shift"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport engage"
            - skill: "celestial_impact"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA burst"
            - skill: "flow_nova_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "constellation"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage"
            - skill: "gravity_well"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA pull + bound"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "supernova"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant AOE on CC'd target"
            - skill: "celestial_impact"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_nova_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up explosion"
            - skill: "constellation"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher — maximum damage"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Scholar has excellent teleport tools
            for creating distance. Use iframes and SA movement to get out.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "warp_step"
              input: "Space"
              keys: ["space"]
              note: "iframe teleport out"
            - skill: "nova_shield"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA/FG protected movement"
            - skill: "astral_shift"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport dash away"
            - skill: "cosmic_ray"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG ranged poke while retreating"
            - skill: "warp_step"
              input: "Space"
              keys: ["space"]
              note: "iframe again if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on ranged AOE damage and grouping.
            Scholar excels in large scale with Gravity Well pulls and Supernova AOE.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "stellar_flare"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "meteor_call"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "Ranged AOE opener from distance"
            - skill: "astral_shift"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA teleport into group"
            - skill: "gravity_well"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA pull enemies together"
            - skill: "supernova"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA massive AOE burst"
            - skill: "celestial_impact"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_nova_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up explosion"
            - skill: "constellation"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA high damage finisher"
            - skill: "nova_shield"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA reposition out"

