pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills. Approach with SA protection
            then look for a CC opening. Drakania has no grab so must trade or CC.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "burning_fury"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA buff before going in"
            - skill: "draconic_leap"
              input: "Space"
              keys: ["space"]
              note: "SA leap gap close"
            - skill: "draconic_slash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge into target"
            - skill: "flow_draconic_slash"
              input: "F"
              keys: ["f"]
              note: "FG stiffness poke"
            - skill: "slayer_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage on stiffened target"
            - skill: "flow_slayer_strike"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"

    ranged_trade:
        name: "Ranged Trade (Brimbolt Kite)"
        description: >
            Succession Drakania's signature kiting combo. Use enhanced Brimbolt
            to deal damage at mid-range while staying in Super Armor.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "brimbolt"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA ranged fire — stiffness at range"
            - skill: "flow_brimbolt"
              input: "RMB"
              keys: ["rmb"]
              note: "SA extend fire damage"
            - skill: "ember_blast"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA ranged knockback"
            - skill: "draconic_leap"
              input: "Space"
              keys: ["space"]
              note: "SA reposition"
            - skill: "brimbolt"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA ranged fire again if off cooldown"

    cc_chain:
        name: "CC Chain (No Grab)"
        description: >
            CC chain combo for succession Drakania. Since Drakania has no grab,
            you must fish for stiffness into bound then burst. Requires patience.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "flame_sweep"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "FG stiffness — catch the target"
            - skill: "untamed_surge"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA knockback on stiffened target"
            - skill: "dragon_maw"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG bound — extend CC chain"
            - skill: "slayer_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_slayer_strike"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "dragon_fang"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE knockdown finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly while
            staying in SA skills. No CC setup needed — pure damage trade.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "draconic_slash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA charge into target"
            - skill: "slayer_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_slayer_strike"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "brimbolt"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA ranged finisher"

    greatsword_punish:
        name: "Greatsword Punish (Target CC'd)"
        description: >
            Maximum damage combo when ally lands a grab or the target is
            already CC'd on the ground. Full burst with down attack modifiers.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "dragon_fang"
