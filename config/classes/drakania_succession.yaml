# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Slayer Strike"
    effect: "Extra damage on all hits and increased down attack multiplier"
    reason: >
        Slayer Strike with Core gains significantly increased damage and
        enhanced down attack multipliers, making succession Drakania's primary
        greatsword slam even more devastating. This is the highest priority
        Core for Drakania Succession. After getting comfortable, experiment
        with Brimbolt Core for better ranged trading and Dragon Fang Core
        for large scale PVP. Drakania has no grab, so maximizing burst
        damage on CC'd targets is critical — Slayer Strike Core achieves
        exactly that. Brimbolt Core is a strong alternative if you prefer
        a mid-range kiting playstyle over melee trading.
