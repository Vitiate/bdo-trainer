              input: "Hotbar"
              keys: ["hotbar"]
              note: "Buff before engaging blob"
            - skill: "draconic_leap"
              input: "Space"
              keys: ["space"]
              note: "SA leap engage into group"
            - skill: "dragon_fang"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE knockdown on group"
            - skill: "slayer_strike"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_slayer_strike"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "brimbolt"
              input: "Shift + RMB"
