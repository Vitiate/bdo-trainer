# ============================================================================
# BDO Trainer - Succession Drakania Combo Configuration
# ============================================================================
# Class: Drakania (Succession)
# Weapons: Slayer (Main — Enhanced Greatsword) / Shard (Off)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Class Notes:
#   - Drakania has NO grab — must rely on CC chains and protected trading
#   - Succession enhances pre-awakening Slayer (greatsword) skills
#   - Strong ranged options with enhanced Brimbolt fire attacks
#   - Tanky class with good Super Armor coverage and self-healing
#   - Excels at mid-range trading and sustained damage output
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Drakania Class Discord
#   - Community guides by Aethon, Drakthar, HexeDrak
# ============================================================================

class: Drakania
spec: Succession

# --------------------------------------------------------------------------
# Awakening Skills (Succession-Enhanced Pre-Awakening Skills)
# --------------------------------------------------------------------------
awakening_skills:
    slayer_strike:
        name: "Slayer Strike"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Enhanced greatsword overhead slam with Super Armor. Main succession damage skill."
        flows_into: ["flow_slayer_strike", "brimbolt", "draconic_slash"]
        core_effect: "Core: Slayer Strike - Extra damage on all hits and increased down attack multiplier"
        notes: "Bread-and-butter damage skill. Always follow up with Flow: Slayer Strike."

    flow_slayer_strike:
        name: "Flow: Slayer Strike"
        input: "LMB (after Slayer Strike)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up greatsword cleave after Slayer Strike. Additional burst with Super Armor."
        flows_into: ["brimbolt", "draconic_slash", "dragon_fang"]
        notes: "Always chain after Slayer Strike for extra damage. Down attack properties."

    brimbolt:
        name: "Brimbolt"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 8000
        description: "Enhanced ranged fire blast. Super Armor with stiffness on hit. Strong mid-range damage."
        flows_into: ["flow_brimbolt", "slayer_strike", "draconic_slash"]
        core_effect: "Core: Brimbolt - Extra damage, increased range, and additional burn tick damage"
        notes: "Signature succession ranged skill. Good for mid-range trading and kiting. Core priority."

    flow_brimbolt:
        name: "Flow: Brimbolt"
        input: "RMB (after Brimbolt)"
        keys: ["rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up fire wave after Brimbolt. Extends the burn damage at range."
        flows_into: ["slayer_strike", "draconic_slash", "dragon_fang"]
        notes: "Always chain after Brimbolt. Keeps you in SA while dealing additional fire damage."

    draconic_slash:
        name: "Draconic Slash"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward greatsword slash. Good gap closer with knockback."
        flows_into: ["flow_draconic_slash", "slayer_strike", "brimbolt"]
        notes: "Primary engage tool. Covers good distance with SA protection."

    flow_draconic_slash:
        name: "Flow: Draconic Slash"
        input: "F (after Draconic Slash)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard cross-slash after Draconic Slash. Quick stiffness CC."
        flows_into: ["slayer_strike", "brimbolt", "dragon_fang"]
        notes: "Always chain after Draconic Slash. FG transitions well into burst skills."

    scale_armor:
        name: "Scale Armor"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 12000
        description: "Defensive stance with Super Armor. Grants DP buff and HP recovery over time."
        flows_into: ["slayer_strike", "brimbolt", "draconic_slash"]
        core_effect: "Core: Scale Armor - Increased HP recovery and additional DP buff"
        notes: "Use when under pressure. SA self-heal and DP buff. Good for sustain fights."

    dragon_fang:
        name: "Dragon Fang"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 10000
        description: "Massive greatsword ground slam. Super Armor AOE with knockdown."
        flows_into: ["slayer_strike", "brimbolt", "draconic_slash"]
        core_effect: "Core: Dragon Fang - Additional knockdown hit and increased AOE radius"
        notes: "Strong AOE burst. Use in PVE for packs and PVP for group fights."

    untamed_surge:
        name: "Untamed Surge"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward charge with greatsword. Knockback on impact."
        flows_into: ["slayer_strike", "brimbolt", "dragon_fang"]
        notes: "Good engage and filler. SA movement with damage."

    draconic_leap:
        name: "Draconic Leap"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Super Armor forward leap. Primary movement skill in succession."
        flows_into: ["slayer_strike", "draconic_slash", "brimbolt"]
        notes: "Main movement skill. SA throughout. PVE iframe (1s invincibility vs monsters)."

    dragon_maw:
        name: "Dragon Maw"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard ground bite attack with bound CC."
        flows_into: ["slayer_strike", "brimbolt", "dragon_fang"]
        notes: "Good defensive CC tool. FG keeps you protected while fishing for bound."

    scorching_breath:
        name: "Scorching Breath"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Fire breath cone attack with Super Armor. AOE stiffness on hit."
        flows_into: ["slayer_strike", "brimbolt", "dragon_fang"]
        notes: "Good AOE for PVE. Stiffness sets up follow-up CC in PVP."

    fang_barrage:
        name: "Fang Barrage"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Forward Guard multi-hit greatsword combo. Rapid strikes with stiffness."
        flows_into: ["slayer_strike", "draconic_slash"]
        notes: "Good filler with frontal protection. Multi-hit builds up damage quickly."

    flame_sweep:
        name: "Flame Sweep"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 4000
        description: "Quick forward fire-infused slash with Forward Guard. Fast stiffness poke."
        flows_into: ["slayer_strike", "draconic_slash", "brimbolt"]
        core_effect: "Core: Flame Sweep - Forward Guard maintained during the full animation"
        notes: "Fast FG poke. Good for testing opponent's defense in PVP."

    burning_fury:
        name: "Burning Fury"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 24000
        description: "Self-buff with Super Armor. Increases AP, attack speed, and burn damage."
        flows_into: ["slayer_strike", "draconic_slash"]
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    dragon_rend:
        name: "Dragon Rend"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 12000
        description: "Powerful overhead greatsword slam from hotbar. Super Armor with knockdown."
        flows_into: ["slayer_strike", "brimbolt"]
        notes: "Hotbar skill. Strong burst damage with protection."

    ember_blast:
        name: "Ember Blast"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Ranged fire explosion from hotbar. Super Armor with knockback at range."
        flows_into: ["brimbolt", "slayer_strike"]
        notes: "Hotbar skill. Good ranged poke with SA protection."

