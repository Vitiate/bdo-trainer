# ============================================================================
# BDO Trainer - Succession Ninja Combo Configuration
# ============================================================================
# Class: Ninja (Succession)
# Weapons: Shortsword (Main) / Shuriken (Off) — Enhanced pre-awakening skills
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Succession Ninja Identity:
#   - Enhanced Shortsword and Shuriken skills with no Sura Katana usage
#   - Retains Grab (E) — core PVP tool that bypasses Super Armor
#   - Retains stealth via Ninjutsu: Shadow Clone for invisible approach
#   - Crescent Slash and Ninjutsu skills become primary damage dealers
#   - Faster, more fluid combos than Awakening with tighter animation locks
#   - High burst windows with enhanced pre-awakening kit scaling
#   - Still extremely high skill ceiling — stealth assassin playstyle
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Ninja Class Discord
#   - Community guides by Katan, Dae, Shinobi, BPGaming
# ============================================================================

class: Ninja
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Pre-Awakening)
# --------------------------------------------------------------------------
awakening_skills:
    crescent_slash:
        name: "Crescent Slash"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Signature succession skill. Wide arc slash with Super Armor and knockdown."
        flows_into: ["flash_slash", "shadow_stomp", "ninja_step"]
        core_effect: "Core: Crescent Slash - Extra hits and massively increased damage"
        notes: "Primary damage skill. SA throughout. Bread-and-butter of succession rotation."

    ninjutsu_black_moonlight:
        name: "Ninjutsu: Black Moonlight"
        input: "S + E"
        keys: ["s", "e"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 10000
        description: "Powerful upward slash ninjutsu. Float CC with high burst damage."
        flows_into: ["crescent_slash", "shadow_clone_attack", "ankle_cutter"]
        core_effect: "Core: Black Moonlight - Extended Super Armor duration and extra damage"
        notes: "High burst ninjutsu. Float sets up aerial combos. Use after CC or grab."

    shadow_clone_attack:
        name: "Ninjutsu: Shadow Clone Attack"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 9000
        description: "Enhanced shadow clone assault. SA multi-hit with stiffness."
        flows_into: ["crescent_slash", "ninjutsu_black_moonlight", "flash_slash"]
        notes: "Strong damage skill with SA. Stiffness enables grab follow-up."

    flash_slash:
        name: "Flash Slash"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Quick forward dash slash with Super Armor. Gap closer with stiffness."
        flows_into: ["crescent_slash", "shadow_stomp", "grab"]
        core_effect: "Core: Flash Slash - Forward Guard added during dash frames"
        notes: "Good engage tool. SA makes it safe. Stiffness into grab is a core combo."

    shadow_stomp:
        name: "Shadow Stomp"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Ground stomp with Super Armor. Bound CC for combo setup."
        flows_into: ["crescent_slash", "ninjutsu_black_moonlight", "grab"]
        notes: "Key CC tool. SA bound into grab or Crescent Slash for full burst."

    shuriken_throw:
        name: "Shuriken Throw"
        input: "RMB"
        keys: ["rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 3000
        description: "Ranged shuriken throw. Stiffness on hit. Fast animation."
        flows_into: ["flash_slash", "ninja_step", "crescent_slash"]
        notes: "Ranged poke for stiffness. Unprotected but very fast. Good for catching."

    kunai_stab:
        name: "Kunai Stab"
        input: "LMB"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic shortsword combo. Enhanced in succession for filler damage."
        flows_into: ["crescent_slash", "shadow_stomp", "flash_slash"]
        notes: "Basic attack filler. Use to cancel animations or transition between skills."

    suicide_fall:
        name: "Suicide Fall"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 8000
        description: "Aerial dive attack with Super Armor. Knockdown on impact."
        flows_into: ["crescent_slash", "shadow_stomp", "ankle_cutter"]
        notes: "SA gap closer with knockdown. Good for engaging from above."

    ankle_cutter:
        name: "Ankle Cutter"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick low sweep with bound CC. Enhanced damage in succession."
        flows_into: ["crescent_slash", "ninjutsu_black_moonlight", "grab"]
        notes: "Bound CC for combo setups. Unprotected — use when target is CC'd or distracted."

    ninja_step:
        name: "Ninja Step"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 4000
        description: "Quick directional dash with iframe. Primary movement skill."
        flows_into: ["crescent_slash", "flash_slash", "shadow_stomp"]
        notes: "iframe movement. Faster than awakening Silent Step. Chain for mobility."

    ninjutsu_shadow_clone:
        name: "Ninjutsu: Shadow Clone"
        input: "Q"
        keys: ["q"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Stealth / invisibility skill. SA during cast. Turns Ninja invisible."
        flows_into: ["crescent_slash", "flash_slash", "grab"]
        notes: "Stealth approach for assassination. SA cast. Duration varies with skill level."

    shadow_slash:
        name: "Shadow Slash"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward Guard backward slash. Knockback CC with frontal protection."
        flows_into: ["crescent_slash", "flash_slash", "ninja_step"]
        notes: "Safe poke with FG. Knockback creates distance. Good defensive option."

    ninjutsu_oni_shadow:
        name: "Ninjutsu: Oni Shadow"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 10000
        description: "Enhanced ninjutsu. Super Armor with float CC and high damage."
        flows_into: ["crescent_slash", "ninjutsu_black_moonlight", "shadow_clone_attack"]
        core_effect: "Core: Oni Shadow - Increased number of hits and AoE range"
        notes: "Strong burst ninjutsu. Float into aerials. Core expands the AOE significantly."

    beheading_the_dead:
        name: "Beheading the Dead"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward rushing slash with Super Armor. Knockdown CC."
        flows_into: ["crescent_slash", "shadow_stomp", "ankle_cutter"]
        notes: "SA gap closer with knockdown. Good approach tool between cooldowns."

    blade_spin:
        name: "Blade Spin"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Spinning blade attack with Super Armor. Stiffness on hit."
        flows_into: ["crescent_slash", "flash_slash", "grab"]
        notes: "SA filler with stiffness. Use to approach or set up grab attempts."

    flow_cutting_clouds:
        name: "Flow: Cutting Clouds"
        input: "F (after succession skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard attack available after multiple succession skills."
        flows_into: ["crescent_slash", "shadow_stomp"]
        notes: "Can chain after many skills. FG filler between combos. Always weave this in."

    ninjutsu_ghost_step:
        name: "Ninjutsu: Ghost Step"
        input: "Shift + Space"
        keys: ["shift", "space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 6000
        description: "Long-range iframe dash. Enhanced in succession for extra distance."
        flows_into: ["crescent_slash", "flash_slash", "ninjutsu_shadow_clone"]
        notes: "Key mobility iframe. Longer range than Ninja Step. Use for repositioning."

