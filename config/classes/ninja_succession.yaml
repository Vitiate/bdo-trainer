pvp_combos:
    stealth_engage:
        name: "Stealth Engage"
        description: >
            Classic Ninja assassination opener. Go invisible with Shadow Clone,
            approach the target unseen, then burst from stealth with succession skills.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "ninjutsu_shadow_clone"
              input: "Q"
              keys: ["q"]
              note: "Go invisible — stealth approach"
            - skill: "flash_slash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA stiffness out of stealth"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab stiffened target"
            - skill: "crescent_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Full burst on grabbed target"
            - skill: "ninjutsu_black_moonlight"
              input: "S + E"
              keys: ["s", "e"]
              note: "Float follow-up for extra damage"
            - skill: "shadow_clone_attack"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher if target survives"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Ninja PVP combo. Land a grab then chain into full succession burst.
            Ninja's grab bypasses Super Armor — no stance swap needed in succession.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "crescent_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Maximum burst on grabbed target"
            - skill: "ninjutsu_black_moonlight"
              input: "S + E"
              keys: ["s", "e"]
              note: "Float follow-up"
            - skill: "shadow_clone_attack"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA multi-hit follow-up"
            - skill: "ninjutsu_oni_shadow"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Finisher burst on downed target"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use stiffness or bound skills to catch the target off guard,
            then chain into grab and full Crescent Slash burst.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "shadow_stomp"
              input: "S + F"
              keys: ["s", "f"]
              note: "SA bound — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on bound target"
            - skill: "crescent_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "ninjutsu_black_moonlight"
              input: "S + E"
              keys: ["s", "e"]
              note: "Float follow-up"
            - skill: "shadow_clone_attack"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Extra burst damage"
            - skill: "ankle_cutter"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Finisher"

    ranged_catch:
        name: "Ranged Catch (Shuriken Opener)"
        description: >
            Ranged catch combo. Hit Shuriken Throw from distance for stiffness,
            then close the gap with Flash Slash and grab for full burst.
        difficulty: advanced
        combo_window_ms: 200
        steps:
            - skill: "shuriken_throw"
              input: "RMB"
              keys: ["rmb"]
              note: "Ranged stiffness — catch from distance"
            - skill: "flash_slash"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close to stiffened target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "crescent_slash"
