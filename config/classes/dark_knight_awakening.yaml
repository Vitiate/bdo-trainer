pve_combos:
  awakening_main_dps:
    name: Awakening Main DPS
    difficulty: advanced
    combo_window_ms: 300
    description: Primary Awakening DPS string listed in the quick PvE guide.
    steps:
      - skill: shattering_darkness
      - skill: unveiled_fate
      - skill: blooming_black_rose
      - skill: spirit_legacy
        note: Heavy damage nuke.
      - skill: root_of_catastrophe
        note: Continue the Seed follow-w.
        hold_ms: 1500
      - skill: spirit_legacy
        note: Big frontal hit in the main DPS string.
      - skill: dark_nebula
        note: Use as quickcast after Legacy.
      - skill: twilight_dash
        note: Use once crit chance addon is active.
  awakening_main_combo_1:
    name: Awakening Main Combo 1
    description: Standard Awakening pack-clear combo from the guide.
    difficulty: advanced
    combo_window_ms: 300
    steps:
      - skill: unveiled_dagger
        note: Start the combo and flow into movement.
      - skill: air_strike
        note: Engage and continue forward.
      - skill: furia_di_vedir
        note: Hold to continue movement into the pack.
      - skill: spirit_legacy
        note: Use Legacy; if it is on cooldown, substitute Trap of Vedir.
      - skill: trap_of_vedir
        note: Alternative to Spirit Legacy when Legacy is on cooldown.
      - skill: shattering_darkness
        note: Main damage follow-w.
      - skill: flow_bombardment
        hold_ms: 1500
        note: Flow from Shattering Darkness.
      - skill: flow_root_of_catastrophe
        hold_ms: 1500
        note: Second held flow.
      - skill: seed_of_catastrophe
        note: Heavy AoE finisher.
      - skill: root_of_catastrophe
        hold_ms: 1500
        note: Finish the combo with the held Root follow-w.
  awakening_main_combo_2:
    name: Awakening Main Combo 2
    description: Fallback main combo when both Spirit Legacy and Trap of Vedir are on cooldown.
    difficulty: advanced
    combo_window_ms: 300
    steps:
      - skill: unveiled_dagger
        note: Start the combo.
      - skill: air_strike
        note: Gap close into the pack.
      - skill: furia_di_vedir
        note: Continue forward pressure.
      - skill: flow_spirit_blaze
        note: Use this if both Legacy and Trap are unavailable.
      - skill: shattering_darkness
        note: Turn camera to get behind mobs for back attacks.
      - skill: flow_bombardment
        hold_ms: 1500
        note: Flow continuation.
      - skill: flow_root_of_catastrophe
        hold_ms: 1500
        note: Second flow.
      - skill: seed_of_catastrophe
        note: Primary nuke.
      - skill: root_of_catastrophe
        hold_ms: 1500
        note: Complete the Seed follow-w.
  awakening_main_combo_3:
    name: Awakening Main Combo 3
    difficulty: advanced
    combo_window_ms: 300
    description: Variation for spots where back attacks are less important.
    steps:
      - skill: unveiled_dagger
        note: Open the combo.
      - skill: air_strike
        note: Move into the pack.
      - skill: furia_di_vedir
        note: Continue movement and setw.
      - skill: spirit_legacy
        note: Main burst hit.
      - skill: dark_nebula
        note: Use before Seed at spots where back attacks are less relevant.
      - skill: seed_of_catastrophe
        note: Heavy AoE damage.
      - skill: root_of_catastrophe
        note: Continue from Seed.
        hold_ms: 1500
      - skill: shattering_darkness
        note: Resume the normal flow string after Seed.
      - skill: flow_bombardment
        note: Flow continuation.
        hold_ms: 1500
      - skill: flow_root_of_catastrophe
        note: Final follow-w in the listed variation.
        hold_ms: 1500
  awakening_main_fillers:
    name: Awakening Main Fillers
    difficulty: intermediate
    combo_window_ms: 300
    description: Primary filler skills recommended between main combos.
    steps:
      - skill: grip
        note: Use only after crit chance addons are w.
      - skill: flow_spirit_blaze
        note: Helpful for managing cooldowns.
  awakening_secondary_fillers:
    name: Awakening Secondary Fillers
    difficulty: intermediate
    combo_window_ms: 300
    description: Backw filler skills; the guide says ideally not to use them unless needed.
    steps:
      - skill: dark_nebula
        note: Emergency filler when needed.
      - skill: spirit_hunt
        note: Secondary filler.
      - skill: touch_of_exploitation
        note: Secondary filler.
      - skill: spirit_blaze
        note: Secondary filler and flow starter.
  awakening_pulling_skills:
    name: Awakening Pulling Skills
    description: Skills listed in the guide for gathering or pulling packs.
    difficulty: beginner
    combo_window_ms: 300
    steps:
      - skill: furia_di_vedir
        note: Primary forward pull tool.
      - skill: shadow_strike
        note: Used to help gather mobs.
      - skill: shadow_bullet
        note: Ranged pull / movement utility.
      - skill: obsidian_ashes
        note: Pack gathering utility.
      - skill: cluster_of_despair
        note: Additional pulling option; guide warns its hitbox can be wonky.
  awakening_pack_to_pack_movement:
    name: Awakening Pack to Pack Movement
