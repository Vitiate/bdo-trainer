# Dark Knight — Awakening
# Generated / updated by BDO Trainer Editor

class: Dark Knight
spec: Awakening
skills:
  spirit_hunt:
    name: Spirit Hunt
    input: W + RMB
    keys:
      - w
      - rmb
    protection: SA
    cc:
      - stiffness
    damage: high
    cooldown_ms: 3000
    description: Draw close to the enemy in an instant, inflicting Stiffness around them. Swer Armor throughout.
    flows_into:
      - shattering_darkness
      - seed_of_catastrophe
    core_effect: "Core: Spirit Hunt - Stiffness on good hits"
    notes: Core gap-close opener. Can be used with kriegsmesser. Recovers 150 MP per hit.
  shattering_darkness:
    name: Shattering Darkness
    input: SHIFT + LMB
    keys:
      - shift
      - lmb
    protection: FG
    cc:
      - down_attack
    damage: high
    cooldown_ms: 7000
    description:
      Slam down phantom blades while evading backward and perform a wide-area magic attack. Forward Guard during
      the skill.
    flows_into:
      - flow_bombardment
      - flow_root_of_catastrophe
    core_effect: "Core: Shattering Darkness - Stiffness on good hits"
    notes: Hold LMB or SHIFT+LMB after to flow front, RMB to flow back.
  seed_of_catastrophe:
    name: Seed of Catastrophe
    input: SHIFT + E
    keys:
      - shift
      - e
    protection: none
    cc:
      - floating
    damage: very_high
    cooldown_ms: 7000
    description: Summon a tree illusion to damage your foes. Floating on hits.
    flows_into:
      - flow_bombardment
      - flow_root_of_catastrophe
    core_effect: "Core: Seed of Catastrophe - Swer Armor during skill (RECOMMENDED CORE)"
    notes: No base protection. SA only applies with Core wgrade. Flows into Root of Catastrophe.
  spirit_legacy:
    name: Spirit Legacy
    input: SHIFT + RMB
    keys:
      - shift
      - rmb
    protection: FG
    cc:
      - stun
    damage: very_high
    cooldown_ms: 7000
    description:
      Inflict explosive damage to enemies in front by charging dark magic into the phantom blades. Forward Guard
      during the skill.
    flows_into:
      - spirit_hunt
      - touch_of_exploitation
    core_effect: "Core: Spirit Legacy - Stun on good hits"
    notes: All Damage Reduction -20 for 10s on hits (nullified during cooldown).
  touch_of_exploitation:
    name: Touch of Exploitation
    input: s + LMB
    keys:
      - s
      - lmb
    protection: FG
    cc:
      - down_attack
    damage: medium
    cooldown_ms: 6000
    description:
      Deal damage with your kriegsmesser and magic simultaneously to enemies in front. Hold s + LMB to continue
      the skill. Forward Guard during the skill (nullified during cooldown).
    flows_into:
      - spirit_hunt
      - shattering_darkness
    core_effect: "Core: Touch of Exploitation - Bound on last good hit"
    notes: Damage reduced during cooldown. Critical Hit Rate +50% (PvE only).
  cluster_of_despair:
    name: Cluster of Despair
    input: RMB
    keys:
      - rmb
    protection: SA
    cc:
      - down_attack
    damage: high
    cooldown_ms: 7000
    description:
      Throw multiple Phantom Blades forward to inflict heavy damage. Swer Armor during the skill. Can be performed
      instantly after certain skills via RMB.
    flows_into:
      - spirit_hunt
      - seed_of_catastrophe
    notes: Movement Speed -10% for 5s on hits. Critical Hit Rate +50% (PvE only).
  wheel_of_fortune:
    name: Wheel of Fortune
    input: SHIFT + F
    keys:
      - shift
      - f
    protection: SA
    cc:
      - floating
    damage: high
    cooldown_ms: 6000
    description:
      Draw from the energy of nature around to attack with a powerful blade strike. Swer Armor during the skill.
      Floating on hits.
    flows_into:
      - spirit_hunt
      - shattering_darkness
    notes: Can be used via Quick Slot with your vediant. Air Attack.
  air_strike:
    name: Air Strike
    input: W + F
    keys:
      - w
      - f
    protection: iframe
    cc:
      - floating
      - bound
    damage: medium
    cooldown_ms: 7000
    description:
      Powerful wward slash then downward blow on ground to inflict heavy damage. Invincible while moving. Floating
      on hits, Bound on extra attack hits.
    flows_into:
      - spirit_hunt
      - shattering_darkness
    notes: Down Attack and Air Attack. Essential PVP catch tool.
  nocturne:
    name: Nocturne
    input: Hotbar Only
    keys:
      - hotbar
    protection: SA
    cc: []
    damage: low
    cooldown_ms: 12000
    description:
      Instantly hide yourself in the dark and wait for an opening. SA at start, Invincible when concealed, SA when
      moving forward, FG when moving backward. W to move behind enemy and attack, s to move backward and guard.
    flows_into:
      - spirit_hunt
