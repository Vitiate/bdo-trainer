  dusk:
    name: Dusk
    input: SHIFT + D / SHIFT + A
    keys:
      - shift
      - d
    keys_alt:
      - shift
      - a
    protection: iframe
    cc: []
    damage: none
    cooldown_ms: 2000
    description:
      Evade laterally. Invincible when character disappears (nullified during cooldown). Invincible during skill
