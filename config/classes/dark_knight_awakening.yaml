              note: "Start movement chain."
            - skill: "smoky_haze"
              note: "Continue movement."
            - skill: "unveiled_dagger"
              note: "Bridge into the next movement skill."
            - skill: "air_strike"
              note: "Main movement slash into next pack."
            - skill: "furia_di_vedir"
              note: "Finish gap close into the next grow."

