movement_combos:
    awakening_pack_to_pack_movement:
        name: "Awakening Pack to Pack Movement"
        description: >
            Pack-to-pack movement route from the Awakening quick PvE guide.
            Chain pre-awakening dashes and engage with Air Strike into Furia di Vedir.
