# ============================================================================
# BDO Trainer - Awakened Dark Knight Combo Configuration
# ============================================================================
# Class: Dark Knight (Awakening)
# Weapons: Kriegsmesser (Main) / Ornamental Knot (Off) / Vediant (Awakening)
# Damage Type: Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Swer Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Dark Knight Class Discord
#   - Community guides by Harshsin, NotTheWorst, JStep
# ============================================================================

class: Dark Knight
spec: Awakening

# --------------------------------------------------------------------------
# Skills
# --------------------------------------------------------------------------
skills:
    spirit_hunt:
        name: "Spirit Hunt"
        input: "W + RMB" # CORRECTED: was "Shift + RMB"
        keys: ["w", "rmb"] # CORRECTED: was ["shift", "rmb"]
        protection: "SA" # ✓ correct
        cc: ["stiffness"] # CORRECTED: was ["bound"]; Stiffness on hits (PvE only)
        damage: high
        cooldown_ms: 3000 # CORRECTED: was 7000; actual cooldown is 3s
        description: "Draw close to the enemy in an instant, inflicting Stiffness around them. Swer Armor throughout."
        flows_into: ["shattering_darkness", "seed_of_catastrophe"]
        core_effect: "Core: Spirit Hunt - Stiffness on good hits"
        notes: "Core gap-close opener. Can be used with kriegsmesser. Recovers 150 MP per hit."

    shattering_darkness:
        name: "Shattering Darkness"
        input: "SHIFT + LMB" # CORRECTED: was "Shift + RMB"
        keys: ["shift", "lmb"] # CORRECTED: was ["shift", "rmb"]
        protection: "FG" # CORRECTED: was "SA"; skill has Forward Guard, not Swer Armor
        cc: ["down_attack"] # CORRECTED: was ["knockdown"]; Down Attack only, no explicit stiffness on base skill
        damage: high
        cooldown_ms: 7000 # CORRECTED: was 8000; actual cooldown is 7s
        description: "Slam down phantom blades while evading backward and perform a wide-area magic attack. Forward Guard during the skill."
        flows_into: ["flow_bombardment", "flow_root_of_catastrophe"] # CORRECTED: flows into Bombardment/Root, not Seed/Spirit Hunt
        core_effect: "Core: Shattering Darkness - Stiffness on good hits"
        notes: "Hold LMB or SHIFT+LMB after to flow front, RMB to flow back."

    seed_of_catastrophe:
        name: "Seed of Catastrophe"
        input: "SHIFT + E" # CORRECTED: was "S + RMB"
        keys: ["shift", "e"] # CORRECTED: was ["s", "rmb"]
        protection: "none" # CORRECTED: was "FG"; no protection on base skill (SA only on Black Spirit version)
        cc: ["floating"] # CORRECTED: was ["bound"]; Floating on hits
        damage: very_high # CORRECTED: was "high"
        cooldown_ms: 7000 # CORRECTED: was 9000; actual cooldown is 7s
        description: "Summon a tree illusion to damage your foes. Floating on hits."
        flows_into: ["flow_bombardment", "flow_root_of_catastrophe"] # CORRECTED
        core_effect: "Core: Seed of Catastrophe - Swer Armor during skill (RECOMMENDED CORE)"
        notes: "No base protection. SA only applies with Core wgrade. Flows into Root of Catastrophe."

    spirit_legacy:
        name: "Spirit Legacy"
        input: "SHIFT + RMB" # CORRECTED: was "W + RMB"
        keys: ["shift", "rmb"] # CORRECTED: was ["w", "rmb"]
        protection: "FG" # ✓ correct
        cc: ["stun"] # CORRECTED: was ["stiffness"]; Stun on hits (PvE only, nullified during cooldown)
        damage: very_high # CORRECTED: was "medium"; this is one of the hardest-hitting awakening skills
        cooldown_ms: 7000 # CORRECTED: was 8000; actual cooldown is 7s
        description: "Inflict explosive damage to enemies in front by charging dark magic into the phantom blades. Forward Guard during the skill."
        flows_into: ["spirit_hunt", "touch_of_exploitation"]
        core_effect: "Core: Spirit Legacy - Stun on good hits"
        notes: "All Damage Reduction -20 for 10s on hits (nullified during cooldown)."

    touch_of_exploitation:
        name: "Touch of Exploitation"
        input: "s + LMB" # CORRECTED: was "W + LMB"
        keys: ["s", "lmb"] # CORRECTED: was ["w", "lmb"]
        protection: "FG" # ✓ correct (nullified during cooldown)
        cc: ["down_attack"] # CORRECTED: was ["stiffness"]; Down Attack only
        damage: medium
        cooldown_ms: 6000 # ✓ correct
        description: "Deal damage with your kriegsmesser and magic simultaneously to enemies in front. Hold s + LMB to continue the skill. Forward Guard during the skill (nullified during cooldown)."
        flows_into: ["spirit_hunt", "shattering_darkness"]
        core_effect: "Core: Touch of Exploitation - Bound on last good hit"
        notes: "Damage reduced during cooldown. Critical Hit Rate +50% (PvE only)."

    cluster_of_despair:
        name: "Cluster of Despair"
        input: "RMB" # CORRECTED: was "S + LMB"; actual input is RMB (instant after certain skills)
        keys: ["rmb"] # CORRECTED: was ["s", "lmb"]
        protection: "SA" # CORRECTED: was "FG"; Swer Armor during the skill
        cc: ["down_attack"] # CORRECTED: was ["pull"]; Down Attack (no pull on this skill)
        damage: high # CORRECTED: was "medium"
        cooldown_ms: 7000 # CORRECTED: was 12000; actual cooldown is 7s
        description: "Throw multiple Phantom Blades forward to inflict heavy damage. Swer Armor during the skill. Can be performed instantly after certain skills via RMB."
        flows_into: ["spirit_hunt", "seed_of_catastrophe"]
        notes: "Movement Speed -10% for 5s on hits. Critical Hit Rate +50% (PvE only)."

    wheel_of_fortune:
        name: "Wheel of Fortune"
        input: "SHIFT + F" # ✓ correct
        keys: ["shift", "f"] # ✓ correct
        protection: "SA" # ✓ correct
        cc: ["floating"] # CORRECTED: was ["knockback"]; Floating on hits
        damage: high
        cooldown_ms: 6000 # CORRECTED: was 10000; actual cooldown is 6s
        description: "Draw from the energy of nature around to attack with a powerful blade strike. Swer Armor during the skill. Floating on hits."
        flows_into: ["spirit_hunt", "shattering_darkness"]
        notes: "Can be used via Quick Slot with your vediant. Air Attack."

    air_strike:
        name: "Air Strike"
        input: "W + F" # CORRECTED: was "S + F"; actual input is W + F
        keys: ["w", "f"] # CORRECTED: was ["s", "f"]
        protection: "iframe" # CORRECTED: was "SA"; Invincible while moving (true iframe)
        cc: ["floating", "bound"] # CORRECTED: was ["float"]; Floating on hits, Bound on extra attack hits (nullified on floating)
        damage: medium
        cooldown_ms: 7000 # CORRECTED: was 12000; actual cooldown is 7s
        description: "Powerful wward slash then downward blow on ground to inflict heavy damage. Invincible while moving. Floating on hits, Bound on extra attack hits."
        flows_into: ["spirit_hunt", "shattering_darkness"]
        notes: "Down Attack and Air Attack. Essential PVP catch tool."

    nocturne:
        name: "Nocturne"
        input: "Hotbar Only" # CORRECTED: was "Space"; no direct key input, Quick Slot / Hotbar only
        keys: ["hotbar"]
        protection: "SA" # CORRECTED: was "SA"; SA at start + Invincible when concealed + SA moving forward + FG moving backward
        cc: [] # ✓ correct (no CC)
        damage: low
        cooldown_ms: 12000 # CORRECTED: was 7000; actual cooldown is 12s
        description: "Instantly hide yourself in the dark and wait for an opening. SA at start, Invincible when concealed, SA when moving forward, FG when moving backward. W to move behind enemy and attack, s to move backward and guard."
        flows_into: ["spirit_hunt", "spirit_legacy", "shattering_darkness"]
        notes: "Primary mobility/stealth skill. Hotbar required. Debuffs enemy Movement/Attack/Casting Speed -5% for 5s on hits."

    lunacy_of_vedir:
        name: "Lunacy of Vedir"
        input: "Hotbar Only" # CORRECTED: was "Shift + E"; no direct key, Quick Slot / Hotbar only
        keys: ["hotbar"]
        protection: "SA" # CORRECTED: was "SA" ✓ but note it's a damage skill, not a buff
        cc: ["bound"] # CORRECTED: was []; Bound on hits, Down Attack
        damage: medium # CORRECTED: was "none"; this is a damage skill, not a self-buff
        cooldown_ms: 15000 # CORRECTED: was 30000; actual cooldown is 15s
        description: "Harness the energy of nature into your kriegsmesser, then slam downwards to knock opponents down. Swer Armor during the skill. Bound on hits."
        flows_into: ["nocturne", "spirit_legacy"]
        notes: "Damage skill, NOT a self-buff. Can be used via Quick Slot with vediant. Down Attack."

    trap_of_vedir:
        name: "Trap of Vedir"
        input: "S + F" # CORRECTED: was "Hotbar Only"; actual input is s + F
        keys: ["s", "f"] # CORRECTED: was ["hotbar"]
        protection: "FG" # CORRECTED: was "none"; Forward Guard during the skill
        cc: ["knockback"] # CORRECTED: was ["bound"]; Knockback on attack 1 hits
        damage: medium
        cooldown_ms: 10000 # CORRECTED: was 16000; actual cooldown is 10s
        description: "Damage enemies before you while dodging backward. Forward Guard during the skill. Knockback on attack 1 hits."
        flows_into: ["spirit_hunt", "nocturne"]
        notes: "No collision while moving. Can be used with kriegsmesser. Down Attack."

    flow_spirit_blaze:
        name: "Flow: Spirit Blaze"
        input: "RMB (after Spirit Blaze)" # CORRECTED: was "Hotbar Only"
        keys: ["rmb"] # CORRECTED: was ["hotbar"]
        protection: "FG" # CORRECTED: was "none"; Forward Guard during the skill
        cc: ["knockdown"] # CORRECTED: was []; Knockdown on hits
        damage: high
        cooldown_ms: 5000 # CORRECTED: was 12000; shares 5s cooldown with Spirit Blaze
        description: "Imbue dark energies onto your kriegsmesser and perform a frontal strike. Forward Guard during the skill. Knockdown on hits."
        flows_into: []
        core_effect: "Core: Spirit Blaze - Forward Guard while using skill"
        notes: "Activated via RMB after Spirit Blaze (s + RMB). Can be used with kriegsmesser. Down Attack."

    dusk:
        name: "Dusk"
        input: "SHIFT + D / SHIFT + A" # CORRECTED: was "Shift + A / Shift + D"; correct keys are arrow directions or D + D / A + A
        keys: ["shift", "d"]
        keys_alt: ["shift", "a"]
        protection: "iframe" # ✓ correct (Invincible when character disappears; PvE full iframe)
        cc: [] # ✓ correct
        damage: none
        cooldown_ms: 2000 # CORRECTED: was 4000; actual cooldown is 2s
        description: "Evade laterally. Invincible when character disappears (nullified during cooldown). Invincible during skill (PvE only). Recovers 60 MP when using (nullified during cooldown)."
        flows_into: ["chain_dusk"]
        notes: "Primary iframe. 2s cooldown. Costs Stamina (150). No collision while moving."

    chain_dusk:
        name: "Chain: Dusk"
        input: "SHIFT + D or SHIFT + A (while Dusk is on cooldown)" # CORRECTED: was "LMB (after Dusk)"
        keys: ["shift", "d"]
        keys_alt: ["shift", "a"]
        protection: "iframe" # ✓ correct (Invincible when disappears; PvE full iframe)
        cc: [] # ✓ correct
        damage: low
        cooldown_ms: 5000 # CORRECTED: was 0; actual cooldown is 5s
        description: "Evade laterally when Dusk is on cooldown. Invincible when character disappears (nullified during cooldown). Invincible during skill (PvE only)."
        flows_into: ["spirit_hunt", "touch_of_exploitation"]
        notes: "Extends iframe availability when Dusk is on cooldown. Costs Stamina (150). Recovers 40 MP (nullified during cooldown)."

    phantasmal_snare:
        name: "Phantasmal Snare"
        input: "A or D + F (combos into Chain: Dusk)" # CORRECTED: was "E"; actual input is A or D + F, or Hotbar
        keys: ["a", "f"]
        keys_alt: ["d", "f"]
        protection: "iframe" # CORRECTED: was "none"; Invincible at start (nullified during Chain: Dusk's cooldown) + Invincible during skill (PvE only)
        cc: ["stun"] # CORRECTED: was ["stiffness"]; Stun on hits
        damage: low
        cooldown_ms: 12000 # CORRECTED: was 5000; actual cooldown is 12s
        description: "Temporarily take on a phantasmal visage to confuse foes, then summon a rose-shaped trap around yourself. Invincible at start (nullified during Chain: Dusk cooldown). Invincible during skill (PvE only). Stun on hits."
        flows_into: ["spirit_hunt", "shattering_darkness"]
        notes: "Preceding Skill: Chain: Dusk. Also usable via Quick Slot with your vediant. Can be used with kriegsmesser."

    shadow_strike:
        name: "Shadow Strike"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 9000
        description: "Ranged DPS skill. Cancellable. Preferred L56 Rabam."
        notes: "Preferred over Wrath of Vedir. Cancellable and ranged."

    obsidian_blaze:
        name: "Obsidian Blaze"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 10000
        description: "Swer Armor AOE. Preferred L57 Rabam."
        notes: "Preferred over Unveiled Fate due to Swer Armor."

    balanced_strike:
        name: "Balanced Strike"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 15000
        description: "Extra Air Strike. Can cancel with Dusk. Preferred L58 Rabam."
        notes: "Preferred over Slanted Slash. Castable from awakening."

    unveiled_dagger:
        name: "Unveiled Dagger"
        input: "W + F (switches to pre-awakening)"
        keys: ["w", "f"]
        protection: "FG"
        cc: ["stiffness"]
        description: "Gap closer. Switches to pre-awakening. Leads into Wheel of Fortune."

    kamasylvia_slash:
        name: "Kamasylvia Slash"
        input: "F"
        keys: ["f"]
        protection: "none"
        cc: ["knockdown"]
        description: "Quick transition slash."

    twilight_dash:
        name: "Twilight Dash"
        input: "Shift + W (pre-awakening)"
        keys: ["shift", "w"]
        protection: "SA"
        cc: []
        description: "Fast forward dash for mobility. Swer Armor."

    evasion:
        name: "Evasion"
        input: "A/D + RMB"
        keys: ["a", "rmb"]
        keys_alt: ["d", "rmb"]
        protection: "iframe"
        cc: []
        description: "Short iframe dodge. PVE iframe. RECOMMENDED LOCKED."
        notes: "Lock this skill to prevent accidental use messing w combos."

    flow_bombardment:
        name: "Flow: Bombardment"
        input: "Hold after Shattering Darkness"
        keys: ["hold"]
        protection: "FG"
        cc: ["down_attack"]
        damage: high
        cooldown_ms: 0
        description: "Flow continuation from Shattering Darkness. Hold input to chain into further flows."
