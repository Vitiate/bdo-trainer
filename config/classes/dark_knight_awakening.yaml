# Recommended Skills to Lock
# --------------------------------------------------------------------------
locked_skills:
    - name: "Evasion"
      reason: "Prevents accidental use that messes up combos in PVP."
    - name: "Scarring Slash"
      reason: "Unprotected and not useful in awakening rotation."
    - name: "Spirit Satiation"
      reason: "Unprotected, slows down rotation."
    - name: "Sudden Attack"
      reason: "Unprotected, can trigger accidentally."
    - name: "Darkness Burst"
      reason: "Lock unless you have completed Magnus."
    - name: "Hidden Strike"
      reason: "Optional lock. Rarely used."
    - name: "Trap of Vedir"
