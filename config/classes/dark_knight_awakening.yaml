movement_combos:
  awakening_pack_to_pack_movement:
    name: Awakening Pack to Pack Movement
    description:
      "Pack-to-pack movement route from the Awakening quick PvE guide. Chain pre-awakening dashes and engage with
      Air Strike into Furia di Vedir.

      "
    difficulty: beginner
    combo_window_ms: 250
    steps:
      - skill: shadow_bullet
        note: Initial dash toward the next pack.
      - skill: smoky_haze
        note: Follow-w dash to keep speed and protection.
      - skill: unveiled_dagger
        note: Bridge into the engage; can be skipped if already close.
      - skill: air_strike
        note: Main engage; ties directly into your main Awakening combo.
      - skill: furia_di_vedir
        note: Continue forward into the center of the pack after Air Strike.
skill_addons:
  pve:
    - skill: Shattering Darkness
      addon_1: Extra AP Against Monsters +20 for 7 sec
      addon_2: Attack/Casting Speed +7% for 7 sec
    - skill: Seed of Catastrophe
      addon_1: Critical Hit Rate +30% for 7 sec
      addon_2: Extra AP Against Monsters +20 for 7 sec
    - skill: Spirit Legacy
      addon_1: All DP -15 for 10 sec for target
      addon_2: Critical Hit Rate +20% for 7 sec
    - skill: Cluster of Despair
      addon_1: Extra AP Against Monsters +30 for 7 sec
      addon_2: Critical Hit Rate +30% for 7 sec
    - skill: Trap of Vedir
      addon_1: Extra AP Against Monsters +20 for 7 sec
      addon_2: All DP -15 for 20 sec for target
    - skill: Air Strike
      addon_1: Back Attack Damage +3% for 5 sec
      addon_2: Critical Hit Damage +3% for 5 sec
locked_skills:
  - name: Shadow Bullet
    reason: Lock from skill bar to avoid accidental swaps; use it from hotbar only for controlled pre-awak movement.
  - name: Smoky Haze
    reason: Lock from skill bar to prevent misinputs during movement chains; activate via hotbar when moving pack to pack.
  - name: "Flow: Spirit Blaze"
    reason: Lock from skill bar and put it on hotbar instead, since it is used as a situational filler and cooldown tool.
  - name: Grip of Grudge
    reason: Optional lock; its awkward hitbox can whiff and disrwt your rotation if triggered unintentionally.
  - name: Cluster of Despair
    reason: Optional lock from skill bar because of its very unreliable hitbox; better controlled via hotbar only when needed.
hotbar_skills:
  - "Flow: Spirit Blaze"
  - Shadow Strike
  - Grip of Grudge
core_skill:
  recommended: Seed of Catastrophe
  effect: Swer Armor during the skill (with Core)
  reason:
    "The Awakening quick PvE guide explicitly recommends Core: Seed of Catastrophe because the Core wgrade adds full
    Swer Armor to an already very high damage skill, making it much safer to use as a main nuke in PvE.

    "
