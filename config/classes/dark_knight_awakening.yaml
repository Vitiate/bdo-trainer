# ============================================================================
# BDO Trainer - Awakened Dark Knight Combo Configuration
# ============================================================================
# Class: Dark Knight (Awakening)
# Weapons: Kriegsmesser (Main) / Ornamental Knot (Off) / Vediant (Awakening)
# Damage Type: Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Dark Knight Class Discord
#   - Community guides by Harshsin, NotTheWorst, JStep
# ============================================================================

class: Dark Knight
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    spirit_hunt:
        name: "Spirit Hunt"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 5000
        description: "Main awakening damage skill. Super Armor throughout."
        flows_into: ["shattering_darkness", "seed_of_catastrophe"]
        core_effect: "Core: Spirit Hunt - Stiffness on good hits"
        notes: "One of your bread-and-butter damage skills."

    shattering_darkness:
        name: "Shattering Darkness"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Heavy hitting AOE with Super Armor."
        flows_into: ["seed_of_catastrophe", "spirit_hunt"]
        core_effect: "Core: Shattering Darkness - Stiffness on good hits"
        notes: "Strong filler between other skills."

    seed_of_catastrophe:
        name: "Seed of Catastrophe"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["bound"]
        damage: high
        cooldown_ms: 9000
        description: "Forward Guard AOE. Core adds Super Armor."
        flows_into: ["cluster_of_despair", "spirit_hunt"]
        core_effect: "Core: Seed of Catastrophe - Super Armor during skill (RECOMMENDED CORE)"
        notes: "Recommended Core skill choice. SA version is very strong."

    spirit_legacy:
        name: "Spirit Legacy"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Ranged forward guard attack. Good for engaging."
        flows_into: ["spirit_hunt", "touch_of_exploitation"]
        core_effect: "Core: Spirit Legacy - Stun on good hits"
        notes: "Good ranged engage tool with Forward Guard."

    touch_of_exploitation:
        name: "Touch of Exploitation"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward guard gap closer."
        flows_into: ["spirit_hunt", "shattering_darkness"]
        core_effect: "Core: Touch of Exploitation - Bound on last good hit"
        notes: "Good for chasing and engaging."

    cluster_of_despair:
        name: "Cluster of Despair"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "FG"
        cc: ["pull"]
        damage: medium
        cooldown_ms: 12000
        description: "Forward guard with pull effect. Pulls enemies in."
        flows_into: ["spirit_hunt", "seed_of_catastrophe"]
        notes: "Useful to group mobs in PVE. Pull CC in PVP."

    wheel_of_fortune:
        name: "Wheel of Fortune"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 10000
        description: "Super Armor spin attack. Put on hotbar."
        flows_into: ["spirit_hunt", "shattering_darkness"]
        notes: "Good protected damage. Hotbar recommended."

    air_strike:
        name: "Air Strike"
        input: "S + F"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor with float CC. Good PVP catch tool."
        flows_into: ["spirit_hunt", "shattering_darkness"]
        notes: "Essential PVP skill for catching floated targets."

    nocturne:
        name: "Nocturne"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 7000
        description: "Super Armor mobility skill. Fast gap closer."
        flows_into: ["spirit_hunt", "spirit_legacy", "shattering_darkness"]
        notes: "Primary movement skill in awakening. Hotbar recommended."

    lunacy_of_vedir:
        name: "Lunacy of Vedir"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Self-buff. Increases AP and attack/casting speed."
        flows_into: ["nocturne", "spirit_legacy"]
        notes: "Use before engaging. Hotbar recommended."

    trap_of_vedir:
        name: "Trap of Vedir"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 16000
        description: "Ranged trap with bound CC. Must be on hotbar."
        flows_into: ["spirit_hunt", "nocturne"]
        notes: "Lock from skill bar, place on hotbar. Good ranged CC."

    flow_spirit_blaze:
        name: "Flow: Spirit Blaze"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        damage: high
        cooldown_ms: 12000
        description: "Ranged burst damage. Must be on hotbar."
        flows_into: []
        core_effect: "Core: Spirit Blaze - Forward Guard while using skill"
        notes: "Hotbar recommended. Lock from skill bar."

    dusk:
        name: "Dusk"
        input: "Shift + A / Shift + D"
        keys: ["shift", "a"]
        keys_alt: ["shift", "d"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 4000
        description: "Iframe dash left or right. PVE iframe as well."
        flows_into: ["chain_dusk"]
        notes: "Primary iframe. Can chain into Chain: Dusk."

    chain_dusk:
        name: "Chain: Dusk"
        input: "LMB (after Dusk)"
        keys: ["lmb"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Follow-up iframe after Dusk."
        flows_into: ["spirit_hunt", "touch_of_exploitation"]
        notes: "PVE iframe. Extends Dusk i-frame."

    phantasmal_snare:
        name: "Phantasmal Snare"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 5000
        description: "Quick CC skill. PVE iframe."
        flows_into: ["spirit_hunt", "shattering_darkness"]
        notes: "PVE iframe (1 second invincibility vs monsters only)."

