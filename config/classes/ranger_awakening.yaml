# ============================================================================
# BDO Trainer - Awakened Ranger Combo Configuration
# ============================================================================
# Class: Ranger (Awakening)
# Weapons: Longbow (Main) / Kamasylven Dagger (Off) / Kamasylven Sword (Awakening)
# Damage Type: Melee / Mid-Range
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Ranger Class Discord
#   - Community guides by Bloo, PreStige, Haerim
# ============================================================================

class: Ranger
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    elven_rage:
        name: "Elven Rage"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "none"
        cc: []
        damage: none
        cooldown_ms: 24000
        description: "Self-buff. Increases AP, attack speed, and critical hit rate."
        flows_into: ["nature_trail", "breezy_blade"]
        core_effect: "Core: Elven Rage - Super Armor during the skill"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    nature_trail:
        name: "Nature Trail"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor forward dash. PVE iframe."
        flows_into: ["natures_tremble", "regeneration", "waltz_of_wind"]
        notes: "Primary movement skill in awakening. PVE iframe vs monsters."

    breezy_blade:
        name: "Breezy Blade"
        input: "W + F"
        keys: ["w", "f"]
        protection: "FG"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 4000
        description: "Forward Guard dash thrust. Knockback on last hit."
        flows_into: ["flow_rushing_wind", "natures_tremble", "regeneration"]
        notes: "Safe FG approach. Always flow into Rushing Wind for extra movement."

    flow_rushing_wind:
        name: "Flow: Rushing Wind"
        input: "F (after Breezy Blade)"
        keys: ["f"]
        protection: "FG"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Follow-up dash after Breezy Blade. Maintains Forward Guard."
        flows_into: ["natures_tremble", "regeneration"]
        notes: "Always chain after Breezy Blade for additional protected movement."

    natures_tremble:
        name: "Nature's Tremble"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 9000
        description: "Large AOE slam with Super Armor. Main damage skill. Bound on hit."
        flows_into: ["regeneration", "wailing_wind", "waltz_of_wind"]
        core_effect: "Core: Nature's Tremble - Extra hits and increased damage"
        notes: "Bread-and-butter damage skill. Use on cooldown in PVE."

    regeneration:
        name: "Regeneration"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor healing skill. Recovers HP while dealing damage."
        flows_into: ["flow_disenchantment", "natures_tremble"]
        notes: "Use for sustain. Always follow with Flow: Disenchantment."

    flow_disenchantment:
        name: "Flow: Disenchantment"
        input: "LMB (after Regeneration)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Regeneration. Additional burst with knockdown."
        flows_into: ["natures_tremble", "wailing_wind"]
        notes: "Always chain after Regeneration for extra damage and CC."

    wailing_wind:
        name: "Wailing Wind"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor frontal projectile attack. Stiffness on hit."
        flows_into: ["flow_rooting", "natures_tremble"]
        notes: "Good mid-range damage with SA protection. Stiffness sets up follow-ups."

    flow_rooting:
        name: "Flow: Rooting"
        input: "LMB (after Wailing Wind)"
        keys: ["lmb"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 0
        description: "Follow-up to Wailing Wind. Bound CC on hit."
        flows_into: ["natures_tremble", "waltz_of_wind"]
        notes: "Unprotected — skip in PVP unless target is already CC'd."

    waltz_of_wind:
        name: "Waltz of Wind"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 10000
        description: "Super Armor spinning AOE attack. Float on hit."
        flows_into: ["flow_tempest", "natures_tremble"]
        notes: "Big AOE damage. Slow animation — don't use carelessly in PVP."

    flow_tempest:
        name: "Flow: Tempest"
        input: "F (after Waltz of Wind)"
        keys: ["f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Waltz of Wind. Super Armor with knockdown."
        flows_into: ["natures_tremble", "regeneration"]
        notes: "Always chain after Waltz of Wind for extra damage."

    cold_blade:
        name: "Cold Blade"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["pull"]
        damage: medium
        cooldown_ms: 12000
        description: "Forward Guard AOE with pull effect. Groups enemies."
        flows_into: ["natures_tremble", "waltz_of_wind"]
        notes: "Pull groups mobs for AOE follow-up. FG makes it safe to use."

    vine_knot:
        name: "Vine Knot"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 8000
        description: "Forward Guard frontal CC. Stiffness on hit."
        flows_into: ["flow_vine_knot", "natures_tremble"]
        notes: "Key PVP catch tool. FG while casting — safe to use for poking."

    flow_vine_knot:
        name: "Flow: Vine Knot"
        input: "Q (after Vine Knot)"
        keys: ["q"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Vine Knot. Bound CC."
        flows_into: ["natures_tremble", "waltz_of_wind"]
        notes: "Unprotected follow-up. Use only when stiffness from Vine Knot lands."

# --------------------------------------------------------------------------
# Rabam Skills
# --------------------------------------------------------------------------
rabam_skills:
    vine_cutter:
        name: "Vine Cutter"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor slash with stiffness. Good filler and PVP catch skill."
        notes: "Preferred L56 Rabam. SA protection makes it safe for PVP."

    natures_bloom:
        name: "Nature's Bloom"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor AOE burst. Additional damage filler skill."
        notes: "Preferred L57 Rabam. Good for PVE AOE clear."

    kamasylven_leaf:
        name: "Kamasylven Leaf"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Ranged leaf projectile with knockdown. Neither L58 Rabam is strong."
        notes: "Optional. Can use from hotbar as a ranged CC poke."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    evasive_explosion_shot:
        name: "Evasive Explosion Shot"
        input: "A/D + LMB"
        keys: ["a", "lmb"]
        keys_alt: ["d", "lmb"]
        protection: "iframe"
        cc: []
        description: "Iframe sidestep with ranged shot. Core Ranger movement/protection tool."
        notes: "Primary iframe. Can be chained. Essential for PVP survival."

    will_of_the_wind:
        name: "Will of the Wind"
        input: "Shift + Space"
        keys: ["shift", "space"]
        protection: "SA"
        cc: []
        description: "Super Armor forward dash. Fast gap closer and movement skill."
        notes: "Main long-distance movement. Chains with Nature Trail."

    razor_wind:
        name: "Razor Wind"
        input: "S + E"
        keys: ["s", "e"]
        protection: "none"
        cc: ["stiffness"]
        description: "Ranged wind projectile. Unprotected but long-range poke."
        notes: "Use from range to poke. Unprotected — don't use at close range in PVP."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe."
        notes: "PVE iframe. Lock in PVP to prevent accidental use (use Evasive Explosion Shot instead)."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "Gap close to pack"
            - skill: "regeneration"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Heal + damage"
            - skill: "flow_disenchantment"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main AOE damage"
            - skill: "wailing_wind"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Filler damage"
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full AOE rotation for large mob packs. Buff first, then unload."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "elven_rage"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "AP buff before engaging"
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "Gap close into pack"
            - skill: "cold_blade"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG pull — group mobs together"
            - skill: "waltz_of_wind"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin AOE"
            - skill: "flow_tempest"
              input: "F"
              keys: ["f"]
              note: "Follow-up spin"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst damage"
            - skill: "regeneration"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Heal + damage"
            - skill: "flow_disenchantment"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "Dash into pack"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "One-shot burst"
            - skill: "breezy_blade"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG dash to next pack"
            - skill: "flow_rushing_wind"
              input: "F"
              keys: ["f"]
              note: "Continue movement"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "elven_rage"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "Engage pack"
            - skill: "cold_blade"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG pull mobs in"
            - skill: "waltz_of_wind"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA spin on grouped mobs"
            - skill: "flow_tempest"
              input: "F"
              keys: ["f"]
              note: "Follow-up"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst"
            - skill: "regeneration"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Heal + damage"
            - skill: "flow_disenchantment"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "wailing_wind"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Filler damage"
            - skill: "vine_cutter"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"
            - skill: "natures_bloom"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "Rabam AOE"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor and Forward Guard skills.
            Approach with protection, then look for a CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "elven_rage"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before going in"
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "vine_knot"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness — catch the target"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main damage"
            - skill: "regeneration"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA damage + heal"
            - skill: "flow_disenchantment"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up knockdown"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach and fish for a stiffness,
            then chain into full damage on the CC'd target.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "breezy_blade"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG approach"
            - skill: "vine_knot"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness — catch target"
            - skill: "flow_vine_knot"
              input: "Q"
              keys: ["q"]
              note: "Bound on stiffened target"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst on CC'd target"
            - skill: "waltz_of_wind"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float extend"
            - skill: "flow_tempest"
              input: "F"
              keys: ["f"]
              note: "SA knockdown finisher"

    iframe_engage:
        name: "Iframe Engage"
        description: >
            Use iframe movement to approach safely, then transition
            into awakening damage. High skill ceiling.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "evasive_explosion_shot"
              input: "A/D + LMB"
              keys: ["a", "lmb"]
              alt_keys: ["d", "lmb"]
              note: "Iframe approach"
            - skill: "will_of_the_wind"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "SA dash into range"
            - skill: "vine_knot"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness catch"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst"
            - skill: "regeneration"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA damage + heal"
            - skill: "flow_disenchantment"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "vine_cutter"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA stiffness opener"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main burst"
            - skill: "regeneration"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA damage + sustain"
            - skill: "flow_disenchantment"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"

    grab_punish:
        name: "Grab Punish (After Ally CC)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
            Ranger has no grab — rely on allies for this.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "waltz_of_wind"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA float on CC'd target"
            - skill: "flow_tempest"
              input: "F"
              keys: ["f"]
              note: "SA follow-up"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst on downed target"
            - skill: "regeneration"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA damage finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframes and SA movement
            to create distance. Ranger has strong iframe tools.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "evasive_explosion_shot"
              input: "A/D + LMB"
              keys: ["a", "lmb"]
              alt_keys: ["d", "lmb"]
              note: "Iframe out"
            - skill: "will_of_the_wind"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "SA dash away"
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "SA dash to gain distance"
            - skill: "breezy_blade"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG movement away"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected AOE damage.
            Stay at mid-range and use SA skills. Avoid overextending.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "elven_rage"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff before engaging blob"
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "SA engage into group"
            - skill: "cold_blade"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG pull enemies"
            - skill: "waltz_of_wind"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE spin"
            - skill: "flow_tempest"
              input: "F"
              keys: ["f"]
              note: "SA follow-up"
            - skill: "natures_tremble"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main burst"
            - skill: "regeneration"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA heal + damage"
            - skill: "flow_disenchantment"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "evasive_explosion_shot"
              input: "A/D + LMB"
              keys: ["a", "lmb"]
              alt_keys: ["d", "lmb"]
              note: "Iframe reposition out"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    fast_travel:
        name: "Fast Travel / Mobility Chain"
        description: "Chain movement skills for fastest traversal between packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "SA forward dash"
            - skill: "breezy_blade"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG forward dash"
            - skill: "flow_rushing_wind"
              input: "F"
              keys: ["f"]
              note: "Continue FG movement"
            - skill: "will_of_the_wind"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "SA long dash"

    awakening_movement:
        name: "Awakening Movement Guide"
        description: >
            Movement chain for Ranger awakening. Cycle between Nature Trail,
            Breezy Blade, and pre-awakening dashes for maximum speed.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "SA forward dash"
            - skill: "breezy_blade"
              input: "W + F"
              keys: ["w", "f"]
              note: "FG forward rush"
            - skill: "flow_rushing_wind"
              input: "F"
              keys: ["f"]
              note: "FG follow-up dash"
            - skill: "will_of_the_wind"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "SA long distance dash"
            - skill: "nature_trail"
              input: "Space"
              keys: ["space"]
              note: "If off cooldown, loop"

