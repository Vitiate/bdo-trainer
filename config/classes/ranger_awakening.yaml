          addon_2: "Critical Hit Rate +20% for 7 sec"

# --------------------------------------------------------------------------
# Recommended Skills to Lock
# --------------------------------------------------------------------------
locked_skills:
    - name: "Evasion"
      reason: "Prevents accidental double-tap dodge that messes up combos."
    - name: "Absolute: Kick"
      reason: "Unprotected, can trigger accidentally."
    - name: "Tearing Arrow"
      reason: "Unprotected pre-awakening skill, interrupts awakening combos."
    - name: "Bow Skill"
      reason: "Basic bow attack, not useful in awakening play."
    - name: "Descending Current"
