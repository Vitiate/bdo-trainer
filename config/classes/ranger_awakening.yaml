        - skill: "Nature's Tremble"
          addon_1: "Extra AP Against Monsters +30 for 7 sec"
          addon_2: "Attack/Casting Speed +10% for 7 sec"
        - skill: "Waltz of Wind"
          addon_1: "Extra AP Against Monsters +20 for 7 sec"
