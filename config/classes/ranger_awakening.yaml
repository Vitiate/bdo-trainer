        - skill: "Regeneration"
          addon_1: "HP Recovery +100 per hit"
          addon_2: "All DP +15 for 7 sec"
        - skill: "Wailing Wind"
          addon_1: "Extra AP Against Monsters +20 for 7 sec"
          addon_2: "Back Attack Damage +3% for 5 sec"
        - skill: "Cold Blade"
