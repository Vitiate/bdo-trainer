# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Chase iframe into Super Armor skills.
            Approach with Chase, then use SA skills to fish for CC.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe dash toward target"
            - skill: "dash_slash"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "blind_thrust"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness poke"
            - skill: "crust_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_foul_play"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA float finisher"

    below_the_belt_catch:
        name: "Below the Belt Catch (1v1)"
        description: >
            Use Forward Guard Below the Belt to catch targets with bound CC.
            Musa has no grab, so this is the primary catch tool in duels.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Close distance with iframe"
            - skill: "below_the_belt"
              input: "Q"
              keys: ["q"]
              note: "FG bound CC — catch the target"
            - skill: "crust_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on bound target"
            - skill: "flow_foul_play"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fiery_angel"
              input: "W + F"
              keys: ["w", "f"]
              note: "Heavy slam on downed target"
            - skill: "flow_backflow"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend combo finisher"

    crosscut_float_combo:
        name: "Crosscut Float Combo"
        description: >
            Use Crosscut float to catch an opening, then chain into
            full damage. Works well when opponent drops protection.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "projection"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA dash in with stiffness"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA float CC"
            - skill: "flow_nemesis_slash"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up on floated target"
            - skill: "crust_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_foul_play"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "fiery_angel"
              input: "W + F"
              keys: ["w", "f"]
              note: "Finisher slam"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying protected. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "projection"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA dash engage"
            - skill: "crust_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_foul_play"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "crosscut"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA filler with float"

    chase_harass:
        name: "Chase Harass (Hit and Run)"
        description: >
            Musa's signature hit-and-run style. Chase in, deal fast damage,
            then Chase out. Exploit Musa's speed to avoid trades.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "chase"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe in"
            - skill: "crust_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Fast SA burst"
            - skill: "flow_foul_play"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe out immediately"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Continue dashing away"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Chase iframe is Musa's best
            escape. Use SA skills to cover retreat if needed.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "counter_assassination"
