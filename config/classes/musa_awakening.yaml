# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Crust Crusher"
    effect: "Extra hit added, increased damage on all hits"
    reason: >
        Crust Crusher with Core gains an additional hit and increased damage
        across all hits, making it Musa's strongest single skill. Since it is
        the bread-and-butter of every combo in both PVE and PVP, this Core
        provides the largest overall damage increase. After getting comfortable,
        experiment with Fiery Angel and Blind Thrust Cores as well.
