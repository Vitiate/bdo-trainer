              keys: ["shift", "z"]
              note: "SA movement filler"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe away to safety"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Use Chase to flank, unload AOE
            damage, then Chase out. Musa excels at hit-and-run in large scale.
        difficulty: advanced
        combo_window_ms: 250
        steps:
