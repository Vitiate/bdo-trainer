# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    chase:
        name: "Chase"
        input: "Shift + Direction"
        keys: ["shift", "w"]
        keys_alt: ["shift", "a"]
        protection: "iframe"
        cc: []
        description: "Signature Musa iframe dash. Spammable. Fastest movement in the game."
        notes: "Core of Musa identity. Spam for movement. Iframe frames on each dash. Consumes WP."

    rising_storm:
        name: "Rising Storm"
        input: "Shift + LMB (Pre-Awakening)"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Pre-awakening AOE spin. Used for extra damage in PVE rotations."
        notes: "Swap to pre-awk for this skill. Good PVE filler between awakening cooldowns."

    blooming:
        name: "Blooming"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Pre-awakening burst slash from hotbar. Super Armor with knockdown."
        notes: "Put on hotbar. Strong extra damage skill usable from awakening stance."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Short invincibility window."
        notes: "Useful iframe. Consider locking in PVP to prevent accidental triggers."

    divider:
        name: "Divider"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stiffness"]
        description: "Pre-awakening Forward Guard lunge. Good ranged poke with CC."
        notes: "Hotbar recommended. Forward Guard with stiffness for safe poke."

