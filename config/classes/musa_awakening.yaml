              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe flank into enemy group"
            - skill: "whirlwind_cut"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA wide AOE spin"
            - skill: "crust_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_foul_play"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "fiery_angel"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA AOE slam"
            - skill: "flow_backflow"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend AOE damage"
            - skill: "blooming"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Extra AOE burst"
            - skill: "chase"
              input: "Shift + S"
              keys: ["shift", "s"]
              note: "Iframe retreat to safety"

