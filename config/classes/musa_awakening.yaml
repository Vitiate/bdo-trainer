# ============================================================================
# BDO Trainer - Awakened Musa Combo Configuration
# ============================================================================
# Class: Musa (Awakening)
# Weapons: Blade (Main) / Horn Bow (Off) / Crescent Blade (Awakening)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Note: Musa has NO grab. Rely on protected CC skills and Chase mobility.
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Musa Class Discord
#   - Community guides by Ahon, KR Musa players, GrumpyGreenCricket
# ============================================================================

class: Musa
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    crust_crusher:
        name: "Crust Crusher"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 4000
        description: "Primary awakening damage skill. Super Armor with knockdown. Fast multi-hit slash."
        flows_into: ["flow_foul_play", "crosscut", "projection"]
        core_effect: "Core: Crust Crusher - Extra hit added, increased damage on all hits"
        notes: "Bread-and-butter damage skill. Always follow up with Flow: Foul Play."

    flow_foul_play:
        name: "Flow: Foul Play"
        input: "LMB (after Crust Crusher)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Crust Crusher. Additional burst with Super Armor."
        flows_into: ["crosscut", "projection", "fiery_angel"]
        notes: "Always chain after Crust Crusher for maximum damage output."

    projection:
        name: "Projection"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Super Armor forward dash slash. Covers distance and deals damage."
        flows_into: ["crust_crusher", "crosscut", "fiery_angel"]
        notes: "Dash + damage. Good for engaging and repositioning. SA throughout."

    fiery_angel:
        name: "Fiery Angel"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor forward slam with knockback. High damage AOE."
        flows_into: ["flow_backflow", "crust_crusher", "crosscut"]
        core_effect: "Core: Fiery Angel - Additional down attack damage"
        notes: "Strong engage tool. Always follow up with Flow: Backflow."

    flow_backflow:
        name: "Flow: Backflow"
        input: "LMB (after Fiery Angel)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Fiery Angel. Sweeping slash with Bound CC."
        flows_into: ["crust_crusher", "projection", "crosscut"]
        notes: "Always chain after Fiery Angel. Bound CC useful in PVP."

    crosscut:
        name: "Crosscut"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor cross slash with float CC. Good filler and CC tool."
        flows_into: ["flow_nemesis_slash", "crust_crusher", "projection"]
        notes: "Reliable float CC with SA protection. Core PVP catch skill."

    flow_nemesis_slash:
        name: "Flow: Nemesis Slash"
        input: "LMB (after Crosscut)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Crosscut. Additional slash with down attack properties."
        flows_into: ["crust_crusher", "fiery_angel", "projection"]
        notes: "Always chain after Crosscut for extra damage on floated target."

    whirlwind_cut:
        name: "Whirlwind Cut"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor spinning AOE slash. Wide area knockdown."
        flows_into: ["crust_crusher", "crosscut", "projection"]
        notes: "Wide AOE spin. Great for PVE pack clearing and large scale PVP."

    dash_slash:
        name: "Dash Slash"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor forward dash. Primary awakening movement skill."
        flows_into: ["crust_crusher", "crosscut", "fiery_angel", "projection"]
        notes: "Primary movement skill in awakening. PVE iframe vs monsters."

    blind_thrust:
        name: "Blind Thrust"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard thrust. Stiffness CC on hit. Good poke tool."
        flows_into: ["crust_crusher", "crosscut", "fiery_angel"]
        core_effect: "Core: Blind Thrust - Forward Guard on cooldown"
        notes: "Safe frontal poke with CC. Good for testing enemy defenses."

    dragon_bite:
        name: "Dragon Bite"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "none"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Quick slash with stiffness CC. Unprotected but fast animation."
        flows_into: ["crust_crusher", "crosscut", "projection"]
        notes: "Unprotected — use carefully in PVP. Good damage filler in PVE."

    below_the_belt:
        name: "Below the Belt"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["bound"]
        damage: low
        cooldown_ms: 6000
        description: "Forward Guard sweep with bound CC. Musa's key PVP catch tool."
        flows_into: ["crust_crusher", "crosscut", "fiery_angel"]
        notes: "Important PVP skill. FG with bound — use to catch unprotected targets."

    flow_chase_slash:
        name: "Flow: Chase Slash"
        input: "LMB (during Chase)"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Quick slash during Chase. Useful for weaving damage between dashes."
        flows_into: ["crust_crusher", "crosscut"]
        notes: "Can cancel Chase animation into damage. Unprotected."

    musa_spirit:
        name: "Musa Spirit"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "none"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff. Recovers WP and increases attack speed."
        flows_into: ["crust_crusher", "dash_slash"]
        notes: "Use between pulls for WP sustain. Hotbar recommended."

    counter_assassination:
        name: "Counter Assassination"
        input: "S + E"
        keys: ["s", "e"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor backstep slash. Defensive disengage with stiffness."
        flows_into: ["projection", "crust_crusher"]
        notes: "Defensive tool. SA backstep for creating space in PVP."

    gale:
        name: "Gale"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor wind slash from hotbar. Wide AOE damage."
        flows_into: ["crust_crusher", "crosscut"]
        notes: "Hotbar skill. Good extra burst in PVE rotation."

