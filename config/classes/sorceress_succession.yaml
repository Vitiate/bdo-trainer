# ============================================================================
# BDO Trainer - Succession Sorceress Combo Configuration
# ============================================================================
# Class: Sorceress (Succession)
# Weapons: Amulet (Main) / Talisman (Off) — Enhanced pre-awakening skills
# Damage Type: Melee / Magic
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Succession Sorceress Identity:
#   - Enhanced Amulet/Talisman skills with no Scythe usage
#   - Retains Night Crow iframe and Shadow Leap for top-tier mobility
#   - Dark Flame becomes the primary damage skill with massive scaling
#   - Still weaves between skills but stays in pre-awakening stance
#   - High burst windows with Dream of Doom crit debuff setups
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Sorceress Class Discord
#   - Community guides by Akiree, JinYiHan, Vert, Shirna
# ============================================================================

class: Sorceress
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Pre-Awakening)
# --------------------------------------------------------------------------
awakening_skills:
    dark_flame:
        name: "Dark Flame"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 5000
        description: "Primary succession damage skill. Enhanced dark burst with Super Armor. Massive scaling."
        flows_into: ["shadow_eruption", "rushing_crow", "claws_of_darkness"]
        core_effect: "Core: Dark Flame - Extra hits and greatly increased damage"
        notes: "Bread-and-butter skill. Use off cooldown. Succession version has far higher damage than base."

    shadow_eruption:
        name: "Shadow Eruption"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["float"]
        damage: medium
        cooldown_ms: 6000
        description: "Ground eruption with float CC. Key catch tool for starting combos."
        flows_into: ["dark_flame", "claws_of_darkness", "abyssal_flame"]
        notes: "Primary CC skill. Float into full burst. Unprotected so time carefully."

    claws_of_darkness:
        name: "Claws of Darkness"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Super Armor dark claw strikes. Multi-hit with knockdown. High burst."
        flows_into: ["dark_flame", "abyssal_flame", "signs_of_agony"]
        core_effect: "Core: Claws of Darkness - Knockdown on hit and increased damage"
        notes: "Second highest damage skill. Strong in both PVE and PVP."

    abyssal_flame:
        name: "Abyssal Flame"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor dark explosion. Large AOE with knockback. Heavy burst."
        flows_into: ["dark_flame", "claws_of_darkness", "rushing_crow"]
        notes: "Strong AOE nuke. Good for PVE clearing and PVP large scale."

    rushing_crow:
        name: "Rushing Crow"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 4000
        description: "Super Armor forward dash. Primary gap closer in succession."
        flows_into: ["dark_flame", "claws_of_darkness", "shadow_eruption"]
        notes: "Main movement skill in succession. Chains into damage skills smoothly."

    dark_strike:
        name: "Dark Strike"
        input: "LMB (chain)"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: medium
        cooldown_ms: 0
        description: "Enhanced LMB combo chain. Multiple dark amulet strikes. Succession scaling."
        flows_into: ["dark_flame", "shadow_eruption", "claws_of_darkness"]
        notes: "Use as filler between cooldowns. Fast animation and decent damage."

    signs_of_agony:
        name: "Signs of Agony"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor dark tendrils with bound CC. Large AOE slam."
        flows_into: ["dark_flame", "abyssal_flame", "claws_of_darkness"]
        notes: "Strong AOE with bound. Great for PVE pack clearing and PVP catch."

    beak_kick:
        name: "Beak Kick"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard kick with stiffness CC. Quick defensive poke."
        flows_into: ["dark_flame", "shadow_eruption", "claws_of_darkness"]
        notes: "Safe FG poke. Use to fish for stiffness in PVP."

    night_crow:
        name: "Night Crow"
        input: "Shift + Direction"
        keys: ["shift", "w"]
        keys_alt_left: ["shift", "a"]
        keys_alt_right: ["shift", "d"]
        keys_alt_back: ["shift", "s"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 3000
        description: "Directional iframe dash. Core Sorceress identity skill. Succession retains full functionality."
        flows_into: ["dark_flame", "rushing_crow", "shadow_eruption", "shadow_leap"]
        notes: "THE identity skill of Sorceress. Spammable iframe with shards. Master this to master Sorc."

    shadow_leap:
        name: "Shadow Leap"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 4000
        description: "Iframe leap. Additional iframe option alongside Night Crow."
        flows_into: ["dark_flame", "rushing_crow", "claws_of_darkness"]
        notes: "Key defensive tool. Pairs with Night Crow for extended iframe chains."

    black_wave:
        name: "Black Wave"
        input: "S + E"
        keys: ["s", "e"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard dark projectile wave. Ranged poke with stiffness."
        flows_into: ["dark_flame", "claws_of_darkness", "abyssal_flame"]
        notes: "Safe ranged FG poke. Good for fishing CC at range in PVP."

    dark_backstep:
        name: "Dark Backstep"
        input: "S + Q"
        keys: ["s", "q"]
        protection: "iframe"
        cc: []
        damage: none
        cooldown_ms: 5000
        description: "Quick iframe backstep. Creates distance with invincibility."
        flows_into: ["dark_flame", "black_wave", "shadow_eruption"]
        notes: "Defensive iframe for creating space. Pairs with Night Crow chains."

    crow_flare_enhanced:
        name: "Crow Flare"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 7000
        description: "Enhanced Super Armor forward dark burst. Succession version has knockdown."
        flows_into: ["dark_flame", "abyssal_flame", "claws_of_darkness"]
        notes: "Good SA engage tool with knockdown CC."

    bloody_calamity:
        name: "Bloody Calamity"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor self-buff and HP drain attack. Recovers HP on hit."
        flows_into: ["dark_flame", "claws_of_darkness"]
        core_effect: "Core: Bloody Calamity - Increased HP recovery and added Super Armor"
        notes: "Sustain tool. Use for HP recovery during grind. SA makes it safe."

    mark_of_the_shadow:
        name: "Mark of the Shadow"
        input: "RMB (hold)"
        keys: ["rmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Ranged dark projectiles. Enhanced succession version for shard generation."
        flows_into: ["dark_flame", "shadow_eruption"]
        notes: "Use to generate shards at range. Quick animation cancel into other skills."

    storming_crow:
        name: "Storming Crow"
        input: "W + W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Super Armor forward charge. Alternative gap closer."
        flows_into: ["dark_flame", "claws_of_darkness", "shadow_eruption"]
        notes: "Extra SA movement option. Use when Rushing Crow is on cooldown."

