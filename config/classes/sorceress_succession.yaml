              note: "SA charge filler"
            - skill: "shadow_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe leap for extra distance"

    iframe_movement:
        name: "Iframe Movement Chain"
        description: >
            Advanced movement using iframe chaining. Succession Sorc retains
            full Night Crow and Shadow Leap for near-permanent iframe uptime.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe dash — consumes shards"
            - skill: "shadow_leap"
              input: "Space"
              keys: ["space"]
              note: "Iframe leap"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Iframe dash again"
            - skill: "dark_backstep"
              input: "S + Q"
              keys: ["s", "q"]
              note: "Iframe backstep variety"
            - skill: "rushing_crow"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash while shards regen"
            - skill: "night_crow"
              input: "Shift + W"
              keys: ["shift", "w"]
              note: "Shards regenerated, iframe again"

