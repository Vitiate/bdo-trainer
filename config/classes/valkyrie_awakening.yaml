        cooldown_ms: 9000
        description: "Forward Guard light burst with healing effect. Preferred L57 Rabam."
        notes: "Preferred choice. Provides healing and FG protection during animation."

    divine_descent:
        name: "Divine Descent"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 15000
        description: "Super Armor aerial slam from hotbar. Good burst option."
        notes: "Put on hotbar. Decent burst with SA protection."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab / Tackle"
        input: "E (in pre-awakening stance)"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Valkyrie PVP. Bypasses Super Armor."
        notes: "Must swap to pre-awakening to use. Core PVP tool. Practice grab timing."

    shield_throw:
        name: "Shield Throw"
        input: "S + E"
        keys: ["s", "e"]
        protection: "none"
        cc: ["stiffness"]
        description: "Ranged shield throw with stiffness. Good for ranged poke and tagging."
        notes: "Useful for pulling mobs in PVE or poking in PVP at range."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Dodge roll."
        notes: "PVE iframe. Lock in PVP to prevent accidental use."

    sanctitas_de_enslar:
        name: "Sanctitas de Enslar"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["pull"]
        description: "Vacuum skill. Pulls enemies toward Valkyrie with Super Armor."
        notes: "Essential PVE vacuum for grouping mobs. Hotbar recommended."

    heavens_echo:
        name: "Heaven's Echo"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Party-wide AP buff with Super Armor during cast. Key support skill."
        notes: "Use before engaging. Essential party buff for group PVP and PVE."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "Dash to pack"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "terra_sancta"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam"
            - skill: "flow_terra_sancta"
              input: "RMB"
              keys: ["rmb"]
              note: "Follow-up slam"
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "Dash to next pack"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Vacuum first, then unload."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "sanctitas_de_enslar"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Vacuum pull mobs together"
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "Position into pack"
            - skill: "wave_of_light"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float, group mobs"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "terra_sancta"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam"
            - skill: "flow_terra_sancta"
              input: "RMB"
              keys: ["rmb"]
              note: "Follow-up slam finisher"
            - skill: "hastiludium"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Clean up remaining mobs"

    speed_clear:
