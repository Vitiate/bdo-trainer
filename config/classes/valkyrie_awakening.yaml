# ============================================================================
# BDO Trainer - Awakened Valkyrie Combo Configuration
# ============================================================================
# Class: Valkyrie (Awakening)
# Weapons: Longsword (Main) / Shield (Off) / Lancia (Awakening)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Valkyrie Class Discord
#   - Community guides by MacHiato, Fuzzlr, DontAsk, Lunyse
# ============================================================================

class: Valkyrie
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    noble_spirit:
        name: "Noble Spirit"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 30000
        description: "Self-buff. Restores HP/MP and increases AP for self and nearby allies. Core adds Super Armor."
        flows_into: ["death_line_chase", "sacrum_ferit"]
        core_effect: "Core: Noble Spirit - Super Armor during the skill"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    death_line_chase:
        name: "Death Line Chase"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Super Armor forward dash. Primary awakening movement skill."
        flows_into: ["sacrum_ferit", "terra_sancta", "hastiludium"]
        notes: "Main movement in awakening. Chase packs in PVE, reposition in PVP."

    sacrum_ferit:
        name: "Sacrum Ferit"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Main awakening damage skill. Super Armor throughout with knockdown."
        flows_into: ["flow_sacrum_ferit", "terra_sancta", "wave_of_light"]
        notes: "Bread-and-butter damage. Always follow with Flow: Sacrum Ferit."

    flow_sacrum_ferit:
        name: "Flow: Sacrum Ferit"
        input: "LMB (after Sacrum Ferit)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Sacrum Ferit. Additional burst with Super Armor."
        flows_into: ["terra_sancta", "hastiludium"]
        notes: "Always chain after Sacrum Ferit for extra damage."

    terra_sancta:
        name: "Terra Sancta"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Massive Lancia slam with Super Armor. Highest damage awakening skill. Core adds Bound."
        flows_into: ["flow_terra_sancta", "sacrum_ferit"]
        core_effect: "Core: Terra Sancta - Bound on good hits, increased damage"
        notes: "Recommended Core skill. Highest burst in the kit. Use off cooldown."

    flow_terra_sancta:
        name: "Flow: Terra Sancta"
        input: "RMB (after Terra Sancta)"
        keys: ["rmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Terra Sancta. Additional slam with Super Armor."
        flows_into: ["sacrum_ferit", "hastiludium"]
        notes: "Always chain after Terra Sancta for maximum burst damage."

    promptness:
        name: "Promptness"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward dash attack. Good engage tool with stiffness CC."
        flows_into: ["flow_revelation", "sacrum_ferit"]
        notes: "Fast SA engage. Flows into Flow: Revelation for extra damage."

    flow_revelation:
        name: "Flow: Revelation"
        input: "LMB (after Promptness)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Promptness. Overhead slam with knockdown."
        flows_into: ["terra_sancta", "sacrum_ferit"]
        notes: "Good CC follow-up. Always chain after Promptness for knockdown."

    hastiludium:
        name: "Hastiludium"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor charging lance thrust. Good filler with knockback."
        flows_into: ["sacrum_ferit", "terra_sancta"]
        core_effect: "Core: Hastiludium - Increased charge distance and damage"
        notes: "Good filler with SA protection. Moderate damage and repositioning."

    wave_of_light:
        name: "Wave of Light"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor wide-area light explosion with float CC. Strong AOE."
        flows_into: ["sacrum_ferit", "terra_sancta"]
        notes: "Strong AOE. Good for pack clearing in PVE and catching in PVP."

    purificatione:
        name: "Purificatione"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Forward Guard buff and heal. Restores HP and grants AP buff to self and nearby allies."
        flows_into: ["death_line_chase", "sacrum_ferit"]
        core_effect: "Core: Purificatione - Enhanced healing and extended buff duration"
        notes: "Key sustain and support tool. Use for HP recovery and party AP buff."

    verdict_lancia_iustitiae:
        name: "Verdict: Lancia Iustitiae"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 7000
        description: "Forward Guard multi-hit lance thrust. Safe protected filler."
        flows_into: ["sacrum_ferit", "terra_sancta"]
        notes: "Good filler with frontal protection. Safe to use in PVP."

    celestial_spear:
        name: "Celestial Spear"
        input: "E"
        keys: ["e"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor ranged lance throw. Good for ranged poke and engagement."
        flows_into: ["death_line_chase", "sacrum_ferit"]
        notes: "Ranged engage or poke with SA. Use to initiate before dashing in."

    blitz_stab:
        name: "Blitz Stab"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick Forward Guard lance thrust. Fast filler with frontal protection."
        flows_into: ["sacrum_ferit", "terra_sancta"]
        notes: "Quick FG poke. Good in 1v1 for safe damage between cooldowns."

    sharp_light:
        name: "Sharp Light"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 6000
        description: "Quick low sweep with bound CC. Unprotected."
        flows_into: ["sacrum_ferit", "terra_sancta"]
        notes: "CC tool but unprotected. Be careful when using in PVP."

    elliptical_slash:
        name: "Flow: Elliptical Slash"
        input: "F (after awakening skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard slash available after multiple awakening skills."
        flows_into: ["sacrum_ferit", "terra_sancta"]
        notes: "Good filler with FG. Chain after awakening skills for safe damage."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    sacred_charge:
        name: "Sacred Charge"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor forward lance charge with stiffness. Good for engage and movement."
        notes: "Preferred L56 Rabam. Good protected movement and engaging."

    light_of_purification:
        name: "Light of Purification"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "FG"
        cc: []
