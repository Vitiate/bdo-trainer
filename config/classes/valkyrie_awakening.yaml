        description: "Fast rotation for spots where mobs die quickly. Maximize mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "Dash into pack"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "One-shot burst"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "sacred_charge"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "noble_spirit"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "Buff up"
            - skill: "sanctitas_de_enslar"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Vacuum pull mobs"
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "Engage"
            - skill: "wave_of_light"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE opener"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "terra_sancta"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam"
            - skill: "flow_terra_sancta"
              input: "RMB"
              keys: ["rmb"]
              note: "Follow-up slam"
            - skill: "hastiludium"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA filler"
            - skill: "promptness"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash filler"
            - skill: "flow_revelation"
              input: "LMB"
              keys: ["lmb"]
              note: "Knockdown follow-up"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills and Forward Guard.
            Approach with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "heavens_echo"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "SA party AP buff before going in"
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "promptness"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA engage with stiffness"
            - skill: "flow_revelation"
              input: "LMB"
              keys: ["lmb"]
              note: "Knockdown follow-up"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Valkyrie PVP combo. Land a grab from pre-awakening
            then swap back and chain into full burst. Valkyrie's grab
            bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA (pre-awakening)"
            - skill: "wave_of_light"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "terra_sancta"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam finisher"
            - skill: "flow_terra_sancta"
              input: "RMB"
              keys: ["rmb"]
              note: "Final burst"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard skills to approach, fish for a stiffness,
            then chain into grab and full damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "blitz_stab"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "wave_of_light"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "terra_sancta"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "promptness"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush"
            - skill: "flow_revelation"
              input: "LMB"
              keys: ["lmb"]
              note: "Knockdown catch"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main burst"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up"
            - skill: "terra_sancta"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy finisher"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "wave_of_light"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Instant float on CC'd target"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "terra_sancta"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam finisher"
            - skill: "flow_terra_sancta"
              input: "RMB"
              keys: ["rmb"]
              note: "Final burst"

    support_disengage:
        name: "Support / Disengage"
        description: >
            Escape combo when pressured while providing team support.
            Use SA movement and heals to create distance safely.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "purificatione"
              input: "Q"
              keys: ["q"]
              note: "FG heal and buff allies"
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "SA dash away"
            - skill: "sacred_charge"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement while retreating"
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "Continue dashing if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on protected damage, party buffs,
            and vacuum to support your group. Valkyrie excels as tanky support.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "heavens_echo"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Party AP buff before engaging blob"
            - skill: "noble_spirit"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA self-buff"
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "SA engage into group"
            - skill: "sanctitas_de_enslar"
              input: "Hotbar"
              keys: ["hotbar"]
              note: "Vacuum pull enemies together"
            - skill: "wave_of_light"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float"
            - skill: "sacrum_ferit"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_sacrum_ferit"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "terra_sancta"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA burst finisher"
            - skill: "death_line_chase"
              input: "Space"
              keys: ["space"]
              note: "SA reposition out"

