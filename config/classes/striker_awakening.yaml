# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Striker PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Striker is a grab class — practice grab timing constantly."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. PVE iframe as well."
        notes: "PVE iframe. Can be locked in PVP to prevent accidental use."

    adamantine:
        name: "Adamantine"
        input: "Shift + A / Shift + D"
        keys: ["shift", "a"]
        keys_alt: ["shift", "d"]
        protection: "SA"
        cc: []
        description: "Super Armor side dash. Primary protected movement in pre-awakening."
        notes: "Key mobility tool. SA dash that transitions between stances smoothly."

    massive_suppression:
        name: "Massive Suppression"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        description: "Super Armor stomping attack. Knockdown CC. Good AOE."
        notes: "Put on hotbar. SA protected engage tool."

    flash_step:
        name: "Flash Step"
        input: "W + W (double tap)"
        keys: ["w", "w"]
        protection: "SA"
        cc: []
        description: "Quick forward dash with Super Armor. Short cooldown movement."
        notes: "Chain with Adamantine for fast SA movement. Hold W for burst of speed."

