# ============================================================================
# BDO Trainer - Awakened Striker Combo Configuration
# ============================================================================
# Class: Striker (Awakening)
# Weapons: Gauntlet (Main) / Vambrace (Off) / Gardbrace (Awakening — Echo Spirits/Clones)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Striker Class Discord
#   - Community guides by Vert, BigandShiny, Preach, DontAsk
# ============================================================================

class: Striker
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    skull_crusher:
        name: "Skull Crusher"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 6000
        description: "Super Armor forward slam. Main awakening damage skill with knockdown."
        flows_into: ["flow_skull_hammer", "echo_spirit", "crouching_wolf"]
        core_effect: "Core: Skull Crusher - Extra hit damage and increased PVE damage"
        notes: "Bread-and-butter awakening damage. Always chain into Flow: Skull Hammer."

    flow_skull_hammer:
        name: "Flow: Skull Hammer"
        input: "LMB (after Skull Crusher)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up slam after Skull Crusher. Bound CC with Super Armor."
        flows_into: ["echo_spirit", "crouching_wolf", "mass_destruction"]
        notes: "Always chain after Skull Crusher. Down attack properties for extra damage."

    echo_spirit:
        name: "Echo Spirit"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: high
        cooldown_ms: 7000
        description: "Summon clone for massive AOE damage. Super Armor throughout. Core awakening skill."
        flows_into: ["flow_bombardment", "skull_crusher", "twisted_collision"]
        core_effect: "Core: Echo Spirit - Super Armor and increased clone damage"
        notes: "Signature Striker skill. Clone attack deals devastating damage. Use on cooldown."

    flow_bombardment:
        name: "Flow: Bombardment"
        input: "LMB (after Echo Spirit)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up clone barrage after Echo Spirit. Super Armor with knockdown."
        flows_into: ["skull_crusher", "crouching_wolf", "mass_destruction"]
        notes: "Always chain after Echo Spirit for extra clone damage."

    roaring_tiger:
        name: "Roaring Tiger"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor forward charge with spirit tiger. Stiffness CC."
        flows_into: ["flow_tiger_hunt", "skull_crusher", "echo_spirit"]
        core_effect: "Core: Roaring Tiger - Stiffness on hit and increased range"
        notes: "Good engage tool with protection. Flows into Flow: Tiger Hunt."

    flow_tiger_hunt:
        name: "Flow: Tiger Hunt"
        input: "LMB (after Roaring Tiger)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up strike after Roaring Tiger. Knockdown with Super Armor."
        flows_into: ["skull_crusher", "echo_spirit", "crouching_wolf"]
        notes: "Always chain after Roaring Tiger for the knockdown CC."

    crouching_wolf:
        name: "Crouching Wolf"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Low sweeping strike with Super Armor. Bound CC on hit."
        flows_into: ["skull_crusher", "echo_spirit", "mass_destruction"]
        notes: "Good filler with bound CC. Down attack properties."

    mass_destruction:
        name: "Mass Destruction"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor ground pound with massive AOE. Knockdown CC."
        flows_into: ["skull_crusher", "echo_spirit", "crouching_wolf"]
        notes: "Strong AOE slam. Used in PVE for pack clearing and PVP for damage."

    ferocious_assault:
        name: "Ferocious Assault"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard multi-hit barrage. Transitions to Super Armor on later hits."
        flows_into: ["skull_crusher", "echo_spirit", "knee_hammer"]
        notes: "FG on first hits, SA on later hits. Good for trading in PVP."

    wolfs_fang:
        name: "Wolf's Fang"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Super Armor dash. Primary movement skill in awakening stance."
        flows_into: ["skull_crusher", "echo_spirit", "roaring_tiger"]
        notes: "Primary gap closer and mobility tool. PVE iframe (1s invincibility vs monsters)."

    knee_hammer:
        name: "Knee Hammer"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard knee strike. Stiffness CC on impact."
        flows_into: ["skull_crusher", "echo_spirit", "ferocious_assault"]
        notes: "Good engage tool with Forward Guard. Fish for stiffness into grab."

    twisted_collision:
        name: "Twisted Collision"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor spinning attack with float CC."
        flows_into: ["skull_crusher", "echo_spirit", "crouching_wolf"]
        notes: "Good CC tool. Float into down attack for burst."

    rage_hammer:
        name: "Rage Hammer"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 5000
        description: "Quick downward hammer strike with bound. Unprotected."
        flows_into: ["skull_crusher", "echo_spirit"]
        notes: "Bound CC but unprotected. Use carefully in PVP."

    hidden_claw:
        name: "Hidden Claw"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor clone uppercut from hotbar. Knockdown CC."
        flows_into: ["skull_crusher", "echo_spirit"]
        notes: "Hotbar skill. Strong SA engage option."

    savage_fang:
        name: "Savage Fang"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor clone rush from hotbar. Good AOE damage."
        flows_into: ["skull_crusher", "echo_spirit"]
        notes: "Hotbar skill. Good for large scale and pack clearing."

    flow_crosswind:
        name: "Flow: Crosswind"
        input: "F (after awakening skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard attack available after multiple awakening skills."
        flows_into: ["skull_crusher", "echo_spirit"]
        notes: "Can be chained after many awakening skills. Good filler with FG."

