# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills and Forward Guard.
            Approach with protection, then look for a grab opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "wolfs_fang"
              input: "Space"
              keys: ["space"]
              note: "SA gap close"
            - skill: "knee_hammer"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness poke"
            - skill: "skull_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_skull_hammer"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up bound"
            - skill: "echo_spirit"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
