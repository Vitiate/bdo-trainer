    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Striker PVP combo. Land a grab then chain into full clone burst.
            Striker's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "mass_destruction"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Ground pound on grabbed target"
            - skill: "skull_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_skull_hammer"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up slam"
            - skill: "echo_spirit"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Clone burst finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard to approach, fish for a stiffness,
            then chain into grab and full clone burst damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "knee_hammer"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "mass_destruction"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Ground pound follow-up"
            - skill: "skull_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_skull_hammer"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up slam"
            - skill: "echo_spirit"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Clone finisher"

    clone_burst:
        name: "Clone Burst (1v1)"
        description: >
            Maximum clone damage combo. Focus on stacking echo spirit
            hits for devastating burst. Works best on CC'd targets.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "twisted_collision"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "SA float the target"
            - skill: "echo_spirit"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Clone burst on floating target"
            - skill: "flow_bombardment"
              input: "LMB"
              keys: ["lmb"]
              note: "Clone follow-up"
            - skill: "skull_crusher"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_skull_hammer"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up slam finisher"
            - skill: "crouching_wolf"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Bound clean-up"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "roaring_tiger"
