# ============================================================================
# BDO Trainer - Awakened Lahn Combo Configuration
# ============================================================================
# Class: Lahn (Awakening)
# Weapons: Crescent Pendulum (Main) / Noble Sword (Off) / Crimson Glaives (Awakening)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull, grab
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Lahn Class Discord
#   - Community guides by Eminent, Ristelle, Danelle, FlexTape
# ============================================================================

class: Lahn
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    blooming_nether_flower:
        name: "Blooming Nether Flower"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Primary awakening damage skill. Super Armor with knockdown. Fast multi-hit slash with Crimson Glaives."
        flows_into: ["flow_bleeding_hearts", "salpuri_purge", "deadly_dance"]
        core_effect: "Core: Blooming Nether Flower - Extra hit on last attack, increased damage"
        notes: "Bread-and-butter damage skill. Always follow with Flow: Bleeding Hearts."

    flow_bleeding_hearts:
        name: "Flow: Bleeding Hearts"
        input: "LMB (after Blooming Nether Flower)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up to Blooming Nether Flower. Additional burst with Super Armor."
        flows_into: ["salpuri_purge", "deadly_dance", "moon_slash"]
        notes: "Always chain after Blooming Nether Flower for maximum damage."

    primrose_sprint:
        name: "Primrose Sprint"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor forward dash attack. Primary gap closer in awakening. Stiffness on hit."
        flows_into: ["flow_fragrant_stigma", "blooming_nether_flower", "salpuri_purge"]
        notes: "Main engage tool. SA throughout. Chain into Flow: Fragrant Stigma for extra damage."

    flow_fragrant_stigma:
        name: "Flow: Fragrant Stigma"
        input: "LMB (after Primrose Sprint)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up to Primrose Sprint. Extended slashing combo with knockback."
        flows_into: ["blooming_nether_flower", "salpuri_purge"]
        notes: "Chain after Primrose Sprint. Good AOE clear in PVE."

    salpuri_purge:
        name: "Salp'uri Purge"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 8000
        description: "Highest damage awakening skill. Super Armor spinning attack with massive AOE and knockdown."
        flows_into: ["flow_mangler", "blooming_nether_flower", "deadly_dance"]
        core_effect: "Core: Salp'uri Purge - Super Armor improvement, additional damage on last hit"
        notes: "Your hardest hitting skill. Use off cooldown in PVE. Key burst in PVP."

    deadly_dance:
        name: "Deadly Dance"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor backward leap into overhead glaive slam. Bound CC on hit."
        flows_into: ["blooming_nether_flower", "salpuri_purge", "flow_mangler"]
        notes: "Good repositioning tool. Bound enables follow-up combos in PVP."

    moon_slash:
        name: "Moon Slash"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 9000
        description: "Super Armor overhead slam with float CC. Strong AOE damage."
        flows_into: ["blooming_nether_flower", "salpuri_purge", "flow_mangler"]
        core_effect: "Core: Moon Slash - Float on good hits, increased damage"
        notes: "Strong AOE. Float CC sets up aerial combos in PVP."

    sacred_dance:
        name: "Sacred Dance"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Forward Guard self-buff. Increases AP, attack speed, and critical hit rate for 30 seconds."
        flows_into: ["primrose_sprint", "blooming_nether_flower"]
        notes: "Use before engaging. FG while casting. Significant AP buff — keep up at all times."

    vice_savage_fang:
        name: "Vice: Savage Fang"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard multi-hit attack with stiffness CC. Good defensive option."
        flows_into: ["blooming_nether_flower", "salpuri_purge", "flow_mangler"]
        notes: "Use for frontal protection when pressured. Stiffness sets up grabs in PVP."

    eradication:
        name: "Eradication"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward rushing attack. Knockback on hit. Good approach tool."
        flows_into: ["blooming_nether_flower", "salpuri_purge", "flow_mangler"]
        notes: "SA engage tool. Can be used to push through enemies in large scale."

    flow_mangler:
        name: "Flow: Mangler"
        input: "F (after various awakening skills)"
        keys: ["f"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up attack available after Salp'uri Purge, Deadly Dance, Moon Slash, Vice: Savage Fang, and Eradication. Super Armor."
        flows_into: ["blooming_nether_flower", "primrose_sprint"]
        notes: "Universal follow-up. Chain after nearly any awakening skill for extra damage."

    nimbus_stride:
        name: "Nimbus Stride"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 3000
        description: "Signature aerial glide. Super Armor while in the air. Hold Space to glide across the battlefield. Can use aerial grab from this."
        flows_into: ["grab", "blooming_nether_flower", "primrose_sprint"]
        notes: "Lahn's signature movement. Hold Space to glide. Use to engage, disengage, or set up aerial grab. SA while airborne."

    twisting_slash:
        name: "Twisting Slash"
        input: "LMB LMB LMB"
        keys: ["lmb"]
        protection: "none"
        cc: []
        damage: low
        cooldown_ms: 0
        description: "Basic awakening auto-attack chain. Three consecutive glaive slashes."
        flows_into: ["blooming_nether_flower", "salpuri_purge"]
        notes: "Basic attack. Use only if all other skills are on cooldown."

    cymbidium:
        name: "Cymbidium"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 5000
        description: "Quick low sweep with bound CC. Unprotected."
        flows_into: ["blooming_nether_flower", "salpuri_purge"]
        notes: "Bound CC but unprotected. Use carefully in PVP — punishable if whiffed."

    soul_raid:
        name: "Soul Raid"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor ranged glaive throw. Hotbar skill with knockback."
        flows_into: ["blooming_nether_flower"]
        notes: "Hotbar recommended. Good ranged poke with SA protection."

    bloody_stride:
        name: "Bloody Stride"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor dash attack from hotbar. Stiffness CC on hit."
        flows_into: ["blooming_nether_flower", "salpuri_purge"]
        notes: "Hotbar skill. Good protected engage or gap closer."

# --------------------------------------------------------------------------
# Rabam Skills (Skill Enhancement)
# --------------------------------------------------------------------------
rabam_skills:
    pendulum_waltz:
        name: "Pendulum Waltz"
        level: 56
        input: "Shift + X"
        keys: ["shift", "x"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor spinning pendulum attack with stiffness. Good gap closer with protection."
        notes: "Preferred L56 Rabam. SA movement with CC. Useful in both PVE and PVP."

    nocturne:
        name: "Nocturne"
        level: 57
        input: "Shift + Z"
        keys: ["shift", "z"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Super Armor overhead slam with knockdown. High burst damage."
        notes: "Preferred L57 Rabam. SA with knockdown. Good burst damage option."

    death_march:
        name: "Death March"
        level: 58
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 12000
        description: "Super Armor rush attack with bound CC. Hotbar only."
        notes: "Decent L58 Rabam. Put on hotbar. SA engage option."

# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Awakening play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab (Aerial Grab)"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Lahn's signature aerial grab — can be used while airborne from Nimbus Stride. Bypasses Super Armor."
        notes: "Core PVP tool. Aerial grab from Nimbus Stride is Lahn's defining PVP mechanic. Practice the timing from flight."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Short invincibility during the dodge."
        notes: "Standard iframe. Use to avoid incoming CC. Can chain into awakening skills."

    nimbus_stride_preawakening:
        name: "Nimbus Stride (Flight)"
        input: "Space (hold)"
        keys: ["space"]
        protection: "SA"
        cc: []
        description: "Aerial glide. Lahn's unique flight mechanic. Hold Space to glide across terrain. SA while airborne."
        notes: "Lahn is the only class with true flight. Use for repositioning, engaging, and escaping."

    bridled_despair:
        name: "Bridled Despair"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["stiffness"]
        description: "Super Armor dash attack with stiffness. Pre-awakening utility skill used in awakening rotation."
        notes: "Put on hotbar. Good protected movement option and filler."

    furor:
        name: "Furor"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: []
        description: "Self-buff that increases attack speed and movement speed."
        notes: "Hotbar buff. Use before grinding for the speed boost."

# --------------------------------------------------------------------------
# PVE Combos
# --------------------------------------------------------------------------
pve_combos:
    basic_grind:
        name: "Basic PVE Grind"
        description: "Standard grinding rotation. Simple and effective for clearing packs."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Glide to next pack"
            - skill: "primrose_sprint"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash into pack"
            - skill: "flow_fragrant_stigma"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up AOE"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main damage"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy AOE finisher"

    large_pack_clear:
        name: "Large Pack Clear"
        description: "Full burst rotation for large mob packs. Buff first, then unload everything."
        difficulty: intermediate
        combo_window_ms: 300
        steps:
            - skill: "sacred_dance"
              input: "Q"
              keys: ["q"]
              note: "AP buff before engaging"
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Glide into pack"
            - skill: "moon_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float opener"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy AOE damage"
            - skill: "flow_mangler"
              input: "F"
              keys: ["f"]
              note: "Extra follow-up damage"
            - skill: "deadly_dance"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Clean up remaining mobs"

    speed_clear:
        name: "Speed Clear (Easy Spots)"
        description: "Fast rotation for spots where mobs die quickly. Maximize flight mobility."
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Glide into pack — fastest travel"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Quick burst to one-shot"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up if needed"
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Glide to next pack immediately"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns for maximum clear."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "sacred_dance"
              input: "Q"
              keys: ["q"]
              note: "Buff up"
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Engage from the air"
            - skill: "moon_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "AOE float opener"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Highest damage skill"
            - skill: "flow_mangler"
              input: "F"
              keys: ["f"]
              note: "Follow-up burst"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up burst"
            - skill: "eradication"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA filler damage"
            - skill: "deadly_dance"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Reposition and damage"
            - skill: "primrose_sprint"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close to stragglers"
            - skill: "flow_fragrant_stigma"
              input: "LMB"
              keys: ["lmb"]
              note: "Extend combo"
            - skill: "pendulum_waltz"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using Super Armor skills. Approach with protection,
            apply pressure, and look for a grab opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "sacred_dance"
              input: "Q"
              keys: ["q"]
              note: "FG AP buff before engaging"
            - skill: "primrose_sprint"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA gap close with stiffness"
            - skill: "flow_fragrant_stigma"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up knockback"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up burst"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA finisher"

    aerial_grab_combo:
        name: "Aerial Grab Combo (Signature)"
        description: >
            Lahn's signature PVP combo. Fly above the target with Nimbus Stride
            then aerial grab them. This bypasses Super Armor and is nearly
            impossible to react to. Lahn's primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly above the target — SA while airborne"
            - skill: "grab"
              input: "E (while airborne)"
              keys: ["e"]
              note: "Aerial grab — bypasses SA, nearly unreactable"
            - skill: "moon_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on grabbed target"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst on CC'd target"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Follow-up burst"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher burst"

    ground_grab_combo:
        name: "Ground Grab Combo (1v1)"
        description: >
            Standard ground grab combo for 1v1 situations. Fish for stiffness
            from Vice: Savage Fang then chain into grab and full burst.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "vice_savage_fang"
              input: "S + RMB"
              keys: ["s", "rmb"]
              note: "FG stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "moon_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float follow-up"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Follow-up burst"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly while
            staying in Super Armor protected skills. No grab required.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "primrose_sprint"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward rush engage"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"
            - skill: "flow_mangler"
              input: "F"
              keys: ["f"]
              note: "SA extended damage"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab or the
            target is already CC'd on the ground. Dump all burst.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "moon_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "Float on CC'd target"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Main burst on downed target"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Follow-up burst"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use Nimbus Stride flight to create
            distance. Lahn has the best disengage in the game via flight.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "deadly_dance"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA backward leap to create space"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly away — SA while airborne, hold to glide"
            - skill: "pendulum_waltz"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement if they follow"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Continue flying to safety"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Fly above the blob, dive in with
            SA skills, dump damage, then fly out. Lahn excels at flanking.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "sacred_dance"
              input: "Q"
              keys: ["q"]
              note: "FG buff before dive"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly above the enemy group"
            - skill: "moon_slash"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float on landing"
            - skill: "salpuri_purge"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA main AOE burst"
            - skill: "blooming_nether_flower"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA follow-up damage"
            - skill: "flow_bleeding_hearts"
              input: "LMB"
              keys: ["lmb"]
              note: "SA extended damage"
            - skill: "eradication"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA push through enemies"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly out to safety — do not overextend"

# --------------------------------------------------------------------------
# Movement Combos
# --------------------------------------------------------------------------
movement_combos:
    flight_travel:
        name: "Flight Travel / Mobility Chain"
        description: "Chain flight and movement skills for fastest traversal. Lahn has the best overworld mobility."
        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Hold to glide — primary traversal"
            - skill: "primrose_sprint"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA dash when landing"
            - skill: "pendulum_waltz"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement filler"
            - skill: "nimbus_stride"
              input: "Space (hold)"
              keys: ["space"]
              note: "Fly again once stamina recovers"

    awakening_movement:
        name: "Awakening Combat Movement"
        description: >
            Movement chain for Lahn awakening in combat. Cycle between
            Nimbus Stride, Primrose Sprint, and SA skills for maximum
            mobility while staying protected.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "SA aerial glide"
            - skill: "primrose_sprint"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward dash"
            - skill: "eradication"
              input: "W + RMB"
              keys: ["w", "rmb"]
              note: "SA forward rush"
            - skill: "pendulum_waltz"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement + stiffness"
            - skill: "nimbus_stride"
              input: "Space"
              keys: ["space"]
              note: "Fly again to reposition"

