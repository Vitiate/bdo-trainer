        difficulty: beginner
        combo_window_ms: 300
        steps:
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "SA forward leap"
            - skill: "heilang_storm"
              input: "Shift + Z"
              keys: ["shift", "z"]
