            - skill: "echo_pierce"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA movement filler"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Leap again if off cooldown"

    awakening_movement:
        name: "Awakening Movement Guide"
        description: >
            Movement chain for Tamer awakening. Cycle between Cloud Stomping,
            Rabam skills, and Cloud Ride for maximum speed between packs.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "SA forward leap"
            - skill: "heilang_storm"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA Rabam movement"
            - skill: "echo_pierce"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "SA dash forward"
            - skill: "cloud_stomping"
              input: "Space"
              keys: ["space"]
              note: "Leap if off cooldown"
            - skill: "cloud_ride"
              input: "W + W (hold)"
              keys: ["w", "w"]
              note: "Sprint on Heilang between packs"

