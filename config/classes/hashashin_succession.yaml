        name: "Succession Movement Guide"
        description: >
            Movement chain for Hashashin succession. Cycle between Shadow Leap,
            Sand Dash, Constriction, and Rabam skills for maximum speed
            and constant iframe/SA coverage. Succession has stronger Shadow Leap.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "shadow_leap"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe teleport forward"
            - skill: "sand_dash"
              input: "Space"
              keys: ["space"]
              note: "Iframe short dash"
            - skill: "constriction"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA forward dash"
            - skill: "sand_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement filler"
            - skill: "shadow_leap"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "If off cooldown, repeat cycle"

