              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe teleport away"
            - skill: "shadow_leap"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Second iframe teleport if off cooldown"

    large_scale_siege:
        name: "Large Scale / Siege"
        description: >
            Node war and siege combo. Focus on AOE damage and protected skills.
            Use enhanced Shamshir skills to zone enemies and burst grouped targets.
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "sand_veil"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "SA buff before engaging"
            - skill: "shadow_leap"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe engage into group"
            - skill: "quicksand"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "SA pull enemies together"
            - skill: "desert_collapse"
              input: "Q"
              keys: ["q"]
              note: "FG AOE knockdown on group"
            - skill: "desert_storm"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA tornado AOE"
            - skill: "sand_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "arid_assault"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"
            - skill: "shadow_leap"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe reposition out"

