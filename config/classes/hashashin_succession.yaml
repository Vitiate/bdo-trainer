# --------------------------------------------------------------------------
# Core Skill Recommendation
# --------------------------------------------------------------------------
core_skill:
    recommended: "Sand Slash"
    effect: "Extra hits, increased damage, and Super Armor"
    reason: >
        Sand Slash with Core gains additional hits, a significant damage
        increase, and reliable Super Armor on the skill. As your most
        frequently used damage skill, this Core provides the biggest
        overall improvement to both PVE grinding speed and PVP burst.
        After getting comfortable, experiment with Arid Assault Core for
        burst-heavy playstyles, or Dune Slash Core for additional CC
        options in PVP.
