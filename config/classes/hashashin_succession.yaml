            - skill: "flow_arid_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher"

    kite_disengage:
        name: "Kite / Disengage"
        description: >
            Escape combo when pressured. Use iframe teleport and SA movement
            to create distance. Succession excels at disengaging with Shadow Leap.
        difficulty: intermediate
        combo_window_ms: 250
        steps:
            - skill: "sand_dash"
              input: "Space"
              keys: ["space"]
              note: "Iframe dash out"
            - skill: "sand_barrier"
              input: "Shift + Z"
              keys: ["shift", "z"]
              note: "SA movement + debuff"
