# --------------------------------------------------------------------------
# Pre-Awakening Utility Skills (used in Succession play)
# --------------------------------------------------------------------------
preawakening_utility:
    grab:
        name: "Grab"
        input: "E"
        keys: ["e"]
        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Hashashin PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Hashashin is a grab class — practice grab timing in duels."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. Short iframe dodge."
        notes: "PVE iframe. Lock in PVP to prevent accidental use if preferred."

    haladie_defense:
        name: "Haladie Defense"
        input: "RMB (hold)"
        keys: ["rmb"]
        protection: "FG"
        cc: []
        description: "Block stance using Haladie off-hand. Forward Guard while held."
        notes: "Emergency block. Succession relies less on block than other classes."

    shamshir_training:
        name: "Shamshir Training"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: []
        description: "Self-buff increasing Shamshir attack damage. Super Armor during animation."
        notes: "Use before engaging for damage boost. Hotbar recommended."

    sand_kick:
        name: "Sand Kick"
        input: "F"
        keys: ["f"]
        protection: "none"
        cc: ["stiffness"]
        description: "Quick sand kick with stiffness. Fast CC tool."
        notes: "Unprotected but very fast. Use to interrupt or catch opponents."

