# ============================================================================
# BDO Trainer - Succession Hashashin Combo Configuration
# ============================================================================
# Class: Hashashin (Succession)
# Weapons: Shamshir (Main) / Haladie (Off) — Enhanced Shamshir skills
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Hashashin Class Discord
#   - Community guides by Vert, BigandShiny, Desperada, Haste
# ============================================================================

class: Hashashin
spec: Succession

# --------------------------------------------------------------------------
# Succession Skills (Enhanced Pre-Awakening)
# --------------------------------------------------------------------------
awakening_skills:
    sand_slash:
        name: "Sand Slash"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 5000
        description: "Enhanced Shamshir slash combo with Super Armor. Primary damage skill in succession."
        flows_into: ["arid_assault", "constriction", "dune_slash"]
        core_effect: "Core: Sand Slash - Extra hits, increased damage, and Super Armor"
        notes: "Bread-and-butter succession damage skill. Enhanced range and damage over pre-awakening."

    arid_assault:
        name: "Arid Assault"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Heavy Shamshir thrust. Second highest burst damage in succession kit."
        flows_into: ["sand_slash", "dune_slash", "flow_arid_burst"]
        core_effect: "Core: Arid Assault - Super Armor and increased damage"
        notes: "Primary burst skill. Use off cooldown for maximum damage output."

    flow_arid_burst:
        name: "Flow: Arid Burst"
        input: "LMB (after Arid Assault)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up slash after Arid Assault. Additional burst with Super Armor."
        flows_into: ["sand_slash", "constriction", "dune_slash"]
        notes: "Always chain after Arid Assault for extended SA and extra damage."

    constriction:
        name: "Constriction"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Super Armor forward dash strike. Fast engagement with stiffness CC."
        flows_into: ["sand_slash", "arid_assault", "dune_slash"]
        notes: "Primary engage tool. Quick gap closer with SA protection."

    dune_slash:
        name: "Dune Slash"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: high
        cooldown_ms: 8000
        description: "Super Armor downward slam with bound CC. Strong burst and CC tool."
        flows_into: ["sand_slash", "arid_assault", "splitting_sands"]
        core_effect: "Core: Dune Slash - Bound on good hits, increased damage"
        notes: "High damage with bound CC. Down attack properties on bound targets."

    desert_storm:
        name: "Desert Storm"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 10000
        description: "Super Armor sand tornado. Enhanced succession version with float CC and large AOE."
        flows_into: ["sand_slash", "arid_assault", "dune_slash"]
        core_effect: "Core: Desert Storm - Float on all hits, increased AOE"
        notes: "Strongest AOE skill. Use for pack clearing in PVE and zoning in PVP."

    shadow_leap:
        name: "Shadow Leap"
        input: "Shift + Space"
        keys: ["shift", "space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 5000
        description: "Iframe teleport through sand. Long-range movement skill. Enhanced in succession."
        flows_into: ["sand_slash", "constriction", "arid_assault"]
        notes: "Primary movement and escape tool. Iframe makes it safe. Can chain twice."

    splitting_sands:
        name: "Splitting Sands"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 7000
        description: "Super Armor forward sand wave. Enhanced version with increased range and damage."
        flows_into: ["sand_slash", "arid_assault", "constriction"]
        notes: "Good approach tool with SA. Knocks back enemies for spacing."

    ensnaring_sands:
        name: "Ensnaring Sands"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward Guard sand trap. Stiffens enemies caught in the area."
        flows_into: ["sand_slash", "arid_assault", "dune_slash"]
        notes: "Defensive tool with FG. Good for fishing stiffness CC in PVP."

    sand_dash:
        name: "Sand Dash"
        input: "Space"
        keys: ["space"]
        protection: "iframe"
        cc: []
        damage: low
        cooldown_ms: 4000
        description: "Quick iframe sand dash. Primary short-range mobility in succession."
        flows_into: ["sand_slash", "constriction", "arid_assault"]
        notes: "Short iframe dash. Chain with Shadow Leap for extended movement."

    serpent_strike:
        name: "Serpent Strike"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 7000
        description: "Quick low sand sweep with bound CC. Unprotected but fast."
        flows_into: ["sand_slash", "arid_assault"]
        notes: "Unprotected CC tool. Use carefully in PVP when target is open."

    desert_collapse:
        name: "Desert Collapse"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 12000
        description: "Forward Guard AOE sand eruption. Large area knockdown."
        flows_into: ["sand_slash", "arid_assault", "dune_slash"]
        core_effect: "Core: Desert Collapse - Forward Guard during the skill"
        notes: "Large AOE with FG. Good for PVE clearing and PVP zoning."

    quicksand:
        name: "Quicksand"
        input: "W + LMB"
        keys: ["w", "lmb"]
        protection: "SA"
        cc: ["pull"]
        damage: medium
        cooldown_ms: 9000
        description: "Super Armor forward sand pull. Groups enemies for combo follow-up."
        flows_into: ["sand_slash", "arid_assault", "dune_slash"]
        notes: "Useful for grouping mobs in PVE and pulling targets in PVP."

    sand_veil:
        name: "Sand Veil"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff. Increases AP, attack speed, and evasion. Enhanced in succession."
        flows_into: ["sand_slash", "constriction", "shadow_leap"]
        core_effect: "Core: Sand Veil - Super Armor during the skill"
        notes: "Use before engaging. Hotbar recommended for tracking cooldown."

    cyclone_slash:
        name: "Cyclone Slash"
        input: "Shift + Q"
        keys: ["shift", "q"]
        protection: "SA"
        cc: ["knockback"]
        damage: medium
        cooldown_ms: 8000
        description: "Super Armor spinning Shamshir attack. AOE knockback."
        flows_into: ["sand_slash", "arid_assault"]
        notes: "Good AOE filler. Use between main skills for additional damage."

    sand_serpent:
        name: "Sand Serpent"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 10000
        description: "Ranged sand projectile from hotbar. Super Armor on cast."
        flows_into: ["sand_slash", "constriction"]
        notes: "Hotbar skill. Good ranged poke with SA protection."

    desert_shroud:
        name: "Desert Shroud"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 11000
        description: "Forward Guard sand explosion from hotbar. AOE stiffness."
        flows_into: ["sand_slash", "arid_assault"]
        notes: "Hotbar skill. Ranged AOE with frontal protection."

