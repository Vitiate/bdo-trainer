              keys: ["shift", "q"]
              note: "SA AOE filler"
            - skill: "wind_slash"
              input: "Shift + X"
              keys: ["shift", "x"]
              note: "Rabam filler"

# --------------------------------------------------------------------------
# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    protected_engage:
        name: "Protected Engage"
        description: >
            Safe engage using iframe teleport and Super Armor skills.
            Close distance with protection, then look for a grab or CC opening.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "shadow_leap"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe teleport to close distance"
            - skill: "constriction"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA stiffness engage"
            - skill: "sand_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "arid_assault"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"
            - skill: "flow_arid_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up"
            - skill: "dune_slash"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "SA bound finisher"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Hashashin PVP combo. Land a grab then chain into full burst.
            Hashashin's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "dune_slash"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Bound on grabbed target"
            - skill: "sand_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "arid_assault"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy slam follow-up"
            - skill: "flow_arid_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Constriction stiffness to catch an opponent,
            then chain into grab and full damage.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "constriction"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA stiffness — catch the target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab on stiffened target"
            - skill: "dune_slash"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Bound follow-up"
            - skill: "sand_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "arid_assault"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy damage"
            - skill: "flow_arid_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (1v1)"
        description: >
            Fast burst combo for duels. Deals high damage quickly
            while staying in protected skills. No grab needed.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "constriction"
              input: "W + F"
              keys: ["w", "f"]
              note: "SA engage with stiffness"
            - skill: "sand_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "SA main damage"
            - skill: "arid_assault"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "SA heavy burst"
            - skill: "flow_arid_burst"
              input: "LMB"
              keys: ["lmb"]
              note: "SA follow-up finisher"

    grab_punish:
        name: "Grab Punish (After Ally Grabs)"
        description: >
            Maximum damage combo when your teammate lands a grab
            or the target is already CC'd on the ground.
        difficulty: beginner
        combo_window_ms: 250
        steps:
            - skill: "dune_slash"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Instant bound on CC'd target"
            - skill: "desert_storm"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA AOE float"
            - skill: "sand_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst"
            - skill: "arid_assault"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Heavy follow-up"

    teleport_assassinate:
        name: "Teleport Assassinate"
        description: >
            Use Shadow Leap to teleport behind an unsuspecting target,
            then grab and burst them down. Classic Hashashin ambush play.
        difficulty: advanced
        combo_window_ms: 180
        steps:
