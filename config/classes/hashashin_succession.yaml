              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Teleport to next pack"

    endgame_grind:
        name: "Endgame Grind Rotation"
        description: "Full damage rotation for high-end grind spots. Uses all cooldowns."
        difficulty: advanced
        combo_window_ms: 250
        steps:
            - skill: "sand_veil"
              input: "Shift + E"
              keys: ["shift", "e"]
              note: "AP buff before engage"
            - skill: "shadow_leap"
              input: "Shift + Space"
              keys: ["shift", "space"]
              note: "Iframe engage"
            - skill: "quicksand"
              input: "W + LMB"
              keys: ["w", "lmb"]
              note: "Pull and group"
            - skill: "desert_collapse"
