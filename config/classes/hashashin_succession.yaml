              note: "SA AOE tornado on grouped mobs"
            - skill: "sand_slash"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main AOE damage"
            - skill: "arid_assault"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
