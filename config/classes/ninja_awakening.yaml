        protection: "none"
        cc: ["grab"]
        description: "Grab / grapple CC. Essential for Ninja PVP. Bypasses Super Armor."
        notes: "Core PVP tool. Ninja's grab is one of the best in the game. Practice swap → grab."

    block_jump:
        name: "Block Jump"
        input: "S + Space (in pre-awakening)"
        keys: ["s", "space"]
        protection: "iframe"
        cc: []
        description: "Quick backward iframe leap. Primary defensive iframe."
        notes: "Key survival tool. iframe on demand. Use to escape pressure or dodge grabs."

    evasion:
        name: "Evasion"
        input: "A / D (double tap)"
        keys: ["a"]
        keys_alt: ["d"]
        protection: "iframe"
        cc: []
        description: "Quick sidestep iframe. PVE iframe as well."
        notes: "Fast iframe for repositioning. Can chain into awakening skills."

    shadow_stomp:
        name: "Shadow Stomp"
        input: "S + F (in pre-awakening)"
        keys: ["s", "f"]
        protection: "SA"
        cc: ["bound"]
        description: "Ground stomp with Super Armor and bound CC. Used to set up combos."
        notes: "Great CC tool. SA protection. Bound into grab or Serpent Ascension."

    ninjutsu_shadow_clone:
        name: "Ninjutsu: Shadow Clone"
        input: "Shift + RMB (in pre-awakening)"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: []
        description: "Stealth / invisibility skill. SA during cast. Turns Ninja invisible."
