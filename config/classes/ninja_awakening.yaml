              note: "Grab on stiffened target"
            - skill: "serpent_ascension"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Main burst on CC'd target"
            - skill: "flow_execution"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up slam"
            - skill: "murderous_intent"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Extra burst damage"
            - skill: "katana_shower"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher"

    flash_bondage_catch:
        name: "Flash Bondage Catch (Ranged)"
        description: >
            Ranged catch combo. Hit Flash Bondage from distance for stiffness,
            then close the gap and grab for a full burst sequence.
        difficulty: advanced
        combo_window_ms: 200
        steps:
            - skill: "flash_bondage"
              input: "E (in awk)"
              keys: ["e"]
              note: "Ranged stiffness — catch from distance"
            - skill: "seamless"
              input: "Shift + F"
              keys: ["shift", "f"]
              note: "SA gap close to target"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab stiffened target"
            - skill: "serpent_ascension"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Full burst"
