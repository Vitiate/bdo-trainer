# PVP Combos
# --------------------------------------------------------------------------
pvp_combos:
    stealth_engage:
        name: "Stealth Engage"
        description: >
            Classic Ninja assassination opener. Go invisible with Shadow Clone,
            approach the target unseen, then burst from stealth.
        difficulty: intermediate
        combo_window_ms: 200
        steps:
            - skill: "ninjutsu_shadow_clone"
              input: "Shift + RMB (pre-awk)"
              keys: ["shift", "rmb"]
              note: "Go invisible — stealth approach"
            - skill: "ghost_greeting"
              input: "Q"
              keys: ["q"]
              note: "FG stiffness out of stealth"
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab stiffened target"
            - skill: "serpent_ascension"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Full burst on grabbed target"
            - skill: "flow_execution"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up slam for kill"
            - skill: "murderous_intent"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Finisher if target survives"

    grab_combo:
        name: "Grab Combo (1v1)"
        description: >
            Core Ninja PVP combo. Land a grab then chain into Serpent Ascension.
            Ninja's grab bypasses Super Armor — this is your primary kill tool.
        difficulty: advanced
        combo_window_ms: 180
        steps:
            - skill: "grab"
              input: "E"
              keys: ["e"]
              note: "Grab the target — bypasses SA"
            - skill: "serpent_ascension"
              input: "Shift + LMB"
              keys: ["shift", "lmb"]
              note: "Maximum burst on grabbed target"
            - skill: "flow_execution"
              input: "LMB"
              keys: ["lmb"]
              note: "Follow-up slam"
            - skill: "murderous_intent"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Extra damage if needed"
            - skill: "katana_shower"
              input: "Shift + RMB"
              keys: ["shift", "rmb"]
              note: "Finisher on downed target"

    catch_combo:
        name: "Catch / CC Chain"
        description: >
            Use Forward Guard or ranged CC to catch the target off guard,
            then chain into grab and full Serpent Ascension burst.
        difficulty: advanced
