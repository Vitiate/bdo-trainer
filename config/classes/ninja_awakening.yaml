              keys: ["lmb"]
              note: "Follow-up slam"
            - skill: "murderous_intent"
              input: "S + LMB"
              keys: ["s", "lmb"]
              note: "Finisher"

    quick_burst:
        name: "Quick Burst (No Grab)"
        description: >
            Fast burst combo for duels when grab is on cooldown or risky.
            Uses protected skills for safe damage output.
        difficulty: intermediate
        combo_window_ms: 200
