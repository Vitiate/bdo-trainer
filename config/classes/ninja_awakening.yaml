# ============================================================================
# BDO Trainer - Awakened Ninja Combo Configuration
# ============================================================================
# Class: Ninja (Awakening)
# Weapons: Shortsword (Main) / Shuriken (Off) / Sura Katana (Awakening — 6 swords)
# Damage Type: Melee
#
# Key Reference:
#   LMB  = Left Mouse Button
#   RMB  = Right Mouse Button
#   MMB  = Middle Mouse Button
#   W/A/S/D = Movement keys
#   Shift, Space, E, F, Q, X, Z = Ability modifiers
#
# Protection Types:
#   SA    = Super Armor (cannot be CC'd except by grab, still takes damage)
#   FG    = Forward Guard (blocks damage/CC from front)
#   iframe = Invincibility frame (no damage, no CC)
#   none  = Unprotected
#
# CC Types:
#   bound, knockdown, knockback, stiffness, stun, float, pull
#
# Ninja Awakening Identity:
#   - Highest burst damage in the game with Serpent Ascension
#   - Grab class — E grab bypasses Super Armor, core PVP tool
#   - Stealth via Ninjutsu: Shadow Clone for invisible approach
#   - Six floating Sura Katana swords for awakening stance
#   - Extremely high skill ceiling — demanding but rewarding
#
# Sources:
#   - Black Desert Foundry (blackdesertfoundry.com)
#   - Ninja Class Discord
#   - Community guides by Katan, Dae, Shinobi, BPGaming
# ============================================================================

class: Ninja
spec: Awakening

# --------------------------------------------------------------------------
# Awakening Skills
# --------------------------------------------------------------------------
awakening_skills:
    serpent_ascension:
        name: "Serpent Ascension"
        input: "Shift + LMB"
        keys: ["shift", "lmb"]
        protection: "SA"
        cc: ["float"]
        damage: high
        cooldown_ms: 10000
        description: "Signature skill. Massive upward slash with float CC. Highest burst in the game."
        flows_into: ["flow_execution", "katana_shower", "silent_step"]
        core_effect: "Core: Serpent Ascension - Extra hit and increased damage"
        notes: "The defining Ninja skill. Use after CC or grab for devastating burst. SA throughout."

    flow_execution:
        name: "Flow: Execution"
        input: "LMB (after Serpent Ascension)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 0
        description: "Follow-up slam after Serpent Ascension. Down attack with knockdown."
        flows_into: ["murderous_intent", "katana_shower"]
        notes: "Always chain after Serpent Ascension for maximum damage. Down attack properties."

    katana_shower:
        name: "Katana Shower"
        input: "Shift + RMB"
        keys: ["shift", "rmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: medium
        cooldown_ms: 8000
        description: "Multi-hit spinning slash with Super Armor. Decent AOE coverage."
        flows_into: ["serpent_ascension", "murderous_intent", "vacuum_slash"]
        notes: "Good filler damage skill with SA. Use between main cooldowns."

    sura_chaospree:
        name: "Sura ChaoSpree"
        input: "W + F"
        keys: ["w", "f"]
        protection: "SA"
        cc: ["stiffness"]
        damage: high
        cooldown_ms: 9000
        description: "Forward charge attack with Super Armor. Stiffness on hit. Strong gap closer."
        flows_into: ["flow_earth_dragon", "serpent_ascension", "katana_shower"]
        core_effect: "Core: Sura ChaoSpree - All DP +15 for 10 sec on hit"
        notes: "Strong engage tool with SA. Always flow into Earth Dragon for extra damage."

    flow_earth_dragon:
        name: "Flow: Earth Dragon"
        input: "LMB (after Sura ChaoSpree)"
        keys: ["lmb"]
        protection: "SA"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 0
        description: "Ground slam follow-up after Sura ChaoSpree. Bound CC."
        flows_into: ["serpent_ascension", "murderous_intent"]
        notes: "Always chain after Sura ChaoSpree. Bound allows follow-up burst."

    murderous_intent:
        name: "Murderous Intent"
        input: "S + LMB"
        keys: ["s", "lmb"]
        protection: "SA"
        cc: ["knockdown"]
        damage: high
        cooldown_ms: 7000
        description: "Heavy backward slash with Super Armor. High damage with knockdown."
        flows_into: ["serpent_ascension", "katana_shower", "vacuum_slash"]
        notes: "Strong burst skill. SA throughout. Good for damage when Serpent is on CD."

    seamless:
        name: "Seamless"
        input: "Shift + F"
        keys: ["shift", "f"]
        protection: "SA"
        cc: ["float"]
        damage: medium
        cooldown_ms: 6000
        description: "Quick forward dash attack. SA during skill. Float CC on hit."
        flows_into: ["serpent_ascension", "sura_chaospree", "katana_shower"]
        core_effect: "Core: Seamless - Forward Guard added after initial SA frames"
        notes: "Versatile engage/transition skill. SA makes it safe. Core adds FG at end."

    ghost_greeting:
        name: "Ghost Greeting"
        input: "Q"
        keys: ["q"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 5000
        description: "Forward Guard counter-style slash. Stiffness on hit."
        flows_into: ["serpent_ascension", "sura_chaospree", "grab"]
        notes: "FG protection lets you fish for stiffness. Confirm into grab or Serpent."

    silent_step:
        name: "Silent Step"
        input: "Space"
        keys: ["space"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 4000
        description: "Awakening dash/movement skill. SA during movement. PVE iframe."
        flows_into: ["serpent_ascension", "sura_chaospree", "katana_shower"]
        notes: "Primary awakening movement. PVE iframe (1s invincibility vs monsters). SA in PVP."

    blade_spin_blade:
        name: "Blade Spin Blade"
        input: "W + RMB"
        keys: ["w", "rmb"]
        protection: "SA"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 6000
        description: "Forward spinning blade attack with SA. Stiffness CC."
        flows_into: ["serpent_ascension", "katana_shower", "murderous_intent"]
        notes: "Good filler with SA protection. Use for approach or between cooldowns."

    vacuum_slash:
        name: "Vacuum Slash"
        input: "S + RMB"
        keys: ["s", "rmb"]
        protection: "FG"
        cc: ["pull"]
        damage: medium
        cooldown_ms: 8000
        description: "Forward Guard slash that pulls enemies in. Good for grouping."
        flows_into: ["serpent_ascension", "murderous_intent", "katana_shower"]
        notes: "Pull CC groups mobs in PVE. FG protection in PVP. Good setup tool."

    flash_bondage:
        name: "Flash Bondage"
        input: "E (in Awakening)"
        keys: ["e"]
        protection: "none"
        cc: ["stiffness"]
        damage: low
        cooldown_ms: 7000
        description: "Ranged shuriken stiffness CC. Unprotected but long range."
        flows_into: ["serpent_ascension", "sura_chaospree", "grab"]
        notes: "Ranged catch tool. Use from distance to stiff, then engage. Unprotected — be careful."

    drastic_measure:
        name: "Drastic Measure"
        input: "Shift + E"
        keys: ["shift", "e"]
        protection: "SA"
        cc: []
        damage: none
        cooldown_ms: 20000
        description: "Self-buff. Increases AP and attack speed. SA during cast."
        flows_into: ["serpent_ascension", "sura_chaospree"]
        core_effect: "Core: Drastic Measure - Extends buff duration by 5 sec"
        notes: "Use before engaging for AP buff. SA makes it safe to cast."

    corrupt_sword_dance:
        name: "Corrupt Sword Dance"
        input: "S + F"
        keys: ["s", "f"]
        protection: "none"
        cc: ["bound"]
        damage: medium
        cooldown_ms: 6000
        description: "Quick low sweep with bound CC. Unprotected."
        flows_into: ["serpent_ascension", "murderous_intent"]
        notes: "Bound CC but unprotected. Use only when target is already CC'd or as surprise catch."

    flow_shadow_strike:
        name: "Flow: Shadow Strike"
        input: "F (after awakening skills)"
        keys: ["f"]
        protection: "FG"
        cc: ["stiffness"]
        damage: medium
        cooldown_ms: 0
        description: "Follow-up Forward Guard attack available after multiple awakening skills."
        flows_into: ["serpent_ascension", "katana_shower"]
        notes: "Can be chained after many awakening skills. FG filler between combos."

    ankle_cutter:
        name: "Ankle Cutter"
        input: "Hotbar Only"
        keys: ["hotbar"]
        protection: "none"
        cc: ["bound"]
        damage: low
        cooldown_ms: 5000
        description: "Quick low strike with bound CC. Hotbar recommended."
        flows_into: ["serpent_ascension", "sura_chaospree"]
        notes: "Hotbar skill. Bound CC for catch attempts. Unprotected."

